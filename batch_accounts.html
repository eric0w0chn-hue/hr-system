<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>批次建立帳號 — 鑫系統</title>
<style>
:root{
  --bg:#ECEEF2;--surface:#fff;--surface2:#F4F5F8;--border:#DDE1E9;--border2:#C8CDD8;
  --text:#1A1D23;--text2:#5A6175;--text3:#9AA0B4;--accent:#2D3142;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.topbar{height:60px;background:var(--accent);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:14px}
.back-btn{font-size:12px;padding:5px 13px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);font-family:inherit}
.back-btn:hover{background:rgba(255,255,255,.2)}
.topbar h1{font-size:16px;font-weight:700;color:#fff}
.main{max-width:900px;margin:0 auto;padding:28px 20px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-num{font-size:24px;font-weight:700;color:var(--accent)}
.stat-num.green{color:#087443}
.stat-num.red{color:#C0392B}
.stat-num.orange{color:#C47A00}
.stat-label{font-size:12px;color:var(--text3);margin-top:4px}

/* Action bar */
.action-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.btn{font-size:13px;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);color:var(--text2)}
.btn:hover{background:var(--surface2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover:not(:disabled){background:#3D4158}
.btn-success{background:#087443;color:#fff;border-color:#087443}
.btn-success:hover:not(:disabled){background:#065F36}
.progress-wrap{flex:1;min-width:200px}
.progress-bar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.progress-fill{height:100%;background:linear-gradient(90deg,#2D3142,#5B6894);border-radius:4px;transition:width .3s}
.progress-text{font-size:11px;color:var(--text3);margin-top:4px}

/* Table */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);background:var(--surface2);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #F4F5F8;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFC}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;gap:4px}
.badge-pending{background:#F4F5F8;color:#5A6175;border:1px solid var(--border)}
.badge-done{background:#E6FAF0;color:#087443;border:1px solid #ADE8C4}
.badge-error{background:#FEE9E9;color:#C0392B;border:1px solid #FFBDBD}
.badge-skip{background:#FFF4E0;color:#C47A00;border:1px solid #FDDFA0}
.mono{font-family:monospace;font-size:12px;color:var(--text2)}
.log-area{background:#1A1D23;color:#A8B4C8;font-family:monospace;font-size:12px;padding:16px;border-radius:10px;height:160px;overflow-y:auto;margin-top:12px;line-height:1.6}
.log-area .ok{color:#5DBB8F}
.log-area .err{color:#E57373}
.log-area .info{color:#7EB8D4}
#loading{position:fixed;inset:0;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

  <div class="main">

      <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">員工總數</div></div>
      <div class="stat-card"><div class="stat-num orange" id="statPending">0</div><div class="stat-label">待建立</div></div>
      <div class="stat-card"><div class="stat-num green" id="statDone">0</div><div class="stat-label">已建立</div></div>

              <th style="width:100px">預設密碼</th>
              <th style="width:150px">工作地點</th>

          </thead>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyAg_dfvoxA1dQYqHzdqPtEot8wT-wKZal4",authDomain:"liangpinghri.firebaseapp.com",projectId:"liangpinghri",storageBucket:"liangpinghri.firebasestorage.app",messagingSenderId:"410255807470",appId:"1:410255807470:web:dc08ba070c7db4f083f4ff"};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let employees = [];
let empStatuses = {}; // empId -> 'pending'|'done'|'error'|'skip'
let isRunning = false;

// ── 民國生日密碼 ──
function birthdayToPassword(birthday){
  if(!birthday) return '';
  const parts = birthday.split('-');
  if(parts.length!==3) return '';
  const rocYear = parseInt(parts[0]) - 1911;
  return String(rocYear) + parts[1] + parts[2];
}

// ── Log ──
function log(msg, type='info'){
  const area = document.getElementById('logArea');
  const span = document.createElement('span');
  span.className = type;
  span.textContent = msg + '\n';
  area.appendChild(span);
  area.scrollTop = area.scrollHeight;
}

// ── 更新統計 ──
function updateStats(){
  const total = employees.length;
  const done  = Object.values(empStatuses).filter(s=>s==='done').length;
  const error = Object.values(empStatuses).filter(s=>s==='error').length;
  const skip  = Object.values(empStatuses).filter(s=>s==='skip').length;
  const pending = total - done - error - skip;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statError').textContent = error;
}

// ── 渲染表格 ──
function renderTable(){
  const tbody = document.getElementById('empTable');
  tbody.innerHTML = employees.map((e,i)=>{
    const pwd = birthdayToPassword(e.birthday);
    const status = empStatuses[e.id] || 'pending';
    const hasUid = !!e.uid;
    const badgeMap = {
      pending: hasUid ? '<span class="badge badge-skip">已有帳號</span>' : '<span class="badge badge-pending">待建立</span>',
      done:    '<span class="badge badge-done">✓ 已建立</span>',
      error:   '<span class="badge badge-error">✕ 失敗</span>',
      skip:    '<span class="badge badge-skip">已有帳號</span>',
    };
    return `<tr id="row-${e.id}">
      <td style="color:var(--text3)">${i+1}</td>
      <td style="font-weight:500">${e.name}</td>
      <td class="mono">${e.idNo||'—'}</td>
      <td class="mono">${e.birthday||'—'}</td>
      <td class="mono">${pwd||'—'}</td>
      <td style="font-size:12px;color:var(--text2)">${e.workLocation||'—'}</td>
      <td id="status-${e.id}">${badgeMap[hasUid?'skip':status]}</td>
    </tr>`;
  }).join('');
}

function updateRowStatus(empId, status){
  empStatuses[empId] = status;
  const cell = document.getElementById(`status-${empId}`);
  if(!cell) return;
  const badgeMap = {
    done:  '<span class="badge badge-done">✓ 已建立</span>',
    error: '<span class="badge badge-error">✕ 失敗</span>',
    skip:  '<span class="badge badge-skip">已有帳號</span>',
  };
  cell.innerHTML = badgeMap[status] || '';
  updateStats();
}

// ── 批次建立 ──
window.startBatch = async function(){
  if(isRunning) return;
  const needCreate = employees.filter(e => !e.uid && e.idNo && e.birthday);
  if(!needCreate.length){log('沒有需要建立的帳號！','info');return;}
  if(!confirm(`即將為 ${needCreate.length} 位員工批次建立帳號，確定繼續？`)) return;

  isRunning = true;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('logArea').innerHTML = '';

  let done=0, errors=0;
  const total = needCreate.length;

  for(const emp of needCreate){
    const idNo = emp.idNo.trim().toUpperCase();
    const pwd  = birthdayToPassword(emp.birthday);
    const fakeEmail = `${idNo.toLowerCase()}@liangpinghri.com`;

    // 更新進度
    const pct = Math.round((done+errors)/total*100);
    document.getElementById('progressFill').style.width = pct+'%';
    document.getElementById('progressText').textContent = `${done+errors}/${total} 完成`;

    try{
      // 用次要實例建立，不影響目前登入
      const { initializeApp: initApp2 } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
      const { getAuth: getAuth2, createUserWithEmailAndPassword: createUser2, signOut: signOut2 } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
      const appName = 'batch-' + Date.now() + '-' + Math.random();
      const app2 = initApp2(firebaseConfig, appName);
      const auth2 = getAuth2(app2);

      // 若遇到限流，等待後重試最多 3 次
      let cred, retries = 0;
      while(retries < 3){
        try{
          cred = await createUser2(auth2, fakeEmail, pwd);
          break;
        }catch(retryErr){
          if(retryErr.code === 'auth/too-many-requests' && retries < 2){
            retries++;
            log(`⏳ ${emp.name} 遇到限流，等待 ${retries*5} 秒後重試...`, 'info');
            await new Promise(r=>setTimeout(r, retries * 5000));
          } else {
            throw retryErr;
          }
        }
      }

      const uid = cred.user.uid;
      await signOut2(auth2);

      // 寫入 users collection
      await setDoc(doc(db,'users',uid),{
        empId: emp.id, idNo, name: emp.name,
        role: 'employee', disabled: false,
        createdAt: new Date().toISOString()
      });

      // 把 uid 寫回 employees 資料
      emp.uid = uid;

      updateRowStatus(emp.id, 'done');
      log(`✓ ${emp.name} (${idNo}) 密碼：${pwd}`, 'ok');
      done++;
    } catch(err){
      if(err.code === 'auth/email-already-in-use'){
        log(`↷ ${emp.name} (${idNo}) 帳號已存在，跳過`, 'info');
        updateRowStatus(emp.id, 'skip');
        done++;
      } else {
        log(`✕ ${emp.name} (${idNo}) 失敗：${err.message}`, 'err');
        updateRowStatus(emp.id, 'error');
        errors++;
      }
    }

    // 每建立 1 筆暫停，避免 Firebase 限流
    await new Promise(r=>setTimeout(r,1200));
  }

  // 最後把 uid 更新回 Firestore employees
  try{
    const snap = await getDoc(doc(db,'hr','employees'));
    const list = snap.exists() ? snap.data().list : [];
    const empMap = {};
    employees.forEach(e=>{ if(e.uid) empMap[e.id]=e.uid; });
    const updated = list.map(e=> empMap[e.id] ? {...e, uid:empMap[e.id]} : e);
    await setDoc(doc(db,'hr','employees'), {list:updated});
    log(`\n✓ 已將所有 uid 同步回員工資料`, 'ok');
  } catch(e){
    log(`✕ 同步 uid 回員工資料失敗：${e.message}`, 'err');
  }

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = `完成！成功 ${done} 筆，失敗 ${errors} 筆`;
  log(`\n完成！成功：${done}，失敗：${errors}`, 'ok');
  document.getElementById('startBtn').disabled = false;
  isRunning = false;
};

// ── 初始化 ──
onAuthStateChanged(auth, async user=>{
  if(!user){window.location.href='/hr-system/index.html';return;}
  const snap = await getDoc(doc(db,'users',user.uid));
  if(!snap.exists()||snap.data().role!=='admin'){
    window.location.href='/hr-system/dashboard.html';return;
  }

  // 載入員工
  try{
    const s = await getDoc(doc(db,'hr','employees'));
    employees = s.exists() ? (s.data().list||[]) : [];
    // 初始化狀態：已有 uid 的標為 skip
    employees.forEach(e=>{ if(e.uid) empStatuses[e.id]='skip'; });
  }catch(e){ employees=[]; }

  document.getElementById('logArea').innerHTML = '';
  log(`載入完成，共 ${employees.length} 位員工`, 'info');
  const needCreate = employees.filter(e=>!e.uid).length;
  log(`需要建立帳號：${needCreate} 位`, 'info');

  updateStats();
  renderTable();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
});
</script>
</body>
</html>
