<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>菜價回報 — 鑫系統</title>
<style>
:root{
  --bg:#F0F2F5;--surface:#FFFFFF;--surface2:#F7F8FA;
  --border:#E4E7ED;--border2:#D0D5DD;
  --text:#1A1D23;--text2:#5A6175;--text3:#9AA0B4;
  --accent:#3B5BDB;--accent-light:#EEF2FF;
  --green:#087443;--green-bg:#E6FAF0;--green-border:#ADE8C4;
  --red:#C0392B;--red-bg:#FEE9E9;--red-border:#FFBDBD;
  --yellow:#C47A00;--yellow-bg:#FFF4E0;--yellow-border:#FDDFA0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.back-btn{font-size:13px;color:var(--text2);cursor:pointer;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);transition:all .15s;font-family:inherit}
.back-btn:hover{background:var(--surface2);color:var(--text)}
.dv{width:1px;height:20px;background:var(--border)}
.page-title{font-size:15px;font-weight:700}
.main{max-width:900px;margin:0 auto;padding:24px 20px;display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.card-body{padding:16px 18px}

/* 表單元素 */
.fr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.fr label{font-size:12px;color:var(--text2);min-width:44px;flex-shrink:0}
.inp{flex:1;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,91,219,.1)}
.sel{font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:inherit;outline:none;cursor:pointer}
.sel:focus{border-color:var(--accent)}

/* banner */
.banner{border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.banner-blue{background:var(--accent-light);border:1px solid #BAC8FF;color:var(--accent)}
.banner-green{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green)}

/* 廠商管理 */
.vendor-wrap{position:relative;flex:1}
.vendor-input-row{display:flex;gap:6px;align-items:center}
.vendor-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:200;max-height:220px;overflow-y:auto;display:none}
.vendor-dropdown.open{display:block}
.vd-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #F4F5F8;transition:background .1s}
.vd-item:last-child{border-bottom:none}
.vd-item:hover{background:var(--surface2)}
.vd-item .vd-del{font-size:11px;color:var(--text3);padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surface);cursor:pointer}
.vd-item .vd-del:hover{color:var(--red);border-color:var(--red-border);background:var(--red-bg)}
.vd-add-row{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--border);background:var(--surface2)}
.vd-add-row input{flex:1;font-size:12px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-family:inherit;outline:none}
.vd-add-row button{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;white-space:nowrap}

/* 品項列 */
.col-header{display:grid;grid-template-columns:1.4fr 1fr 90px 32px;gap:6px;margin-bottom:4px;padding:0 2px}
.col-header span{font-size:11px;color:var(--text3);font-weight:600}
.item-rows{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.item-row{display:grid;grid-template-columns:1.4fr 1fr 90px 32px;gap:6px;align-items:center}
.item-row .item-name-wrap{position:relative}
.item-row .item-name-wrap input{width:100%;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.item-row .item-name-wrap input:focus{border-color:var(--accent)}
.item-dropdown{position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.1);z-index:200;max-height:180px;overflow-y:auto;display:none}
.item-dropdown.open{display:block}
.id-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid #F4F5F8;transition:background .1s}
.id-item:last-child{border-bottom:none}
.id-item:hover{background:var(--surface2)}
.id-del{font-size:11px;color:var(--text3);padding:1px 5px;border-radius:4px;border:1px solid var(--border);cursor:pointer}
.id-del:hover{color:var(--red);border-color:var(--red-border);background:var(--red-bg)}
.id-add-row{display:flex;gap:5px;padding:7px 8px;border-top:1px solid var(--border);background:var(--surface2)}
.id-add-row input{flex:1;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-family:inherit;outline:none}
.id-add-row button{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;white-space:nowrap}

/* 規格欄 */
.unit-row{display:flex;gap:4px;align-items:center}
.unit-row input[type=number]{width:52px;font-size:13px;padding:7px 6px;border:1px solid var(--border);border-radius:8px;text-align:center;font-family:inherit;outline:none}
.unit-row input[type=number]:focus{border-color:var(--accent)}
.unit-row select{font-size:12px;padding:7px 4px;border:1px solid var(--border);border-radius:8px;font-family:inherit;background:var(--surface);outline:none;cursor:pointer;flex:1}
.unit-row select:focus{border-color:var(--accent)}

/* 價格欄 */
.price-inp{width:100%;font-size:13px;padding:7px 8px;border:1px solid var(--border);border-radius:8px;text-align:right;font-family:inherit;outline:none}
.price-inp:focus{border-color:var(--accent)}
.del-row-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.del-row-btn:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.add-item-btn{width:100%;padding:8px;border:1px dashed var(--border2);border-radius:8px;background:transparent;color:var(--text3);cursor:pointer;font-size:13px;transition:all .15s;font-family:inherit;margin-top:2px}
.add-item-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

/* 按鈕 */
.btn{font-size:13px;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;border:1px solid var(--border);display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#2F4AC8}
.btn-outline{background:var(--surface);color:var(--text2)}
.btn-outline:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.btn-danger:hover{background:#ffd0d0}
.submit-row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}

/* 查看區 */
.store-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.store-tab{font-size:12px;padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;font-family:inherit}
.store-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.report-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.report-card-header{padding:10px 14px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface2)}
.report-store{font-size:13px;font-weight:600}
.report-table{width:100%;border-collapse:collapse;background:var(--surface)}
.report-table th{font-size:11px;color:var(--text3);font-weight:600;padding:7px 12px;text-align:left;background:var(--surface2)}
.report-table td{font-size:13px;padding:8px 12px;border-top:1px solid var(--border)}
.report-table tr:hover td{background:#F7F8FF}
.price-val{font-weight:600;color:var(--accent)}

/* 右側 */
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px}
.summary-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between}
.summary-empty{padding:20px;text-align:center;font-size:12px;color:var(--text3)}
.vis-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.vis-row:last-child{border-bottom:none}
.toggle{position:relative;display:inline-block;width:40px;height:22px;cursor:pointer;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.tg-sl{position:absolute;inset:0;background:#C8CDD8;border-radius:22px;transition:.2s}
.tg-kn{position:absolute;left:2px;top:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked + .tg-sl{background:var(--accent)}
.toggle input:checked + .tg-sl + .tg-kn{left:20px}

/* loading / toast */
.empty-state{text-align:center;padding:36px 20px;color:var(--text3);font-size:13px}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading{position:fixed;inset:0;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
.spin-lg{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.toast{position:fixed;bottom:24px;right:24px;background:#1A1D23;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;z-index:2000;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:800px){.main{padding:14px}.topbar{padding:0 14px}}
/* cdd 下拉元件（比照人員管理）*/
.cdd{position:relative;display:inline-block;width:100%}
.cdd-trigger{width:100%;font-size:13px;padding:8px 32px 8px 11px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);cursor:pointer;text-align:left;font-family:inherit;appearance:none;-webkit-appearance:none;transition:border-color .15s;position:relative}
.cdd-trigger:hover{border-color:#9CA3AF}
.cdd-menu{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:2000;max-height:220px;overflow-y:auto;overflow-x:hidden;display:none;scrollbar-width:thin}
.cdd-menu.open{display:block}
.cdd-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;font-size:13px;color:var(--text)}
.cdd-item:hover{background:#F7F8FF}
.cdd-item.selected{background:var(--accent-light);color:var(--accent);font-weight:500}
.cdd-item .cdd-del{background:none;border:none;cursor:pointer;color:#D1D5DB;font-size:14px;line-height:1;padding:2px 5px;border-radius:4px;flex-shrink:0;transition:all .1s}
.cdd-item .cdd-del:hover{color:#EF4444;background:#FEE2E2}
.cdd-drag{color:#C0C0C0;cursor:grab;font-size:12px;margin-right:6px;padding:0 2px;flex-shrink:0;user-select:none}
.cdd-drag:active{cursor:grabbing}
.cdd-item.drag-over{border-top:2px solid var(--accent);background:#EEF2FF}
.cdd-placeholder{color:var(--text3)}
.cdd-add{display:flex;align-items:center;gap:6px;padding:8px 12px;border-top:1px solid #F3F4F6;font-size:12px;color:var(--text2);position:sticky;bottom:0;background:#fff;z-index:1}
.cdd-add input{flex:1;font-size:12px;padding:5px 9px;border:1px solid var(--border);border-radius:6px;font-family:inherit}
.cdd-add input:focus{outline:none;border-color:var(--accent)}
/* 廠商區塊 */
.vendor-block{border:1px solid var(--border);border-radius:12px;overflow:visible;margin-bottom:12px;background:var(--surface2)}
.vb-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);border-radius:12px 12px 0 0}
.vb-header .vendor-wrap{flex:1;position:relative}
.vb-header .vendor-wrap input{width:100%;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:inherit;outline:none}
.vb-header .vendor-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,91,219,.1)}
.vb-body{padding:12px 14px}
@media(max-width:480px){.item-row{grid-template-columns:1fr 1fr 80px 32px}.col-header{grid-template-columns:1fr 1fr 80px 32px}}
</style>
</head>
<body>
<div id="loading"><div class="spin-lg"></div><div style="font-size:13px;color:var(--text3)">載入中...</div></div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <button class="back-btn" onclick="window.location.href='/hr-system/dashboard.html'">← 主選單</button>
      <div class="dv"></div>
      <span class="page-title">🥬 菜價回報</span>
    </div>
    <span id="todayLabel" style="font-size:12px;color:var(--text3)"></span>
  </div>

  <div class="main">
    <!-- 左側 -->
    <div>
      <!-- 回報表單 -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">今日回報</span>
          <span id="myStoreLabel" style="font-size:12px;color:var(--accent);font-weight:600"></span>
        </div>
        <div class="card-body">
          <div id="formBanner"></div>

          <!-- 店面選擇 -->
          <div id="storeRow" class="fr">
            <label>店面</label>
            <select id="f-store" class="inp"></select>
          </div>

          <!-- 廠商區塊列表（可多個） -->
          <div id="vendorBlocks"></div>
          <button class="add-item-btn" style="margin-bottom:14px" onclick="addVendorBlock()">＋ 新增廠商</button>

          <div class="fr" style="margin-top:4px">
            <label>備註</label>
            <input type="text" id="f-note" class="inp" placeholder="選填">
          </div>

          <div class="submit-row">
            <button class="btn btn-outline" onclick="clearForm()">清除</button>
            <button class="btn btn-primary" id="submitBtn" onclick="submitReport()">📤 送出回報</button>
          </div>
        </div>
      </div>

      <!-- 歷史查看 -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">歷史回報</span>
          <input type="date" id="viewDate" class="sel" style="font-size:12px;padding:5px 8px" onchange="loadReports()">
        </div>
        <div class="card-body" style="padding:14px">
          <div class="store-tabs" id="storeTabs"></div>
          <div id="reportList"><div class="empty-state">請稍候...</div></div>
        </div>
      </div>
    </div>

      <!-- Admin 可見性設定（預設收起）-->
      <div id="adminSection" style="display:none;margin-top:0">
        <div class="card">
          <div class="card-header" style="cursor:pointer" onclick="toggleVisSection()">
            <span class="card-title">可見店面設定</span>
            <div style="display:flex;align-items:center;gap:8px">
              <button class="btn btn-outline" style="font-size:11px;padding:4px 10px" id="saveVisBtn"
                onclick="event.stopPropagation();saveVisibility()" hidden>儲存</button>
              <span id="visSectionArrow" style="font-size:12px;color:var(--text3)">▸ 展開</span>
            </div>
          </div>
          <div id="visibilityList" style="display:none;padding:0 18px 12px"></div>
        </div>
      </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, getDocs, collection, query, where, addDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fc={apiKey:"AIzaSyAg_dfvoxA1dQYqHzdqPtEot8wT-wKZal4",authDomain:"liangpinghri.firebaseapp.com",projectId:"liangpinghri",storageBucket:"liangpinghri.firebasestorage.app",messagingSenderId:"410255807470",appId:"1:410255807470:web:dc08ba070c7db4f083f4ff"};
const app=initializeApp(fc);
const auth=getAuth(app);
const db=getFirestore(app);

let cu=null,cRole='',cName='',cStore='';
let allStores=[],visibleStores=[],allReports=[],todayStr='';
let vendorOptions=[],itemOptions=[];
let storeFilter='all';

function toast(m,d=2200){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function twToday(){return new Date(Date.now()+8*3600000).toISOString().slice(0,10);}
function fmtDate(ds){if(!ds)return'—';const[y,m,d]=ds.split('-');return`${+y-1911}年${+m}月${+d}日`;}
function fmtTime(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Taipei'});}

// ══ cdd 下拉元件（廠商＆品項共用）══
let _priceDragSrc=null;

function priceCddHtml(id, options, value, onSelectFn, placeholder='請選擇或新增'){
  const safeId=id.replace(/[^a-zA-Z0-9_]/g,'_');
  return `<div class="cdd" id="pcdd-wrap-${safeId}">
    <button type="button" class="cdd-trigger" onclick="pcddToggle('${safeId}')">
      <span id="pcdd-label-${safeId}" class="${value?'':'cdd-placeholder'}">${value||placeholder}</span>▾
    </button>
    <input type="hidden" id="pcdd-val-${safeId}" value="${value||''}">
    <div class="cdd-menu" id="pcdd-menu-${safeId}">
      ${options.map(o=>`<div class="cdd-item${o===value?' selected':''}" draggable="true" data-val="${o.replace(/"/g,'&quot;')}"
        ondragstart="priceDragStart(event,'${safeId}')"
        ondragover="priceDragOver(event)"
        ondragleave="e=>e.currentTarget.classList.remove('drag-over')"
        ondrop="priceDrop(event,'${safeId}','${onSelectFn}')"
        onclick="pcddSelect('${safeId}','${onSelectFn}','${o.replace(/'/g,"\\'")}')">
        <span class="cdd-drag" onclick="event.stopPropagation()">⠿</span>
        <span style="flex:1">${o}</span>
        <button class="cdd-del" onclick="event.stopPropagation();pcddDel('${safeId}','${o.replace(/'/g,"\\'")}','${onSelectFn}')">×</button>
      </div>`).join('')}
      <div class="cdd-add" onclick="event.stopPropagation()">
        <input id="pcdd-inp-${safeId}" placeholder="輸入後按 ＋ 新增" onkeydown="if(event.key==='Enter'){event.preventDefault();pcddAdd('${safeId}','${onSelectFn}')}">
        <button type="button" onclick="pcddAdd('${safeId}','${onSelectFn}')" style="background:#1a1a19;color:#fff;border:none;border-radius:5px;padding:3px 10px;cursor:pointer;font-size:12px;white-space:nowrap">＋</button>
      </div>
    </div>
  </div>`;
}

window.pcddToggle=function(safeId){
  const menu=document.getElementById('pcdd-menu-'+safeId);
  if(!menu)return;
  const open=menu.classList.contains('open');
  document.querySelectorAll('.cdd-menu.open').forEach(m=>{m.classList.remove('open');m.style.cssText='';});
  if(!open){menu.style.position='absolute';menu.style.top='calc(100% + 4px)';menu.style.left='0';menu.style.width='100%';menu.style.zIndex='9999';menu.classList.add('open');}
};

window.pcddSelect=function(safeId,cbFn,val){
  const lbl=document.getElementById('pcdd-label-'+safeId);
  const hid=document.getElementById('pcdd-val-'+safeId);
  const menu=document.getElementById('pcdd-menu-'+safeId);
  if(lbl){lbl.textContent=val;lbl.classList.remove('cdd-placeholder');}
  if(hid) hid.value=val;
  if(menu){menu.querySelectorAll('.cdd-item').forEach(i=>i.classList.toggle('selected',i.querySelector('span:nth-child(2)')?.textContent===val));menu.classList.remove('open');menu.style.cssText='';}
  // 呼叫 callback（如果有的話）
  if(cbFn&&window[cbFn]) window[cbFn](safeId,val);
};

window.pcddDel=async function(safeId,val,cbFn){
  if(!confirm(`確定刪除「${val}」？`))return;
  // 判斷是廠商還是品項
  if(safeId.startsWith('vendor_')){
    vendorOptions=vendorOptions.filter(x=>x!==val);
  } else {
    itemOptions=itemOptions.filter(x=>x!==val);
  }
  await saveOptions();
  toast('已刪除');
  const menu=document.getElementById('pcdd-menu-'+safeId);
  if(menu){const item=Array.from(menu.querySelectorAll('.cdd-item')).find(el=>el.dataset.val===val);if(item)item.remove();}
  const hid=document.getElementById('pcdd-val-'+safeId);
  if(hid&&hid.value===val){hid.value='';const lbl=document.getElementById('pcdd-label-'+safeId);if(lbl){lbl.textContent='請選擇或新增';lbl.classList.add('cdd-placeholder');}}
};

window.pcddAdd=async function(safeId,cbFn){
  const cinp=document.getElementById('pcdd-inp-'+safeId);
  if(!cinp||!cinp.value.trim()) return;
  const n=cinp.value.trim();
  const isVendor=safeId.startsWith('vendor_');
  const arr=isVendor?vendorOptions:itemOptions;
  if(arr.includes(n)){toast('此項目已存在');return;}
  arr.push(n);
  await saveOptions();
  toast(`✅ 已新增「${n}」`);
  cinp.value='';
  const menu=document.getElementById('pcdd-menu-'+safeId);
  if(menu){
    const addRow=menu.querySelector('.cdd-add');
    const div=document.createElement('div');
    div.className='cdd-item selected';div.setAttribute('draggable','true');div.dataset.val=n;
    div.setAttribute('ondragstart',`priceDragStart(event,'${safeId}')`);
    div.setAttribute('ondragover','priceDragOver(event)');
    div.innerHTML=`<span class="cdd-drag" onclick="event.stopPropagation()">⠿</span><span style="flex:1">${n}</span><button class="cdd-del" onclick="event.stopPropagation();pcddDel('${safeId}','${n}','${cbFn}')">×</button>`;
    div.onclick=()=>pcddSelect(safeId,cbFn,n);
    menu.insertBefore(div,addRow);
  }
  pcddSelect(safeId,cbFn,n);
};

window.priceDragStart=function(e,safeId){
  _priceDragSrc=e.currentTarget;e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{if(_priceDragSrc)_priceDragSrc.style.opacity='0.4';},0);
};
window.priceDragOver=function(e){e.preventDefault();e.currentTarget.classList.add('drag-over');};
window.priceDrop=async function(e,safeId,cbFn){
  e.preventDefault();e.stopPropagation();e.currentTarget.classList.remove('drag-over');
  if(!_priceDragSrc||_priceDragSrc===e.currentTarget)return;
  const menu=document.getElementById('pcdd-menu-'+safeId);if(!menu)return;
  const items=[...menu.querySelectorAll('.cdd-item[draggable]')];
  const si=items.indexOf(_priceDragSrc),ti=items.indexOf(e.currentTarget);
  if(si<ti) e.currentTarget.after(_priceDragSrc); else e.currentTarget.before(_priceDragSrc);
  _priceDragSrc.style.opacity='1';
  // 同步陣列
  const isVendor=safeId.startsWith('vendor_');
  const arr=isVendor?vendorOptions:itemOptions;
  const newOrder=[...menu.querySelectorAll('.cdd-item[draggable]')].map(el=>el.dataset.val).filter(Boolean);
  arr.length=0;newOrder.forEach(v=>arr.push(v));
  await saveOptions();
  _priceDragSrc=null;
};
document.addEventListener('dragend',()=>{
  document.querySelectorAll('.cdd-item[draggable]').forEach(el=>{el.style.opacity='1';el.classList.remove('drag-over');});
  _priceDragSrc=null;
});
document.addEventListener('click',e=>{
  if(!e.target.closest('.cdd')) document.querySelectorAll('.cdd-menu.open').forEach(m=>{m.classList.remove('open');m.style.cssText='';});
  if(!e.target.closest('.item-name-wrap')) document.querySelectorAll('.item-dropdown.open').forEach(d=>d.classList.remove('open'));
});

// ══ 廠商區塊管理 ══
let vbCount=0;

window.addVendorBlock=function(vendor='',items=[]){
  const container=document.getElementById('vendorBlocks');
  const bid=vbCount++;
  const safeId=`vendor_${bid}`;
  const div=document.createElement('div');
  div.className='vendor-block';div.dataset.bid=bid;
  div.innerHTML=`
    <div class="vb-header" style="display:flex;align-items:center;gap:8px">
      <div style="flex:1">${priceCddHtml(safeId,vendorOptions,vendor,'',`請選擇或新增廠商`)}</div>
      <button class="del-row-btn" onclick="this.closest('.vendor-block').remove()" title="移除" style="flex-shrink:0">×</button>
    </div>
    <div class="vb-body">
      <div class="col-header"><span>品項名稱</span><span>數量 / 單位</span><span style="text-align:right">單價(元)</span><span></span></div>
      <div class="item-rows" id="iRows-${bid}"></div>
      <button class="add-item-btn" onclick="addItemRow(${bid})">＋ 新增品項</button>
    </div>`;
  container.appendChild(div);
  if(items.length) items.forEach(i=>addItemRow(bid,i.item,i.qty,i.unit,i.price));
  else addItemRow(bid);
};

// ══ 品項列（品項名稱改用 cdd）══
window.addItemRow=function(bid,item='',qty='',unit='公斤',price=''){
  const rows=document.getElementById(`iRows-${bid}`);
  if(!rows) return;
  const idx=rows.children.length;
  const safeId=`item_${bid}_${idx}`;
  const div=document.createElement('div');
  div.className='item-row';
  div.innerHTML=`
    <div style="position:relative">${priceCddHtml(safeId,itemOptions,item,'','請選擇或新增品項')}</div>
    <div class="unit-row">
      <input type="number" value="${qty}" placeholder="數量" min="0" step="0.5">
      <select>
        <option value="件"${unit==='件'?' selected':''}>件</option>
        <option value="公斤"${unit==='公斤'?' selected':''}>公斤</option>
        <option value="斤"${unit==='斤'?' selected':''}>斤</option>
      </select>
    </div>
    <input type="number" class="price-inp" value="${price}" placeholder="0" min="0" step="0.5">
    <button class="del-row-btn" onclick="this.closest('.item-row').remove()">×</button>`;
  rows.appendChild(div);
};

window.clearForm=function(){
  document.getElementById('vendorBlocks').innerHTML='';
  document.getElementById('f-note').value='';
  vbCount=0;
  addVendorBlock();
};

function getVendorBlocks(){
  return [...document.querySelectorAll('#vendorBlocks .vendor-block')].map(block=>{
    const bid=block.dataset.bid;
    const safeId=`vendor_${bid}`;
    // 從 cdd 的 hidden input 取值
    const vendor=(document.getElementById(`pcdd-val-${safeId}`)?.value||'').trim();
    const items=[...block.querySelectorAll('.item-rows .item-row')].map((r,idx)=>{
      const itemSafeId=`item_${bid}_${idx}`;
      const item=(document.getElementById(`pcdd-val-${itemSafeId}`)?.value||'').trim();
      const unitInps=r.querySelectorAll('.unit-row input,.unit-row select');
      const priceInp=r.querySelector('.price-inp');
      return{item,qty:parseFloat(unitInps[0]?.value)||0,unit:unitInps[1]?.value||'件',price:parseFloat(priceInp?.value)||0};
    }).filter(r=>r.item);
    return{vendor,items};
  }).filter(b=>b.vendor);
}


// ══ 今日是否已回報（同店同日） ══
async function checkTodayReport(store){
  const s=await getDocs(query(collection(db,'price_reports'),where('date','==',todayStr),where('uid','==',cu.uid),where('store','==',store)));
  return s.empty?null:s.docs[0];
}

// ══ 送出回報（支援多廠商） ══
window.submitReport=async function(){
  const note=document.getElementById('f-note').value.trim();
  const store=document.getElementById('f-store').value;
  const blocks=getVendorBlocks();
  if(!store){toast('請選擇店面');return;}
  if(!blocks.length){toast('請至少填寫一個廠商');return;}
  if(blocks.some(b=>!b.items.length)){toast('每個廠商至少需要一個品項');return;}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='送出中...';
  try{
    for(const block of blocks){
      const{vendor,items}=block;
      const snap=await getDocs(query(collection(db,'price_reports'),
        where('date','==',todayStr),where('uid','==',cu.uid),
        where('store','==',store),where('vendor','==',vendor)));
      const data={uid:cu.uid,editorName:cName,store,date:todayStr,vendor,items,note,updatedAt:serverTimestamp()};
      if(!snap.empty){
        await setDoc(snap.docs[0].ref,{...data},{merge:true});
      } else {
        await addDoc(collection(db,'price_reports'),{...data,createdAt:serverTimestamp()});
      }
    }
    toast(`✅ 已送出 ${blocks.length} 筆廠商回報`);
    await loadReports();
  }catch(e){toast('❌ 送出失敗：'+e.message);}
  finally{btn.disabled=false;btn.textContent='📤 送出回報';}
};

// ══ 載入歷史回報 ══
window.loadReports=async function(){
  const dateVal=document.getElementById('viewDate').value||todayStr;
  const list=document.getElementById('reportList');
  list.innerHTML='<div class="empty-state"><div class="spinner"></div>載入中...</div>';
  try{
    const snap=await getDocs(query(collection(db,'price_reports'),where('date','==',dateVal)));
    // 所有管理職都能看到所有可見店面（不限自己的店）
    allReports=snap.docs.map(d=>({id:d.id,...d.data()}))
      .filter(r=>cRole==='admin'||visibleStores.includes(r.store));

    const stores=[...new Set(allReports.map(r=>r.store))].filter(Boolean).sort();
    const tabsEl=document.getElementById('storeTabs');
    tabsEl.innerHTML=`<button class="store-tab${storeFilter==='all'?' active':''}" onclick="setStoreFilter('all')">全部(${allReports.length})</button>`
      +stores.map(s=>`<button class="store-tab${storeFilter===s?' active':''}" onclick="setStoreFilter('${s}')">${s}</button>`).join('');
    renderReports();
  }catch(e){list.innerHTML=`<div class="empty-state" style="color:var(--red)">載入失敗，請重新整理</div>`;
    console.error(e);}
};

window.setStoreFilter=function(s){
  storeFilter=s;
  document.querySelectorAll('.store-tab').forEach(b=>b.classList.toggle('active',
    s==='all'?b.textContent.startsWith('全部'):b.textContent===s));
  renderReports();
};

function renderReports(){
  const list=document.getElementById('reportList');
  const filtered=storeFilter==='all'?allReports:allReports.filter(r=>r.store===storeFilter);
  if(!filtered.length){list.innerHTML='<div class="empty-state">此日期無回報記錄</div>';return;}

  // 問題4：同店面合併為一個窗格，廠商分行顯示
  const storeMap={};
  filtered.forEach(r=>{
    if(!storeMap[r.store]) storeMap[r.store]=[];
    storeMap[r.store].push(r);
  });

  list.innerHTML=Object.entries(storeMap).map(([store,reports])=>`
    <div class="report-card">
      <div class="report-card-header">
        <div>
          <div class="report-store">${store}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">${reports[0]?.editorName||'—'}</div>
        </div>
        <div style="font-size:11px;color:var(--text3)">${fmtTime(reports[0]?.createdAt)}</div>
      </div>
      ${reports.map(r=>`
        <div style="padding:10px 14px;border-bottom:1px solid var(--border)">
          <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px">廠商：${r.vendor||'—'}
            ${(r.uid===cu?.uid&&r.date===todayStr)||cRole==='admin'
              ?`<button class="btn btn-danger" style="font-size:10px;padding:1px 7px;margin-left:8px;vertical-align:middle" onclick="deleteReport('${r.id}')">刪除</button>`:''}
          </div>
          <table class="report-table" style="width:100%">
            <thead><tr><th>品項</th><th>數量/單位</th><th style="text-align:right">單價</th></tr></thead>
            <tbody>${(r.items||[]).map(i=>`
              <tr>
                <td>${i.item||'—'}</td>
                <td style="color:var(--text3)">${i.qty?i.qty+' ':''} ${i.unit||''}</td>
                <td style="text-align:right" class="price-val">$${i.price||0}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`).join('')}
      ${reports.some(r=>r.note)?`<div style="padding:8px 12px;font-size:12px;color:var(--text3)">${reports.filter(r=>r.note).map(r=>`備註(${r.vendor})：${r.note}`).join('　')}</div>`:''}
    </div>`).join('');
}

window.deleteReport=async function(id){
  if(!confirm('確定刪除此回報？'))return;
  await deleteDoc(doc(db,'price_reports',id));
  toast('已刪除');
  await loadReports();await loadSummary();
};

// ══ 今日品項摘要 ══
async function loadSummary(){
  const snap=await getDocs(query(collection(db,'price_reports'),where('date','==',todayStr)));
  const reports=snap.docs.map(d=>d.data()).filter(r=>cRole==='admin'||visibleStores.includes(r.store));
  const itemMap={};
  reports.forEach(r=>(r.items||[]).forEach(i=>{
    if(!itemMap[i.item]) itemMap[i.item]={};
    if(!itemMap[i.item][r.store]) itemMap[i.item][r.store]=[];
    itemMap[i.item][r.store].push(i.price);
  }));
  const el=document.getElementById('priceSummary');
  const entries=Object.entries(itemMap);
  if(!entries.length){el.innerHTML='<div class="summary-empty">尚無今日資料</div>';return;}
  el.innerHTML=entries.map(([name,storeMap])=>{
    const allPrices=Object.values(storeMap).flat().filter(p=>p>0);
    const min=Math.min(...allPrices),max=Math.max(...allPrices);
    const rows=Object.entries(storeMap).map(([s,ps])=>`<span style="font-size:11px;color:var(--text3)">${s}：<b style="color:var(--text)">$${ps[0]}</b></span>`).join('　');
    return`<div style="padding:10px 14px;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-weight:600;font-size:13px">${name}</span>
        <span style="font-size:12px;color:var(--text3)">$${min}${min!==max?'~$'+max:''}</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${rows}</div>
    </div>`;
  }).join('');
}

// ══ 廠商/品項選項 儲存與載入 ══
async function saveOptions(){
  try{
    await setDoc(doc(db,'price_settings','options'),{vendors:vendorOptions,items:itemOptions});
  }catch(e){ toast('選項儲存失敗：'+e.message); }
}
async function loadOptions(){
  try{
    const s=await getDoc(doc(db,'price_settings','options'));
    if(s.exists()){
      vendorOptions=s.data().vendors||[];
      itemOptions=s.data().items||[];
    }
  }catch(e){ console.warn('loadOptions failed',e); }
}

// ══ Admin 可見性設定 ══
async function loadVisibility(){
  const s=await getDoc(doc(db,'price_settings','visibility'));
  const data=s.exists()?s.data():{};
  const el=document.getElementById('visibilityList');
  if(!allStores.length){el.innerHTML='<div class="summary-empty">無店面資料</div>';return;}
  el.innerHTML=allStores.map(s=>{
    const on=data[s]!==false;
    return`<div class="vis-row">
      <span>${s}</span>
      <label class="toggle">
        <input type="checkbox" id="vis-${s.replace(/\s/g,'_')}" ${on?'checked':''}>
        <span class="tg-sl"></span><span class="tg-kn"></span>
      </label>
    </div>`;
  }).join('');
}

window.toggleVisSection=function(){
  const list=document.getElementById('visibilityList');
  const arrow=document.getElementById('visSectionArrow');
  const btn=document.getElementById('saveVisBtn');
  const open=list.style.display!=='none';
  list.style.display=open?'none':'block';
  arrow.textContent=open?'▸ 展開':'▾ 收起';
  if(btn) btn.hidden=open;
};

window.saveVisibility=async function(){
  const data={};
  allStores.forEach(s=>{data[s]=document.getElementById('vis-'+s.replace(/\s/g,'_'))?.checked??true;});
  await setDoc(doc(db,'price_settings','visibility'),data);
  visibleStores=allStores.filter(s=>data[s]!==false);
  toast('✅ 設定已儲存');
  await loadReports();
};

// ══ Auth ══
onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='/hr-system/index.html';return;}
  try{
    const snap=await getDoc(doc(db,'users',user.uid));
    if(!snap.exists()||snap.data().disabled){window.location.href='/hr-system/index.html';return;}
    const data=snap.data();
    cRole=data.role||'employee';
    cName=data.name||'—';
    cStore=data.workLocation||'';
    if(cRole==='employee'){window.location.href='/hr-system/dashboard.html';return;}
    cu=user;
    todayStr=twToday();
    document.getElementById('todayLabel').textContent=fmtDate(todayStr);
    document.getElementById('viewDate').value=todayStr;
    document.getElementById('myStoreLabel').textContent=cName;

    // 載入店面清單
    const hrSnap=await getDoc(doc(db,'hr','settings'));
    allStores=(hrSnap.exists()?hrSnap.data().workLocations||[]:[] ).filter(Boolean);

    // 問題3：店面選擇器 — 店長/副店長不需選，admin/consultant 顯示全部
    const fStore=document.getElementById('f-store');
    const storeRow=document.getElementById('storeRow');
    if(cRole==='manager'){
      // 店長：如果 workLocation 是陣列就取第一個，否則直接用字串
      const mgStore=Array.isArray(cStore)?cStore[0]:(cStore||'');
      fStore.innerHTML=`<option value="${mgStore}">${mgStore||'未設定店面'}</option>`;
      storeRow.style.display='none';
      document.getElementById('myStoreLabel').textContent=mgStore||'';
      cStore=mgStore; // 更新 cStore 確保送出時正確
    } else {
      // admin/consultant：可選所有店面
      const defStore=Array.isArray(cStore)?cStore[0]:(cStore||'');
      fStore.innerHTML=allStores.map(s=>`<option value="${s}"${s===defStore?' selected':''}>${s}</option>`).join('');
      storeRow.style.display='flex';
    }

    // 載入可見設定
    const visSnap=await getDoc(doc(db,'price_settings','visibility'));
    const visData=visSnap.exists()?visSnap.data():{};
    visibleStores=allStores.filter(s=>visData[s]!==false);
    if(!visibleStores.length) visibleStores=[...allStores];

    // Admin
    if(cRole==='admin'){
      document.getElementById('adminSection').style.display='block';
      await loadVisibility();
    }

    await loadOptions();
    addVendorBlock();
    await loadReports();

  }catch(e){console.error(e);}
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
});
</script>
