<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>

<title>操作日誌 — 鑫系統</title>
<style>
:root{
  --bg:#F0F2F5;--surface:#FFFFFF;--surface2:#F7F8FA;
  --border:#E4E7ED;--border2:#D0D5DD;
  --text:#1A1D23;--text2:#5A6175;--text3:#9AA0B4;
  --accent:#3B5BDB;--accent-light:#EEF2FF;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* Topbar */







/* Main */
.main{max-width:1100px;margin:0 auto;padding:28px 24px}

/* Filter bar */
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{font-size:13px;padding:7px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:inherit;transition:border-color .15s;outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,91,219,.1)}
.filter-bar input{flex:1;min-width:160px}
.filter-bar input[type=date]{flex:0 1 auto;min-width:150px;width:auto;-webkit-appearance:none;appearance:none;min-height:36px;line-height:1.4;text-align:left}
.filter-bar input[type=date]::-webkit-date-and-time-value{text-align:left;margin:0}
.btn{font-size:12px;padding:7px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;border:1px solid var(--border)}
.btn-outline{background:var(--surface);color:var(--text2)}
.btn-outline:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#2F4AC8}

/* Stats row */
.stats-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;flex:1;min-width:120px}
.stat-card .sl{font-size:11px;color:var(--text3);margin-bottom:4px}
.stat-card .sn{font-size:20px;font-weight:700;color:var(--text)}

/* Table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-wrap table{width:100%;border-collapse:collapse}
.table-wrap th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:11px 16px;background:var(--surface2);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
.table-wrap td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
.table-wrap tr:last-child td{border-bottom:none}
.table-wrap tr:hover td{background:var(--surface2)}

/* Action badges */
.act{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.act-add{background:#E6FAF0;color:#087443;border:1px solid #ADE8C4}
.act-edit{background:#EEF2FF;color:#3B5BDB;border:1px solid #BAC8FF}
.act-del{background:#FEE9E9;color:#C0392B;border:1px solid #FFBDBD}
.act-import{background:#FFF4E0;color:#C47A00;border:1px solid #FDDFA0}
.act-other{background:#F4F4F4;color:#5A6175;border:1px solid #E4E7ED}

/* Role badge */
.role{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.role-admin{background:#FFF4E0;color:#C47A00;border:1px solid #FDDFA0}
.role-consultant{background:#F0EBFF;color:#6741D9;border:1px solid #D8CAFF}
.role-manager{background:#E6FAF0;color:#087443;border:1px solid #ADE8C4}
.role-employee{background:#E8EEFF;color:#3B5BDB;border:1px solid #BAC8FF}

/* Empty / Loading */
.empty-state{text-align:center;padding:60px 24px;color:var(--text3);font-size:13px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Loading screen */
#loading{position:fixed;inset:0;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.spinner-lg{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--border);background:var(--surface2)}
.pg-info{font-size:12px;color:var(--text3)}
.pg-btns{display:flex;gap:6px}
.pg-btn{font-size:12px;padding:5px 10px;border-radius:7px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:inherit;transition:all .15s;min-width:32px;text-align:center}
.pg-btn:hover:not([disabled]){background:var(--surface2);border-color:var(--border2);color:var(--text)}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-active{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important;font-weight:600}

/* Toast */
.toast{position:fixed;bottom:28px;right:28px;background:#1A1D23;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:2000;opacity:0;transform:translateY(10px);transition:all .2s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateY(0)}

@media(max-width:640px){
  
  .main{padding:16px}
  .filter-bar{flex-direction:column}
  .filter-bar input{width:100%}
  .filter-bar input[type=date]{width:100%;flex:1 1 100%}
  th:nth-child(3),td:nth-child(3),th:nth-child(5),td:nth-child(5){display:none}
}
/* ===== 標準 topbar（統一規格）===== */
.topbar{height:60px;background:var(--accent);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:200;gap:10px}
.topbar-left{display:flex;align-items:center;gap:14px;min-width:0;flex:1;overflow:hidden}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.back-btn{font-size:12px;padding:5px 13px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0}
.back-btn:hover{background:rgba(255,255,255,.2)}
.dv{width:1px;height:20px;background:rgba(255,255,255,.2);flex-shrink:0}
.topbar h1{font-size:16px;font-weight:700;color:#fff;letter-spacing:.5px;display:flex;align-items:center;gap:8px;white-space:nowrap;margin:0}
.role-chip{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);white-space:nowrap}
@media(max-width:600px){.topbar{padding:0 12px;gap:6px}.topbar h1{font-size:14px}.back-btn{font-size:11px;padding:4px 9px}}
/* ===== 標準 topbar 結束 ===== */
</style>

<script type="module">
import { authGuard, db } from './auth-guard.js?v=4';
import { doc, getDoc, getDocs, collection, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let allLogs = [];
let filtered = [];
const PAGE_SIZE = 50;
let currentPage = 1;

// ── Toast ──
function showToast(msg){ const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200); }


// ── Module badge ──
const MODULE_MAP = {
  hr:'👥 人員', account:'🔑 帳號', schedule:'📅 排班',
  meeting:'📝 會議', price:'💰 物價', anomaly:'⚠️ 異常', cctv:'📹 監視器', delivery_report:'🚚 配送回報', store_accounts:'🏪 店內帳號', salary:'💰 薪資計算', task:'📌 店務追蹤', backup:'💾 備份管理', '—':'—'
};
function modBadge(mod){
  const label = MODULE_MAP[mod] || mod || '—';
  return `<span style="font-size:11px;color:var(--text2)">${label}</span>`;
}

// ── Action badge ──
function actBadge(action){
  if(!action) return '<span class="act act-other">—</span>';
  if(action.includes('新增')) return `<span class="act act-add">${action}</span>`;
  if(action.includes('編輯')) return `<span class="act act-edit">${action}</span>`;
  if(action.includes('刪除')) return `<span class="act act-del">${action}</span>`;
  if(action.includes('匯入')||action.includes('還原')) return `<span class="act act-import">${action}</span>`;
  return `<span class="act act-other">${action}</span>`;
}

function roleBadge(role){
  const map={admin:'管理員',consultant:'顧問',manager:'店長',employee:'同仁'};
  const cls={admin:'role-admin',consultant:'role-consultant',manager:'role-manager',employee:'role-employee'};
  return `<span class="role ${cls[role]||'role-employee'}">${map[role]||role||'—'}</span>`;
}

function fmtTime(ts){
  const d = ts?.toDate ? ts.toDate() : new Date(ts||0);
  const date = d.toLocaleDateString('zh-TW',{month:'numeric',day:'numeric',timeZone:'Asia/Taipei'});
  const time = d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Taipei'});
  return `<div style="font-weight:500">${date}</div><div style="font-size:11px;color:var(--text3)">${time}</div>`;
}

// ── 載入日誌（sys_oplogs + hr_oplogs 合併）──
window.loadLogs = async function(){
  try{
    const [sysSnap, hrSnap] = await Promise.all([
      getDocs(query(collection(db,'sys_oplogs'), orderBy('ts','desc'), limit(500))),
      getDocs(query(collection(db,'hr_oplogs'),  orderBy('ts','desc'), limit(300))),
    ]);
    // sys_oplogs 有 module 欄；hr_oplogs 舊資料補上 module:'hr'
    const sysLogs = sysSnap.docs.map(d=>({id:d.id,...d.data()}));
    const hrLogs  = hrSnap.docs.map(d=>({id:'hr_'+d.id,...d.data(), module: d.data().module||'hr'}));
    // 去重：hr.html 雙寫後 sys_oplogs 已有，ts+editor+action 相同視為同筆
    const sysKeys = new Set(sysLogs.map(l=>{
      const t = l.ts?.toDate ? l.ts.toDate() : new Date(l.ts||0);
      return `${Math.round(t/1000)}_${l.editor}_${l.action}`;
    }));
    const dedupHr = hrLogs.filter(l=>{
      const t = l.ts?.toDate ? l.ts.toDate() : new Date(l.ts||0);
      return !sysKeys.has(`${Math.round(t/1000)}_${l.editor}_${l.action}`);
    });
    allLogs = [...sysLogs, ...dedupHr].sort((a,b)=>{
      const ta = a.ts?.toDate ? a.ts.toDate() : new Date(a.ts||0);
      const tb = b.ts?.toDate ? b.ts.toDate() : new Date(b.ts||0);
      return tb - ta;
    });
    updateStats();
    applyFilter();
    showToast('已載入最新資料');
  }catch(e){
    console.error(e);
    document.getElementById('logTableBody').innerHTML=`<tr><td colspan="6"><div class="empty-state" style="color:#e24b4a">載入失敗：${e.message}</div></td></tr>`;
  }
};

// ── 統計卡片 ──
function updateStats(){
  const today = new Date().toLocaleDateString('zh-TW',{timeZone:'Asia/Taipei'});
  document.getElementById('statTotal').textContent = allLogs.length;
  document.getElementById('statAdd').textContent = allLogs.filter(l=>l.action?.includes('新增')).length;
  document.getElementById('statEdit').textContent = allLogs.filter(l=>l.action?.includes('編輯')).length;
  document.getElementById('statDel').textContent = allLogs.filter(l=>l.action?.includes('刪除')).length;
  document.getElementById('statToday').textContent = allLogs.filter(l=>{
    const d = l.ts?.toDate ? l.ts.toDate() : new Date(l.ts||0);
    return d.toLocaleDateString('zh-TW',{timeZone:'Asia/Taipei'})===today;
  }).length;
}

// ── 篩選 ──
window.applyFilter = function(){
  const editor = document.getElementById('fEditor').value.toLowerCase();
  const action = document.getElementById('fAction').value;
  const role   = document.getElementById('fRole').value;
  const from   = document.getElementById('fDateFrom').value;
  const to     = document.getElementById('fDateTo').value;

  const mod = document.getElementById('fModule').value;
  filtered = allLogs.filter(l=>{
    if(editor && !(l.editor||'').toLowerCase().includes(editor)) return false;
    if(mod && (l.module||'') !== mod) return false;
    if(action && !(l.action||'').includes(action)) return false;
    if(role && l.role !== role) return false;
    if(from || to){
      const d = l.ts?.toDate ? l.ts.toDate() : new Date(l.ts||0);
      const ds = d.toISOString().slice(0,10);
      if(from && ds < from) return false;
      if(to && ds > to) return false;
    }
    return true;
  });
  currentPage = 1;
  renderTable();
};

window.clearFilter = function(){
  document.getElementById('fEditor').value='';
  document.getElementById('fModule').value='';
  document.getElementById('fAction').value='';
  document.getElementById('fRole').value='';
  document.getElementById('fDateFrom').value='';
  document.getElementById('fDateTo').value='';
  applyFilter();
};

// ── 渲染表格 ──
function renderTable(){
  const tbody = document.getElementById('logTableBody');
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  currentPage = Math.min(currentPage, totalPages);

  const start = (currentPage-1)*PAGE_SIZE;
  const page = filtered.slice(start, start+PAGE_SIZE);

  if(!page.length){
    tbody.innerHTML=`<tr><td colspan="5"><div class="empty-state">沒有符合的紀錄</div></td></tr>`;
    document.getElementById('pagination').style.display='none';
    return;
  }

  tbody.innerHTML = page.map(l=>`
    <tr>
      <td>${fmtTime(l.ts)}</td>
      <td style="font-weight:500">${l.editor||'—'}</td>
      <td>${roleBadge(l.role)}</td>
      <td>${modBadge(l.module)}</td>
      <td>${actBadge(l.action)}</td>
      <td style="color:var(--text2);font-size:12px">${l.detail||'—'}</td>
    </tr>`).join('');

  // Pagination
  const pg = document.getElementById('pagination');
  const pgInfo = document.getElementById('pgInfo');
  const pgBtns = document.getElementById('pgBtns');
  pg.style.display = totalPages>1 ? 'flex' : 'none';
  pgInfo.textContent = `第 ${start+1}–${Math.min(start+PAGE_SIZE,total)} 筆，共 ${total} 筆`;

  let btns='';
  btns+=`<button class="pg-btn" ${currentPage===1?'disabled':''} onclick="goPage(${currentPage-1})">‹</button>`;
  for(let i=1;i<=totalPages;i++){
    if(i===1||i===totalPages||Math.abs(i-currentPage)<=1)
      btns+=`<button class="pg-btn${i===currentPage?' pg-active':''}" onclick="goPage(${i})">${i}</button>`;
    else if(Math.abs(i-currentPage)===2)
      btns+=`<span style="padding:5px 4px;color:var(--text3);font-size:12px">…</span>`;
  }
  btns+=`<button class="pg-btn" ${currentPage===totalPages?'disabled':''} onclick="goPage(${currentPage+1})">›</button>`;
  pgBtns.innerHTML=btns;
}

window.goPage = function(p){ currentPage=p; renderTable(); window.scrollTo(0,0); };

// ── 匯出 CSV ──
window.exportCSV = function(){
  if(!filtered.length){showToast('沒有資料可匯出');return;}
  const rows=[['時間','操作者','角色','模組','動作','對象/內容']];
  filtered.forEach(l=>{
    const d = l.ts?.toDate ? l.ts.toDate() : new Date(l.ts||0);
    rows.push([
      d.toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}),
      l.editor||'',l.role||'',l.module||'',l.action||'',l.detail||''
    ]);
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`oplog-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('CSV 已下載');
};

// ── Auth Guard ──
authGuard('oplog', async ({role}) => {
  try{var _rc=document.getElementById('roleChip');if(_rc)_rc.textContent=({admin:'管理員',consultant:'顧問',manager:'店長/副店長',employee:'同仁'})[role]||role||'—';}catch(e){}
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  await loadLogs();
});
</script>
