<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
<title>排班管理 — 鑫系統</title>
<style>
:root{
  --bg:#ECEEF2;--surface:#fff;--surface2:#F4F5F8;--border:#DDE1E9;--border2:#C8CDD8;
  --text:#1A1D23;--text2:#5A6175;--text3:#9AA0B4;--accent:#2D3142;--accent-light:#F0F2F5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* Topbar */
.topbar{height:60px;background:var(--accent);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:200}
.topbar-left{display:flex;align-items:center;gap:14px}
.back-btn{font-size:12px;padding:5px 13px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);font-family:inherit;transition:all .15s}
.back-btn:hover{background:rgba(255,255,255,.2)}
.dv{width:1px;height:20px;background:rgba(255,255,255,.2)}
.topbar h1{font-size:16px;font-weight:700;color:#fff;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.topbar-right{display:flex;align-items:center;gap:8px}
.role-chip{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2)}

/* Main */
.main{max-width:1300px;margin:0 auto;padding:24px 20px}

/* Toolbar */
.toolbar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.toolbar select{font-size:13px;padding:7px 11px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:inherit;cursor:pointer}
.toolbar select:focus{outline:none;border-color:var(--accent)}
.month-nav{display:flex;align-items:center;gap:8px}
.month-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text2)}
.month-btn:hover{background:var(--accent-light);border-color:var(--border2)}
.month-label{font-size:15px;font-weight:600;color:var(--text);min-width:90px;text-align:center}
.btn{font-size:12px;padding:7px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);background:var(--surface);color:var(--text2)}
.btn:hover{background:var(--accent-light);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#3D4158}
.ml-auto{margin-left:auto}

/* Calendar */
.cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface2);border-bottom:1px solid var(--border)}
.cal-head-cell{padding:10px 0;text-align:center;font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.3px}
.cal-head-cell.sun{color:#E05252}
.cal-head-cell.sat{color:#5B8EDB}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:110px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px;position:relative;transition:background .1s;vertical-align:top}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.other-month{background:#FAFBFC;opacity:.5}
.cal-cell.today{background:#F0F2FF}
.cal-cell.today .day-num{color:var(--accent);font-weight:700}
.cal-cell.is-sun .day-num{color:#E05252}
.cal-cell.is-sat .day-num{color:#5B8EDB}
.cal-cell.is-holiday{background:#FFF5F5}
.cal-cell.is-holiday .day-num{color:#E05252}
.holiday-name{font-size:9px;color:#E05252;display:block;margin-bottom:2px;font-weight:500}
.day-num{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:4px;display:block}
.shift-tag{font-size:11px;padding:3px 6px;border-radius:6px;margin-bottom:3px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:3px;transition:opacity .1s;line-height:1.4;min-width:0}
.shift-tag.shift-annual{background:#E5F5EB!important;color:#1A9B4C!important;border:1px dashed #1A9B4C}
.batch-kind-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.shift-tag:hover{opacity:.8}
.shift-tag .emp-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.shift-tag .time{font-size:10px;opacity:.8;white-space:nowrap;flex-shrink:0}
.shift-tag .del-btn{font-size:10px;opacity:0;transition:opacity .1s;cursor:pointer;flex-shrink:0;line-height:1}
.shift-tag:hover .del-btn{opacity:1}

/* 主內容 + 右側統計欄 */
.content-wrap{display:flex;gap:14px;align-items:flex-start}
.cal-section{flex:1;min-width:0;overflow:hidden}
.sidebar{width:180px;flex-shrink:0;position:sticky;top:76px}

.add-btn{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 4px;border-radius:4px;transition:all .1s;display:inline-flex;align-items:center;gap:2px;margin-top:2px}
.add-btn:hover{background:var(--accent-light);color:var(--accent)}

/* 人員篩選 */
.emp-filter-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.emp-filter-btn{font-size:11px;padding:3px 10px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:inherit;transition:all .15s;white-space:nowrap}
.emp-filter-btn:hover{border-color:var(--border2);background:var(--surface2)}
.emp-filter-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}
.emp-filter-label{font-size:11px;color:var(--text3);white-space:nowrap}
.c0{background:#E8F4FD;color:#1A6B9A} .c1{background:#E6F9F0;color:#0A6E45}
.c2{background:#FEF3E2;color:#9A5B0A} .c3{background:#F3E8FD;color:#6B1A9A}
.c4{background:#FDE8E8;color:#9A1A1A} .c5{background:#E8FDE8;color:#1A6B1A}
.c6{background:#FDF3E8;color:#9A6B1A} .c7{background:#E8E8FD;color:#1A1A9A}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(10,12,18,.45);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:16px;width:460px;max-width:100%;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.18);border:1px solid var(--border);max-height:90vh;overflow-y:auto}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);position:sticky;bottom:-28px;background:var(--surface);margin-left:-28px;margin-right:-28px;margin-bottom:-28px;padding:16px 28px 28px;border-radius:0 0 16px 16px}
.modal-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.fr{margin-bottom:14px}
.fr label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.fr select,.fr input{width:100%;font-size:13px;padding:9px 12px;border:1px solid var(--border);border-radius:9px;background:var(--surface);color:var(--text);font-family:inherit;transition:border-color .15s}
.fr select:focus,.fr input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,49,66,.08)}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Toast */
.toast{position:fixed;bottom:28px;right:28px;background:#1A1D23;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:2000;opacity:0;transform:translateY(10px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* Loading */
#loading{position:fixed;inset:0;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty-cal{grid-column:1/-1;padding:48px;text-align:center;color:var(--text3);font-size:13px}
.legend{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-left:auto}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:50%}

/* 主內容 + 右側統計欄 */
.content-wrap{display:flex;gap:16px;align-items:flex-start}
.cal-section{flex:1;min-width:0}
.sidebar{width:200px;flex-shrink:0;position:sticky;top:76px}
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.sidebar-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface2)}
.sidebar-list{max-height:calc(100vh - 200px);overflow-y:auto}
.sidebar-item{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid #F4F5F8;font-size:13px;transition:background .1s}
.sidebar-item:last-child{border-bottom:none}
.sidebar-item:hover{background:var(--surface2)}
.sidebar-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:6px}
.sidebar-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--text)}
.sidebar-days{font-size:13px;font-weight:700;color:var(--accent);min-width:24px;text-align:right}
.sidebar-empty{padding:20px 14px;font-size:12px;color:var(--text3);text-align:center}

/* 員工唯讀模式 / 鎖定提示 */
.readonly-notice{border-radius:10px;padding:8px 14px;font-size:12px;margin-bottom:12px;display:none}
.readonly-notice.show{display:block}
.readonly-notice.type-readonly{background:#EEF2FF;border:1px solid #BAC8FF;color:#3B5BDB}
.readonly-notice.type-lock{background:#FFF4E0;border:1px solid #FDDFA0;color:#C47A00}

/* 假單卡片 */
.leave-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;align-items:flex-start;gap:14px;transition:box-shadow .15s}
.leave-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.07)}
.leave-card.draggable{cursor:grab}
.leave-card.dragging{opacity:.4;border:2px dashed var(--border2)}
.leave-card.drag-over{border:2px dashed var(--accent)}
.leave-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.lb-pending{background:#FFF4E0;color:#C47A00;border:1px solid #FDDFA0}
.lb-approved{background:#E6FAF0;color:#087443;border:1px solid #ADE8C4}
.lb-rejected{background:#FEE9E9;color:#C0392B;border:1px solid #FFBDBD}
.leave-priority{width:22px;height:22px;background:var(--accent);color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}

/* ══════════════════════════════
   手機響應式
══════════════════════════════ */
@media (max-width: 768px) {

  /* Topbar */
  .topbar { padding: 0 14px; gap: 8px; flex-wrap: wrap; height: auto; min-height: 56px; }
  .topbar-left { gap: 8px; flex-wrap: wrap; }
  .topbar h1 { font-size: 14px; }
  .back-btn { font-size: 11px; padding: 4px 10px; }
  #toolbarBtns { display: flex; flex-wrap: wrap; gap: 6px; width: 100%; padding: 0 0 10px 0; }
  #toolbarBtns .btn { font-size: 11px; padding: 6px 10px; }

  /* Main padding */
  .main { padding: 12px; }

  /* Toolbar */
  .toolbar { padding: 10px 12px; gap: 8px; }
  .toolbar select { font-size: 12px; padding: 6px 8px; }
  .month-label { font-size: 13px; min-width: 70px; }

  /* 本月出勤天數 sidebar → 摺疊到日曆下方 */
  .content-wrap { flex-direction: column; gap: 10px; }
  .sidebar {
    width: 100%;
    position: static;
    top: auto;
  }
  .sidebar-card { border-radius: 10px; }
  .sidebar-list { max-height: 160px; display: grid; grid-template-columns: repeat(2, 1fr); }
  .sidebar-item { border-right: 1px solid #F4F5F8; }
  .sidebar-item:nth-child(2n) { border-right: none; }
  .sidebar-title { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .sidebar-title::after { content: '▾'; font-size: 12px; color: var(--text3); }
  .sidebar-card.collapsed .sidebar-list { display: none; }
  .sidebar-card.collapsed .sidebar-title::after { content: '▸'; }

  /* 日曆格子 */
  .cal-section { width: 100%; overflow-x: auto; }
  .cal-wrap { min-width: 0; }
  .cal-cell { min-height: 60px; padding: 3px; }
  .day-num { font-size: 11px; margin-bottom: 2px; }
  .holiday-name { display: none; }

  /* shift tag 手機版精簡 */
  .shift-tag { font-size: 10px; padding: 2px 4px; }
  .shift-tag .time { display: none; }
  .shift-tag .del-btn { opacity: 1; font-size: 11px; }

  /* 人員篩選列 */
  .emp-filter-wrap { gap: 4px; }
  .emp-filter-btn { font-size: 10px; padding: 2px 8px; }

  /* Tab 按鈕 */
  #tabShift, #tabLeave { font-size: 12px !important; padding: 6px 14px !important; }

  /* 假單卡片 */
  .leave-card { flex-direction: column; gap: 8px; padding: 12px 14px; }
  .backup-counts { gap: 8px; }

  /* readonly notice */
  .readonly-notice { font-size: 12px; padding: 8px 12px; }

  /* Modal 手機版：縮小 padding、底部按鈕固定 */
  .modal { padding: 20px; max-height: 92vh; }
  .mf { bottom: -20px; margin-left: -20px; margin-right: -20px; margin-bottom: -20px; padding: 14px 20px 20px; }
}

@media (max-width: 480px) {
  .cal-cell { min-height: 48px; padding: 2px; }
  .cal-head-cell { font-size: 10px; padding: 6px 0; }
  .day-num { font-size: 10px; }
  .shift-tag { font-size: 9px; padding: 1px 3px; border-radius: 4px; }
  .shift-tag .emp-name { max-width: 28px; }
  .sidebar-list { grid-template-columns: repeat(3, 1fr); max-height: 120px; }
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

const firebaseConfig={apiKey:"AIzaSyAg_dfvoxA1dQYqHzdqPtEot8wT-wKZal4",authDomain:"liangpinghri.firebaseapp.com",projectId:"liangpinghri",storageBucket:"liangpinghri.firebasestorage.app",messagingSenderId:"410255807470",appId:"1:410255807470:web:dc08ba070c7db4f083f4ff"};

let currentUser=null,currentRole='',currentLocations=[],currentUserName='';
let viewYear=new Date().getFullYear(),viewMonth=new Date().getMonth()+1;
let allEmployees=[],workLocations=[],shifts={},locationCodes={
  "梁平有限公司":"tw000","鑫耀鑫餐廳":"tw002","梁鑫雞肉飯專門店":"tw003",
  "鑫營雞肉本舖":"tw004","府中雞肉飯專門店":"tw005","景新雞肉飯專門店":"tw006",
  "天津雞肉飯":"tw008","鑫雞肉央廚":"tw001","大直讚雞肉飯":"tw009",
  "心惦雞肉飯":"tw010","幸福雞肉飯":"tw012","福城雞肉飯":"tw013",
  "泉州鑫廚房":"tw007","新莊央廚":"tw011","巷日雞肉飯":"tw008"
};

// ── Toast ──
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

// ── 匯出 Excel（格式同薪資系統範本）──
// ══════════════════════════════════════════════════════
window.exportToExcel = async function() {
  // 決定要撈的店面清單：永遠撈所有可管理的店面
  const exportLocs = currentRole === 'admin'
    ? workLocations
    : (currentLocations.length ? currentLocations : (selectedLocation ? [selectedLocation] : []));

  if(!exportLocs.length){ showToast('無可匯出的店面，請先選擇店面'); return; }

  showToast('匯出中，請稍候...');

  const yearMonthKey = `${viewYear}-${String(viewMonth).padStart(2,'0')}`;
  const toHMS = t => t ? (t.length===5 ? t+':00' : t) : '';

  // 並行撈所有店面班表
  // 並行撈所有店面班表
  // 主店（currentUser 的 workLocation）→ 全員；其他跨店 → 只撈自己
  const currentEmp = allEmployees.find(e=>e.uid===currentUser.uid)||{};
  const myEmpId = currentEmp.id ? String(currentEmp.id) : null;
  const myWorkLocation = currentEmp.workLocation||'';

  const allLocShifts = await Promise.all(
    exportLocs.map(async loc => {
      try {
        const [schedSnap, stSnap] = await Promise.all([
          getDoc(doc(db,'schedules',`${yearMonthKey}_${loc}`)),
          getDoc(doc(db,'shift_types',loc)),
        ]);
        return {
          loc,
          shifts: schedSnap.exists() ? (schedSnap.data().shifts||{}) : {},
          locShiftTypes: stSnap.exists() ? (stSnap.data().list||[]) : [],
        };
      } catch(e) { return { loc, shifts:{}, locShiftTypes:[] }; }
    })
  );

  // 整合成平排列表
  const rows = [];
  for(const { loc, shifts: locShifts, locShiftTypes } of allLocShifts){
    const locCode = locationCodes[loc]||'';
    const locCell = locCode ? `${locCode} - ${loc}` : loc;

    // 決定這間店要匯出哪些人
    // admin → 全員；非admin → 主店全員，其他店只匯出自己
    const isMainStore = currentRole==='admin' || normLoc(loc)===normLoc(myWorkLocation);

    for(const dateStr of Object.keys(locShifts).sort()){
      for(const s of locShifts[dateStr]){
        // 特休不匯出（只匯出實際上班排班）
        if(s.kind==='annual') continue;
        // 人員篩選（UI 篩選器）
        if(filterEmpIds.size > 0 && !filterEmpIds.has(String(s.empId))) continue;
        // 跨店只匯自己
        if(!isMainStore && myEmpId && String(s.empId) !== myEmpId) continue;

        const emp = allEmployees.find(e=>String(e.id)===String(s.empId))||{};
        const empNo = emp.empNo||'';
        const empName = s.empName||emp.name||'';
        const empCell = empNo ? `${empNo}-${empName}` : empName;
        // 比對時間找對應班別 → C欄帶入代號
        const allShiftTypesToCheck = [...shiftTypes, ...locShiftTypes];
        const matched = allShiftTypesToCheck.find(t=>t.start===s.startTime&&t.end===s.endTime);
        const shiftCell = matched && matched.code ? `${matched.code} - ${matched.name}` : '';
        rows.push({
          locCell,
          shiftType: shiftCell,
          empCell,
          date: dateStr.replace(/-/g, '/'),
          startTime: toHMS(s.startTime),
          endTime: toHMS(s.endTime),
        });
      }
    }
  }

  // 依日期排序
  rows.sort((a,b) => a.date.localeCompare(b.date));

  if(!rows.length){ showToast('本月所有店面無排班資料可匯出'); return; }

  // 建立 Workbook
  const wb = XLSX.utils.book_new();
  const wsData = [];

  // 標題列（第一列）
  wsData.push([
    '排班編號\n(自動填寫，請勿更動)',
    '上班地點\n(必填，格式必須正確)',
    '值班班別\n(非必填，填寫則視為班別排班)',
    '值班餐飲人員\n(必填，格式必須正確)',
    '值班日期\n(必填，格式必須正確)',
    '上班時間\n(若非班別班則必須填寫，格式必須正確)',
    '下班時間\n(若非班別班則必須填寫，格式必須正確)',
  ]);

  // 資料列（含 A 欄公式）
  rows.forEach((r, i) => {
    const row = i + 2; // Excel 第2列起
    const formula =
      `CONCATENATE(` +
      `IF(ISNUMBER(SEARCH("-",B${row})),TRIM(LEFT(B${row},SEARCH("-",B${row},1)-1)),B${row}),` +
      `IF(ISNUMBER(SEARCH("-",C${row})),SUBSTITUTE(TRIM(LEFT(C${row},SEARCH("-",C${row},1)-1))," ",""),IF(C${row} = "","NOSHIFT",C${row})),` +
      `IF(ISNUMBER(SEARCH("-",D${row})),TRIM(LEFT(D${row},SEARCH("-",D${row},1)-1)),D${row}),` +
      `SUBSTITUTE(E${row},"/",""),` +
      `IF(OR(F${row} = "",C${row} <> ""),"NN",LEFT(SUBSTITUTE(F${row},":",""),(4))),` +
      `IF(OR(G${row} = "",C${row} <> ""),"NN",LEFT(SUBSTITUTE(G${row},":",""),(4))))`;

    wsData.push([
      { f: formula },
      r.locCell,
      r.shiftType,
      r.empCell,
      r.date,
      r.startTime,
      r.endTime,
    ]);
  });

  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // 設定欄寬
  ws['!cols'] = [
    { wch: 35 }, // A
    { wch: 22 }, // B
    { wch: 20 }, // C
    { wch: 20 }, // D
    { wch: 14 }, // E
    { wch: 14 }, // F
    { wch: 14 }, // G
  ];

  // 設定列高（標題列）
  ws['!rows'] = [{ hpt: 40 }];

  // 標題列換行
  ws['A1'].s = { alignment: { wrapText: true } };

  XLSX.utils.book_append_sheet(wb, ws, '工作表1');

  // 匯出檔名
  let fileName;
  if(filterEmpIds.size === 1){
    const filteredEmpId = [...filterEmpIds][0];
    const filteredEmp = allEmployees.find(e=>String(e.id)===String(filteredEmpId));
    const empName = filteredEmp ? filteredEmp.name : filteredEmpId;
    fileName = `${empName}_${viewYear}年${viewMonth}月.xlsx`;
  } else if(currentRole==='admin'){
    fileName = `${viewYear}年${viewMonth}月_全店班表.xlsx`;
  } else {
    fileName = `${exportLocs[0]}_${viewYear}年${viewMonth}月.xlsx`;
  }
  XLSX.writeFile(wb, fileName);
  const scopeMsg = filterEmpIds.size===1 ? `（跨 ${exportLocs.length} 間店）` : `（${exportLocs.length} 間店 / 全員）`;
  showToast(`✅ 已匯出 ${rows.length} 筆排班 ${scopeMsg}`);
};


// ── 店面名稱正規化（處理異體字：舖/鋪 等）──
function normLoc(s){ return (s||'').replace(/鋪/g,'舖').replace(/　/g,' ').trim(); }

// ── 顏色 ──
const EMP_COLORS=['c0','c1','c2','c3','c4','c5','c6','c7'];
const empColorMap={};
function getEmpColor(empId){
  if(!empColorMap[empId]){const keys=Object.keys(empColorMap);empColorMap[empId]=EMP_COLORS[keys.length%EMP_COLORS.length];}
  return empColorMap[empId];
}

// ── 載入台灣國定假日（人事行政局 API）──
async function loadHolidays(year){
  try{
    const res=await fetch(`https://cdn.jsdelivr.net/gh/ruyut/TaiwanCalendar/data/${year}.json`);
    const data=await res.json();
    twHolidays={};
    data.forEach(d=>{
      if(d.isHoliday){
        const ds=`${d.date.slice(0,4)}-${d.date.slice(4,6)}-${d.date.slice(6,8)}`;
        twHolidays[ds]=d.description||'假日';
      }
    });
  }catch(e){twHolidays={};}
}

window.changeMonth=async function(dir){
  viewMonth+=dir;
  if(viewMonth>12){viewMonth=1;viewYear++;}
  if(viewMonth<1){viewMonth=12;viewYear--;}
  document.getElementById('monthLabel').textContent=`${viewYear} 年 ${viewMonth} 月`;
  await loadHolidays(viewYear);
  if(!isReadOnly && window._checkScheduleLock){
    const lockMsg=window._checkScheduleLock();
    if(lockMsg){
      document.getElementById('readonlyNotice').textContent=`🔒 ${lockMsg}`;
      document.getElementById('readonlyNotice').classList.remove('type-readonly');
      document.getElementById('readonlyNotice').classList.add('show','type-lock');
      document.getElementById('toolbarBtns').style.display='none';
    } else {
      document.getElementById('readonlyNotice').classList.remove('show');
      document.getElementById('toolbarBtns').style.display='flex';

  loadShifts();
};

// ── 載入班表 ──
async function loadShifts(){
  if(!selectedLocation){renderCalendar();return;}
  const key=`${viewYear}-${String(viewMonth).padStart(2,'0')}_${selectedLocation}`;
  try{const snap=await getDoc(doc(db,'schedules',key));shifts=snap.exists()?(snap.data().shifts||{}):{};
  }catch(e){shifts={};}
  renderCalendar();renderLegend();renderSidebar();
}

// ── 儲存班表 ──
async function saveShifts(){
  if(!selectedLocation) return;
  const key=`${viewYear}-${String(viewMonth).padStart(2,'0')}_${selectedLocation}`;
  try{
    // 將 shifts 轉成純 JSON 再存，避免 Firestore 物件問題
    const shiftsJson = JSON.parse(JSON.stringify(shifts));
    await setDoc(doc(db,'schedules',key),{
      shifts: shiftsJson,
      location: selectedLocation,
      yearMonth: `${viewYear}-${String(viewMonth).padStart(2,'0')}`,
      updatedAt: new Date().toISOString()
    });

  } catch(e){
    console.error('儲存失敗：', e);
    showToast('❌ 儲存失敗：' + e.message);
  }
}

async function saveShiftTypes(){

// ── 渲染月曆（週一起始）──
function renderCalendar(){
  const grid=document.getElementById('calGrid');
  if(!selectedLocation){grid.innerHTML='<div class="empty-cal">請先選擇店面以查看班表</div>';return;}
  const today=new Date();
  const daysInMonth=new Date(viewYear,viewMonth,0).getDate();
  const prevDays=new Date(viewYear,viewMonth-1,0).getDate();
  // 週一為 0，週日為 6
  let firstDow=new Date(viewYear,viewMonth-1,1).getDay(); // 0=日,1=一,...,6=六
  firstDow=(firstDow+6)%7; // 轉成週一起始：一=0,...,六=5,日=6
  let html='';

  // 上個月補位
  for(let i=firstDow-1;i>=0;i--){
    html+=`<div class="cal-cell other-month"><span class="day-num">${prevDays-i}</span></div>`;
  }
  // 本月
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(viewYear,viewMonth-1,d);
    const dow=date.getDay(); // 0=日,6=六
    const isToday=today.getFullYear()===viewYear&&today.getMonth()+1===viewMonth&&today.getDate()===d;
    const dateStr=`${viewYear}-${String(viewMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const holiday=twHolidays[dateStr];
    const isSun=dow===0,isSat=dow===6;
    let cls='cal-cell';
    if(isToday)cls+=' today';
    if(isSun)cls+=' is-sun';
    if(isSat)cls+=' is-sat';
    if(holiday)cls+=' is-holiday';

    const dayShifts=(shifts[dateStr]||[]).filter(s=>filterEmpIds.size===0||filterEmpIds.has(String(s.empId)));
    const shiftsHtml=dayShifts.map((s,idx)=>{
      const c=getEmpColor(s.empId);
      const delBtn = isReadOnly ? '' : `<span class="del-btn" onclick="event.stopPropagation();deleteShift('${dateStr}',${idx})">✕</span>`;
      const clickFn = isReadOnly ? '' : `onclick="openEditModal('${dateStr}',${idx})"`;
      const isAnnual=s.kind==='annual';
      return `<div class="shift-tag ${c}${isAnnual?' shift-annual':''}" ${clickFn} style="${isReadOnly?'cursor:default':''}">
        <span class="emp-name">${s.empName}</span>
        <span class="time">${isAnnual?'🌴 特休':`${s.startTime}-${s.endTime}`}</span>
        ${delBtn}
      </div>`;
    }).join('');

    html+=`<div class="${cls}">
      <span class="day-num">${d}</span>
      ${holiday?`<span class="holiday-name">${holiday}</span>`:''}
      ${shiftsHtml}
      ${!isReadOnly&&selectedLocation?`<span class="add-btn" onclick="openAddModal('${dateStr}')">＋</span>`:''}
    </div>`;
  }
  // 補足
  const totalCells=firstDow+daysInMonth;
  const remain=totalCells%7===0?0:7-(totalCells%7);
  for(let i=1;i<=remain;i++){
    html+=`<div class="cal-cell other-month"><span class="day-num">${i}</span></div>`;
  }
  grid.innerHTML=html;
}

// ── 同仁圖例 + 篩選按鈕（複選）──
function renderLegend(){
  const usedEmps={};
  Object.values(shifts).forEach(arr=>arr.forEach(s=>{usedEmps[s.empId]=s.empName;}));

  // 圖例
  const legend=document.getElementById('empLegend');
  legend.innerHTML=Object.entries(usedEmps).map(([id,name])=>
    `<div class="legend-item"><div class="legend-dot ${getEmpColor(id)}"></div>${name}</div>`
  ).join('');

  // 篩選按鈕列
  const bar=document.getElementById('empFilterBar');
  const btns=document.getElementById('empFilterBtns');
  if(!Object.keys(usedEmps).length){bar.style.display='none';return;}
  bar.style.display='flex';

  // 批次刪除（只在篩選單人且非唯讀時顯示）
  const singleFilter=filterEmpIds.size===1;
  const singleId=singleFilter?[...filterEmpIds][0]:'';
  const batchDelBtn=(!isReadOnly&&singleFilter&&!window._checkScheduleLock?.())
    ?`<button class="btn" onclick="openBatchDeleteModal('${singleId}','${usedEmps[singleId]||''}')"
        style="margin-left:8px;color:#C0392B;border-color:#FECACA;font-size:12px">🗑 批次刪除</button>`:'';

  btns.innerHTML=
    `<button class="emp-filter-btn${filterEmpIds.size===0?' active':''}" onclick="setEmpFilter('')">全部</button>`+
    Object.entries(usedEmps).map(([id,name])=>{
      const active=filterEmpIds.has(id);
      const cls=getEmpColor(id);

window.confirmBatchDelete=async function(empId){

  const selected=[...document.querySelectorAll('.batch-del-check:checked')].map(el=>el.value);

// 產生批次月曆
function buildBatchCalendar(dateStr){
  const daysInMonth=new Date(viewYear,viewMonth,0).getDate();
  let calHtml='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:6px">';
  ['一','二','三','四','五','六','日'].forEach(d=>{calHtml+=`<div style="text-align:center;font-size:10px;font-weight:600;color:var(--text3);padding:2px 0">${d}</div>`;});
  let firstDow=new Date(viewYear,viewMonth-1,1).getDay();firstDow=(firstDow+6)%7;
  for(let i=0;i<firstDow;i++) calHtml+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${viewYear}-${String(viewMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(viewYear,viewMonth-1,d).getDay();
    const isHol=!!twHolidays[ds];
    const color=isHol||dow===0?'#E05252':dow===6?'#5B8EDB':'var(--text)';
    const preselect=ds===dateStr?'batch-day-sel':'';
    calHtml+=`<div class="batch-day ${preselect}" data-date="${ds}" onclick="toggleBatchDay(this)"
      style="text-align:center;padding:5px 2px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);color:${color};transition:all .1s">${d}</div>`;
  }
  calHtml+='</div>';
  return calHtml;
}

function getEmpOptions(selectedId=''){
  const locEmps = currentRole==='admin'
    ? allEmployees
    : allEmployees.filter(e => {
        return currentLocations.some(l=>normLoc(l)===normLoc(e.workLocation))
          || (selectedLocation && normLoc(e.workLocation)===normLoc(selectedLocation))
          || e.uid===currentUser?.uid;
      });

  // 依 workLocation 分組
  const groups = {};
  locEmps.forEach(e => {
    const loc = e.workLocation || '（未設定）';
    if(!groups[loc]) groups[loc] = [];
    groups[loc].push(e);
  });

  // 依 workLocations 順序排列（正規化比對，防異體字導致分組消失）
  const sortedLocs = [];
  workLocations.forEach(wl => {
    const matchKey = Object.keys(groups).find(k => normLoc(k)===normLoc(wl));
    if(matchKey && !sortedLocs.includes(matchKey)) sortedLocs.push(matchKey);
  });
  if(groups['（未設定）']) sortedLocs.push('（未設定）');

  return sortedLocs.map(loc => {
    const emps = groups[loc]
      .filter(e => !e.status || e.status==='在職')
      .concat(groups[loc].filter(e => e.status && e.status!=='在職'));
    const opts = emps.map(e => {
      const label = e.status && e.status!=='在職' ? `${e.name}（${e.status}）` : e.name;
      return `<option value="${e.id}" data-name="${e.name}" ${e.id==selectedId?'selected':''}>${label}</option>`;
    }).join('');
    return `<optgroup label="${loc}">${opts}</optgroup>`;
  }).join('');
}

window.saveAllBatches=async function(){
  const _lm=window._checkScheduleLock&&window._checkScheduleLock();
  if(_lm){showToast('🔒 '+_lm);return;}
  const sel=document.getElementById('m-emp');
  const empId=sel.value,empName=sel.options[sel.selectedIndex].dataset.name;
  if(!empId){showToast('請選擇同仁');return;}
  // 若還有未加入的選取，提示先加入
  const stillSel=[...document.querySelectorAll('.batch-day-sel')];
  if(!pendingBatches.length&&!stillSel.length){showToast('請先選日期並加入');return;}
  // 自動把尚未加入的選取也算進去（避免漏存）
  if(stillSel.length){addBatch();}
  if(!pendingBatches.length){showToast('沒有可儲存的項目');return;}

  let totalDays=0;const annualDates=[];
  pendingBatches.forEach(b=>{
    b.dates.forEach(date=>{
      if(!shifts[date])shifts[date]=[];
      if(b.kind==='annual'){
        shifts[date].push({empId,empName,kind:'annual',startTime:'',endTime:'',note:b.note||'特休'});
        annualDates.push(date);
      } else {
        shifts[date].push({empId,empName,startTime:b.start,endTime:b.end,note:b.note||''});
      }
      totalDays++;
    });
  });

  closeModal();renderCalendar();renderLegend();renderSidebar();
  showToast('儲存中...');
  await saveShifts();
  // 特休同步到 hr 臨時特休
  if(annualDates.length){await syncAnnualToHR(empId,annualDates,true);}
  showToast(`已儲存 ${totalDays} 筆排班 ✓`);
};

// 特休日期同步到 hr/employees 的 extraLeave[年]
async function syncAnnualToHR(empId,dates,add){
  try{
    const snap=await getDoc(doc(db,'hr','employees'));
    if(!snap.exists())return;
    const list=snap.data().list||[];
    const emp=list.find(e=>String(e.id)===String(empId));
    if(!emp)return;
    if(!emp.extraLeave)emp.extraLeave={};
    dates.forEach(ds=>{
      const yr=new Date(ds).getFullYear();
      if(!emp.extraLeave[yr])emp.extraLeave[yr]=[];
      const arr=emp.extraLeave[yr];const idx=arr.indexOf(ds);
      if(add){if(idx<0)arr.push(ds);}else{if(idx>=0)arr.splice(idx,1);}
      arr.sort();
    });
    await setDoc(doc(db,'hr','employees'),{list},{merge:true});
  }catch(e){console.error('syncAnnualToHR',e);}
}

window.saveEdit=async function(dateStr,idx){
  if(window._checkScheduleLock&&window._checkScheduleLock()){
    showToast('⚠ 已超過25號，無法修改次月班表');closeModal();return;
  }
  const sel=document.getElementById('m-emp');
  const empId=sel.value,empName=sel.options[sel.selectedIndex].dataset.name;
  const date=document.getElementById('m-date').value;
  const startTime=document.getElementById('m-start').value;
  const endTime=document.getElementById('m-end').value;
  const note=document.getElementById('m-note').value.trim();
  if(!empId||!date||!startTime||!endTime){showToast('請填寫完整資料');return;}
  if(date!==dateStr){
    if(!shifts[date])shifts[date]=[];
    shifts[date].push({empId,empName,startTime,endTime,note});
    shifts[dateStr].splice(idx,1);
    if(!shifts[dateStr].length)delete shifts[dateStr];
  }else{shifts[dateStr][idx]={empId,empName,startTime,endTime,note};}
  closeModal();renderCalendar();renderLegend();renderSidebar();
  showToast('儲存中...');await saveShifts();showToast('已更新 ✓');
};

window.deleteShift=async function(dateStr,idx){
  const _lm=window._checkScheduleLock&&window._checkScheduleLock();
  if(_lm){showToast('🔒 '+_lm);return;}
  if(!confirm('確定要刪除這筆排班？'))return;
  const removed=shifts[dateStr][idx];
  shifts[dateStr].splice(idx,1);
  if(!shifts[dateStr].length)delete shifts[dateStr];
  renderCalendar();renderLegend();renderSidebar();
  showToast('儲存中...');await saveShifts();
  // 若刪的是特休 → 同步移除 hr 臨時特休
  if(removed&&removed.kind==='annual'&&removed.empId){await syncAnnualToHR(removed.empId,[dateStr],false);}
  showToast('已刪除 ✓');
};

onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='/hr-system/index.html';return;}
  const snap=await getDoc(doc(db,'users',user.uid));
  if(!snap.exists()||snap.data().disabled){await signOut(auth);window.location.href='/hr-system/index.html?disabled=1';return;}
  const data=snap.data();
  currentRole=data.role||'employee';
  currentLocations=data.locations||[];
  currentUserName=data.name||'—';
  currentUser=user;

  // employee 設為唯讀
  if(currentRole==='employee'){
    isReadOnly=true;
    document.getElementById('readonlyNotice').classList.add('show','type-readonly');
    document.getElementById('toolbarBtns').style.display='none';
  }

  // 非 admin：鎖定邏輯
  if(currentRole!=='admin'){
    const today=new Date();
    const todayDay=today.getDate();
    const todayMonth=today.getMonth()+1;
    const todayYear=today.getFullYear();
    const nextMonth=todayMonth===12?1:todayMonth+1;
    const nextYear=todayMonth===12?todayYear+1:todayYear;

    window._checkScheduleLock=function(){
      if(currentRole==='admin') return false;
      if(currentRole==='manager'||currentRole==='consultant') return false;

      const viewDate=viewYear*100+viewMonth;
      const currentDate=todayYear*100+todayMonth;
      const nextDate=nextYear*100+nextMonth;

      // 當月及過去 → 永遠鎖定
      if(viewDate <= currentDate) return '當月及過去的班表已鎖定，無法修改';

      // 次月 → 25號後鎖定
      if(viewDate===nextDate && todayDay>25) return '已超過25號，次月班表已鎖定，無法修改，如需異動請聯繫總公司';

      // 第三個月以後 → 可預排
      return false;
    };
  } else {
    window._checkScheduleLock=function(){ return false; };
  }
  document.getElementById('roleChip').textContent=roleNames[currentRole]||currentRole;
  // 管理人員（admin / consultant / manager）顯示匯出按鈕
  if(currentRole==='admin'||currentRole==='consultant'||currentRole==='manager'){
    document.getElementById('exportBtn').style.display='';
  }

  // 並行載入所有資料
  await Promise.all([
    getDoc(doc(db,'hr','settings')).then(s=>{
      if(s.exists()){
        workLocations=s.data().workLocations||[];
        // Firestore 有設定就合併，沒有就保留寫死的預設值
        if(s.data().locationCodes) locationCodes={...locationCodes,...s.data().locationCodes};
      }
    }),
    getDoc(doc(db,'hr','employees')).then(s=>{allEmployees=s.exists()?(s.data().list||[]):[]; }),
    loadHolidays(viewYear),
  ]);

  const locSelect=document.getElementById('locationFilter');
  const availLocs=currentRole==='admin'?workLocations:
    currentRole==='employee'
      ? workLocations.filter(l=> allEmployees.find(e=>e.uid===user.uid&&normLoc(e.workLocation)===normLoc(l)) || currentLocations.some(cl=>normLoc(cl)===normLoc(l)))
      : currentLocations.filter(l=>workLocations.includes(l));
  availLocs.forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;locSelect.appendChild(o);});

  if(availLocs.length===1){
    locSelect.value=availLocs[0];selectedLocation=availLocs[0];
    await loadShiftTypes();await loadShifts();
  } else if(availLocs.length>1 && (currentRole==='manager'||currentRole==='consultant')){
    const primaryLoc = currentLocations[0]||'';
    const matchedLoc = availLocs.find(l=>normLoc(l)===normLoc(primaryLoc)) || availLocs[0];
    locSelect.value=matchedLoc;selectedLocation=matchedLoc;
    await loadShiftTypes();await loadShifts();
  }

  document.getElementById('monthLabel').textContent=`${viewYear} 年 ${viewMonth} 月`;

  // 初始載入時也檢查鎖定狀態
  if(!isReadOnly && window._checkScheduleLock){
    const lockMsg=window._checkScheduleLock();
    if(lockMsg){
      document.getElementById('readonlyNotice').textContent=`🔒 ${lockMsg}`;
      document.getElementById('readonlyNotice').classList.remove('type-readonly');
      document.getElementById('readonlyNotice').classList.add('show','type-lock');
      document.getElementById('toolbarBtns').style.display='none';
    }
  }

  await loadShifts();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
});

// ── 載入假單 ──
async function loadLeaveRequests() {
  try {
    let q;
    // 全部撈回後 client 端篩選，避免複合索引需求
    q = query(collection(db,'leave_requests'), orderBy('createdAt','desc'));
    const snaps = await getDocs(q);
    let allReqs = snaps.docs.map(d=>({id:d.id,...d.data()}));
    if(currentRole==='employee') {
      allReqs = allReqs.filter(r=>r.uid===currentUser.uid);
    } else {
      // 管理員：待審核依 priority 排，其餘依時間排
      allReqs.sort((a,b)=>{
        if(a.status==='pending'&&b.status==='pending') return (a.priority||999)-(b.priority||999);
        if(a.status==='pending') return -1;
        if(b.status==='pending') return 1;
        return 0;
      });
    }
    leaveRequests = allReqs;
    renderLeaveList();
  } catch(e) {
    document.getElementById('leaveList').innerHTML=`<div style="text-align:center;padding:40px;color:#e24b4a">載入失敗：${e.message}</div>`;
  }
}

// ── 渲染假單列表 ──
function renderLeaveList() {
  const list = document.getElementById('leaveList');
  const isAdmin = currentRole==='admin'||currentRole==='consultant'||currentRole==='manager';

  // 顯示/隱藏 UI 元素
  document.getElementById('leaveSubmitBar').style.display = currentRole==='employee' ? 'block' : 'none';
  const adminTabs = document.getElementById('leaveAdminTabs');
  adminTabs.style.display = isAdmin ? 'flex' : 'none';

  // 更新待審核數量
  const pendingCnt = leaveRequests.filter(r=>r.status==='pending').length;
  const cntEl = document.getElementById('lf-pending-cnt');
  if(cntEl) cntEl.textContent = pendingCnt;

  // 鎖定狀態提示
  const today = new Date();
  const lockInfo = document.getElementById('vacation-lock-info');
  if(lockInfo) {
    const todayDay = today.getDate();
    const nextMonth = today.getMonth()===11?1:today.getMonth()+2;
    const nextYear = today.getMonth()===11?today.getFullYear()+1:today.getFullYear();
    lockInfo.textContent = todayDay > 20
      ? `（${nextYear}年${nextMonth}月休假申請已截止）`
      : `（${nextYear}年${nextMonth}月申請截止：本月20號）`;
  }

  // 篩選
  let filtered = leaveRequests;
  if(isAdmin && leaveFilter!=='all') filtered = filtered.filter(r=>r.status===leaveFilter);
  if(isAdmin && leaveTypeFilter==='vacation') filtered = filtered.filter(r=>r.leaveType==='休假');
  if(isAdmin && leaveTypeFilter==='special')  filtered = filtered.filter(r=>r.leaveType!=='休假');

  // 拖拉提示
  const dragHint = document.getElementById('drag-hint-leave');
  if(dragHint) dragHint.style.display=(leaveFilter==='pending'&&leaveTypeFilter==='vacation'&&isAdmin)?'block':'none';

  if(!filtered.length) {
    list.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:12px">暫無假單記錄</div>';
    return;
  }

  const statusLabel = {pending:'⏳ 待審核', approved:'✅ 已核准', rejected:'❌ 已拒絕'};
  const statusClass = {pending:'lb-pending', approved:'lb-approved', rejected:'lb-rejected'};

  list.innerHTML = filtered.map((r,i)=>{
    const isPending = r.status==='pending';
    const canDrag = isAdmin && leaveFilter==='pending';
    const adminBtns = isAdmin && isPending ? `
      <div style="display:flex;gap:6px;margin-top:10px">
        <button class="btn" style="font-size:12px;background:#E6FAF0;color:#087443;border-color:#ADE8C4" onclick="reviewLeave('${r.id}','approved')">✅ 核准</button>
        <button class="btn" style="font-size:12px;background:#FEE9E9;color:#C0392B;border-color:#FFBDBD" onclick="reviewLeave('${r.id}','rejected')">❌ 拒絕</button>
        <button class="btn" style="font-size:12px;color:#C0392B" onclick="deleteLeave('${r.id}')">🗑 刪除</button>
      </div>` : (isAdmin && !isPending ? `
      <div style="margin-top:8px;display:flex;gap:6px">
        <button class="btn" style="font-size:12px" onclick="deleteLeave('${r.id}')">🗑 刪除</button>
      </div>` : '');

    const empBtns = currentRole==='employee' && isPending ? `
      <button class="btn" style="font-size:12px;color:#C0392B;margin-top:8px" onclick="cancelLeave('${r.id}')">撤回申請</button>` : '';

    const priorityBadge = isAdmin && isPending ? `<div class="leave-priority">${i+1}</div>` : '';

    return `<div class="leave-card${canDrag?' draggable':''}" data-id="${r.id}" ${canDrag?'draggable="true"':''}>
      ${priorityBadge}
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">
          <span style="font-weight:600;font-size:14px">${r.empName||'—'}</span>
          <span class="leave-badge ${statusClass[r.status]||'lb-pending'}">${statusLabel[r.status]||r.status}</span>
          <span style="font-size:11px;color:var(--text3)">${r.workLocation||''}</span>
        </div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:4px">
          📅 ${r.startDate} ${r.endDate&&r.endDate!==r.startDate?'～ '+r.endDate:''} &nbsp;|&nbsp; 🏷 ${r.leaveType||'休假'}
          ${r.days ? `&nbsp;|&nbsp; ${r.days} 天` : ''}
        </div>
        ${r.reason?`<div style="font-size:12px;color:var(--text3)">備註：${r.reason}</div>`:''}
        ${r.reviewNote?`<div style="font-size:12px;color:#3B5BDB;margin-top:4px">審核備注：${r.reviewNote}</div>`:''}
        <div style="font-size:11px;color:var(--text3);margin-top:6px">申請時間：${r.createdAt?.toDate?r.createdAt.toDate().toLocaleString('zh-TW',{timeZone:'Asia/Taipei',month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):r.createdAt||'—'}</div>
        ${adminBtns}${empBtns}
      </div>
    </div>`;
  }).join('');

  // 拖拉排序（僅待審核、管理員）
  if(isAdmin && leaveFilter==='pending') initLeaveDrag();
}

// ── 拖拉優先順序 ──
function initLeaveDrag() {
  const list = document.getElementById('leaveList');
  let dragSrc = null;
  list.querySelectorAll('.leave-card.draggable').forEach(card=>{
    card.addEventListener('dragstart', e=>{ dragSrc=card; setTimeout(()=>card.classList.add('dragging'),0); e.dataTransfer.effectAllowed='move'; });
    card.addEventListener('dragend', ()=>{ card.classList.remove('dragging'); list.querySelectorAll('.leave-card').forEach(c=>c.classList.remove('drag-over')); savePriority(); });
    card.addEventListener('dragover', e=>{ e.preventDefault(); if(card!==dragSrc){ list.querySelectorAll('.leave-card').forEach(c=>c.classList.remove('drag-over')); card.classList.add('drag-over'); } });
    card.addEventListener('drop', e=>{ e.preventDefault(); if(dragSrc&&card!==dragSrc){ const cards=[...list.querySelectorAll('.leave-card')]; const si=cards.indexOf(dragSrc),ti=cards.indexOf(card); if(si<ti) list.insertBefore(dragSrc,card.nextSibling); else list.insertBefore(dragSrc,card); card.classList.remove('drag-over'); } });
  });
}

async function savePriority() {
  const cards = [...document.getElementById('leaveList').querySelectorAll('.leave-card')];
  for(let i=0;i<cards.length;i++){
    const id = cards[i].dataset.id;
    if(id) await updateDoc(doc(db,'leave_requests',id),{priority:i+1}).catch(()=>{});
  }
  // 重新排序本地資料
  const newOrder = cards.map(c=>c.dataset.id);
  leaveRequests.sort((a,b)=>newOrder.indexOf(a.id)-newOrder.indexOf(b.id));
}

// ── 假別切換 ──
window.onLeaveTypeChange = function() {
  const type = document.getElementById('l-type').value;
  const isVacation = type === '休假';
  const lockNotice = document.getElementById('leave-lock-notice');
  const monthNotice = document.getElementById('leave-month-notice');
  const startInput = document.getElementById('l-start');
  const endInput = document.getElementById('l-end');

  const today = new Date();
  const todayDay = today.getDate();
  const nextMonth = today.getMonth() === 11 ? 1 : today.getMonth() + 2;
  const nextYear = today.getMonth() === 11 ? today.getFullYear() + 1 : today.getFullYear();
  const nextMonthStr = `${nextYear}-${String(nextMonth).padStart(2,'0')}`;
  const nextMonthLabel = `${nextYear} 年 ${nextMonth} 月`;

  if(isVacation) {
    if(todayDay > 20) {
      lockNotice.style.display = 'block';
      monthNotice.style.display = 'none';
      startInput.disabled = true;
      endInput.disabled = true;
    } else {
      lockNotice.style.display = 'none';
      monthNotice.style.display = 'block';
      document.getElementById('nextMonthLabel').textContent = nextMonthLabel;
      // 限定只能選次月日期
      startInput.min = nextMonthStr + '-01';
      startInput.max = nextMonthStr + '-' + new Date(nextYear, nextMonth, 0).getDate();
      endInput.min = startInput.min;
      endInput.max = startInput.max;
      startInput.disabled = false;
      endInput.disabled = false;
    }
  } else {
    lockNotice.style.display = 'none';
    monthNotice.style.display = 'none';
    startInput.min = '';
    startInput.max = '';
    endInput.min = '';
    endInput.max = '';
    startInput.disabled = false;
    endInput.disabled = false;
  }
  onDateChange();
};

window.onDateChange = function() {
  const start = document.getElementById('l-start').value;
  const end   = document.getElementById('l-end').value;
  const preview = document.getElementById('leave-days-preview');
  if(start && end && end >= start) {
    const days = Math.round((new Date(end)-new Date(start))/(86400000))+1;
    preview.textContent = `共 ${days} 天`;
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
};

window.submitLeave = async function() {
  const start = document.getElementById('l-start').value;
  const end   = document.getElementById('l-end').value || start;
  const type  = document.getElementById('l-type').value;
  const reason= document.getElementById('l-reason').value.trim();
  if(!start){ showToast('請選擇日期'); return; }
  if(end < start){ showToast('結束日期不能早於開始日期'); return; }

  // 次月休假：再次確認是否超過 20 號
  if(type === '休假') {
    const todayDay = new Date().getDate();
    if(todayDay > 20) { showToast('🔒 已超過申請截止日（20號）'); return; }

    // 確認選的是次月
    const today = new Date();
    const nextMonth = today.getMonth() === 11 ? 1 : today.getMonth() + 2;
    const nextYear  = today.getMonth() === 11 ? today.getFullYear() + 1 : today.getFullYear();
    const startMonth = parseInt(start.slice(5,7));
    const startYear  = parseInt(start.slice(0,4));
    if(startYear !== nextYear || startMonth !== nextMonth) {
      showToast('次月休假只能選擇次月的日期');
      return;
    }
  }

  const emp = allEmployees.find(e=>e.uid===currentUser.uid)||{};
  const days = Math.round((new Date(end)-new Date(start))/(86400000))+1;
  const isVacation = type === '休假';
  const maxPri = leaveRequests.filter(r=>r.status==='pending'&&r.leaveType==='休假').length + 1;

  await addDoc(collection(db,'leave_requests'),{
    uid: currentUser.uid,
    empName: emp.name||'—',
    workLocation: emp.workLocation||'—',
    leaveType: type,
    isVacation,
    startDate: start,
    endDate: end,
    days,
    reason,
    status: 'pending',
    priority: isVacation ? maxPri : 999,
    createdAt: serverTimestamp(),
  });
  const emp2 = allEmployees.find(e=>e.uid===currentUser.uid)||{};
  writeOpLog({ editor:currentUserName, role:currentRole, module:'schedule', action:'申請請假', detail:`${emp2.name||'—'} ${type} ${start}～${end}` });
  closeModal();
  showToast('假單已送出，等待審核 ✓');
  await loadLeaveRequests();
};

// ── 審核假單 ──
window.reviewLeave = async function(id, status) {
  const note = status==='rejected' ? prompt('拒絕原因（選填）：')||'' : '';
  await updateDoc(doc(db,'leave_requests',id),{
    status,
    reviewNote: note,
    reviewedBy: currentUser.uid,
    reviewedAt: serverTimestamp(),
  });
  const lr = leaveRequests.find(r=>r.id===id);
  writeOpLog({ editor:currentUserName, role:currentRole, module:'schedule', action:status==='approved'?'核准假單':'拒絕假單', detail:`${lr?.empName||'—'} ${lr?.leaveType||''} ${lr?.startDate||''}` });
  showToast(status==='approved'?'已核准 ✓':'已拒絕');
  await loadLeaveRequests();
};

// ── 同仁撤回 ──
window.cancelLeave = async function(id) {
  if(!confirm('確定要撤回這筆假單申請？')) return;
  await deleteDoc(doc(db,'leave_requests',id));
  showToast('已撤回');
  await loadLeaveRequests();
};

// ── 管理員刪除 ──
window.deleteLeave = async function(id) {
  if(!confirm('確定要刪除這筆假單記錄？')) return;
  await deleteDoc(doc(db,'leave_requests',id));
  showToast('已刪除');
  await loadLeaveRequests();
};

// 初始設定待審核篩選
window.addEventListener('DOMContentLoaded', ()=>setLeaveFilter('pending'));

</script>
