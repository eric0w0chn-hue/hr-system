<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出缺勤紀錄 — 鑫系統</title>
<style>
:root{--bg:#ECEEF2;--surface:#fff;--surface2:#F4F5F8;--border:#DDE1E9;--border2:#C8CDD8;--text:#1A1D23;--text2:#5A6175;--text3:#9AA0B4;--accent:#2D3142;--accent-light:#F0F2F5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}






.main{max-width:1200px;margin:0 auto;padding:24px 20px}
.filter-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px}
.filter-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:16px;text-transform:uppercase;letter-spacing:.4px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.filter-grid.wide{grid-template-columns:1fr 1fr 1fr}
.fr{display:flex;flex-direction:column;gap:5px}
.fr label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.3px;text-transform:uppercase}
.fr select,.fr input{font-size:13px;padding:8px 11px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:inherit}
.fr select:focus,.fr input:focus{outline:none;border-color:var(--accent)}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn{font-size:13px;padding:8px 18px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;border:1px solid var(--border);background:var(--surface);color:var(--text2)}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#3D4158}
.btn-export{background:#087443;color:#fff;border-color:#087443}
.btn-export:hover{background:#065F36}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.result-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface2)}
.result-count{font-size:13px;color:var(--text2)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);background:var(--surface2);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid #F4F5F8;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFC}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.b-normal{background:#E6FAF0;color:#087443;border:1px solid #ADE8C4}
.b-missing-in{background:#FEE9E9;color:#C0392B;border:1px solid #FFBDBD}
.b-missing-out{background:#FFF4E0;color:#C47A00;border:1px solid #FDDFA0}
.b-temp{background:#EDE9FE;color:#6741D9;border:1px solid #D8CAFF}
.empty-state{text-align:center;padding:48px;color:var(--text3);font-size:13px}
.pg-row{display:flex;align-items:center;justify-content:center;gap:4px;padding:14px;border-top:1px solid var(--border)}
.pg-btn{font-size:12px;padding:5px 10px;border-radius:7px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:inherit;min-width:32px}
.pg-btn:hover:not([disabled]){background:var(--surface2)}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-active{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important;font-weight:600}
#loading{position:fixed;inset:0;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ===== 標準 topbar（統一規格）===== */
.topbar{height:60px;background:var(--accent);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:200;gap:10px}
.topbar-left{display:flex;align-items:center;gap:14px;min-width:0;flex:1;overflow:hidden}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.back-btn{font-size:12px;padding:5px 13px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0}
.back-btn:hover{background:rgba(255,255,255,.2)}
.dv{width:1px;height:20px;background:rgba(255,255,255,.2);flex-shrink:0}
.topbar h1{font-size:16px;font-weight:700;color:#fff;letter-spacing:.5px;display:flex;align-items:center;gap:8px;white-space:nowrap;margin:0}
.role-chip{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);white-space:nowrap}
@media(max-width:600px){.topbar{padding:0 12px;gap:6px}.topbar h1{font-size:14px}.back-btn{font-size:11px;padding:4px 9px}}
/* ===== 標準 topbar 結束 ===== */
</style>
</head>

    </div>
    <div class="topbar-right">
      <span class="role-chip" id="roleChip">—</span>
    </div>
  </div>
  <div class="main">
    <div class="filter-card">
      <div class="filter-title">快速篩選</div>
      <div class="filter-grid">
        <div class="fr"><label>店面</label>
          <select id="f-loc"><option value="">全部店面</option></select>
        </div>
        <div class="fr"><label>同仁</label>
          <select id="f-emp"><option value="">全部同仁</option></select>
        </div>
      </div>
      <div class="filter-grid wide" style="margin-top:12px">
        <div class="fr"><label>日期起</label><input type="date" id="f-from"></div>
        <div class="fr"><label>日期迄</label><input type="date" id="f-to"></div>
        <div class="fr"><label>狀態</label>
          <select id="f-status">
            <option value="">全部</option>
            <option value="normal">正常</option>
            <option value="missing_in">未打上班卡</option>
            <option value="missing_out">未打下班卡</option>
            <option value="temp">臨時打卡</option>
          </select>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="doSearch()">🔍 查詢</button>
        <button class="btn" onclick="doReset()">↺ 重設</button>
        <button class="btn btn-export" onclick="doExport()">↓ 匯出 Excel</button>
      </div>
    </div>

    <div class="result-card">
      <div class="result-header">
        <span class="result-count" id="resultCount">尚未查詢</span>
      </div>
      <div id="tableWrap">
        <div class="empty-state">請設定篩選條件後按「查詢」</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { authGuard, db } from './auth-guard.js';
import { doc, getDoc, getDocs, collection, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
// 店面名稱正規化（異體字容錯：舖/鋪）
function normLoc(s){return (s||'').replace(/鋪/g,'舖').replace(/　/g,' ').trim();}


let allEmployees=[], workLocations=[], currentRole='', currentLocations=[];
let searchResults=[], currentPage=1;
const PAGE_SIZE=20;

const statusLabel={normal:'正常',missing_in:'未打上班卡',missing_out:'未打下班卡',temp:'臨時打卡'};
const statusBadge={normal:'b-normal',missing_in:'b-missing-in',missing_out:'b-missing-out',temp:'b-temp'};

// 初始化日期（預設本月）
function initDates(){
  const now=new Date();
  const y=now.getFullYear(), m=String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('f-from').value=`${y}-${m}-01`;
  document.getElementById('f-to').value=`${y}-${m}-${String(new Date(y,now.getMonth()+1,0).getDate()).padStart(2,'0')}`;
}

window.doSearch=async function(){
  const loc=document.getElementById('f-loc').value;
  const empId=document.getElementById('f-emp').value;
  const from=document.getElementById('f-from').value;
  const to=document.getElementById('f-to').value;
  const status=document.getElementById('f-status').value;

  document.getElementById('resultCount').textContent='查詢中...';
  document.getElementById('tableWrap').innerHTML='<div class="empty-state">查詢中...</div>';

  try{
    // 從 attendance collection 查詢
    const snap=await getDocs(collection(db,'attendance'));
    let results=snap.docs.map(d=>({id:d.id,...d.data()}));

    // 篩選
    if(loc) results=results.filter(r=>normLoc(r.workLocation)===normLoc(loc));
    if(empId) results=results.filter(r=>r.empId==empId);
    if(from) results=results.filter(r=>r.date>=from);
    if(to) results=results.filter(r=>r.date<=to);
    if(status) results=results.filter(r=>r.status===status);

    // 依日期排序（新到舊）
    results.sort((a,b)=>b.date.localeCompare(a.date));
    searchResults=results;
    currentPage=1;
    renderTable();
  }catch(e){
    document.getElementById('tableWrap').innerHTML='<div class="empty-state">查詢失敗，請稍後再試</div>';
  }
};

window.doReset=function(){
  document.getElementById('f-loc').value='';
  document.getElementById('f-emp').value='';
  document.getElementById('f-status').value='';
  initDates();
  searchResults=[];
  currentPage=1;
  document.getElementById('resultCount').textContent='尚未查詢';
  document.getElementById('tableWrap').innerHTML='<div class="empty-state">請設定篩選條件後按「查詢」</div>';
};

function renderTable(){
  const total=searchResults.length;
  document.getElementById('resultCount').textContent=`共 ${total} 筆記錄`;
  if(!total){
    document.getElementById('tableWrap').innerHTML='<div class="empty-state">查無符合的記錄</div>';
    return;
  }
  const totalPages=Math.ceil(total/PAGE_SIZE);
  const start=(currentPage-1)*PAGE_SIZE;
  const page=searchResults.slice(start,start+PAGE_SIZE);

  let html=`<table><thead><tr>
    <th>#</th><th>日期</th><th>店面</th><th>同仁</th>
    <th>上班打卡</th><th>下班打卡</th><th>狀態</th><th>備註</th>
  </tr></thead><tbody>`;
  page.forEach((r,i)=>{
    const s=r.status||'normal';
    html+=`<tr>
      <td style="color:var(--text3)">${start+i+1}</td>
      <td>${r.date||'—'}</td>
      <td style="font-size:12px">${r.workLocation||'—'}</td>
      <td style="font-weight:500">${r.empName||'—'}</td>
      <td class="mono">${r.clockIn||'—'}</td>
      <td class="mono">${r.clockOut||'<span style="color:#C47A00">尚未打卡</span>'}</td>
      <td><span class="badge ${statusBadge[s]||'b-normal'}">${statusLabel[s]||s}</span></td>
      <td style="font-size:12px;color:var(--text3)">${r.note||'—'}</td>
    </tr>`;
  });
  html+='</tbody></table>';

  // 分頁
  if(totalPages>1){
    html+=`<div class="pg-row">`;
    html+=`<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    for(let i=1;i<=totalPages;i++){
      if(i===1||i===totalPages||Math.abs(i-currentPage)<=1)
        html+=`<button class="pg-btn${i===currentPage?' pg-active':''}" onclick="goPage(${i})">${i}</button>`;
      else if(Math.abs(i-currentPage)===2)
        html+=`<span style="color:var(--text3);padding:0 4px">…</span>`;
    }
    html+=`<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
    html+=`<span style="font-size:12px;color:var(--text3);margin-left:8px">第 ${currentPage}/${totalPages} 頁</span></div>`;
  }
  document.getElementById('tableWrap').innerHTML=html;
}

window.goPage=function(p){
  const totalPages=Math.ceil(searchResults.length/PAGE_SIZE);
  if(p<1||p>totalPages) return;
  currentPage=p;
  renderTable();
};

window.doExport=function(){
  if(!searchResults.length){alert('請先查詢再匯出');return;}
  const rows=[['日期','店面','同仁','上班打卡','下班打卡','狀態','備註']];
  searchResults.forEach(r=>{
    rows.push([r.date||'',r.workLocation||'',r.empName||'',r.clockIn||'',r.clockOut||'',statusLabel[r.status]||'',r.note||'']);
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`出缺勤紀錄_${document.getElementById('f-from').value}_${document.getElementById('f-to').value}.csv`;
  a.click();URL.revokeObjectURL(url);
};

authGuard('clock_attendance', async ({ role, locations }) => {
  {try{var _rc=document.getElementById('roleChip');if(_rc)_rc.textContent=({admin:'管理員',consultant:'顧問',manager:'店長/副店長',employee:'同仁'})[role]||role||'—';}catch(e){}}
  currentRole=role;
  currentLocations=locations;

  // 載入店面和員工
  const [settSnap,empSnap]=await Promise.all([
    getDoc(doc(db,'hr','settings')),
    getDoc(doc(db,'hr','employees'))
  ]);
  workLocations=settSnap.exists()?(settSnap.data().workLocations||[]):[];
  allEmployees=empSnap.exists()?(empSnap.data().list||[]):[];

  const locSelect=document.getElementById('f-loc');
  const empSelect=document.getElementById('f-emp');
  const availLocs=currentRole==='admin'?workLocations:currentLocations.filter(l=>workLocations.some(w=>normLoc(w)===normLoc(l)));
  availLocs.forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;locSelect.appendChild(o);});
  const availEmps=currentRole==='admin'?allEmployees:allEmployees.filter(e=>currentLocations.some(l=>normLoc(l)===normLoc(e.workLocation)));
  availEmps.forEach(e=>{const o=document.createElement('option');o.value=e.id;o.textContent=`${e.name} ${e.workLocation||''}`;empSelect.appendChild(o);});

  initDates();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
});
</script>
</body>
</html>
