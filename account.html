<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帳號管理 — 鑫系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#F8FAFC;color:#0F172A;min-height:100vh;font-size:14px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:linear-gradient(135deg,#1E3A8A 0%,#2563EB 60%,#0891B2 100%);height:62px}
.topbar h1{font-size:18px;font-weight:800;color:#fff;letter-spacing:1px;display:flex;align-items:center;gap:10px}
.topbar h1::before{content:'';display:inline-block;width:4px;height:20px;background:linear-gradient(180deg,#60A5FA,#38BDF8);border-radius:2px}
.btn-back{font-size:12px;padding:5px 14px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);font-family:inherit;transition:background .15s}
.btn-back:hover{background:rgba(255,255,255,.25)}
.main{max-width:900px;margin:0 auto;padding:28px 20px}
.page-title{font-size:18px;font-weight:700;margin-bottom:4px}
.page-sub{font-size:13px;color:#64748B;margin-bottom:20px}
.card{background:#fff;border-radius:12px;border:1px solid #E2E8F0;overflow:hidden;box-shadow:0 2px 8px rgba(15,23,42,.04)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 16px;font-size:11px;font-weight:600;color:#64748B;border-bottom:1px solid #E2E8F0;background:#F8FAFC;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid #F1F5F9;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F8FBFF}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.role-admin{background:#FEF3C7;color:#92400E}
.role-consultant{background:#EDE9FE;color:#5B21B6}
.role-manager{background:#D1FAE5;color:#065F46}
.role-employee{background:#DBEAFE;color:#1D4ED8}
.status-active{background:#D1FAE5;color:#065F46}
.status-disabled{background:#FEE2E2;color:#991B1B}
.btn{font-size:12px;padding:5px 12px;border-radius:7px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:4px;border:1px solid #E2E8F0;background:#fff;color:#0F172A}
.btn:hover{background:#F1F5F9}
.btn-primary{background:#2563EB;color:#fff;border-color:#1D4ED8}
.btn-primary:hover{background:#1D4ED8}
.btn-danger{background:#fff;color:#DC2626;border-color:#FECACA}
.btn-danger:hover{background:#FEF2F2}
.av{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.av-b{background:#DBEAFE;color:#1E40AF}.av-t{background:#D1FAE5;color:#065F46}.av-c{background:#FEE2E2;color:#991B1B}.av-p{background:#EDE9FE;color:#5B21B6}.av-a{background:#FEF3C7;color:#92400E}.av-k{background:#FCE7F3;color:#9D174D}
.nc{display:flex;align-items:center;gap:10px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:14px;width:500px;max-width:100%;padding:24px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(15,23,42,.2)}
.modal h2{font-size:15px;font-weight:600;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid #E2E8F0}
.fr{margin-bottom:14px}
.fr label{display:block;font-size:12px;color:#64748B;margin-bottom:5px;font-weight:500}
.fr select,.fr input{width:100%;font-size:13px;padding:8px 11px;border:1px solid #E2E8F0;border-radius:8px;background:#fff;color:#0F172A;font-family:inherit}
.fr select:focus,.fr input:focus{outline:none;border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid #E2E8F0}
.loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;max-height:160px;overflow-y:auto;padding:2px}
.loc-item{display:flex;align-items:center;gap:6px;font-size:13px;padding:5px 8px;border-radius:6px;border:1px solid #E2E8F0;cursor:pointer;transition:background .1s}
.loc-item:hover{background:#F0F7FF}
.loc-item input{width:16px;height:16px;cursor:pointer;accent-color:#2563EB}
.toast{position:fixed;bottom:24px;right:24px;background:#0F172A;color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;z-index:2000;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
#loading{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:999;font-size:14px;color:#64748B}
.empty{text-align:center;padding:40px;color:#94A3B8;font-size:13px}
</style>
</head>
<body>
<div id="loading">載入中...</div>
<div id="app" style="display:none">
  <div class="topbar">
    <h1>🔑 帳號管理</h1>
    <button class="btn-back" onclick="window.location.href='/hr-system/dashboard.html'">⬅ 主選單</button>
  </div>
  <div class="main">
    <div class="page-title">帳號管理</div>
    <div class="page-sub">設定每位使用者的角色與店面權限</div>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th style="width:200px">姓名</th>
            <th style="width:100px">身分證號</th>
            <th style="width:90px">角色</th>
            <th>負責店面</th>
            <th style="width:80px">狀態</th>
            <th style="width:100px">操作</th>
          </tr>
        </thead>
        <tbody id="accountList"><tr><td colspan="6"><div class="empty">載入中...</div></td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<div id="modalArea"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, getDocs, collection, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAg_dfvoxA1dQYqHzdqPtEot8wT-wKZal4",
  authDomain: "liangpinghri.firebaseapp.com",
  projectId: "liangpinghri",
  storageBucket: "liangpinghri.firebasestorage.app",
  messagingSenderId: "410255807470",
  appId: "1:410255807470:web:dc08ba070c7db4f083f4ff"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const roleNames      = { admin:'管理員', consultant:'顧問', manager:'店長', employee:'員工' };
const roleBadgeClass = { admin:'role-admin', consultant:'role-consultant', manager:'role-manager', employee:'role-employee' };
const avCls = n => ['av-b','av-t','av-c','av-p','av-a','av-k'][n.charCodeAt(0)%6];

let allUsers = [];
let workLocations = [];
let currentUserUid = '';

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

async function loadData(){
  // 載入 workLocations
  try{
    const s = await getDoc(doc(db,'hr','settings'));
    workLocations = s.exists() ? (s.data().workLocations||[]) : [];
  }catch(e){ workLocations=[]; }

  // 載入所有 users
  try{
    const snap = await getDocs(collection(db,'users'));
    allUsers = snap.docs.map(d=>({uid:d.id, ...d.data()}));
  }catch(e){ allUsers=[]; }
}

function renderList(){
  const tbody = document.getElementById('accountList');
  if(!allUsers.length){
    tbody.innerHTML='<tr><td colspan="6"><div class="empty">尚無帳號資料</div></td></tr>';
    return;
  }
  tbody.innerHTML = allUsers.map(u=>{
    const role = u.role||'employee';
    const locs = (u.locations||[]).join('、') || '—';
    const showLocs = (role==='consultant'||role==='manager');
    const statusBadge = u.disabled
      ? `<span class="badge status-disabled">已停用</span>`
      : `<span class="badge status-active">正常</span>`;
    const isSelf = u.uid === currentUserUid;
    return `<tr>
      <td><div class="nc"><div class="av ${avCls(u.name||'?')}">${(u.name||'?').slice(0,2)}</div><span>${u.name||'—'}</span></div></td>
      <td style="font-size:12px;color:#475569">${u.idNo||'—'}</td>
      <td><span class="badge ${roleBadgeClass[role]||'role-employee'}">${roleNames[role]||role}</span></td>
      <td style="font-size:12px;color:#475569">${showLocs ? locs : '<span style="color:#CBD5E1">—</span>'}</td>
      <td>${statusBadge}</td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn" onclick="openEdit('${u.uid}')" title="編輯">✎ 編輯</button>
          ${!isSelf ? `<button class="btn btn-danger" onclick="toggleDisable('${u.uid}')" title="${u.disabled?'啟用':'停用'}">${u.disabled?'啟用':'停用'}</button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

window.openEdit = function(uid){
  const u = allUsers.find(x=>x.uid===uid);
  if(!u) return;
  const role = u.role||'employee';
  const locChecks = workLocations.map(l=>{
    const checked = (u.locations||[]).includes(l) ? 'checked' : '';
    return `<label class="loc-item"><input type="checkbox" value="${l}" ${checked}> ${l}</label>`;
  }).join('');
  const showLocs = (role==='consultant'||role==='manager');

  document.getElementById('modalArea').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>編輯帳號：${u.name||u.idNo}</h2>
        <div class="fr">
          <label>角色</label>
          <select id="edit-role" onchange="toggleLocSection()">
            <option value="admin"      ${role==='admin'?'selected':''}>管理員</option>
            <option value="consultant" ${role==='consultant'?'selected':''}>顧問</option>
            <option value="manager"    ${role==='manager'?'selected':''}>店長</option>
            <option value="employee"   ${role==='employee'?'selected':''}>員工</option>
          </select>
        </div>
        <div class="fr" id="loc-section" style="display:${showLocs?'block':'none'}">
          <label>負責店面（可多選）</label>
          <div class="loc-grid" id="loc-checks">${locChecks}</div>
        </div>
        <div class="mf">
          <button class="btn" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="saveEdit('${uid}')">儲存</button>
        </div>
      </div>
    </div>`;
};

window.toggleLocSection = function(){
  const role = document.getElementById('edit-role').value;
  const sec  = document.getElementById('loc-section');
  if(sec) sec.style.display = (role==='consultant'||role==='manager') ? 'block' : 'none';
};

window.saveEdit = async function(uid){
  const role = document.getElementById('edit-role').value;
  const checks = document.querySelectorAll('#loc-checks input:checked');
  const locations = Array.from(checks).map(c=>c.value);
  try{
    await setDoc(doc(db,'users',uid), { role, locations }, { merge:true });
    const u = allUsers.find(x=>x.uid===uid);
    if(u){ u.role=role; u.locations=locations; }
    closeModal();
    renderList();
    showToast('已更新 ✓');
  }catch(e){
    showToast('儲存失敗：'+e.message);
  }
};

window.toggleDisable = async function(uid){
  const u = allUsers.find(x=>x.uid===uid);
  if(!u) return;
  const newVal = !u.disabled;
  const msg = newVal ? `確定要停用「${u.name}」的帳號嗎？` : `確定要啟用「${u.name}」的帳號嗎？`;
  if(!confirm(msg)) return;
  try{
    await setDoc(doc(db,'users',uid), { disabled:newVal }, { merge:true });
    u.disabled = newVal;
    renderList();
    showToast(newVal ? '帳號已停用 ✓' : '帳號已啟用 ✓');
  }catch(e){
    showToast('操作失敗：'+e.message);
  }
};

window.closeModal = function(){ document.getElementById('modalArea').innerHTML=''; };

onAuthStateChanged(auth, async user => {
  if(!user){
    window.location.href = '/hr-system/index.html';
    return;
  }
  const snap = await getDoc(doc(db,'users', user.uid));
  if(!snap.exists() || snap.data().disabled){
    await signOut(auth);
    window.location.href = '/hr-system/index.html?disabled=1';
    return;
  }
  if(snap.data().role !== 'admin'){
    window.location.href = '/hr-system/dashboard.html';
    return;
  }
  currentUserUid = user.uid;
  await loadData();
  renderList();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
});
</script>
</body>
</html>
