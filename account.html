<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
<title>帳號管理 — 鑫系統</title>
<style>
:root{
  --bg:#ECEEF2;--surface:#fff;--surface2:#F4F5F8;--border:#DDE1E9;--border2:#C8CDD8;
  --text:#1A1D23;--text2:#5A6175;--text3:#9AA0B4;--accent:#2D3142;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
/* topbar */
.topbar{height:60px;background:var(--accent);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;gap:10px;flex-wrap:nowrap}
.topbar-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;overflow:hidden}
.back-btn{font-size:12px;padding:5px 12px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);font-family:inherit;white-space:nowrap;flex-shrink:0}
.back-btn:hover{background:rgba(255,255,255,.2)}
.topbar h1{font-size:15px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.stat-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(255,255,255,.1);border-radius:20px;border:1px solid rgba(255,255,255,.15);font-size:12px;color:rgba(255,255,255,.85);white-space:nowrap}
.stat-pill strong{font-size:14px;color:#fff}
.stat-pill.red{background:rgba(226,75,74,.2);border-color:rgba(226,75,74,.3)}
.stat-pill.red strong{color:#fca5a5}
/* topbar 手機版 */
@media(max-width:600px){
  .topbar{padding:0 10px}
  .topbar h1{font-size:13px}
  .stat-pill span:not(strong){display:none}
}
/* main */
.main{max-width:1200px;margin:0 auto;padding:24px 20px}
/* action bar */
.action-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:360px}
.search-wrap input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:var(--surface);color:var(--text);transition:border .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
select.filter-select{padding:8px 10px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:var(--surface);color:var(--text);cursor:pointer}
.btn{font-size:13px;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);color:var(--text2)}
.btn:hover{background:var(--surface2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover:not(:disabled){background:#3D4158}
.count-label{font-size:12px;color:var(--text3);margin-left:auto;white-space:nowrap}
/* account list */
.account-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:box-shadow .15s}
.account-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07)}
.account-card.disabled-acc{opacity:.55}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.acc-info{flex:1;min-width:0}
.acc-name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.acc-name{font-size:14px;font-weight:600;color:var(--text)}
.acc-self{font-size:11px;color:var(--text3);padding:1px 6px;border-radius:10px;background:var(--surface2);border:1px solid var(--border)}
.acc-id{font-size:12px;color:var(--text3);font-family:monospace;margin-top:2px}
.acc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:5px}
.acc-login{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-admin{background:#FFF4E0;color:#C47A00;border:1px solid #FDDFA0}
.badge-consultant{background:#F0EBFF;color:#6741D9;border:1px solid #D9C2FF}
.badge-manager{background:#E6FAF0;color:#087443;border:1px solid #ADE8C4}
.badge-employee{background:#E8EEFF;color:#3B5BDB;border:1px solid #BFD0FF}
.badge-ok{background:#E6FAF0;color:#087443;border:1px solid #ADE8C4}
.badge-disabled{background:#FEE9E9;color:#C0392B;border:1px solid #FFBDBD}
.store-tag{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.acc-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ibt{font-size:12px;padding:5px 10px;border-radius:7px;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;white-space:nowrap}
.ibt:hover{background:var(--surface2)}
.ibt.danger{color:#C0392B;border-color:#FFBDBD;background:#fff0f0}
.ibt.danger:hover{background:#ffe0e0}
.ibt.warn{color:#C47A00;border-color:#FDDFA0;background:#FFF8EC}
.ibt.warn:hover{background:#fff3d0}
/* empty */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
/* pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:20px;flex-wrap:wrap}
.pg-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;font-family:inherit;color:var(--text2);transition:all .15s}
.pg-btn:hover:not(:disabled){background:var(--surface2)}
.pg-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.pg-info{font-size:12px;color:var(--text3)}
/* modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.modal-ov{align-items:center}}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:22px 18px 32px;position:relative}
@media(min-width:600px){.modal{border-radius:16px;padding:26px 24px 32px}}
.modal-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.form-row{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;outline:none;color:var(--text);background:var(--surface2);transition:border .15s}
.form-input:focus{border-color:var(--accent);background:#fff}
.form-row .note{font-size:11px;color:var(--text3);margin-top:4px}
.btn-row{display:flex;gap:10px;margin-top:20px}
.close-modal{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;border:none;background:var(--surface2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
/* loading */
#loading{position:fixed;inset:0;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* store checkbox */
.store-check-item{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .15s;background:var(--surface2);user-select:none;font-size:12px;color:var(--text)}
.store-check-item:hover{border-color:var(--border2)}
.store-check-item.checked{border-color:var(--accent);background:#eef0ff;color:var(--accent);font-weight:500}
.store-check-item .sc-box{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:transparent;flex-shrink:0;transition:all .15s}
.store-check-item.checked .sc-box{background:var(--accent);border-color:var(--accent);color:#fff}
/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1D23;color:#fff;padding:10px 20px;border-radius:50px;font-size:13px;z-index:999;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}
/* mobile cards */
@media(max-width:520px){
  .acc-actions{flex-direction:column;gap:4px;align-items:flex-end}
  .acc-meta .store-tag{display:none}
}

/* embed 模式 */
[data-embed="1"] .topbar,[data-embed="1"] .topbar *{display:none!important;height:0!important;min-height:0!important;overflow:hidden!important}
[data-embed="1"] body{padding-top:0!important}
[data-embed="1"] #app{padding-top:0!important}
[data-embed="1"] .main{padding-top:16px!important}
</style>
  <script>
  /* embed 模式：被 iframe 嵌入時隱藏 topbar、移除 body 頂部 padding */
  (function(){
    if(new URLSearchParams(location.search).get("embed")==="1"){
      var s=document.createElement("style");
      s.textContent=".topbar{display:none!important;height:0!important;min-height:0!important;overflow:hidden!important;position:static!important}body{padding-top:0!important}#app{padding-top:0!important}.main{padding-top:16px!important}#todayLabel,#clockLabel,#roleChip,.topbar-right,.topbar-left,.back-btn,.topbar-dv,.tb-dv,.dv{display:none!important}";
      document.head.appendChild(s);
      document.documentElement.setAttribute("data-embed","1");
    }
  })();
  </script>
</head>

      <button class="btn btn-primary" onclick="openBatchPage()">⚡ 批次建立帳號</button>
      <button class="btn" onclick="window.location.href='/hr-system/oplog.html'" style="white-space:nowrap">📋 操作日誌</button>
    </div>
    <div id="listWrap"></div>
  </div>
</div>

<!-- 編輯 Modal -->
<div class="modal-ov" id="editModal" style="display:none" onclick="closeMOv(event,'editModal')">
  <div class="modal">
    <button class="close-modal" onclick="closeModal('editModal')">✕</button>
    <div class="modal-title">✎ 編輯帳號</div>
    <input type="hidden" id="editUid">
    <div class="form-row">
      <div class="form-label">姓名</div>
      <input class="form-input" id="editName" placeholder="姓名">
    </div>
    <div class="form-row">
      <div class="form-label">角色</div>
      <select class="form-input" id="editRole">
        <option value="employee">同仁</option>
        <option value="manager">店長/副店長</option>
        <option value="consultant">顧問</option>
        <option value="admin">管理員</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-label">所屬店面</div>
      <div id="storeCheckList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;max-height:220px;overflow-y:auto;padding:4px 0"></div>
      <div id="storeLoadingMsg" style="font-size:12px;color:var(--text3);padding:4px 0">載入店面清單中...</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" style="flex:1" onclick="saveEdit()">儲存</button>
      <button class="btn" onclick="closeModal('editModal')">取消</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { authGuard, db, writeOpLog } from './auth-guard.js?v=4';
import { collection, getDocs, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const PAGE_SIZE = 10;
let allUsers = [];
let currentPage = 1;
let currentUid = '';
let currentRole = '';
let currentUserName = '';
let storeList = [];  // 從 hr/employees 動態載入

const roleNames = {admin:'管理員',consultant:'顧問',manager:'店長/副店長',employee:'同仁'};
const roleClass = {admin:'badge-admin',consultant:'badge-consultant',manager:'badge-manager',employee:'badge-employee'};
const avColors = ['#E85D4A','#F59E0B','#10B981','#3B82F6','#8B5CF6','#EC4899','#06B6D4','#84CC16'];

function avColor(name){ let h=0; for(const c of (name||'?'))h=(h*31+c.charCodeAt(0))%avColors.length; return avColors[h]; }
function ini(name){ return (name||'?').slice(0,2); }

function getFiltered(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const rf = document.getElementById('roleFilter').value;
  const sf = document.getElementById('statusFilter').value;
  return allUsers.filter(u=>{
    const matchQ = !q || (u.name||'').toLowerCase().includes(q) || (u.idNo||'').toLowerCase().includes(q) || (u.role||'').includes(q);
    const matchR = !rf || u.role===rf;
    const matchS = !sf || (sf==='ok'?!u.disabled:u.disabled);
    return matchQ && matchR && matchS;
  });
}

function timeAgo(ts){
  if(!ts) return '從未';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const s = Math.floor((Date.now()-d)/1000);
  if(s<60) return '剛剛';
  if(s<3600) return Math.floor(s/60)+'分鐘前';
  if(s<86400) return Math.floor(s/3600)+'小時前';
  if(s<86400*7) return Math.floor(s/86400)+'天前';
  return d.toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
}

window.renderList = function(){
  const list = getFiltered();
  const total = list.length;
  const pages = Math.ceil(total/PAGE_SIZE)||1;
  if(currentPage>pages) currentPage=1;
  const slice = list.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

  document.getElementById('countLabel').textContent = total+' 筆';

  const wrap = document.getElementById('listWrap');
  if(!slice.length){
    wrap.innerHTML='<div class="empty"><div class="empty-icon">👤</div><div>沒有符合的帳號</div></div>';
    return;
  }

  const cards = slice.map(u=>{
    const isSelf = u.uid===currentUid;
    const locs = (u.locations||[u.workLocation]).filter(Boolean);
    const locTags = locs.slice(0,3).map(l=>`<span class="store-tag">${l}</span>`).join('');
    const moreTag = locs.length>3?`<span class="store-tag">+${locs.length-3}</span>`:'';
    const selfTag = isSelf?`<span class="acc-self">本人</span>`:'';
    const statusBadge = u.disabled
      ?`<span class="badge badge-disabled">停用</span>`
      :`<span class="badge badge-ok">正常</span>`;
    const actionBtns = isSelf
      ?`<button class="ibt" onclick="openEdit('${u.uid}')">✎ 編輯</button>`
      :`<button class="ibt" onclick="openEdit('${u.uid}')">✎ 編輯</button>
        ${u.disabled
          ?`<button class="ibt warn" onclick="toggleDisable('${u.uid}',false)">↩ 啟用</button>`
          :currentRole==='admin'?`<button class="ibt danger" onclick="toggleDisable('${u.uid}',true)">停用</button>`:''}
        ${currentRole==='admin'&&u.role!=='admin'?`<button class="ibt" onclick="delUser('${u.uid}')" style="padding:5px 7px;color:var(--text3)">✕</button>`:''}`;
    return `<div class="account-card${u.disabled?' disabled-acc':''}">
      <div class="av" style="background:${avColor(u.name)}">${ini(u.name)}</div>
      <div class="acc-info">
        <div class="acc-name-row">
          <span class="acc-name">${u.name||'—'}</span>
          <span class="badge ${roleClass[u.role]||'badge-employee'}">${roleNames[u.role]||u.role}</span>
          ${statusBadge}
          ${selfTag}
        </div>
        <div class="acc-id">${u.idNo||'—'}</div>
        <div class="acc-meta">
          ${locTags}${moreTag}
          <span class="acc-login">🕐 最後登入：${timeAgo(u.lastLoginAt)}</span>
        </div>
      </div>
      <div class="acc-actions">${actionBtns}</div>
    </div>`;
  }).join('');

  // 分頁
  let pager='';
  if(pages>1){
    pager+=`<div class="pagination">`;
    pager+=`<button class="pg-btn" onclick="setPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    for(let p=1;p<=pages;p++){
      if(p===1||p===pages||Math.abs(p-currentPage)<=1)
        pager+=`<button class="pg-btn${p===currentPage?' active':''}" onclick="setPage(${p})">${p}</button>`;
      else if(Math.abs(p-currentPage)===2)
        pager+=`<span class="pg-info">…</span>`;
    }
    pager+=`<button class="pg-btn" onclick="setPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
    pager+=`<span class="pg-info">${total} 筆，第 ${currentPage}/${pages} 頁</span></div>`;
  }

  wrap.innerHTML = cards + pager;
};

window.setPage = function(p){ currentPage=p; renderList(); };

window.openEdit = function(uid){
  const u = allUsers.find(x=>x.uid===uid);
  if(!u) return;
  document.getElementById('editUid').value = uid;
  document.getElementById('editName').value = u.name||'';
  document.getElementById('editRole').value = u.role||'employee';
  const userLocs = new Set(u.locations||[u.workLocation].filter(Boolean));
  renderStoreChecklist(userLocs);
  document.getElementById('editModal').style.display='flex';
};

function renderStoreChecklist(selected=new Set()){
  const wrap = document.getElementById('storeCheckList');
  const msg = document.getElementById('storeLoadingMsg');
  if(!storeList.length){
    wrap.innerHTML='';
    msg.style.display='block';
    msg.textContent='（尚無店面資料，請先在人員資訊中建立員工）';
    return;
  }
  msg.style.display='none';
  wrap.innerHTML = storeList.map(s=>{
    const checked = selected.has(s);
    return `<div class="store-check-item${checked?' checked':''}" data-store="${s}" onclick="toggleStore(this)">
      <span class="sc-box">${checked?'✓':''}</span>
      <span>${s}</span>
    </div>`;
  }).join('');
}

window.toggleStore = function(el){
  el.classList.toggle('checked');
  el.querySelector('.sc-box').textContent = el.classList.contains('checked')?'✓':'';
};

function getSelectedStores(){
  return [...document.querySelectorAll('#storeCheckList .store-check-item.checked')].map(el=>el.dataset.store);
}

window.saveEdit = async function(){
  const uid = document.getElementById('editUid').value;
  const name = document.getElementById('editName').value.trim();
  const role = document.getElementById('editRole').value;
  const locations = getSelectedStores();
  if(!name){showToast('請輸入姓名');return;}
  try{
    await updateDoc(doc(db,'users',uid),{name,role,locations,workLocation:locations[0]||''});
    writeOpLog({ editor:currentUserName, role:currentRole, module:'account', action:'編輯帳號', detail:`${name}（${role}）` });
    const idx = allUsers.findIndex(x=>x.uid===uid);
    if(idx>=0) allUsers[idx]={...allUsers[idx],name,role,locations,workLocation:locations[0]||''};
    updateStats();
    renderList();
    closeModal('editModal');
    showToast('✅ 已儲存');
  }catch(e){showToast('儲存失敗：'+e.message);}
};

window.toggleDisable = async function(uid, disable){
  if(disable&&!confirm('確定要停用此帳號？')) return;
  try{
    await updateDoc(doc(db,'users',uid),{disabled:disable});
    const target = allUsers.find(x=>x.uid===uid);
    writeOpLog({ editor:currentUserName, role:currentRole, module:'account', action:disable?'停用帳號':'啟用帳號', detail:target?.name||uid });
    const idx=allUsers.findIndex(x=>x.uid===uid);
    if(idx>=0) allUsers[idx].disabled=disable;
    updateStats(); renderList();
    showToast(disable?'已停用帳號':'已啟用帳號');
  }catch(e){showToast('操作失敗：'+e.message);}
};

window.delUser = async function(uid){
  if(!confirm('確定要刪除此帳號？此操作無法復原，hr 員工資料也將一併移除。')) return;
  try{
    // 1. 刪除 Firestore users 文件
    await deleteDoc(doc(db,'users',uid));

    // 2. 刪除 hr 員工資料（依 uid 找到對應筆）
    try{
      const hrSnap = await getDoc(doc(db,'hr','employees'));
      if(hrSnap.exists()){
        const data = hrSnap.data();
        const employees = data.list || [];
        const filtered = employees.filter(e => e.uid !== uid);
        if(filtered.length !== employees.length){
          await updateDoc(doc(db,'hr','employees'), {list: filtered});
        }
      }
    }catch(e){ console.warn('hr 資料刪除失敗', e); }

    const delName = allUsers.find(x=>x.uid===uid)?.name || uid;
    allUsers = allUsers.filter(x=>x.uid!==uid);
    writeOpLog({ editor:currentUserName, role:currentRole, module:'account', action:'刪除帳號', detail:delName });
    updateStats(); renderList();
    showToast('✅ 已刪除');
  }catch(e){showToast('刪除失敗：'+e.message);}
};

window.openBatchPage = function(){
  window.location.href='/hr-system/batch_accounts.html';
};

function updateStats(){
  document.getElementById('statTotal').textContent = allUsers.length;
  document.getElementById('statDisabled').textContent = allUsers.filter(u=>u.disabled).length;
}

window.closeModal = function(id){ document.getElementById(id).style.display='none'; };
window.closeMOv = function(e,id){ if(e.target.classList.contains('modal-ov')) closeModal(id); };

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// auth
authGuard('account', async ({ user, role, uid, userData }) => {
  currentRole = role;
  currentUid  = uid;
  currentUserName = userData?.name || '管理員';
  try{
    // 載入所有使用者
    const snap=await getDocs(collection(db,'users'));
    allUsers=[];
    snap.forEach(d=>allUsers.push({uid:d.id,...d.data()}));
    // 載入店面清單（從 hr/employees 動態抽取）
    try{
      const empSnap = await getDoc(doc(db,'hr','employees'));
      if(empSnap.exists()){
        const empList = empSnap.data().list||[];
        const storeSet = new Set(empList.map(e=>e.workLocation).filter(Boolean));
        storeList = [...storeSet].sort((a,b)=>a.localeCompare(b,'zh-TW'));
      }
    }catch(_){}

    // 排序：admin > consultant > manager > employee，同角色按姓名
    const rOrder={admin:0,consultant:1,manager:2,employee:3};
    allUsers.sort((a,b)=>{
      const rd=(rOrder[a.role]??9)-(rOrder[b.role]??9);
      if(rd!==0) return rd;
      return (a.name||'').localeCompare(b.name||'','zh-TW');
    });
    updateStats();
    renderList();
    const now=new Date();
    document.getElementById('topDate').textContent=now.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});
  }catch(e){console.error(e);}
  finally{
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
  }
});
</script>
</body>
</html>
