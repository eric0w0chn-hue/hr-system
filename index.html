<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人員資訊管理系統</title>
<style>
:root{
  --primary:#2563EB;--primary-dark:#1D4ED8;--primary-light:#EFF6FF;--primary-border:#BFDBFE;
  --accent:#0891B2;--accent-light:#ECFEFF;
  --gray-bg:#F8FAFC;--card-bg:#fff;--border:#E2E8F0;
  --text:#0F172A;--text-2:#64748B;--text-3:#94A3B8
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--gray-bg);color:var(--text);min-height:100vh;font-size:14px;padding:16px 16px 32px}
.app{max-width:1140px;margin:0 auto;padding:0}
/* 頂部 bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:linear-gradient(135deg,#1E3A8A 0%,#2563EB 60%,#0891B2 100%);height:62px;margin-bottom:0}
.topbar h1{font-size:20px;font-weight:800;color:#fff;letter-spacing:1px;text-shadow:0 1px 4px rgba(0,0,0,.2);display:flex;align-items:center;gap:10px}
.topbar h1::before{content:'';display:inline-block;width:4px;height:22px;background:linear-gradient(180deg,#60A5FA,#38BDF8);border-radius:2px}
.topbar-right{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.topbar small{font-size:11px;color:rgba(255,255,255,.7)}
#clockLabel{font-size:14px;font-weight:600;color:#fff;letter-spacing:.5px}
.card{background:var(--card-bg);border-radius:0 0 14px 14px;border:1px solid var(--border);border-top:none;overflow:visible;margin-bottom:16px;box-shadow:0 4px 16px rgba(15,23,42,.07)}
/* 分頁列 */
.tabs{display:flex;padding:0 20px;border-bottom:2px solid var(--border);background:#fff}
.tab{padding:12px 18px;font-size:13px;color:var(--text-2);cursor:pointer;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;white-space:nowrap;font-family:inherit;font-weight:500;transition:color .15s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.tab:hover:not(.active){color:var(--text);background:#F1F5F9}
.main{padding:18px 20px}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.toolbar input{flex:1;min-width:160px;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);height:36px;font-family:inherit}
.toolbar input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.toolbar select{font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);height:36px;cursor:pointer;font-family:inherit}
/* 按鈕 */
.btn{font-size:13px;padding:6px 14px;border-radius:8px;cursor:pointer;height:36px;font-weight:500;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff;border:1px solid var(--primary-dark)}
.btn-primary:hover{background:var(--primary-dark)}
.btn-sm{font-size:12px;padding:4px 11px;height:28px;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;font-weight:500;font-family:inherit}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:#F8FAFC;border-color:#94A3B8}
/* 統計卡片 */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.sc{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid var(--border);border-left:4px solid var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.sc .sl{font-size:11px;color:var(--text-2);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.sc .sn{font-size:24px;font-weight:700;color:var(--text)}
.sc .ss{font-size:11px;color:var(--text-3);margin-top:2px}
/* 表格 */
.tw{border:1px solid var(--border);border-radius:10px;overflow-x:auto;box-shadow:0 1px 4px rgba(0,0,0,.04);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--text-2);border-bottom:1px solid var(--border);background:#F8FAFC;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px;text-transform:uppercase}
td{padding:10px 14px;border-bottom:1px solid #F1F5F9;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
tr:last-child td{border-bottom:none}
tr.data-row:hover td{background:#F0F7FF;cursor:pointer}
tr.data-row.selected td{background:var(--primary-light)}
/* 頭像 */
.av{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.av-b{background:#DBEAFE;color:#1E40AF}.av-t{background:#D1FAE5;color:#065F46}.av-c{background:#FEE2E2;color:#991B1B}.av-p{background:#EDE9FE;color:#5B21B6}.av-a{background:#FEF3C7;color:#92400E}.av-k{background:#FCE7F3;color:#9D174D}
/* 標籤 */
.badge{display:inline-block;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.bg{background:#D1FAE5;color:#065F46}.bb{background:#DBEAFE;color:#1D4ED8}.ba{background:#FEF3C7;color:#92400E}.bgr{background:#F1F5F9;color:#475569}.br{background:#FEE2E2;color:#991B1B}.bp{background:#EDE9FE;color:#6D28D9}.bt{background:#CCFBF1;color:#0F766E}
.nc{display:flex;align-items:center;gap:8px}
.nc span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ibt{background:none;border:none;cursor:pointer;color:var(--text-3);padding:3px 6px;border-radius:5px;font-size:13px;line-height:1;font-family:inherit;transition:all .1s}
.ibt:hover{background:#F1F5F9;color:var(--text)}
/* 詳細資料 */
.detail{border:1px solid var(--border);border-radius:10px;margin-top:14px;overflow:visible;background:#fff;box-shadow:0 2px 8px rgba(15,23,42,.06)}
.detail-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#EFF6FF 0%,#fff 100%)}
.detail-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);padding:0 12px;background:#fff;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.detail-tabs::-webkit-scrollbar{display:none}
.dtab{padding:9px 10px;font-size:11.5px;color:var(--text-2);cursor:pointer;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;white-space:nowrap;font-family:inherit;font-weight:500;transition:color .15s}
.dtab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.dtab:hover:not(.active){background:#F1F5F9;color:var(--text)}
.detail-body{padding:18px 20px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.di .dl{font-size:11px;color:var(--text-2);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.di .dv{font-size:13px;color:var(--text);font-weight:400}
.nb{background:#F8FAFC;border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text);line-height:1.7;min-height:34px;border:1px solid var(--border)}
.sec-title{font-size:11px;font-weight:600;color:var(--text-2);margin:0 0 10px;text-transform:uppercase;letter-spacing:.5px}
.hist-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #F1F5F9}
.hist-row:last-child{border-bottom:none}
.hist-dot{width:8px;height:8px;border-radius:50%;background:#93C5FD;flex-shrink:0;margin-top:5px}
.hist-dot.green{background:#6EE7B7}.hist-dot.amber{background:#FCD34D}
.hist-meta{font-size:11px;color:var(--text-3);margin-top:2px}
.prog-bar{height:7px;border-radius:4px;background:#E2E8F0;margin-top:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .3s}
.empty-state{text-align:center;padding:40px;color:var(--text-3);font-size:13px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:14px;border:1px solid var(--border);width:540px;max-width:100%;padding:24px;max-height:90vh;overflow-y:auto;overflow-x:visible;box-shadow:0 20px 60px rgba(15,23,42,.2)}
.modal h2{font-size:15px;font-weight:600;margin-bottom:18px;color:var(--text);padding-bottom:12px;border-bottom:1px solid var(--border)}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:12px;color:var(--text-2);margin-bottom:5px;font-weight:500}
.fr input,.fr select,.fr textarea{width:100%;font-size:13px;padding:8px 11px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);font-family:inherit;transition:border-color .15s}
.fr input:focus,.fr select:focus,.fr textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fr textarea{resize:vertical;min-height:60px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#0F172A;color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;z-index:2000;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateY(0)}
/* 可排序欄位標題 */
th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
th.sortable:hover{background:#EFF6FF;color:var(--primary)}
th.sort-asc::after{content:' ↑';color:var(--primary)}
th.sort-desc::after{content:' ↓';color:var(--primary)}


@media(max-width:700px){
  .dg,.dg3,.fg{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr 1fr}
  .tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{table-layout:auto;min-width:480px}
  th,td{padding:8px 10px;font-size:12px}
  .toolbar{flex-wrap:wrap}
  .toolbar .search-input{min-width:100%;order:-1}
  .btn{font-size:12px;padding:5px 10px}
  .detail-header{flex-wrap:wrap;gap:8px}
  body{padding:8px 8px 24px}
  .topbar{padding:0 14px}
  .topbar h1{font-size:13px}
  .main{padding:12px 14px}
}
/* 自製下拉選單 */
.cdd{position:relative;display:inline-block;width:100%}
.cdd-trigger{width:100%;font-size:13px;padding:8px 32px 8px 11px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);cursor:pointer;text-align:left;font-family:inherit;appearance:none;-webkit-appearance:none;transition:border-color .15s}
.cdd-trigger:hover{border-color:#9CA3AF}
.cdd-trigger::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-2);font-size:11px}
.cdd-menu{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:2000;max-height:200px;overflow-y:auto;overflow-x:hidden;display:none;scrollbar-width:thin}
.cdd-menu.open{display:block}
.cdd-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;font-size:13px;color:var(--text)}
.cdd-item:hover{background:#FFF8F0}
.cdd-item.selected{background:var(--primary-light);color:var(--primary);font-weight:500}
.cdd-item .cdd-del{background:none;border:none;cursor:pointer;color:#D1D5DB;font-size:14px;line-height:1;padding:2px 5px;border-radius:4px;flex-shrink:0;transition:all .1s}
.cdd-item .cdd-del:hover{color:#EF4444;background:#FEE2E2}
.cdd-placeholder{color:var(--text-3)}
.cdd-add{display:flex;align-items:center;gap:6px;padding:8px 12px;border-top:1px solid #F3F4F6;font-size:12px;color:var(--text-2);position:sticky;bottom:0;background:#fff;z-index:1}
.cdd-add input{flex:1;font-size:12px;padding:5px 9px;border:1px solid var(--border);border-radius:6px;font-family:inherit}
.cdd-add input:focus{outline:none;border-color:var(--orange)}

</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="topbar">
      <h1>🍗 梁平人員資訊管理系統</h1>
      <div class="topbar-right">
        <small id="todayLabel"></small>
        <span id="clockLabel"></span>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('employee')">在職同仁</button>
      <button class="tab" onclick="switchTab('resigned')">離職同仁</button>
      <button class="tab" onclick="switchTab('interview')">求職者資訊</button>
    </div>
    <div class="main" id="mainContent"></div>
  </div>
</div>
<div id="modalArea"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAg_dfvoxA1dQYqHzdqPtEot8wT-wKZal4",
  authDomain: "liangpinghri.firebaseapp.com",
  projectId: "liangpinghri",
  storageBucket: "liangpinghri.firebasestorage.app",
  messagingSenderId: "410255807470",
  appId: "1:410255807470:web:dc08ba070c7db4f083f4ff"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── 日期 & 時鐘 ──
document.getElementById('todayLabel').textContent = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});
function updateClock(){
  const now=new Date();
  const tw=now.toLocaleTimeString('zh-TW',{timeZone:'Asia/Taipei',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const el=document.getElementById('clockLabel');
  if(el)el.textContent=tw;
}
updateClock();
setInterval(updateClock,1000);

// ── 狀態 ──
let tab='employee', selId=null, detailTab='basic', sq='', sf='';
let editMode=null, editTarget=null;
let interviewLocations=[], workLocations=[], titleOptions=[], bankOptions=[], insuranceGrades=[];
let sortField='', sortDir=1; // sortDir: 1=升冪 -1=降冪

// ── 民國年轉換工具 ──
// 西元 YYYY-MM-DD → 民國 YYY年MM月DD日
function toROC(dateStr){
  if(!dateStr)return '—';
  const [y,m,d]=dateStr.split('-');
  if(!y||!m||!d)return dateStr;
  return `民國 ${parseInt(y)-1911} 年 ${parseInt(m)} 月 ${parseInt(d)} 日`;
}
// 民國輸入框：顯示民國年，底層儲存西元 YYYY-MM-DD
// 使用自訂輸入：三欄（年/月/日）組合
function rocInputHtml(id, val){
  let yy='',mm='',dd='';
  if(val){const [y,m,d]=val.split('-');yy=y?parseInt(y)-1911:'';mm=m?parseInt(m):'';dd=d?parseInt(d):'';}
  return `<div style="display:flex;gap:4px;align-items:center">
    <input id="${id}-y" type="number" placeholder="年" value="${yy}" style="width:64px;font-size:13px;padding:7px 8px;border:1px solid #d4d4d0;border-radius:8px" oninput="syncROC('${id}')">
    <span style="color:#6b6b68;font-size:12px">年</span>
    <input id="${id}-m" type="number" placeholder="月" min="1" max="12" value="${mm}" style="width:50px;font-size:13px;padding:7px 8px;border:1px solid #d4d4d0;border-radius:8px" oninput="syncROC('${id}')">
    <span style="color:#6b6b68;font-size:12px">月</span>
    <input id="${id}-d" type="number" placeholder="日" min="1" max="31" value="${dd}" style="width:50px;font-size:13px;padding:7px 8px;border:1px solid #d4d4d0;border-radius:8px" oninput="syncROC('${id}')">
    <span style="color:#6b6b68;font-size:12px">日</span>
    <input type="hidden" id="${id}" value="${val||''}">
  </div>`;
}
window.syncROC=function(id){
  const y=parseInt(document.getElementById(id+'-y').value)||'';
  const m=parseInt(document.getElementById(id+'-m').value)||'';
  const d=parseInt(document.getElementById(id+'-d').value)||'';
  if(y&&m&&d){
    const yy=String(y+1911).padStart(4,'0');
    const mm=String(m).padStart(2,'0');
    const dd=String(d).padStart(2,'0');
    document.getElementById(id).value=`${yy}-${mm}-${dd}`;
  }else{document.getElementById(id).value='';}
};
function getROC(id){return document.getElementById(id)?document.getElementById(id).value:'';}

// ── 自製下拉選單 ──
function cddHtml(id, options, value, listName, placeholder='請選擇或新增'){
  const safeId=id.replace(/[^a-zA-Z0-9_]/g,'_');
  return `<div class="cdd" id="cdd-wrap-${safeId}">
    <button type="button" class="cdd-trigger" onclick="cddToggle('${safeId}')">
      <span id="cdd-label-${safeId}" class="${value?'':'cdd-placeholder'}">${value||placeholder}</span>▾
    </button>
    <input type="hidden" id="${id}" value="${value||''}">
    <div class="cdd-menu" id="cdd-menu-${safeId}">
      ${options.map(o=>`<div class="cdd-item${o===value?' selected':''}" onclick="cddSelect('${safeId}','${id}','${o.replace(/'/g,'\\\'')}')">
        <span>${o}</span>
        <button class="cdd-del" onclick="event.stopPropagation();cddDel('${listName}','${o.replace(/'/g,'\\\'')}','${safeId}','${id}')" title="刪除">×</button>
      </div>`).join('')}
      <div class="cdd-add" onclick="event.stopPropagation()">
        <input id="cdd-input-${safeId}" placeholder="輸入後按 ＋ 新增" onkeydown="if(event.key==='Enter'){event.preventDefault();cddAdd('${listName}','${safeId}','${id}')}">
        <button type="button" onclick="cddAdd('${listName}','${safeId}','${id}')" style="background:#1a1a19;color:#fff;border:none;border-radius:5px;padding:3px 10px;cursor:pointer;font-size:12px;white-space:nowrap">＋</button>
      </div>
    </div>
  </div>`;
}
window.cddToggle=function(safeId){
  const menu=document.getElementById('cdd-menu-'+safeId);
  const trigger=document.querySelector(`[onclick="cddToggle('${safeId}')"]`);
  if(!menu||!trigger)return;
  const open=menu.classList.contains('open');
  document.querySelectorAll('.cdd-menu.open').forEach(m=>{
    m.classList.remove('open');m.style.cssText='';
  });
  if(!open){
    const rect=trigger.getBoundingClientRect();
    menu.style.position='fixed';
    menu.style.top=(rect.bottom+4)+'px';
    menu.style.left=rect.left+'px';
    menu.style.width=rect.width+'px';
    menu.style.zIndex='9999';
    menu.style.display='block';
    menu.classList.add('open');
  }
};
window.cddSelect=function(safeId,inputId,val){
  const inp=document.getElementById(inputId);
  const lbl=document.getElementById('cdd-label-'+safeId);
  const menu=document.getElementById('cdd-menu-'+safeId);
  if(inp)inp.value=val;
  if(lbl){lbl.textContent=val;lbl.classList.remove('cdd-placeholder');}
  if(menu){
    menu.querySelectorAll('.cdd-item').forEach(i=>i.classList.toggle('selected',i.querySelector('span')?.textContent===val));
    menu.classList.remove('open');
    menu.style.cssText='';
  }
};
window.cddDel=function(listName,val,safeId,inputId){
  if(!confirm(`確定要刪除「${val}」嗎？`))return;
  const maps={interviewLocations,workLocations,titleOptions,bankOptions,insuranceGrades};
  const arr=maps[listName];if(!arr)return;
  const idx=arr.indexOf(val);if(idx>=0)arr.splice(idx,1);
  saveData();showToast(`已刪除「${val}」`);
  const menu=document.getElementById('cdd-menu-'+safeId);
  if(menu){const item=Array.from(menu.querySelectorAll('.cdd-item')).find(el=>el.querySelector('span')&&el.querySelector('span').textContent===val);if(item)item.remove();}
  const inp=document.getElementById(inputId);
  if(inp&&inp.value===val){inp.value='';const lbl=document.getElementById('cdd-label-'+safeId);if(lbl){lbl.textContent='請選擇或新增';lbl.classList.add('cdd-placeholder');}}
};
window.cddAdd=function(listName,safeId,inputId){
  const cinp=document.getElementById('cdd-input-'+safeId);if(!cinp||!cinp.value.trim())return;
  const n=cinp.value.trim();
  const maps={interviewLocations,workLocations,titleOptions,bankOptions,insuranceGrades};
  const arr=maps[listName];if(!arr)return;
  if(arr.includes(n)){showToast('此項目已存在');return;}
  arr.push(n);saveData();showToast(`已新增「${n}」`);cinp.value='';
  const menu=document.getElementById('cdd-menu-'+safeId);
  if(menu){
    const addRow=menu.querySelector('.cdd-add');
    const div=document.createElement('div');div.className='cdd-item selected';
    div.innerHTML=`<span>${n}</span><button class="cdd-del" onclick="event.stopPropagation();cddDel('${listName}','${n}','${safeId}','${inputId}')">×</button>`;
    div.onclick=()=>cddSelect(safeId,inputId,n);

// ── Toast ──
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');

// ── 工具函式 ──
const avCls = n => ['av-b','av-t','av-c','av-p','av-a','av-k'][n.charCodeAt(0)%6];
const ini   = n => n.slice(0,2);
const calcYears = d => {
  const ms=Date.now()-new Date(d).getTime();
  const y=Math.floor(ms/31536000000),m=Math.floor((ms%31536000000)/2592000000);
  return y>0?`${y}年${m}個月`:`${m}個月`;
};
const isBadge = s => { const m={錄取:'bg',待通知:'ba',已婉拒:'bgr'}; return`<span class="badge ${m[s]||'bgr'}">${s}</span>` };
const eBadge  = s => { const m={在職:'bt',留職停薪:'ba',離職:'br'}; return`<span class="badge ${m[s]||'bgr'}">${s}</span>` };
const perfBadge = l => { const m={優秀:'bg',良好:'bb',待改善:'ba',不合格:'br'}; return`<span class="badge ${m[l]||'bgr'}">${l}</span>` };
const fitBadge = s => { const m={合適:'bg',尚可:'ba',不佳:'br'}; return`<span class="badge ${m[s]||'bgr'}">${s||'—'}</span>` };

function switchTab(t) { tab=t;selId=null;detailTab='basic';sq='';sf='';sortField='';sortDir=1;render(); }

function getList() {
  const src = tab==='interview' ? interviews : tab==='resigned' ? resigned : employees;
  let list = src.filter(r => {
    const q=sq.toLowerCase();
    const nm=(r.name+((tab==='interview'?r.location:r.workLocation)||'')+(r.email||'')).toLowerCase().includes(q);
    const st=!sf||r.status===sf;
    return nm&&st;
  });
  if(sortField){
    list=[...list].sort((a,b)=>{
      let va=a[sortField]||'', vb=b[sortField]||'';
      // 年資特殊處理：用到職日做數值排序
      if(sortField==='calcYears'){
        va=a.startDate?new Date(a.startDate).getTime():0;
        vb=b.startDate?new Date(b.startDate).getTime():0;
        return (va-vb)*sortDir*-1; // 越早到職年資越長
      }
      if(typeof va==='number'&&typeof vb==='number') return (va-vb)*sortDir;
      return String(va).localeCompare(String(vb),'zh-TW')*sortDir;
    });
  }
  return list;
}

// ── 匯出 JSON ──
function exportJSON() {
  const data = { interviews, employees, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`hr-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
  showToast('備份檔案已下載');
}

// ── 匯入 JSON ──
function importJSON() {
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.interviews&&d.employees){
          interviews=d.interviews;employees=d.employees;saveData();render();showToast('資料匯入成功');
        }else{showToast('檔案格式不正確');}
      }catch{showToast('匯入失敗，請確認檔案格式');}
    };reader.readAsText(f);
  };input.click();
}

function closeModal(){ document.getElementById('modalArea').innerHTML=''; editMode=null; editTarget=null; }

const g = id => { const el=document.getElementById(id); return el?el.value.trim():''; };

async function saveModal(){
  const m=editMode, tid=editTarget;
  if(m==='addInterview'||m==='editInterview'){
    if(!g('m-name')){alert('請填寫姓名');return;}
    const obj={id:tid||Date.now(),name:g('m-name'),location:g('m-location'),date:g('m-date'),source:g('m-source'),fit:g('m-fit'),status:g('m-status'),phone:g('m-phone'),email:g('m-email'),education:g('m-education'),military:g('m-military'),experience:g('m-experience'),note:g('m-note')};
    if(m==='editInterview'){const i=interviews.findIndex(r=>r.id===tid);interviews[i]=obj;}
    else interviews.unshift(obj);
  } else if(m==='addEmployee'||m==='editEmployee'){
    if(!g('m-name')){alert('請填寫姓名');return;}
    const newStatus=g('m-status');
    const empFields={name:g('m-name'),workLocation:g('m-workLocation'),title:g('m-title'),status:newStatus,startDate:getROC('m-startDate'),salary:parseInt(g('m-salary'))||0,phone:g('m-phone'),email:g('m-email'),education:g('m-education'),birthday:getROC('m-birthday'),idNo:g('m-idNo'),empNo:g('m-empNo'),bankName:g('m-bankName'),bankAccount:g('m-bankAccount'),note:g('m-note')};
    if(m==='editEmployee'){
      const r=employees.find(x=>x.id===tid);
      Object.assign(r,empFields);
    } else {
      employees.unshift({id:Date.now(),...empFields,emergency:{name:'',relation:'',phone:''},salaryHistory:[],performance:[],leaves:[],trainings:[]});
    }
  } else if(m==='editInsurance'){
    closeModal(); return; // handled by saveInsuranceGrade
  } else if(m==='addDependent'){
    if(!g('m-dname')){alert('請填寫眷屬姓名');return;}
    const r=employees.find(x=>x.id===tid);
    if(!r.insurance)r.insurance={grade:'',dependents:[]};
    if(!r.insurance.dependents)r.insurance.dependents=[];
    r.insurance.dependents.push({name:g('m-dname'),idNo:g('m-didNo'),birthday:getROC('m-dbday')});
  } else if(m==='addEmergency'){
    if(!g('m-ename')){alert('請填寫聯絡人姓名');return;}
    const r=employees.find(x=>x.id===tid);if(!r)return;
    if(!r.emergencyContacts)r.emergencyContacts=[];
    r.emergencyContacts.push({name:g('m-ename'),relation:g('m-erel'),phone:g('m-ephone')});
  } else if(m==='addSalary'||m==='editSalary'){
    if(m==='editSalary'&&editTarget&&typeof editTarget==='object'){
      const r=employees.find(x=>x.id===editTarget.empId);
      if(r&&r.salaryHistory[editTarget.idx]){
        r.salaryHistory[editTarget.idx]={date:g('m-sdate'),amount:parseInt(g('m-samount'))||0,reason:g('m-sreason')};
      }
    } else {
      employees.find(x=>x.id===tid).salaryHistory.push({date:g('m-sdate'),amount:parseInt(g('m-samount'))||0,reason:g('m-sreason')});
    }
  } else if(m==='addBonus'){
    if(!g('m-btitle')){alert('請填寫項目名稱');return;}
    const r=employees.find(x=>x.id===tid);
    if(!r.bonuses)r.bonuses=[];
    r.bonuses.unshift({title:g('m-btitle'),amount:parseInt(g('m-bamount'))||0,status:g('m-bstatus'),date:g('m-bdate')});
  } else if(m==='addTraining'){
    employees.find(x=>x.id===tid).trainings.unshift({date:g('m-tdate'),name:g('m-tname'),hours:parseInt(g('m-thours'))||0,result:g('m-tresult')});
  }

  closeModal();
  render();
  showToast('儲存中...');
  await saveData();
  showToast('已儲存 ✓');
}

async function delRow(id){
  if(!confirm('確定要刪除此筆資料？'))return;
  if(tab==='interview') interviews=interviews.filter(r=>r.id!==id);
  else employees=employees.filter(r=>r.id!==id);
  if(selId===id) selId=null;
  render();
  showToast('刪除中...');
  await saveData();
  showToast('已刪除 ✓');
}

// ── 刪除自訂下拉選項 ──
window.delCustomOption=function(listName, selectId){
  const sel=document.getElementById(selectId);
  if(!sel||!sel.value){showToast('請先選擇要刪除的項目');return;}
  const val=sel.value;
  if(!confirm(`確定要刪除「${val}」嗎？`))return;
  const maps={interviewLocations,workLocations,titleOptions,bankOptions,insuranceGrades};
  const arr=maps[listName];
  if(!arr)return;
  const idx=arr.indexOf(val);
  if(idx>=0)arr.splice(idx,1);
  saveData(); showToast(`已刪除「${val}」`);
  sel.remove(sel.selectedIndex); sel.value='';
};

// ── 薪資記錄刪除 ──

window.addLeaveDate=async function(id){
  const r=employees.find(x=>x.id===id); if(!r)return;
  const el=document.getElementById('leave-input-'+id); if(!el||!el.value)return;
  const date=el.value;
  if(!r.leaves)r.leaves=[];
  // 統一存在 year=0 的全域紀錄（按日期區分週期）
  let global=r.leaves.find(l=>l.year===0);
  if(!global){global={year:0,usedDates:[]};r.leaves.unshift(global);}
  if(!global.usedDates)global.usedDates=[];
  if(global.usedDates.includes(date)){showToast('此日期已登記過');return;}
  global.usedDates.push(date);
  render(); showToast('儲存中...'); await saveData(); showToast('假日已新增 ✓');
};
window.removeLeaveDate=async function(id,date){
  const r=employees.find(x=>x.id===id); if(!r)return;
  if(!r.leaves)return;
  // 從所有紀錄中移除
  r.leaves.forEach(l=>{if(l.usedDates)l.usedDates=l.usedDates.filter(d=>d!==date);});
  render(); showToast('儲存中...'); await saveData(); showToast('已移除 ✓');
};
window.transferToEmployee=async function(id){
  const r=interviews.find(x=>x.id===id); if(!r)return;
  if(!confirm(`確定要將「${r.name}」轉為在職同仁嗎？\n基本資料會自動帶入，可再到在職同仁頁面補充到職日等資訊。`))return;
  const newEmp={
    id:Date.now(), name:r.name, phone:r.phone||'', email:r.email||'',
    education:r.education||'', workLocation:'', title:'', status:'在職',
    startDate:'', salary:0, birthday:'', idNo:'', empNo:'', bankName:'', bankAccount:'',
    note:r.note||'', emergency:{name:'',relation:'',phone:''},
    salaryHistory:[], performance:[], leaves:[], trainings:[]
  };
  employees.unshift(newEmp);
  interviews=interviews.filter(x=>x.id!==id);
  selId=null; tab='employee';
  render(); showToast('轉移中...');
  await saveData(); showToast(`${r.name} 已轉為在職同仁 ✓`);
};

// ── 新增銀行 ──
function addBank(){
  const name=prompt('請輸入銀行名稱（例：台灣銀行、玉山銀行）：');
  if(!name||!name.trim())return;
  const n=name.trim();
  if(bankOptions.includes(n)){showToast('此銀行已存在');return;}
  bankOptions.push(n);
  saveData();
  showToast(`已新增「${n}」`);
  const sel=document.getElementById('m-bankName');
  if(sel){const opt=document.createElement('option');opt.value=n;opt.textContent=n;opt.selected=true;sel.appendChild(opt);}
}

// ── 更新已使用特休天數 ──
async function updateLeaveUsed(id, annual){
  const r=employees.find(x=>x.id===id);
  if(!r)return;
  const el=document.getElementById('leave-used-'+id);
  if(!el)return;
  const used=Math.max(0,parseInt(el.value)||0);
  const yr=new Date().getFullYear();
  const idx=r.leaves.findIndex(l=>l.year===yr);
  const obj={year:yr,annual,used,remain:annual-used};
  if(idx>=0)r.leaves[idx]=obj; else r.leaves.unshift(obj);
  render();
  showToast('更新中...');
  await saveData();
  showToast('特休已更新 ✓');
}

// ── 離職：移到離職員工 ──
window.resignEmployee=async function(id){
  const r=employees.find(x=>x.id===id);
  if(!r)return;
  const resignDate=prompt('請輸入離職日期（格式：YYYY-MM-DD）：',new Date().toISOString().slice(0,10));
  if(resignDate===null)return;
  const record={...r, status:'離職', resignDate:resignDate.trim()};
  resigned.unshift(record);
  employees=employees.filter(x=>x.id!==id);
  if(selId===id)selId=null;
  render();
  showToast('已移至離職同仁...');
  await saveData();
  showToast('離職記錄已儲存 ✓');
};

// ── 復職 ──
window.restoreEmployee=async function(id){
  const r=resigned.find(x=>x.id===id);
  if(!r)return;
  if(!confirm(`確定要將「${r.name}」復職嗎？`))return;
  const record={...r, status:'在職', resignDate:undefined};
  delete record.resignDate;
  employees.unshift(record);
  resigned=resigned.filter(x=>x.id!==id);
  if(selId===id)selId=null;
  tab='employee';
  render();
  showToast('已復職，移回在職同仁 ✓');
  await saveData();
};

// ── 訪談紀錄 ──
window.saveInterviewMemo=async function(empId){
  const r=employees.find(x=>x.id===empId);if(!r)return;
  const el=document.getElementById('iv-memo-'+empId);if(!el)return;
  if(!r.interviewRecord)r.interviewRecord={memo:'',files:[]};
  r.interviewRecord.memo=el.value;
  showToast('儲存中...'); await saveData(); showToast('備忘錄已儲存 ✓');
};
window.addInterviewFile=async function(empId){
  const nameEl=document.getElementById('iv-fname-'+empId);
  const urlEl=document.getElementById('iv-furl-'+empId);
  if(!nameEl||!urlEl)return;
  const name=nameEl.value.trim();
  const url=urlEl.value.trim();
  if(!name){showToast('請填寫檔案名稱');return;}
  if(!url){showToast('請貼上連結');return;}
  const r=employees.find(x=>x.id===empId);if(!r)return;
  if(!r.interviewRecord)r.interviewRecord={memo:'',files:[]};
  r.interviewRecord.files.push({name,url,date:new Date().toLocaleDateString('zh-TW')});
  nameEl.value=''; urlEl.value='';
  render(); showToast('儲存中...'); await saveData(); showToast('文件連結已新增 ✓');
};
window.deleteInterviewFile=async function(empId,idx){
  if(!confirm('確定要刪除此文件連結？'))return;
  const r=employees.find(x=>x.id===empId);if(!r||!r.interviewRecord)return;
  r.interviewRecord.files.splice(idx,1);
  render(); showToast('刪除中...'); await saveData(); showToast('已刪除 ✓');
};

// ── 刪除離職記錄 ──
window.delResigned=async function(id){
  if(!confirm('確定要永久刪除此離職記錄？'))return;
  resigned=resigned.filter(r=>r.id!==id);
  if(selId===id)selId=null;

  await saveData();
  showToast('已刪除 ✓');
};
