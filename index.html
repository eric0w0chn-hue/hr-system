.fr{margin-bottom:11px}

.fr input,.fr select,.fr textarea{width:100%;font-size:13px;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.fr textarea{resize:vertical;min-height:55px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:14px;border-top:0.5px solid var(--color-border-tertiary)}
.empty-state{text-align:center;padding:40px;color:var(--color-text-secondary);font-size:13px}
.add-row-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;font-size:13px;color:var(--color-text-secondary);cursor:pointer;border-top:0.5px solid var(--color-border-tertiary);background:none;width:100%;border-left:none;border-right:none;border-bottom:none}
.add-row-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
</style>

function switchTab(t){tab=t;selId=null;detailTab='basic';sq='';sf='';render()}

function isBadge(s){const m={錄取:'bg',待通知:'ba',面試中:'bb',已婉拒:'bgr'};return`<span class="badge ${m[s]||'bgr'}">${s}</span>`}
function eBadge(s){const m={在職:'bt',試用期:'bb',留職停薪:'ba',離職:'bgr'};return`<span class="badge ${m[s]||'bgr'}">${s}</span>`}
function perfBadge(l){const m={優秀:'bg',良好:'bb',待改善:'ba',不合格:'br'};return`<span class="badge ${m[l]||'bgr'}">${l}</span>`}

function getList(){
  const src=tab==='interview'?interviews:employees;
  return src.filter(r=>{
    const q=sq.toLowerCase();
    const nm=(r.name+((tab==='interview'?r.position:r.dept)||'')+(r.email||'')).toLowerCase().includes(q);
    const st=!sf||r.status===sf;
    return nm&&st;
  });
}

function calcYears(d){
  const ms=Date.now()-new Date(d).getTime();
  const y=Math.floor(ms/31536000000),m=Math.floor((ms%31536000000)/2592000000);
  return y>0?`${y}年${m}個月`:`${m}個月`;
}

  const list=getList();
  const all=tab==='interview'?interviews:employees;
  let stats='',tbl='',det='';

  if(tab==='interview'){

    ${list.length?list.map(r=>`<tr class="data-row${selId===r.id?' selected':''}" onclick="selId=${r.id};render()">
    <td><div class="nc"><div class="av ${avCls(r.name)}">${ini(r.name)}</div><span>${r.name}</span></div></td>
    <td>${r.position}</td><td>${r.date}</td><td>${r.source}</td><td><span style="font-weight:500">${r.score}</span></td>
    <td>${isBadge(r.status)}</td>
    <td><div style="display:flex;gap:4px"><button class="ibt" onclick="event.stopPropagation();openModal('editInterview',${r.id})">✎</button><button class="ibt" onclick="event.stopPropagation();delRow(${r.id})">✕</button></div></td>
    </tr>`).join(''):`<tr><td colspan="7"><div class="empty-state">沒有符合的記錄</div></td></tr>`}
    </tbody></table></div>`;

    const sel=interviews.find(r=>r.id===selId);
    if(sel){det=`<div class="detail"><div class="detail-header">
    <div class="av ${avCls(sel.name)}" style="width:38px;height:38px;font-size:13px">${ini(sel.name)}</div>
    <div><div style="font-size:14px;font-weight:500">${sel.name}</div><div style="font-size:12px;color:var(--color-text-secondary)">${sel.position} · ${isBadge(sel.status)}</div></div>
    </div><div class="detail-body">
    <div class="dg"><div class="di"><div class="dl">電話</div><div class="dv">${sel.phone}</div></div><div class="di"><div class="dl">Email</div><div class="dv" style="font-size:12px">${sel.email}</div></div><div class="di"><div class="dl">學歷</div><div class="dv">${sel.education}</div></div><div class="di"><div class="dl">年資</div><div class="dv">${sel.experience}</div></div><div class="di"><div class="dl">來源</div><div class="dv">${sel.source}</div></div><div class="di"><div class="dl">評分</div><div class="dv" style="font-size:16px;font-weight:500">${sel.score}<span style="font-size:11px;font-weight:400;color:var(--color-text-secondary)"> / 100</span></div></div></div>
    <div style="margin-top:12px"><div class="dl" style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px">面試備註</div><div class="nb">${sel.note}</div></div>
    </div></div>`;}
  } else {
    const total=all.length,active=all.filter(r=>r.status==='在職').length,prob=all.filter(r=>r.status==='試用期').length,depts=new Set(all.map(r=>r.dept)).size;
    stats=`<div class="stats"><div class="sc"><div class="sl">員工總數</div><div class="sn">${total}</div></div><div class="sc"><div class="sl">正式在職</div><div class="sn">${active}</div></div><div class="sc"><div class="sl">試用期中</div><div class="sn">${prob}</div></div><div class="sc"><div class="sl">部門數</div><div class="sn">${depts}</div></div></div>`;
    const sopts=['','在職','試用期','留職停薪','離職'].map(s=>`<option value="${s}"${sf===s?' selected':''}>${s||'全部狀態'}</option>`).join('');
    tbl=`<div class="toolbar"><input type="text" placeholder="搜尋姓名、部門..." value="${sq}" oninput="sq=this.value;selId=null;render()"><select onchange="sf=this.value;selId=null;render()">${sopts}</select><button class="btn btn-primary" onclick="openModal('addEmployee')">+ 新增員工</button></div>
    <div class="tw"><table><thead><tr><th style="width:130px">姓名</th><th style="width:80px">部門</th><th style="width:120px">職稱</th><th style="width:88px">到職日</th><th style="width:90px">年資</th><th style="width:80px">狀態</th><th style="width:70px">操作</th></tr></thead><tbody>
    ${list.length?list.map(r=>`<tr class="data-row${selId===r.id?' selected':''}" onclick="selId=${r.id};detailTab='basic';render()">
    <td><div class="nc"><div class="av ${avCls(r.name)}">${ini(r.name)}</div><span>${r.name}</span></div></td>
    <td>${r.dept}</td><td>${r.title}</td><td>${r.startDate}</td><td>${calcYears(r.startDate)}</td>
    <td>${eBadge(r.status)}</td>
    <td><div style="display:flex;gap:4px"><button class="ibt" onclick="event.stopPropagation();openModal('editEmployee',${r.id})">✎</button><button class="ibt" onclick="event.stopPropagation();delRow(${r.id})">✕</button></div></td>
    </tr>`).join(''):`<tr><td colspan="7"><div class="empty-state">沒有符合的記錄</div></td></tr>`}
    </tbody></table></div>`;

    const sel=employees.find(r=>r.id===selId);
    if(sel){
      const dtabs=[['basic','基本資料'],['emergency','緊急聯絡人'],['salary','薪資歷程'],['perf','績效考核'],['leave','特休假管理'],['training','教育訓練']];
      let body='';
      if(detailTab==='basic'){
        body=`<div class="dg"><div class="di"><div class="dl">電話</div><div class="dv">${sel.phone}</div></div><div class="di"><div class="dl">Email</div><div class="dv" style="font-size:12px">${sel.email}</div></div><div class="di"><div class="dl">學歷</div><div class="dv">${sel.education}</div></div><div class="di"><div class="dl">月薪</div><div class="dv" style="font-weight:500">$${sel.salary.toLocaleString()}</div></div><div class="di"><div class="dl">到職日</div><div class="dv">${sel.startDate}</div></div><div class="di"><div class="dl">年資</div><div class="dv">${calcYears(sel.startDate)}</div></div></div>
        <div style="margin-top:12px"><div class="dl" style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px">專長技能</div><div class="nb">${sel.skill}</div></div>
        <div style="margin-top:10px"><div class="dl" style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px">備註</div><div class="nb">${sel.note}</div></div>`;
      } else if(detailTab==='emergency'){
        const e=sel.emergency;
        body=`<div class="dg3" style="margin-bottom:12px"><div class="di"><div class="dl">聯絡人姓名</div><div class="dv">${e.name}</div></div><div class="di"><div class="dl">關係</div><div class="dv">${e.relation}</div></div><div class="di"><div class="dl">電話</div><div class="dv">${e.phone}</div></div></div>
        <button class="btn btn-sm btn-outline" onclick="openModal('editEmergency',${sel.id})">編輯緊急聯絡人</button>`;
      } else if(detailTab==='salary'){
        body=`<div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center"><span class="sec-title" style="margin:0">薪資調整歷程</span><button class="btn btn-sm btn-outline" onclick="openModal('addSalary',${sel.id})">+ 新增記錄</button></div>
        ${sel.salaryHistory.map((h,i)=>`<div class="hist-row"><div class="hist-dot green"></div><div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--color-text-primary)">$${h.amount.toLocaleString()}</div><div class="hist-meta">${h.date} · ${h.reason}</div></div>${i>0?`<div style="font-size:12px;color:#3B6D11">+$${(h.amount-(sel.salaryHistory[i-1]||{amount:0}).amount).toLocaleString()}</div>`:''}</div>`).join('')}`;
      } else if(detailTab==='perf'){
        body=`<div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center"><span class="sec-title" style="margin:0">績效考核記錄</span><button class="btn btn-sm btn-outline" onclick="openModal('addPerf',${sel.id})">+ 新增考核</button></div>
        ${sel.performance.length?sel.performance.map(p=>`<div class="hist-row"><div class="hist-dot blue" style="background:#B5D4F4"></div><div style="flex:1"><div style="font-size:13px;display:flex;align-items:center;gap:8px">${p.period} ${perfBadge(p.level)} <span style="font-weight:500">${p.score}分</span></div><div class="hist-meta">${p.note}</div></div></div>`).join(''):'<div class="empty-state" style="padding:24px">尚無績效考核記錄</div>'}`;
      } else if(detailTab==='leave'){
        const yr=new Date().getFullYear();
        const thisYr=sel.leaves.find(l=>l.year===yr)||{year:yr,annual:0,used:0,remain:0};
        const pct=thisYr.annual>0?Math.round(thisYr.used/thisYr.annual*100):0;
        body=`<div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center"><span class="sec-title" style="margin:0">${yr} 年度特休</span><button class="btn btn-sm btn-outline" onclick="openModal('editLeave',${sel.id})">編輯</button></div>
        <div class="dg3" style="margin-bottom:14px"><div class="sc"><div class="sl">應有天數</div><div class="sn">${thisYr.annual}</div></div><div class="sc"><div class="sl">已使用</div><div class="sn">${thisYr.used}</div></div><div class="sc"><div class="sl">剩餘天數</div><div class="sn">${thisYr.remain}</div></div></div>
        <div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px"><span>使用進度</span><span>${pct}%</span></div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${pct>80?'#E24B4A':pct>50?'#EF9F27':'#1D9E75'}"></div></div></div>
        ${sel.leaves.filter(l=>l.year<yr).length?`<div style="margin-top:14px"><div class="sec-title">歷年紀錄</div>${sel.leaves.filter(l=>l.year<yr).map(l=>`<div class="hist-row"><div class="hist-dot"></div><div style="flex:1"><div style="font-size:13px">${l.year} 年</div><div class="hist-meta">應有 ${l.annual} 天 · 已用 ${l.used} 天 · 剩餘 ${l.remain} 天</div></div></div>`).join('')}</div>`:''}`;
      } else if(detailTab==='training'){
        body=`<div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center"><span class="sec-title" style="margin:0">教育訓練紀錄</span><button class="btn btn-sm btn-outline" onclick="openModal('addTraining',${sel.id})">+ 新增訓練</button></div>
        ${sel.trainings.length?sel.trainings.map(t=>`<div class="hist-row"><div class="hist-dot amber" style="background:#FAC775"></div><div style="flex:1"><div style="font-size:13px;font-weight:500">${t.name}</div><div class="hist-meta">${t.date} · ${t.hours}小時 · <span style="color:${t.result==='通過'?'#3B6D11':'#A32D2D'}">${t.result}</span></div></div></div>`).join(''):'<div class="empty-state" style="padding:24px">尚無訓練紀錄</div>'}`;
      }
      det=`<div class="detail"><div class="detail-header">
      <div class="av ${avCls(sel.name)}" style="width:38px;height:38px;font-size:13px">${ini(sel.name)}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:500">${sel.name}</div><div style="font-size:12px;color:var(--color-text-secondary)">${sel.dept} · ${sel.title} · ${eBadge(sel.status)}</div></div>
      </div>
      <div class="detail-tabs">${dtabs.map(([id,lb])=>`<button class="dtab${detailTab===id?' active':''}" onclick="detailTab='${id}';render()">${lb}</button>`).join('')}</div>
      <div class="detail-body">${body}</div></div>`;
    }
  }
  document.getElementById('mainContent').innerHTML=stats+tbl+det;
}

function delRow(id){
  if(!confirm('確定要刪除此筆資料？'))return;
  if(tab==='interview')interviews=interviews.filter(r=>r.id!==id);
  else employees=employees.filter(r=>r.id!==id);
  if(selId===id)selId=null;
  render();
}

function openModal(mode,targetId){
  editMode=mode;editTarget=targetId||null;
  let html='',title='';

  if(mode==='addInterview'||mode==='editInterview'){
    const r=mode==='editInterview'?interviews.find(x=>x.id===targetId):{};
    title=(mode==='addInterview'?'新增':'編輯')+'候選人';
    html=`<div class="fg"><div class="fr"><label>姓名 *</label><input id="m-name" value="${r.name||''}"></div><div class="fr"><label>應徵職位</label><input id="m-position" value="${r.position||''}"></div><div class="fr"><label>面試日期</label><input id="m-date" type="date" value="${r.date||''}"></div><div class="fr"><label>來源</label><select id="m-source"><option>104人力銀行</option><option>LinkedIn</option><option>內部推薦</option><option>Yourator</option><option>其他</option></select></div><div class="fr"><label>評分（0-100）</label><input id="m-score" type="number" min="0" max="100" value="${r.score||''}"></div><div class="fr"><label>狀態</label><select id="m-status"><option>面試中</option><option>待通知</option><option>錄取</option><option>已婉拒</option></select></div><div class="fr"><label>電話</label><input id="m-phone" value="${r.phone||''}"></div><div class="fr"><label>Email</label><input id="m-email" value="${r.email||''}"></div><div class="fr"><label>學歷</label><input id="m-education" value="${r.education||''}"></div><div class="fr"><label>工作年資</label><input id="m-experience" value="${r.experience||''}"></div></div><div class="fr"><label>面試備註</label><textarea id="m-note">${r.note||''}</textarea></div>
    <script>if('${r.status}')document.getElementById('m-status').value='${r.status||'面試中'}';if('${r.source}')document.getElementById('m-source').value='${r.source||'104人力銀行'}';<\/script>`;
  } else if(mode==='addEmployee'||mode==='editEmployee'){
    const r=mode==='editEmployee'?employees.find(x=>x.id===targetId):{};
    title=(mode==='addEmployee'?'新增':'編輯')+'員工';
    html=`<div class="fg"><div class="fr"><label>姓名 *</label><input id="m-name" value="${r.name||''}"></div><div class="fr"><label>部門</label><input id="m-dept" value="${r.dept||''}"></div><div class="fr"><label>職稱</label><input id="m-title" value="${r.title||''}"></div><div class="fr"><label>狀態</label><select id="m-status"><option>在職</option><option>試用期</option><option>留職停薪</option><option>離職</option></select></div><div class="fr"><label>到職日期</label><input id="m-startDate" type="date" value="${r.startDate||''}"></div><div class="fr"><label>月薪</label><input id="m-salary" type="number" value="${r.salary||''}"></div><div class="fr"><label>電話</label><input id="m-phone" value="${r.phone||''}"></div><div class="fr"><label>Email</label><input id="m-email" value="${r.email||''}"></div><div class="fr"><label>學歷</label><input id="m-education" value="${r.education||''}"></div><div class="fr"><label>專長技能</label><input id="m-skill" value="${r.skill||''}"></div></div><div class="fr"><label>備註</label><textarea id="m-note">${r.note||''}</textarea></div>
    <script>document.getElementById('m-status').value='${r.status||'在職'}';<\/script>`;
  } else if(mode==='editEmergency'){
    const r=employees.find(x=>x.id===targetId);const e=r.emergency||{};
    title='編輯緊急聯絡人';
    html=`<div class="fg"><div class="fr"><label>聯絡人姓名</label><input id="m-ename" value="${e.name||''}"></div><div class="fr"><label>關係</label><input id="m-erel" value="${e.relation||''}"></div><div class="fr" style="grid-column:span 2"><label>電話</label><input id="m-ephone" value="${e.phone||''}"></div></div>`;
  } else if(mode==='addSalary'){
    title='新增薪資調整記錄';
    html=`<div class="fg"><div class="fr"><label>生效日期</label><input id="m-sdate" type="date"></div><div class="fr"><label>調整後月薪</label><input id="m-samount" type="number" placeholder="例：65000"></div></div><div class="fr"><label>調整原因</label><input id="m-sreason" placeholder="例：年度調薪、晉升"></div>`;
  } else if(mode==='addPerf'){
    title='新增績效考核';
    html=`<div class="fg"><div class="fr"><label>考核期間</label><input id="m-pperiod" placeholder="例：2025 Q1"></div><div class="fr"><label>分數（0-100）</label><input id="m-pscore" type="number" min="0" max="100"></div><div class="fr"><label>評級</label><select id="m-plevel"><option>優秀</option><option>良好</option><option>待改善</option><option>不合格</option></select></div></div><div class="fr"><label>備註</label><textarea id="m-pnote"></textarea></div>`;
  } else if(mode==='editLeave'){
    const r=employees.find(x=>x.id===targetId);const yr=new Date().getFullYear();const l=r.leaves.find(x=>x.year===yr)||{year:yr,annual:0,used:0,remain:0};
    title=`編輯 ${yr} 年特休`;
    html=`<div class="fg"><div class="fr"><label>應有天數</label><input id="m-lann" type="number" value="${l.annual}"></div><div class="fr"><label>已使用天數</label><input id="m-lused" type="number" value="${l.used}"></div></div>`;
  } else if(mode==='addTraining'){
    title='新增教育訓練紀錄';
    html=`<div class="fg"><div class="fr"><label>訓練日期</label><input id="m-tdate" type="date"></div><div class="fr"><label>訓練時數</label><input id="m-thours" type="number" placeholder="小時"></div><div class="fr" style="grid-column:span 2"><label>課程名稱</label><input id="m-tname" placeholder="例：React 進階工作坊"></div><div class="fr"><label>結果</label><select id="m-tresult"><option>通過</option><option>未通過</option><option>進行中</option></select></div></div>`;
  }

  document.getElementById('modalArea').innerHTML=`<div class="modal-bg"><div class="modal"><h2>${title}</h2>${html}<div class="mf"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveModal()">儲存</button></div></div></div>`;
}

function closeModal(){document.getElementById('modalArea').innerHTML='';editMode=null;editTarget=null}

function g(id){const el=document.getElementById(id);return el?el.value.trim():''}

function saveModal(){
  const m=editMode,tid=editTarget;
  if(m==='addInterview'||m==='editInterview'){
    if(!g('m-name')){alert('請填寫姓名');return}
    const obj={id:tid||Date.now(),name:g('m-name'),position:g('m-position'),date:g('m-date'),source:g('m-source'),score:parseInt(g('m-score'))||0,status:g('m-status'),phone:g('m-phone'),email:g('m-email'),education:g('m-education'),experience:g('m-experience'),note:g('m-note')};
    if(m==='editInterview'){const i=interviews.findIndex(r=>r.id===tid);interviews[i]=obj;}else interviews.unshift(obj);
  } else if(m==='addEmployee'||m==='editEmployee'){
    if(!g('m-name')){alert('請填寫姓名');return}
    if(m==='editEmployee'){
      const r=employees.find(x=>x.id===tid);
      Object.assign(r,{name:g('m-name'),dept:g('m-dept'),title:g('m-title'),status:g('m-status'),startDate:g('m-startDate'),salary:parseInt(g('m-salary'))||0,phone:g('m-phone'),email:g('m-email'),education:g('m-education'),skill:g('m-skill'),note:g('m-note')});
    }else{
      employees.unshift({id:Date.now(),name:g('m-name'),dept:g('m-dept'),title:g('m-title'),status:g('m-status'),startDate:g('m-startDate'),salary:parseInt(g('m-salary'))||0,phone:g('m-phone'),email:g('m-email'),education:g('m-education'),skill:g('m-skill'),note:g('m-note'),emergency:{name:'',relation:'',phone:''},salaryHistory:[],performance:[],leaves:[],trainings:[]});
    }
  } else if(m==='editEmergency'){
    const r=employees.find(x=>x.id===tid);r.emergency={name:g('m-ename'),relation:g('m-erel'),phone:g('m-ephone')};
  } else if(m==='addSalary'){
    const r=employees.find(x=>x.id===tid);r.salaryHistory.push({date:g('m-sdate'),amount:parseInt(g('m-samount'))||0,reason:g('m-sreason')});
  } else if(m==='addPerf'){
    const r=employees.find(x=>x.id===tid);r.performance.unshift({period:g('m-pperiod'),score:parseInt(g('m-pscore'))||0,level:g('m-plevel'),note:g('m-pnote')});
  } else if(m==='editLeave'){
    const r=employees.find(x=>x.id===tid);const yr=new Date().getFullYear();const ann=parseInt(g('m-lann'))||0,used=parseInt(g('m-lused'))||0;const idx=r.leaves.findIndex(l=>l.year===yr);const obj={year:yr,annual:ann,used:used,remain:ann-used};if(idx>=0)r.leaves[idx]=obj;else r.leaves.unshift(obj);
  } else if(m==='addTraining'){
    const r=employees.find(x=>x.id===tid);r.trainings.unshift({date:g('m-tdate'),name:g('m-tname'),hours:parseInt(g('m-thours'))||0,result:g('m-tresult')});
  }
  closeModal();render();
}

render();
</script>
