<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人員資訊管理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f5f5f4;color:#1a1a19;min-height:100vh;font-size:14px}
.app{max-width:1100px;margin:0 auto;padding:16px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #e5e5e3;background:#fff;border-radius:12px 12px 0 0;margin-bottom:0}
.topbar h1{font-size:15px;font-weight:500;color:#1a1a19}
.topbar small{font-size:12px;color:#6b6b68}
.card{background:#fff;border-radius:12px;border:1px solid #e5e5e3;overflow:hidden;margin-bottom:16px}
.tabs{display:flex;padding:0 20px;border-bottom:1px solid #e5e5e3;background:#fff}
.tab{padding:10px 16px;font-size:13px;color:#6b6b68;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;font-family:inherit}
.tab.active{color:#1a1a19;border-bottom-color:#1a1a19;font-weight:500}
.tab:hover:not(.active){background:#f5f5f4;color:#1a1a19}
.main{padding:18px 20px}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.toolbar input{flex:1;min-width:160px;font-size:13px;padding:7px 10px;border:1px solid #d4d4d0;border-radius:8px;background:#fff;color:#1a1a19;height:34px;font-family:inherit}
.toolbar input:focus{outline:none;border-color:#888}
.toolbar select{font-size:13px;padding:6px 10px;border:1px solid #d4d4d0;border-radius:8px;background:#fff;color:#1a1a19;height:34px;cursor:pointer;font-family:inherit}
.btn{font-size:13px;padding:6px 13px;border-radius:8px;cursor:pointer;height:34px;font-weight:400;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;font-family:inherit;transition:background .1s}
.btn-primary{background:#1a1a19;color:#fff;border:1px solid #1a1a19}
.btn-primary:hover{background:#333}
.btn-sm{font-size:12px;padding:4px 10px;height:28px;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;font-weight:400;font-family:inherit}
.btn-outline{background:transparent;color:#1a1a19;border:1px solid #d4d4d0}
.btn-outline:hover{background:#f5f5f4}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px}
.sc{background:#f5f5f4;border-radius:8px;padding:10px 12px}
.sc .sl{font-size:11px;color:#6b6b68;margin-bottom:3px}
.sc .sn{font-size:20px;font-weight:500;color:#1a1a19}
.sc .ss{font-size:11px;color:#9b9b98;margin-top:1px}
.tw{border:1px solid #e5e5e3;border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:500;color:#6b6b68;border-bottom:1px solid #e5e5e3;background:#f9f9f8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td{padding:9px 12px;border-bottom:1px solid #e5e5e3;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1a1a19}
tr:last-child td{border-bottom:none}
tr.data-row:hover td{background:#f9f9f8;cursor:pointer}
tr.data-row.selected td{background:#f5f5f4}
.av{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.av-b{background:#dbeafe;color:#1e40af}.av-t{background:#d1fae5;color:#065f46}.av-c{background:#fee2e2;color:#991b1b}.av-p{background:#ede9fe;color:#5b21b6}.av-a{background:#fef3c7;color:#92400e}.av-k{background:#fce7f3;color:#9d174d}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:20px}
.bg{background:#dcfce7;color:#166534}.bb{background:#dbeafe;color:#1d4ed8}.ba{background:#fef3c7;color:#92400e}.bgr{background:#f1f5f9;color:#475569}.br{background:#fee2e2;color:#991b1b}.bp{background:#ede9fe;color:#6d28d9}.bt{background:#d1fae5;color:#065f46}
.nc{display:flex;align-items:center;gap:7px}
.nc span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ibt{background:none;border:none;cursor:pointer;color:#9b9b98;padding:3px 5px;border-radius:4px;font-size:12px;line-height:1;font-family:inherit}
.ibt:hover{background:#f5f5f4;color:#1a1a19}
.detail{border:1px solid #e5e5e3;border-radius:10px;margin-top:14px;overflow:hidden;background:#fff}
.detail-header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid #e5e5e3}
.detail-tabs{display:flex;gap:0;border-bottom:1px solid #e5e5e3;padding:0 18px;background:#fff;overflow-x:auto}
.dtab{padding:8px 13px;font-size:12px;color:#6b6b68;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;font-family:inherit}
.dtab.active{color:#1a1a19;border-bottom-color:#1a1a19;font-weight:500}
.dtab:hover:not(.active){background:#f5f5f4}
.detail-body{padding:16px 18px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.di .dl{font-size:11px;color:#6b6b68;margin-bottom:3px}
.di .dv{font-size:13px;color:#1a1a19}
.nb{background:#f5f5f4;border-radius:8px;padding:9px 11px;font-size:13px;color:#1a1a19;line-height:1.6;min-height:32px}
.sec-title{font-size:11px;font-weight:500;color:#6b6b68;margin:0 0 10px;text-transform:uppercase;letter-spacing:.5px}
.hist-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0ee}
.hist-row:last-child{border-bottom:none}
.hist-dot{width:8px;height:8px;border-radius:50%;background:#93c5fd;flex-shrink:0;margin-top:4px}
.hist-dot.green{background:#86efac}
.hist-dot.amber{background:#fcd34d}
.hist-meta{font-size:11px;color:#9b9b98;margin-top:2px}
.prog-bar{height:6px;border-radius:3px;background:#e5e5e3;margin-top:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}
.empty-state{text-align:center;padding:40px;color:#9b9b98;font-size:13px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:12px;border:1px solid #e5e5e3;width:520px;max-width:100%;padding:22px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal h2{font-size:14px;font-weight:500;margin-bottom:16px;color:#1a1a19}
.fr{margin-bottom:11px}
.fr label{display:block;font-size:12px;color:#6b6b68;margin-bottom:4px}
.fr input,.fr select,.fr textarea{width:100%;font-size:13px;padding:7px 10px;border:1px solid #d4d4d0;border-radius:8px;background:#fff;color:#1a1a19;font-family:inherit}
.fr input:focus,.fr select:focus,.fr textarea:focus{outline:none;border-color:#888}
.fr textarea{resize:vertical;min-height:60px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid #e5e5e3}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a19;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:2000;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
/* Responsive */
@media(max-width:600px){.dg,.dg3,.fg{grid-template-columns:1fr}.detail-tabs{overflow-x:auto}.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="topbar">
      <h1>人員資訊管理系統</h1>
      <small id="todayLabel"></small>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('interview')">面試候選人</button>
      <button class="tab" onclick="switchTab('employee')">在職員工</button>
    </div>
    <div class="main" id="mainContent"></div>
  </div>
</div>
<div id="modalArea"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAg_dfvoxA1dQYqHzdqPtEot8wT-wKZal4",
  authDomain: "liangpinghri.firebaseapp.com",
  projectId: "liangpinghri",
  storageBucket: "liangpinghri.firebasestorage.app",
  messagingSenderId: "410255807470",
  appId: "1:410255807470:web:dc08ba070c7db4f083f4ff"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── 日期 ──
document.getElementById('todayLabel').textContent = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});

// ── 狀態 ──
let tab='interview', selId=null, detailTab='basic', sq='', sf='';
let editMode=null, editTarget=null;

// ── 雲端讀寫 ──
function showLoading(show) {
  let el=document.getElementById('loadingBar');
  if(!el){el=document.createElement('div');el.id='loadingBar';el.style.cssText='position:fixed;top:0;left:0;right:0;height:3px;background:#1a1a19;z-index:9999;transition:opacity .4s';document.body.appendChild(el);}
  el.style.opacity=show?'1':'0';
}

async function loadData() {
  try {
    showLoading(true);
    const [ivSnap,evSnap] = await Promise.all([
      getDoc(doc(db,'hr','interviews')),
      getDoc(doc(db,'hr','employees')),
    ]);
    interviews = ivSnap.exists() ? ivSnap.data().list : [];
    employees  = evSnap.exists() ? evSnap.data().list : [];
  } catch(e) {
    console.error(e);
    showToast('載入資料失敗，請重新整理');
    interviews=[]; employees=[];
  } finally {
    showLoading(false);
  }
}

async function saveData() {
  try {
    await Promise.all([
      setDoc(doc(db,'hr','interviews'),{list:interviews}),
      setDoc(doc(db,'hr','employees'), {list:employees}),
    ]);
  } catch(e) {
    console.error(e);
    showToast('儲存失敗，請檢查網路連線');
  }
}

let interviews=[], employees=[];
// 啟動後立即載入再渲染（async IIFE）
(async()=>{ await loadData(); render(); })();

// ── Toast ──
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ── 工具函式 ──
const avCls = n => ['av-b','av-t','av-c','av-p','av-a','av-k'][n.charCodeAt(0)%6];
const ini   = n => n.slice(0,2);
const calcYears = d => {
  const ms=Date.now()-new Date(d).getTime();
  const y=Math.floor(ms/31536000000),m=Math.floor((ms%31536000000)/2592000000);
  return y>0?`${y}年${m}個月`:`${m}個月`;
};
const isBadge = s => { const m={錄取:'bg',待通知:'ba',面試中:'bb',已婉拒:'bgr'}; return`<span class="badge ${m[s]||'bgr'}">${s}</span>` };
const eBadge  = s => { const m={在職:'bt',試用期:'bb',留職停薪:'ba',離職:'bgr'}; return`<span class="badge ${m[s]||'bgr'}">${s}</span>` };
const perfBadge = l => { const m={優秀:'bg',良好:'bb',待改善:'ba',不合格:'br'}; return`<span class="badge ${m[l]||'bgr'}">${l}</span>` };

function switchTab(t) { tab=t;selId=null;detailTab='basic';sq='';sf='';render(); }

function getList() {
  const src = tab==='interview' ? interviews : employees;
  return src.filter(r => {
    const q=sq.toLowerCase();
    const nm=(r.name+((tab==='interview'?r.position:r.dept)||'')+(r.email||'')).toLowerCase().includes(q);
    const st=!sf||r.status===sf;
    return nm&&st;
  });
}

// ── 匯出 JSON ──
function exportJSON() {
  const data = { interviews, employees, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`hr-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
  showToast('備份檔案已下載');
}

// ── 匯入 JSON ──
function importJSON() {
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.interviews&&d.employees){
          interviews=d.interviews;employees=d.employees;saveData();render();showToast('資料匯入成功');
        }else{showToast('檔案格式不正確');}
      }catch{showToast('匯入失敗，請確認檔案格式');}
    };reader.readAsText(f);
  };input.click();
}

// ── 主渲染 ──
function render() {
  const list=getList();
  const all=tab==='interview'?interviews:employees;
  let stats='',tbl='',det='';

  if(tab==='interview'){
    const total=all.length,hired=all.filter(r=>r.status==='錄取').length,
          pending=all.filter(r=>['待通知','面試中'].includes(r.status)).length,
          avg=all.length?Math.round(all.reduce((s,r)=>s+r.score,0)/all.length):0;
    stats=`<div class="stats">
      <div class="sc"><div class="sl">面試總數</div><div class="sn">${total}</div></div>
      <div class="sc"><div class="sl">已錄取</div><div class="sn">${hired}</div></div>
      <div class="sc"><div class="sl">待回覆</div><div class="sn">${pending}</div></div>
      <div class="sc"><div class="sl">平均評分</div><div class="sn">${avg}</div><div class="ss">滿分100</div></div>
    </div>`;
    const sopts=['','錄取','面試中','待通知','已婉拒'].map(s=>`<option value="${s}"${sf===s?' selected':''}>${s||'全部狀態'}</option>`).join('');
    tbl=`<div class="toolbar">
      <input type="text" placeholder="搜尋姓名、職位..." value="${sq}" oninput="setSq(this.value)">
      <select onchange="setSf(this.value)">${sopts}</select>
      <button class="btn btn-outline" onclick="exportJSON()" title="備份資料">⬇ 備份</button>
      <button class="btn btn-outline" onclick="importJSON()" title="還原資料">⬆ 還原</button>
      <button class="btn btn-primary" onclick="openModal('addInterview')">＋ 新增候選人</button>
    </div>
    <div class="tw"><table>
      <thead><tr>
        <th style="width:140px">姓名</th><th style="width:110px">應徵職位</th>
        <th style="width:90px">日期</th><th style="width:80px">來源</th>
        <th style="width:55px">評分</th><th style="width:80px">狀態</th><th style="width:70px">操作</th>
      </tr></thead>
      <tbody>${list.length?list.map(r=>`<tr class="data-row${selId===r.id?' selected':''}" onclick="setSelId(${r.id})">
        <td><div class="nc"><div class="av ${avCls(r.name)}">${ini(r.name)}</div><span>${r.name}</span></div></td>
        <td>${r.position}</td><td>${r.date}</td><td>${r.source}</td>
        <td><span style="font-weight:500">${r.score}</span></td>
        <td>${isBadge(r.status)}</td>
        <td><div style="display:flex;gap:4px">
          <button class="ibt" onclick="event.stopPropagation();openModal('editInterview',${r.id})" title="編輯">✎</button>
          <button class="ibt" onclick="event.stopPropagation();delRow(${r.id})" title="刪除" style="color:#e24b4a">✕</button>
        </div></td>
      </tr>`).join(''):`<tr><td colspan="7"><div class="empty-state">沒有符合的記錄</div></td></tr>`}
      </tbody></table></div>`;

    const sel=interviews.find(r=>r.id===selId);
    if(sel){det=`<div class="detail">
      <div class="detail-header">
        <div class="av ${avCls(sel.name)}" style="width:38px;height:38px;font-size:13px">${ini(sel.name)}</div>
        <div><div style="font-size:14px;font-weight:500">${sel.name}</div>
        <div style="font-size:12px;color:#6b6b68">${sel.position} · ${isBadge(sel.status)}</div></div>
        <button class="btn btn-sm btn-outline" style="margin-left:auto" onclick="openModal('editInterview',${sel.id})">編輯</button>
      </div>
      <div class="detail-body">
        <div class="dg">
          <div class="di"><div class="dl">電話</div><div class="dv">${sel.phone}</div></div>
          <div class="di"><div class="dl">Email</div><div class="dv" style="font-size:12px">${sel.email}</div></div>
          <div class="di"><div class="dl">學歷</div><div class="dv">${sel.education}</div></div>
          <div class="di"><div class="dl">工作年資</div><div class="dv">${sel.experience}</div></div>
          <div class="di"><div class="dl">來源管道</div><div class="dv">${sel.source}</div></div>
          <div class="di"><div class="dl">評分</div><div class="dv" style="font-size:18px;font-weight:500">${sel.score}<span style="font-size:11px;font-weight:400;color:#9b9b98"> / 100</span></div></div>
        </div>
        <div style="margin-top:12px"><div class="dl" style="font-size:11px;color:#6b6b68;margin-bottom:4px">面試備註</div><div class="nb">${sel.note||'（無備註）'}</div></div>
      </div></div>`;}

  } else {
    const total=all.length,active=all.filter(r=>r.status==='在職').length,
          prob=all.filter(r=>r.status==='試用期').length,
          depts=new Set(all.map(r=>r.dept)).size;
    stats=`<div class="stats">
      <div class="sc"><div class="sl">員工總數</div><div class="sn">${total}</div></div>
      <div class="sc"><div class="sl">正式在職</div><div class="sn">${active}</div></div>
      <div class="sc"><div class="sl">試用期中</div><div class="sn">${prob}</div></div>
      <div class="sc"><div class="sl">部門數</div><div class="sn">${depts}</div></div>
    </div>`;
    const sopts=['','在職','試用期','留職停薪','離職'].map(s=>`<option value="${s}"${sf===s?' selected':''}>${s||'全部狀態'}</option>`).join('');
    tbl=`<div class="toolbar">
      <input type="text" placeholder="搜尋姓名、部門..." value="${sq}" oninput="setSq(this.value)">
      <select onchange="setSf(this.value)">${sopts}</select>
      <button class="btn btn-outline" onclick="exportJSON()" title="備份資料">⬇ 備份</button>
      <button class="btn btn-outline" onclick="importJSON()" title="還原資料">⬆ 還原</button>
      <button class="btn btn-primary" onclick="openModal('addEmployee')">＋ 新增員工</button>
    </div>
    <div class="tw"><table>
      <thead><tr>
        <th style="width:130px">姓名</th><th style="width:80px">部門</th>
        <th style="width:120px">職稱</th><th style="width:90px">到職日</th>
        <th style="width:90px">年資</th><th style="width:80px">狀態</th><th style="width:70px">操作</th>
      </tr></thead>
      <tbody>${list.length?list.map(r=>`<tr class="data-row${selId===r.id?' selected':''}" onclick="detailTab='basic';setSelId(${r.id})">
        <td><div class="nc"><div class="av ${avCls(r.name)}">${ini(r.name)}</div><span>${r.name}</span></div></td>
        <td>${r.dept}</td><td>${r.title}</td><td>${r.startDate}</td><td>${calcYears(r.startDate)}</td>
        <td>${eBadge(r.status)}</td>
        <td><div style="display:flex;gap:4px">
          <button class="ibt" onclick="event.stopPropagation();openModal('editEmployee',${r.id})" title="編輯">✎</button>
          <button class="ibt" onclick="event.stopPropagation();delRow(${r.id})" title="刪除" style="color:#e24b4a">✕</button>
        </div></td>
      </tr>`).join(''):`<tr><td colspan="7"><div class="empty-state">沒有符合的記錄</div></td></tr>`}
      </tbody></table></div>`;

    const sel=employees.find(r=>r.id===selId);
    if(sel){
      const dtabs=[['basic','基本資料'],['emergency','緊急聯絡人'],['salary','薪資歷程'],['perf','績效考核'],['leave','特休假管理'],['training','教育訓練']];
      let body='';
      if(detailTab==='basic'){
        body=`<div class="dg">
          <div class="di"><div class="dl">電話</div><div class="dv">${sel.phone}</div></div>
          <div class="di"><div class="dl">Email</div><div class="dv" style="font-size:12px">${sel.email}</div></div>
          <div class="di"><div class="dl">學歷</div><div class="dv">${sel.education}</div></div>
          <div class="di"><div class="dl">月薪</div><div class="dv" style="font-weight:500">$${sel.salary.toLocaleString()}</div></div>
          <div class="di"><div class="dl">到職日</div><div class="dv">${sel.startDate}</div></div>
          <div class="di"><div class="dl">年資</div><div class="dv">${calcYears(sel.startDate)}</div></div>
        </div>
        <div style="margin-top:12px"><div class="dl" style="font-size:11px;color:#6b6b68;margin-bottom:4px">專長技能</div><div class="nb">${sel.skill||'（未填寫）'}</div></div>
        <div style="margin-top:10px"><div class="dl" style="font-size:11px;color:#6b6b68;margin-bottom:4px">備註</div><div class="nb">${sel.note||'（無備註）'}</div></div>`;
      } else if(detailTab==='emergency'){
        const e=sel.emergency||{};
        body=`<div class="dg3" style="margin-bottom:14px">
          <div class="di"><div class="dl">聯絡人姓名</div><div class="dv">${e.name||'—'}</div></div>
          <div class="di"><div class="dl">關係</div><div class="dv">${e.relation||'—'}</div></div>
          <div class="di"><div class="dl">電話</div><div class="dv">${e.phone||'—'}</div></div>
        </div>
        <button class="btn btn-sm btn-outline" onclick="openModal('editEmergency',${sel.id})">編輯緊急聯絡人</button>`;
      } else if(detailTab==='salary'){
        body=`<div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
          <span class="sec-title" style="margin:0">薪資調整歷程</span>
          <button class="btn btn-sm btn-outline" onclick="openModal('addSalary',${sel.id})">＋ 新增記錄</button>
        </div>
        ${sel.salaryHistory.length?sel.salaryHistory.map((h,i)=>`<div class="hist-row">
          <div class="hist-dot green"></div>
          <div style="flex:1"><div style="font-size:13px;font-weight:500">$${h.amount.toLocaleString()}</div>
          <div class="hist-meta">${h.date} · ${h.reason}</div></div>
          ${i>0?`<div style="font-size:12px;color:#166534;font-weight:500">+$${(h.amount-(sel.salaryHistory[i-1]||{amount:0}).amount).toLocaleString()}</div>`:'<div style="font-size:11px;color:#9b9b98">起薪</div>'}
        </div>`).join(''):'<div class="empty-state" style="padding:24px">尚無薪資記錄</div>'}`;
      } else if(detailTab==='perf'){
        body=`<div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
          <span class="sec-title" style="margin:0">績效考核記錄</span>
          <button class="btn btn-sm btn-outline" onclick="openModal('addPerf',${sel.id})">＋ 新增考核</button>
        </div>
        ${sel.performance.length?sel.performance.map(p=>`<div class="hist-row">
          <div class="hist-dot" style="background:#93c5fd"></div>
          <div style="flex:1">
            <div style="font-size:13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">${p.period} ${perfBadge(p.level)} <span style="font-weight:500">${p.score}分</span></div>
            <div class="hist-meta">${p.note}</div>
          </div>
        </div>`).join(''):'<div class="empty-state" style="padding:24px">尚無績效考核記錄</div>'}`;
      } else if(detailTab==='leave'){
        const yr=new Date().getFullYear();
        const thisYr=sel.leaves.find(l=>l.year===yr)||{year:yr,annual:0,used:0,remain:0};
        const pct=thisYr.annual>0?Math.round(thisYr.used/thisYr.annual*100):0;
        const color=pct>80?'#e24b4a':pct>50?'#f59e0b':'#10b981';
        body=`<div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
          <span class="sec-title" style="margin:0">${yr} 年度特休</span>
          <button class="btn btn-sm btn-outline" onclick="openModal('editLeave',${sel.id})">編輯</button>
        </div>
        <div class="dg3" style="margin-bottom:14px">
          <div class="sc"><div class="sl">應有天數</div><div class="sn">${thisYr.annual}</div></div>
          <div class="sc"><div class="sl">已使用</div><div class="sn">${thisYr.used}</div></div>
          <div class="sc"><div class="sl">剩餘天數</div><div class="sn">${thisYr.remain}</div></div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:#6b6b68;margin-bottom:4px"><span>使用進度</span><span>${pct}%</span></div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>
        ${sel.leaves.filter(l=>l.year<yr).length?`<div style="margin-top:16px">
          <div class="sec-title">歷年紀錄</div>
          ${sel.leaves.filter(l=>l.year<yr).sort((a,b)=>b.year-a.year).map(l=>`<div class="hist-row">
            <div class="hist-dot"></div>
            <div style="flex:1"><div style="font-size:13px">${l.year} 年</div>
            <div class="hist-meta">應有 ${l.annual} 天 · 已用 ${l.used} 天 · 剩餘 ${l.remain} 天</div></div>
          </div>`).join('')}
        </div>`:''}`;
      } else if(detailTab==='training'){
        body=`<div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
          <span class="sec-title" style="margin:0">教育訓練紀錄</span>
          <button class="btn btn-sm btn-outline" onclick="openModal('addTraining',${sel.id})">＋ 新增訓練</button>
        </div>
        ${sel.trainings.length?sel.trainings.map(t=>`<div class="hist-row">
          <div class="hist-dot amber" style="background:#fcd34d"></div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:500">${t.name}</div>
            <div class="hist-meta">${t.date} · ${t.hours} 小時 · <span style="color:${t.result==='通過'?'#166534':'#991b1b'}">${t.result}</span></div>
          </div>
        </div>`).join(''):'<div class="empty-state" style="padding:24px">尚無訓練紀錄</div>'}`;
      }
      det=`<div class="detail">
        <div class="detail-header">
          <div class="av ${avCls(sel.name)}" style="width:38px;height:38px;font-size:13px">${ini(sel.name)}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:500">${sel.name}</div>
            <div style="font-size:12px;color:#6b6b68">${sel.dept} · ${sel.title} · ${eBadge(sel.status)}</div>
          </div>
          <button class="btn btn-sm btn-outline" onclick="openModal('editEmployee',${sel.id})">編輯</button>
        </div>
        <div class="detail-tabs">${dtabs.map(([id,lb])=>`<button class="dtab${detailTab===id?' active':''}" onclick="setDetailTab('${id}')">${lb}</button>`).join('')}</div>
        <div class="detail-body">${body}</div>
      </div>`;
    }
  }

  document.getElementById('mainContent').innerHTML = stats+tbl+det;
  // sync active tab button
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',(i===0&&tab==='interview')||(i===1&&tab==='employee'))});
}

// ── Modal ──
function openModal(mode, targetId) {
  editMode=mode; editTarget=targetId||null;
  let html='', title='';

  if(mode==='addInterview'||mode==='editInterview'){
    const r=mode==='editInterview'?interviews.find(x=>x.id===targetId):{};
    title=(mode==='addInterview'?'新增':'編輯')+'候選人';
    html=`<div class="fg">
      <div class="fr"><label>姓名 *</label><input id="m-name" value="${r.name||''}"></div>
      <div class="fr"><label>應徵職位</label><input id="m-position" value="${r.position||''}"></div>
      <div class="fr"><label>面試日期</label><input id="m-date" type="date" value="${r.date||''}"></div>
      <div class="fr"><label>來源管道</label><select id="m-source"><option>104人力銀行</option><option>LinkedIn</option><option>內部推薦</option><option>Yourator</option><option>其他</option></select></div>
      <div class="fr"><label>評分（0-100）</label><input id="m-score" type="number" min="0" max="100" value="${r.score||''}"></div>
      <div class="fr"><label>狀態</label><select id="m-status"><option>面試中</option><option>待通知</option><option>錄取</option><option>已婉拒</option></select></div>
      <div class="fr"><label>電話</label><input id="m-phone" value="${r.phone||''}"></div>
      <div class="fr"><label>Email</label><input id="m-email" value="${r.email||''}"></div>
      <div class="fr"><label>學歷</label><input id="m-education" value="${r.education||''}"></div>
      <div class="fr"><label>工作年資</label><input id="m-experience" value="${r.experience||''}"></div>
    </div>
    <div class="fr"><label>面試備註</label><textarea id="m-note">${r.note||''}</textarea></div>`;
    setTimeout(()=>{
      if(r.status)document.getElementById('m-status').value=r.status;
      if(r.source)document.getElementById('m-source').value=r.source;
    },10);
  } else if(mode==='addEmployee'||mode==='editEmployee'){
    const r=mode==='editEmployee'?employees.find(x=>x.id===targetId):{};
    title=(mode==='addEmployee'?'新增':'編輯')+'員工';
    html=`<div class="fg">
      <div class="fr"><label>姓名 *</label><input id="m-name" value="${r.name||''}"></div>
      <div class="fr"><label>部門</label><input id="m-dept" value="${r.dept||''}"></div>
      <div class="fr"><label>職稱</label><input id="m-title" value="${r.title||''}"></div>
      <div class="fr"><label>狀態</label><select id="m-status"><option>在職</option><option>試用期</option><option>留職停薪</option><option>離職</option></select></div>
      <div class="fr"><label>到職日期</label><input id="m-startDate" type="date" value="${r.startDate||''}"></div>
      <div class="fr"><label>月薪（元）</label><input id="m-salary" type="number" value="${r.salary||''}"></div>
      <div class="fr"><label>電話</label><input id="m-phone" value="${r.phone||''}"></div>
      <div class="fr"><label>Email</label><input id="m-email" value="${r.email||''}"></div>
      <div class="fr"><label>學歷</label><input id="m-education" value="${r.education||''}"></div>
      <div class="fr"><label>專長技能</label><input id="m-skill" value="${r.skill||''}"></div>
    </div>
    <div class="fr"><label>備註</label><textarea id="m-note">${r.note||''}</textarea></div>`;
    setTimeout(()=>{ if(r.status)document.getElementById('m-status').value=r.status; },10);
  } else if(mode==='editEmergency'){
    const e=(employees.find(x=>x.id===targetId)||{}).emergency||{};
    title='編輯緊急聯絡人';
    html=`<div class="fg">
      <div class="fr"><label>聯絡人姓名</label><input id="m-ename" value="${e.name||''}"></div>
      <div class="fr"><label>關係</label><input id="m-erel" value="${e.relation||''}"></div>
      <div class="fr" style="grid-column:span 2"><label>電話</label><input id="m-ephone" value="${e.phone||''}"></div>
    </div>`;
  } else if(mode==='addSalary'){
    title='新增薪資調整記錄';
    html=`<div class="fg">
      <div class="fr"><label>生效日期</label><input id="m-sdate" type="date"></div>
      <div class="fr"><label>調整後月薪（元）</label><input id="m-samount" type="number" placeholder="例：65000"></div>
    </div>
    <div class="fr"><label>調整原因</label><input id="m-sreason" placeholder="例：年度調薪、晉升調薪"></div>`;
  } else if(mode==='addPerf'){
    title='新增績效考核';
    html=`<div class="fg">
      <div class="fr"><label>考核期間</label><input id="m-pperiod" placeholder="例：2025 Q2"></div>
      <div class="fr"><label>分數（0-100）</label><input id="m-pscore" type="number" min="0" max="100"></div>
      <div class="fr"><label>評級</label><select id="m-plevel"><option>優秀</option><option>良好</option><option>待改善</option><option>不合格</option></select></div>
    </div>
    <div class="fr"><label>備註</label><textarea id="m-pnote"></textarea></div>`;
  } else if(mode==='editLeave'){
    const r=employees.find(x=>x.id===targetId);
    const yr=new Date().getFullYear();
    const l=r.leaves.find(x=>x.year===yr)||{year:yr,annual:0,used:0,remain:0};
    title=`編輯 ${yr} 年度特休`;
    html=`<div class="fg">
      <div class="fr"><label>應有天數</label><input id="m-lann" type="number" value="${l.annual}"></div>
      <div class="fr"><label>已使用天數</label><input id="m-lused" type="number" value="${l.used}"></div>
    </div>`;
  } else if(mode==='addTraining'){
    title='新增教育訓練紀錄';
    html=`<div class="fg">
      <div class="fr"><label>訓練日期</label><input id="m-tdate" type="date"></div>
      <div class="fr"><label>訓練時數（小時）</label><input id="m-thours" type="number" placeholder="例：8"></div>
      <div class="fr" style="grid-column:span 2"><label>課程名稱</label><input id="m-tname" placeholder="例：React 進階工作坊"></div>
      <div class="fr"><label>結果</label><select id="m-tresult"><option>通過</option><option>未通過</option><option>進行中</option></select></div>
    </div>`;
  }

  document.getElementById('modalArea').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>${title}</h2>
        ${html}
        <div class="mf">
          <button class="btn btn-outline" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="saveModal()">儲存</button>
        </div>
      </div>
    </div>`;
}

function closeModal(){ document.getElementById('modalArea').innerHTML=''; editMode=null; editTarget=null; }

const g = id => { const el=document.getElementById(id); return el?el.value.trim():''; };

async function saveModal(){
  const m=editMode, tid=editTarget;
  if(m==='addInterview'||m==='editInterview'){
    if(!g('m-name')){alert('請填寫姓名');return;}
    const obj={id:tid||Date.now(),name:g('m-name'),position:g('m-position'),date:g('m-date'),source:g('m-source'),score:parseInt(g('m-score'))||0,status:g('m-status'),phone:g('m-phone'),email:g('m-email'),education:g('m-education'),experience:g('m-experience'),note:g('m-note')};
    if(m==='editInterview'){const i=interviews.findIndex(r=>r.id===tid);interviews[i]=obj;}
    else interviews.unshift(obj);
  } else if(m==='addEmployee'||m==='editEmployee'){
    if(!g('m-name')){alert('請填寫姓名');return;}
    if(m==='editEmployee'){
      const r=employees.find(x=>x.id===tid);
      Object.assign(r,{name:g('m-name'),dept:g('m-dept'),title:g('m-title'),status:g('m-status'),startDate:g('m-startDate'),salary:parseInt(g('m-salary'))||0,phone:g('m-phone'),email:g('m-email'),education:g('m-education'),skill:g('m-skill'),note:g('m-note')});
    } else {
      employees.unshift({id:Date.now(),name:g('m-name'),dept:g('m-dept'),title:g('m-title'),status:g('m-status'),startDate:g('m-startDate'),salary:parseInt(g('m-salary'))||0,phone:g('m-phone'),email:g('m-email'),education:g('m-education'),skill:g('m-skill'),note:g('m-note'),emergency:{name:'',relation:'',phone:''},salaryHistory:[],performance:[],leaves:[],trainings:[]});
    }
  } else if(m==='editEmergency'){
    const r=employees.find(x=>x.id===tid);
    r.emergency={name:g('m-ename'),relation:g('m-erel'),phone:g('m-ephone')};
  } else if(m==='addSalary'){
    employees.find(x=>x.id===tid).salaryHistory.push({date:g('m-sdate'),amount:parseInt(g('m-samount'))||0,reason:g('m-sreason')});
  } else if(m==='addPerf'){
    employees.find(x=>x.id===tid).performance.unshift({period:g('m-pperiod'),score:parseInt(g('m-pscore'))||0,level:g('m-plevel'),note:g('m-pnote')});
  } else if(m==='editLeave'){
    const r=employees.find(x=>x.id===tid);
    const yr=new Date().getFullYear();
    const ann=parseInt(g('m-lann'))||0, used=parseInt(g('m-lused'))||0;
    const idx=r.leaves.findIndex(l=>l.year===yr);
    const obj={year:yr,annual:ann,used:used,remain:ann-used};
    if(idx>=0)r.leaves[idx]=obj; else r.leaves.unshift(obj);
  } else if(m==='addTraining'){
    employees.find(x=>x.id===tid).trainings.unshift({date:g('m-tdate'),name:g('m-tname'),hours:parseInt(g('m-thours'))||0,result:g('m-tresult')});
  }

  closeModal();
  render();
  showToast('儲存中...');
  await saveData();
  showToast('已儲存 ✓');
}

async function delRow(id){
  if(!confirm('確定要刪除此筆資料？'))return;
  if(tab==='interview') interviews=interviews.filter(r=>r.id!==id);
  else employees=employees.filter(r=>r.id!==id);
  if(selId===id) selId=null;
  render();
  showToast('刪除中...');
  await saveData();
  showToast('已刪除 ✓');
}

// 把需要從 HTML onclick 呼叫的函式掛到 window
window.switchTab=switchTab;
window.openModal=openModal;
window.closeModal=closeModal;
window.saveModal=()=>saveModal();
window.delRow=(id)=>delRow(id);
window.exportJSON=exportJSON;
window.importJSON=importJSON;
window.render=render;
window.setSq=(v)=>{sq=v;selId=null;render();};
window.setSf=(v)=>{sf=v;selId=null;render();};
window.setSelId=(id)=>{selId=(selId===id?null:id);render();};
window.setDetailTab=(t)=>{detailTab=t;render();};
</script>
