<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人員資訊管理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f5f5f4;color:#1a1a19;min-height:100vh;font-size:14px}
.app{max-width:1100px;margin:0 auto;padding:16px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #e5e5e3;background:#fff;border-radius:12px 12px 0 0;margin-bottom:0}
.topbar h1{font-size:15px;font-weight:500;color:#1a1a19}
.topbar small{font-size:12px;color:#6b6b68}
.card{background:#fff;border-radius:12px;border:1px solid #e5e5e3;overflow:hidden;margin-bottom:16px}
.tabs{display:flex;padding:0 20px;border-bottom:1px solid #e5e5e3;background:#fff}
.tab{padding:10px 16px;font-size:13px;color:#6b6b68;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;font-family:inherit}
.tab.active{color:#1a1a19;border-bottom-color:#1a1a19;font-weight:500}
.tab:hover:not(.active){background:#f5f5f4;color:#1a1a19}
.main{padding:18px 20px}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.toolbar input{flex:1;min-width:160px;font-size:13px;padding:7px 10px;border:1px solid #d4d4d0;border-radius:8px;background:#fff;color:#1a1a19;height:34px;font-family:inherit}
.toolbar input:focus{outline:none;border-color:#888}
.toolbar select{font-size:13px;padding:6px 10px;border:1px solid #d4d4d0;border-radius:8px;background:#fff;color:#1a1a19;height:34px;cursor:pointer;font-family:inherit}
.btn{font-size:13px;padding:6px 13px;border-radius:8px;cursor:pointer;height:34px;font-weight:400;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;font-family:inherit;transition:background .1s}
.btn-primary{background:#1a1a19;color:#fff;border:1px solid #1a1a19}
.btn-primary:hover{background:#333}
.btn-sm{font-size:12px;padding:4px 10px;height:28px;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;font-weight:400;font-family:inherit}
.btn-outline{background:transparent;color:#1a1a19;border:1px solid #d4d4d0}
.btn-outline:hover{background:#f5f5f4}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px}
.sc{background:#f5f5f4;border-radius:8px;padding:10px 12px}
.sc .sl{font-size:11px;color:#6b6b68;margin-bottom:3px}
.sc .sn{font-size:20px;font-weight:500;color:#1a1a19}
.sc .ss{font-size:11px;color:#9b9b98;margin-top:1px}
.tw{border:1px solid #e5e5e3;border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:500;color:#6b6b68;border-bottom:1px solid #e5e5e3;background:#f9f9f8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td{padding:9px 12px;border-bottom:1px solid #e5e5e3;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1a1a19}
tr:last-child td{border-bottom:none}
tr.data-row:hover td{background:#f9f9f8;cursor:pointer}
tr.data-row.selected td{background:#f5f5f4}
.av{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.av-b{background:#dbeafe;color:#1e40af}.av-t{background:#d1fae5;color:#065f46}.av-c{background:#fee2e2;color:#991b1b}.av-p{background:#ede9fe;color:#5b21b6}.av-a{background:#fef3c7;color:#92400e}.av-k{background:#fce7f3;color:#9d174d}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:20px}
.bg{background:#dcfce7;color:#166534}.bb{background:#dbeafe;color:#1d4ed8}.ba{background:#fef3c7;color:#92400e}.bgr{background:#f1f5f9;color:#475569}.br{background:#fee2e2;color:#991b1b}.bp{background:#ede9fe;color:#6d28d9}.bt{background:#d1fae5;color:#065f46}
.nc{display:flex;align-items:center;gap:7px}
.nc span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ibt{background:none;border:none;cursor:pointer;color:#9b9b98;padding:3px 5px;border-radius:4px;font-size:12px;line-height:1;font-family:inherit}
.ibt:hover{background:#f5f5f4;color:#1a1a19}
.detail{border:1px solid #e5e5e3;border-radius:10px;margin-top:14px;overflow:hidden;background:#fff}
.detail-header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid #e5e5e3}
.detail-tabs{display:flex;gap:0;border-bottom:1px solid #e5e5e3;padding:0 18px;background:#fff;overflow-x:auto}
.dtab{padding:8px 13px;font-size:12px;color:#6b6b68;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;font-family:inherit}
.dtab.active{color:#1a1a19;border-bottom-color:#1a1a19;font-weight:500}
.dtab:hover:not(.active){background:#f5f5f4}
.detail-body{padding:16px 18px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.di .dl{font-size:11px;color:#6b6b68;margin-bottom:3px}
.di .dv{font-size:13px;color:#1a1a19}
.nb{background:#f5f5f4;border-radius:8px;padding:9px 11px;font-size:13px;color:#1a1a19;line-height:1.6;min-height:32px}
.sec-title{font-size:11px;font-weight:500;color:#6b6b68;margin:0 0 10px;text-transform:uppercase;letter-spacing:.5px}
.hist-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0ee}
.hist-row:last-child{border-bottom:none}
.hist-dot{width:8px;height:8px;border-radius:50%;background:#93c5fd;flex-shrink:0;margin-top:4px}
.hist-dot.green{background:#86efac}
.hist-dot.amber{background:#fcd34d}
.hist-meta{font-size:11px;color:#9b9b98;margin-top:2px}
.prog-bar{height:6px;border-radius:3px;background:#e5e5e3;margin-top:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}
.empty-state{text-align:center;padding:40px;color:#9b9b98;font-size:13px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:12px;border:1px solid #e5e5e3;width:520px;max-width:100%;padding:22px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal h2{font-size:14px;font-weight:500;margin-bottom:16px;color:#1a1a19}
.fr{margin-bottom:11px}
.fr label{display:block;font-size:12px;color:#6b6b68;margin-bottom:4px}
.fr input,.fr select,.fr textarea{width:100%;font-size:13px;padding:7px 10px;border:1px solid #d4d4d0;border-radius:8px;background:#fff;color:#1a1a19;font-family:inherit}
.fr input:focus,.fr select:focus,.fr textarea:focus{outline:none;border-color:#888}
.fr textarea{resize:vertical;min-height:60px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid #e5e5e3}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a19;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:2000;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
/* Responsive */
@media(max-width:600px){.dg,.dg3,.fg{grid-template-columns:1fr}.detail-tabs{overflow-x:auto}.stats{grid-template-columns:1fr 1fr}}
/* 自製下拉選單 */
.cdd{position:relative;display:inline-block;width:100%}
.cdd-trigger{width:100%;font-size:13px;padding:7px 32px 7px 10px;border:1px solid #d4d4d0;border-radius:8px;background:#fff;color:#1a1a19;cursor:pointer;text-align:left;font-family:inherit;appearance:none;-webkit-appearance:none}
.cdd-trigger::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:#6b6b68;font-size:11px}
.cdd-menu{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #d4d4d0;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:500;max-height:220px;overflow-y:auto;display:none}
.cdd-menu.open{display:block}
.cdd-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;cursor:pointer;font-size:13px;color:#1a1a19}
.cdd-item:hover{background:#f5f5f4}
.cdd-item.selected{background:#f5f5f4;font-weight:500}
.cdd-item .cdd-del{background:none;border:none;cursor:pointer;color:#d4d4d0;font-size:13px;line-height:1;padding:2px 4px;border-radius:4px;flex-shrink:0}
.cdd-item .cdd-del:hover{color:#e24b4a;background:#fee2e2}
.cdd-placeholder{color:#9b9b98}
.cdd-add{display:flex;align-items:center;gap:6px;padding:7px 10px;border-top:1px solid #f0f0ee;font-size:12px;color:#6b6b68;cursor:pointer}
.cdd-add:hover{background:#f5f5f4;color:#1a1a19}
.cdd-add input{flex:1;font-size:12px;padding:4px 8px;border:1px solid #d4d4d0;border-radius:6px;font-family:inherit}

</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="topbar">
      <h1>人員資訊管理系統</h1>
      <small id="todayLabel"></small>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('employee')">在職同仁</button>
      <button class="tab" onclick="switchTab('resigned')">離職同仁</button>
      <button class="tab" onclick="switchTab('interview')">求職者資訊</button>
    </div>
    <div class="main" id="mainContent"></div>
  </div>
</div>
<div id="modalArea"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAg_dfvoxA1dQYqHzdqPtEot8wT-wKZal4",
  authDomain: "liangpinghri.firebaseapp.com",
  projectId: "liangpinghri",
  storageBucket: "liangpinghri.firebasestorage.app",
  messagingSenderId: "410255807470",
  appId: "1:410255807470:web:dc08ba070c7db4f083f4ff"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── 日期 ──
document.getElementById('todayLabel').textContent = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});

// ── 狀態 ──
let tab='employee', selId=null, detailTab='basic', sq='', sf='';
let editMode=null, editTarget=null;
let interviewLocations=[], workLocations=[], titleOptions=[], bankOptions=[];

// ── 民國年轉換工具 ──
// 西元 YYYY-MM-DD → 民國 YYY年MM月DD日
function toROC(dateStr){
  if(!dateStr)return '—';
  const [y,m,d]=dateStr.split('-');
  if(!y||!m||!d)return dateStr;
  return `民國 ${parseInt(y)-1911} 年 ${parseInt(m)} 月 ${parseInt(d)} 日`;
}
// 民國輸入框：顯示民國年，底層儲存西元 YYYY-MM-DD
// 使用自訂輸入：三欄（年/月/日）組合
function rocInputHtml(id, val){
  let yy='',mm='',dd='';
  if(val){const [y,m,d]=val.split('-');yy=y?parseInt(y)-1911:'';mm=m?parseInt(m):'';dd=d?parseInt(d):'';}
  return `<div style="display:flex;gap:4px;align-items:center">
    <input id="${id}-y" type="number" placeholder="年" value="${yy}" style="width:64px;font-size:13px;padding:7px 8px;border:1px solid #d4d4d0;border-radius:8px" oninput="syncROC('${id}')">
    <span style="color:#6b6b68;font-size:12px">年</span>
    <input id="${id}-m" type="number" placeholder="月" min="1" max="12" value="${mm}" style="width:50px;font-size:13px;padding:7px 8px;border:1px solid #d4d4d0;border-radius:8px" oninput="syncROC('${id}')">
    <span style="color:#6b6b68;font-size:12px">月</span>
    <input id="${id}-d" type="number" placeholder="日" min="1" max="31" value="${dd}" style="width:50px;font-size:13px;padding:7px 8px;border:1px solid #d4d4d0;border-radius:8px" oninput="syncROC('${id}')">
    <span style="color:#6b6b68;font-size:12px">日</span>
    <input type="hidden" id="${id}" value="${val||''}">
  </div>`;
}
window.syncROC=function(id){
  const y=parseInt(document.getElementById(id+'-y').value)||'';
  const m=parseInt(document.getElementById(id+'-m').value)||'';
  const d=parseInt(document.getElementById(id+'-d').value)||'';
  if(y&&m&&d){
    const yy=String(y+1911).padStart(4,'0');
    const mm=String(m).padStart(2,'0');
    const dd=String(d).padStart(2,'0');
    document.getElementById(id).value=`${yy}-${mm}-${dd}`;
  }else{document.getElementById(id).value='';}
};
function getROC(id){return document.getElementById(id)?document.getElementById(id).value:'';}

// ── 自製下拉選單 ──
function cddHtml(id, options, value, listName, placeholder='請選擇或新增'){
  const safeId=id.replace(/[^a-zA-Z0-9_]/g,'_');
  return `<div class="cdd" id="cdd-wrap-${safeId}">
    <button type="button" class="cdd-trigger" onclick="cddToggle('${safeId}')">
      <span id="cdd-label-${safeId}" class="${value?'':'cdd-placeholder'}">${value||placeholder}</span>▾
    </button>
    <input type="hidden" id="${id}" value="${value||''}">
    <div class="cdd-menu" id="cdd-menu-${safeId}">
      ${options.map(o=>`<div class="cdd-item${o===value?' selected':''}" onclick="cddSelect('${safeId}','${id}','${o.replace(/'/g,'\\\'')}')">
        <span>${o}</span>
        <button class="cdd-del" onclick="event.stopPropagation();cddDel('${listName}','${o.replace(/'/g,'\\\'')}','${safeId}','${id}')" title="刪除">×</button>
      </div>`).join('')}
      <div class="cdd-add" onclick="event.stopPropagation()">
        <input id="cdd-input-${safeId}" placeholder="輸入後按 ＋ 新增" onkeydown="if(event.key==='Enter'){event.preventDefault();cddAdd('${listName}','${safeId}','${id}')}">
        <button type="button" onclick="cddAdd('${listName}','${safeId}','${id}')" style="background:#1a1a19;color:#fff;border:none;border-radius:5px;padding:3px 10px;cursor:pointer;font-size:12px;white-space:nowrap">＋</button>
      </div>
    </div>
  </div>`;
}
window.cddToggle=function(safeId){
  const menu=document.getElementById('cdd-menu-'+safeId);
  if(!menu)return;
  const open=menu.classList.contains('open');
  document.querySelectorAll('.cdd-menu.open').forEach(m=>m.classList.remove('open'));
  if(!open)menu.classList.add('open');
};
window.cddSelect=function(safeId,inputId,val){
  const inp=document.getElementById(inputId);
  const lbl=document.getElementById('cdd-label-'+safeId);
  const menu=document.getElementById('cdd-menu-'+safeId);
  if(inp)inp.value=val;
  if(lbl){lbl.textContent=val;lbl.classList.remove('cdd-placeholder');}
  if(menu){menu.querySelectorAll('.cdd-item').forEach(i=>i.classList.toggle('selected',i.querySelector('span').textContent===val));menu.classList.remove('open');}
};
window.cddDel=function(listName,val,safeId,inputId){
  if(!confirm(`確定要刪除「${val}」嗎？`))return;
  const maps={interviewLocations,workLocations,titleOptions,bankOptions};
  const arr=maps[listName];if(!arr)return;
  const idx=arr.indexOf(val);if(idx>=0)arr.splice(idx,1);
  saveData();showToast(`已刪除「${val}」`);
  const menu=document.getElementById('cdd-menu-'+safeId);
  if(menu){const item=Array.from(menu.querySelectorAll('.cdd-item')).find(el=>el.querySelector('span')&&el.querySelector('span').textContent===val);if(item)item.remove();}
  const inp=document.getElementById(inputId);
  if(inp&&inp.value===val){inp.value='';const lbl=document.getElementById('cdd-label-'+safeId);if(lbl){lbl.textContent='請選擇或新增';lbl.classList.add('cdd-placeholder');}}
};
window.cddAdd=function(listName,safeId,inputId){
  const cinp=document.getElementById('cdd-input-'+safeId);if(!cinp||!cinp.value.trim())return;
  const n=cinp.value.trim();
  const maps={interviewLocations,workLocations,titleOptions,bankOptions};
  const arr=maps[listName];if(!arr)return;
  if(arr.includes(n)){showToast('此項目已存在');return;}
  arr.push(n);saveData();showToast(`已新增「${n}」`);cinp.value='';
  const menu=document.getElementById('cdd-menu-'+safeId);
  if(menu){
    const addRow=menu.querySelector('.cdd-add');
    const div=document.createElement('div');div.className='cdd-item selected';
    div.innerHTML=`<span>${n}</span><button class="cdd-del" onclick="event.stopPropagation();cddDel('${listName}','${n}','${safeId}','${inputId}')">×</button>`;
    div.onclick=()=>cddSelect(safeId,inputId,n);
    menu.insertBefore(div,addRow);
  }
  cddSelect(safeId,inputId,n);
};
document.addEventListener('click',e=>{if(!e.target.closest('.cdd'))document.querySelectorAll('.cdd-menu.open').forEach(m=>m.classList.remove('open'));});

function showLoading(show) {
  let el=document.getElementById('loadingBar');
  if(!el){el=document.createElement('div');el.id='loadingBar';el.style.cssText='position:fixed;top:0;left:0;right:0;height:3px;background:#1a1a19;z-index:9999;transition:opacity .4s';document.body.appendChild(el);}
  el.style.opacity=show?'1':'0';
}

async function loadData() {
  try {
    showLoading(true);
    const [ivSnap,evSnap,rsSnap,locSnap] = await Promise.all([
      getDoc(doc(db,'hr','interviews')),
      getDoc(doc(db,'hr','employees')),
      getDoc(doc(db,'hr','resigned')),
      getDoc(doc(db,'hr','settings')),
    ]);
    interviews       = ivSnap.exists() ? ivSnap.data().list : [];
    employees        = evSnap.exists() ? evSnap.data().list : [];
    resigned         = rsSnap.exists() ? rsSnap.data().list : [];
    interviewLocations = locSnap.exists() ? (locSnap.data().interviewLocations||[]) : [];
    workLocations      = locSnap.exists() ? (locSnap.data().workLocations||[]) : [];
    titleOptions       = locSnap.exists() ? (locSnap.data().titleOptions||[]) : [];
    bankOptions        = locSnap.exists() ? (locSnap.data().bankOptions||[]) : [];
  } catch(e) {
    console.error(e);
    showToast('載入資料失敗，請重新整理');
    interviews=[]; employees=[]; resigned=[]; interviewLocations=[]; workLocations=[]; titleOptions=[]; bankOptions=[];
  } finally {
    showLoading(false);
  }
}

async function saveData() {
  try {
    await Promise.all([
      setDoc(doc(db,'hr','interviews'),{list:interviews}),
      setDoc(doc(db,'hr','employees'), {list:employees}),
      setDoc(doc(db,'hr','resigned'),  {list:resigned}),
      setDoc(doc(db,'hr','settings'),  {interviewLocations,workLocations,titleOptions,bankOptions}),
    ]);
  } catch(e) {
    console.error(e);
    showToast('儲存失敗，請檢查網路連線');
  }
}

let interviews=[], employees=[], resigned=[];
(async()=>{ await loadData(); render(); })();

// ── Toast ──
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ── 工具函式 ──
const avCls = n => ['av-b','av-t','av-c','av-p','av-a','av-k'][n.charCodeAt(0)%6];
const ini   = n => n.slice(0,2);
const calcYears = d => {
  const ms=Date.now()-new Date(d).getTime();
  const y=Math.floor(ms/31536000000),m=Math.floor((ms%31536000000)/2592000000);
  return y>0?`${y}年${m}個月`:`${m}個月`;
};
const isBadge = s => { const m={錄取:'bg',待通知:'ba',已婉拒:'bgr'}; return`<span class="badge ${m[s]||'bgr'}">${s}</span>` };
const eBadge  = s => { const m={在職:'bt',留職停薪:'ba',離職:'br'}; return`<span class="badge ${m[s]||'bgr'}">${s}</span>` };
const perfBadge = l => { const m={優秀:'bg',良好:'bb',待改善:'ba',不合格:'br'}; return`<span class="badge ${m[l]||'bgr'}">${l}</span>` };
const fitBadge = s => { const m={合適:'bg',尚可:'ba',不佳:'br'}; return`<span class="badge ${m[s]||'bgr'}">${s||'—'}</span>` };

function switchTab(t) { tab=t;selId=null;detailTab='basic';sq='';sf='';render(); }

function getList() {
  const src = tab==='interview' ? interviews : tab==='resigned' ? resigned : employees;
  return src.filter(r => {
    const q=sq.toLowerCase();
    const nm=(r.name+((tab==='interview'?r.location:r.workLocation)||'')+(r.email||'')).toLowerCase().includes(q);
    const st=!sf||r.status===sf;
    return nm&&st;
  });
}

// ── 匯出 JSON ──
function exportJSON() {
  const data = { interviews, employees, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`hr-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
  showToast('備份檔案已下載');
}

// ── 匯入 JSON ──
function importJSON() {
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.interviews&&d.employees){
          interviews=d.interviews;employees=d.employees;saveData();render();showToast('資料匯入成功');
        }else{showToast('檔案格式不正確');}
      }catch{showToast('匯入失敗，請確認檔案格式');}
    };reader.readAsText(f);
  };input.click();
}

function closeModal(){ document.getElementById('modalArea').innerHTML=''; editMode=null; editTarget=null; }

const g = id => { const el=document.getElementById(id); return el?el.value.trim():''; };

async function saveModal(){
  const m=editMode, tid=editTarget;
  if(m==='addInterview'||m==='editInterview'){
    if(!g('m-name')){alert('請填寫姓名');return;}
    const obj={id:tid||Date.now(),name:g('m-name'),location:g('m-location'),date:g('m-date'),source:g('m-source'),fit:g('m-fit'),status:g('m-status'),phone:g('m-phone'),email:g('m-email'),education:g('m-education'),military:g('m-military'),experience:g('m-experience'),note:g('m-note')};
    if(m==='editInterview'){const i=interviews.findIndex(r=>r.id===tid);interviews[i]=obj;}
    else interviews.unshift(obj);
  } else if(m==='addEmployee'||m==='editEmployee'){
    if(!g('m-name')){alert('請填寫姓名');return;}
    const newStatus=g('m-status');
    const empFields={name:g('m-name'),workLocation:g('m-workLocation'),title:g('m-title'),status:newStatus,startDate:getROC('m-startDate'),salary:parseInt(g('m-salary'))||0,phone:g('m-phone'),email:g('m-email'),education:g('m-education'),birthday:getROC('m-birthday'),idNo:g('m-idNo'),empNo:g('m-empNo'),bankName:g('m-bankName'),bankAccount:g('m-bankAccount'),note:g('m-note')};
    if(m==='editEmployee'){
      const r=employees.find(x=>x.id===tid);
      Object.assign(r,empFields);
    } else {
      employees.unshift({id:Date.now(),...empFields,emergency:{name:'',relation:'',phone:''},salaryHistory:[],performance:[],leaves:[],trainings:[]});
    }
  } else if(m==='editInsurance'){
    const r=employees.find(x=>x.id===tid);
    if(!r.insurance)r.insurance={grade:'',dependents:[]};
    r.insurance.grade=g('m-grade');
  } else if(m==='addDependent'){
    if(!g('m-dname')){alert('請填寫眷屬姓名');return;}
    const r=employees.find(x=>x.id===tid);
    if(!r.insurance)r.insurance={grade:'',dependents:[]};
    if(!r.insurance.dependents)r.insurance.dependents=[];
    r.insurance.dependents.push({name:g('m-dname'),idNo:g('m-didNo'),birthday:getROC('m-dbday')});
  } else if(m==='editEmergency'){
    const r=employees.find(x=>x.id===tid);
    r.emergency={name:g('m-ename'),relation:g('m-erel'),phone:g('m-ephone')};
  } else if(m==='addSalary'){
    employees.find(x=>x.id===tid).salaryHistory.push({date:g('m-sdate'),amount:parseInt(g('m-samount'))||0,reason:g('m-sreason')});
  } else if(m==='addBonus'){
    if(!g('m-btitle')){alert('請填寫項目名稱');return;}
    const r=employees.find(x=>x.id===tid);
    if(!r.bonuses)r.bonuses=[];
    r.bonuses.unshift({title:g('m-btitle'),amount:parseInt(g('m-bamount'))||0,status:g('m-bstatus'),date:g('m-bdate')});
  } else if(m==='addTraining'){
    employees.find(x=>x.id===tid).trainings.unshift({date:g('m-tdate'),name:g('m-tname'),hours:parseInt(g('m-thours'))||0,result:g('m-tresult')});
  }

  closeModal();
  render();
  showToast('儲存中...');
  await saveData();
  showToast('已儲存 ✓');
}

async function delRow(id){
  if(!confirm('確定要刪除此筆資料？'))return;
  if(tab==='interview') interviews=interviews.filter(r=>r.id!==id);
  else employees=employees.filter(r=>r.id!==id);
  if(selId===id) selId=null;
  render();
  showToast('刪除中...');
  await saveData();
  showToast('已刪除 ✓');
}

// 把需要從 HTML onclick 呼叫的函式掛到 window
window.switchTab=switchTab;
window.openModal=openModal;
window.closeModal=closeModal;

window.delRow=(id)=>delRow(id);
window.exportJSON=exportJSON;

window.setSq=(v)=>{sq=v;selId=null;render();};
window.setSf=(v)=>{sf=v;selId=null;render();};

// ── 刪除自訂下拉選項 ──
window.delCustomOption=function(listName, selectId){
  const sel=document.getElementById(selectId);
  if(!sel||!sel.value){showToast('請先選擇要刪除的項目');return;}
  const val=sel.value;
  if(!confirm(`確定要刪除「${val}」嗎？`))return;
  const maps={interviewLocations,workLocations,titleOptions,bankOptions};
  const arr=maps[listName];
  if(!arr)return;
  const idx=arr.indexOf(val);
  if(idx>=0)arr.splice(idx,1);
  saveData(); showToast(`已刪除「${val}」`);
  sel.remove(sel.selectedIndex); sel.value='';
};

// ── 獎金相關 ──
window.removeBonus=async function(empId,idx){
  if(!confirm('確定要刪除此筆獎金/補助紀錄？'))return;
  const r=employees.find(x=>x.id===empId); if(!r)return;
  if(!r.bonuses)return;
  r.bonuses.splice(idx,1);
  render(); showToast('儲存中...'); await saveData(); showToast('已刪除 ✓');
};
window.unlockBonusAlert=async function(empId){
  const el=document.getElementById('bonus-unlock-'+empId);
  if(!el)return;
  if(el.value.trim()!=='已發放獎金'){showToast('請輸入正確文字「已發放獎金」');return;}
  const r=employees.find(x=>x.id===empId); if(!r)return;
  r.bonusUnlocked=true;
  render(); showToast('儲存中...'); await saveData(); showToast('提醒已解除 ✓');
};
window.resetBonusAlert=async function(empId){
  const r=employees.find(x=>x.id===empId); if(!r)return;
  r.bonusUnlocked=false;
  render(); await saveData(); showToast('已重置提醒');
};

// ── 刪除眷屬 ──
window.removeDependent=async function(empId,idx){
  if(!confirm('確定要刪除此眷屬資料？'))return;
  const r=employees.find(x=>x.id===empId);
  if(!r||!r.insurance)return;
  r.insurance.dependents.splice(idx,1);
  render(); showToast('儲存中...');
  await saveData(); showToast('已刪除 ✓');
};
window.addLeaveDate=async function(id){
  const r=employees.find(x=>x.id===id); if(!r)return;
  const el=document.getElementById('leave-input-'+id); if(!el||!el.value)return;
  const date=el.value;
  const yr=new Date().getFullYear();
  let stored=r.leaves.find(l=>l.year===yr);
  if(!stored){stored={year:yr,annual:0,usedDates:[],remain:0};r.leaves.unshift(stored);}
  if(!stored.usedDates)stored.usedDates=[];
  if(stored.usedDates.includes(date)){showToast('此日期已登記過');return;}
  stored.usedDates.push(date);
  stored.used=stored.usedDates.length;
  stored.remain=stored.annual-stored.used;
  render(); showToast('儲存中...'); await saveData(); showToast('假日已新增 ✓');
};
window.removeLeaveDate=async function(id,date){
  const r=employees.find(x=>x.id===id); if(!r)return;
  const yr=new Date().getFullYear();
  const stored=r.leaves.find(l=>l.year===yr); if(!stored)return;
  stored.usedDates=(stored.usedDates||[]).filter(d=>d!==date);
  stored.used=stored.usedDates.length;
  stored.remain=stored.annual-stored.used;
  render(); showToast('儲存中...'); await saveData(); showToast('已移除 ✓');
};
window.transferToEmployee=async function(id){
  const r=interviews.find(x=>x.id===id); if(!r)return;
  if(!confirm(`確定要將「${r.name}」轉為在職同仁嗎？\n基本資料會自動帶入，可再到在職同仁頁面補充到職日等資訊。`))return;
  const newEmp={
    id:Date.now(), name:r.name, phone:r.phone||'', email:r.email||'',
    education:r.education||'', workLocation:'', title:'', status:'在職',
    startDate:'', salary:0, birthday:'', idNo:'', empNo:'', bankName:'', bankAccount:'',
    note:r.note||'', emergency:{name:'',relation:'',phone:''},
    salaryHistory:[], performance:[], leaves:[], trainings:[]
  };
  employees.unshift(newEmp);
  interviews=interviews.filter(x=>x.id!==id);
  selId=null; tab='employee';
  render(); showToast('轉移中...');
  await saveData(); showToast(`${r.name} 已轉為在職同仁 ✓`);
};

// ── 新增銀行 ──
function addBank(){
  const name=prompt('請輸入銀行名稱（例：台灣銀行、玉山銀行）：');
  if(!name||!name.trim())return;
  const n=name.trim();
  if(bankOptions.includes(n)){showToast('此銀行已存在');return;}
  bankOptions.push(n);
  saveData();
  showToast(`已新增「${n}」`);
  const sel=document.getElementById('m-bankName');
  if(sel){const opt=document.createElement('option');opt.value=n;opt.textContent=n;opt.selected=true;sel.appendChild(opt);}
}

// ── 更新已使用特休天數 ──
async function updateLeaveUsed(id, annual){
  const r=employees.find(x=>x.id===id);
  if(!r)return;
  const el=document.getElementById('leave-used-'+id);
  if(!el)return;
  const used=Math.max(0,parseInt(el.value)||0);
  const yr=new Date().getFullYear();
  const idx=r.leaves.findIndex(l=>l.year===yr);
  const obj={year:yr,annual,used,remain:annual-used};
  if(idx>=0)r.leaves[idx]=obj; else r.leaves.unshift(obj);
  render();
  showToast('更新中...');
  await saveData();
  showToast('特休已更新 ✓');
}

// ── 離職：移到離職員工 ──
window.resignEmployee=async function(id){
  const r=employees.find(x=>x.id===id);
  if(!r)return;
  const resignDate=prompt('請輸入離職日期（格式：YYYY-MM-DD）：',new Date().toISOString().slice(0,10));
  if(resignDate===null)return;
  const record={...r, status:'離職', resignDate:resignDate.trim()};
  resigned.unshift(record);
  employees=employees.filter(x=>x.id!==id);
  if(selId===id)selId=null;
  render();
  showToast('已移至離職同仁...');
  await saveData();
  showToast('離職記錄已儲存 ✓');
};

// ── 復職 ──
window.restoreEmployee=async function(id){
  const r=resigned.find(x=>x.id===id);
  if(!r)return;
  if(!confirm(`確定要將「${r.name}」復職嗎？`))return;
  const record={...r, status:'在職', resignDate:undefined};
  delete record.resignDate;
  employees.unshift(record);
  resigned=resigned.filter(x=>x.id!==id);
  if(selId===id)selId=null;
  tab='employee';
  render();
  showToast('已復職，移回在職同仁 ✓');
  await saveData();
};

// ── 訪談紀錄 ──
window.saveInterviewMemo=async function(empId){
  const r=employees.find(x=>x.id===empId);if(!r)return;
  const el=document.getElementById('iv-memo-'+empId);if(!el)return;
  if(!r.interviewRecord)r.interviewRecord={memo:'',files:[]};
  r.interviewRecord.memo=el.value;
  showToast('儲存中...'); await saveData(); showToast('備忘錄已儲存 ✓');
};
window.addInterviewFile=async function(empId){
  const nameEl=document.getElementById('iv-fname-'+empId);
  const urlEl=document.getElementById('iv-furl-'+empId);
  if(!nameEl||!urlEl)return;
  const name=nameEl.value.trim();
  const url=urlEl.value.trim();
  if(!name){showToast('請填寫檔案名稱');return;}
  if(!url){showToast('請貼上連結');return;}
  const r=employees.find(x=>x.id===empId);if(!r)return;
  if(!r.interviewRecord)r.interviewRecord={memo:'',files:[]};
  r.interviewRecord.files.push({name,url,date:new Date().toLocaleDateString('zh-TW')});
  nameEl.value=''; urlEl.value='';
  render(); showToast('儲存中...'); await saveData(); showToast('文件連結已新增 ✓');
};
window.deleteInterviewFile=async function(empId,idx){
  if(!confirm('確定要刪除此文件連結？'))return;
  const r=employees.find(x=>x.id===empId);if(!r||!r.interviewRecord)return;
  r.interviewRecord.files.splice(idx,1);
  render(); showToast('刪除中...'); await saveData(); showToast('已刪除 ✓');
};

// ── 刪除離職記錄 ──
window.delResigned=async function(id){
  if(!confirm('確定要永久刪除此離職記錄？'))return;
  resigned=resigned.filter(r=>r.id!==id);
  if(selId===id)selId=null;
  render();
  await saveData();
  showToast('已刪除 ✓');
};
