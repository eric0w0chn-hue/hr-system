<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鑫系統 LIANGPING</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:linear-gradient(135deg,#1E3A8A 0%,#2563EB 60%,#0891B2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:22px;font-weight:800;color:#0F172A;letter-spacing:1px}
.logo p{font-size:13px;color:#64748B;margin-top:4px}
.fr{margin-bottom:14px}
.fr label{display:block;font-size:12px;color:#64748B;margin-bottom:5px;font-weight:500}
.fr input{width:100%;font-size:14px;padding:10px 12px;border:1px solid #E2E8F0;border-radius:10px;color:#0F172A;transition:border-color .15s;font-family:inherit}
.fr input:focus{outline:none;border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn-login{width:100%;background:linear-gradient(135deg,#1E3A8A,#2563EB);color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;letter-spacing:.5px;transition:opacity .15s;font-family:inherit}
.btn-login:hover{opacity:.9}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.err{font-size:12px;color:#DC2626;margin-top:8px;text-align:center;min-height:18px}
.divider{border:none;border-top:1px solid #F1F5F9;margin:20px 0}
.hint{font-size:11px;color:#94A3B8;text-align:center;line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🍗 鑫系統 LIANGPING</h1>
    <p>請輸入帳號密碼登入</p>
  </div>
  <div class="fr">
    <label>身分證號</label>
    <input id="idNo" type="text" placeholder="A123456789" autocomplete="off" maxlength="10">
  </div>
  <div class="fr">
    <label>密碼</label>
    <input id="pwd" type="password" placeholder="民國生日，例：830101">
  </div>
  <div class="err" id="errMsg"></div>
  <button class="btn-login" id="loginBtn" onclick="doLogin()">登入</button>
  <hr class="divider">
  <p class="hint">首次登入密碼為民國生日<br>例：民國83年1月1日 → 830101</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAg_dfvoxA1dQYqHzdqPtEot8wT-wKZal4",
  authDomain: "liangpinghri.firebaseapp.com",
  projectId: "liangpinghri",
  storageBucket: "liangpinghri.firebasestorage.app",
  messagingSenderId: "410255807470",
  appId: "1:410255807470:web:dc08ba070c7db4f083f4ff"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Enter 鍵登入
document.getElementById('pwd').addEventListener('keydown', e => {
  if(e.key === 'Enter') doLogin();
});
document.getElementById('idNo').addEventListener('keydown', e => {
  if(e.key === 'Enter') document.getElementById('pwd').focus();
});

window.doLogin = async function(){
  const idNo = document.getElementById('idNo').value.trim().toUpperCase();
  const pwd  = document.getElementById('pwd').value.trim();
  const err  = document.getElementById('errMsg');
  const btn  = document.getElementById('loginBtn');

  if(!idNo){ err.textContent = '請輸入身分證號'; return; }
  if(!pwd){  err.textContent = '請輸入密碼'; return; }

  err.textContent = '';
  btn.disabled = true;
  btn.textContent = '登入中...';

  try {
    const email = `${idNo.toLowerCase()}@liangpinghri.com`;
    await signInWithEmailAndPassword(auth, email, pwd);
    window.location.href = 'dashboard.html';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '登入';
    if(e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found'){
      err.textContent = '身分證號或密碼錯誤，請確認後重試';
    } else {
      err.textContent = '登入失敗，請稍後再試';
    }
  }
};
</script>
</body>
</html>
