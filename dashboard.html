<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鑫系統 LIANGPING</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#F8FAFC;color:#0F172A;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:linear-gradient(135deg,#1E3A8A 0%,#2563EB 60%,#0891B2 100%);height:62px}
.topbar h1{font-size:18px;font-weight:800;color:#fff;letter-spacing:1px;display:flex;align-items:center;gap:10px}
.topbar h1::before{content:'';display:inline-block;width:4px;height:20px;background:linear-gradient(180deg,#60A5FA,#38BDF8);border-radius:2px}
.topbar-right{display:flex;align-items:center;gap:14px}
.user-info{text-align:right}
.user-info .name{font-size:14px;font-weight:600;color:#fff}
.user-info .id{font-size:11px;color:rgba(255,255,255,.7)}
.btn-logout{font-size:12px;padding:5px 14px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);font-family:inherit;transition:background .15s}
.btn-logout:hover{background:rgba(255,255,255,.25)}
.main{max-width:900px;margin:0 auto;padding:36px 20px}
.greeting{margin-bottom:28px}
.greeting h2{font-size:20px;font-weight:700;color:#0F172A}
.greeting p{font-size:13px;color:#64748B;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.module-card{background:#fff;border-radius:14px;border:1px solid #E2E8F0;padding:24px 20px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:12px;position:relative;box-shadow:0 2px 8px rgba(15,23,42,.04)}
.module-card:hover{border-color:#2563EB;box-shadow:0 8px 24px rgba(37,99,235,.12);transform:translateY(-2px)}
.module-card.disabled{cursor:not-allowed;opacity:.65}
.module-card.disabled:hover{border-color:#E2E8F0;box-shadow:0 2px 8px rgba(15,23,42,.04);transform:none}
.icon-wrap{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.module-card .mod-name{font-size:16px;font-weight:600;color:#0F172A}
.module-card .mod-desc{font-size:12px;color:#64748B;line-height:1.6}
.badge{position:absolute;top:14px;right:14px;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-active{background:#D1FAE5;color:#065F46}
.badge-soon{background:#F1F5F9;color:#475569}
.footer{text-align:center;margin-top:40px;font-size:11px;color:#CBD5E1}
/* 載入中 */
#loading{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:999;font-size:14px;color:#64748B}
</style>
</head>
<body>
<div id="loading">載入中...</div>

<div id="app" style="display:none">
  <div class="topbar">
    <h1>🍗 鑫系統 LIANGPING</h1>
    <div class="topbar-right">
      <div class="user-info">
        <div class="name" id="userName">—</div>
        <div class="id" id="userId">—</div>
      </div>
      <button class="btn-logout" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="main">
    <div class="greeting">
      <h2 id="greetText">歡迎回來</h2>
      <p id="todayText"></p>
    </div>

    <div class="grid">
      <div class="module-card" onclick="goTo('hr.html')">
        <span class="badge badge-active">可使用</span>
        <div class="icon-wrap" style="background:#EFF6FF">👥</div>
        <div class="mod-name">人員資訊</div>
        <div class="mod-desc">員工基本資料、薪資歷程、特休假管理、投保資料</div>
      </div>

      <div class="module-card disabled">
        <span class="badge badge-soon">即將推出</span>
        <div class="icon-wrap" style="background:#ECFEFF">⏱</div>
        <div class="mod-name">打卡系統</div>
        <div class="mod-desc">上下班打卡、異常補打申請、月份出勤記錄</div>
      </div>

      <div class="module-card disabled">
        <span class="badge badge-soon">即將推出</span>
        <div class="icon-wrap" style="background:#FFFBEB">📅</div>
        <div class="mod-name">排班管理</div>
        <div class="mod-desc">班表設定、輪班規則、換班申請</div>
      </div>

      <div class="module-card disabled">
        <span class="badge badge-soon">即將推出</span>
        <div class="icon-wrap" style="background:#F0FDF4">💰</div>
        <div class="mod-name">薪資計算</div>
        <div class="mod-desc">月薪結算、固定獎金、勞健保自負額試算</div>
      </div>
    </div>

    <div class="footer">鑫系統 LIANGPING &nbsp;·&nbsp; <span id="yearText"></span></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAg_dfvoxA1dQYqHzdqPtEot8wT-wKZal4",
  authDomain: "liangpinghri.firebaseapp.com",
  projectId: "liangpinghri",
  storageBucket: "liangpinghri.firebasestorage.app",
  messagingSenderId: "410255807470",
  appId: "1:410255807470:web:dc08ba070c7db4f083f4ff"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

onAuthStateChanged(auth, async user => {
  if(!user){
    window.location.href = 'index.html';
    return;
  }
  // 取得使用者資料
  try {
    const snap = await getDoc(doc(db,'users', user.uid));
    if(snap.exists() && snap.data().disabled === true){
      await signOut(auth);
      window.location.href = 'index.html?disabled=1';
      return;
    }
    const name = snap.exists() ? snap.data().name : '使用者';
    const idNo = user.email.split('@')[0].toUpperCase();
    document.getElementById('userName').textContent = name;
    document.getElementById('userId').textContent = idNo;
    const h = new Date().getHours();
    const gr = h < 12 ? '早安' : h < 18 ? '午安' : '晚安';
    document.getElementById('greetText').textContent = `${gr}，${name} 👋`;
  } catch(e) {
    document.getElementById('userName').textContent = '使用者';
  }
  const now = new Date();
  document.getElementById('todayText').textContent = now.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  document.getElementById('yearText').textContent = now.getFullYear();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
});

window.goTo = function(page){ window.location.href = page; };

window.doLogout = async function(){
  if(!confirm('確定要登出嗎？')) return;
  await signOut(auth);
  window.location.href = 'index.html';
};
</script>
</body>
</html>
