<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鑫系統 LIANGPING</title>
<style>
:root{
  --bg:#F0F2F5;--surface:#FFFFFF;--surface2:#F4F5F8;--border:#DDE1E9;--border2:#C8CDD8;
  --text:#1A1D23;--text2:#5A6175;--text3:#9AA0B4;
  --topbar:#1A1E2E;
  --sidebar:#252A3D;--sidebar2:#2E3450;
  --accent:#2D3142;--accent2:#3D4360;
  --sidebar-w:220px;--topbar-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── Topbar ── */
.topbar{height:var(--topbar-h);background:var(--topbar);display:flex;align-items:center;padding:0 16px;position:fixed;top:0;left:0;right:0;z-index:200;gap:12px;border-bottom:1px solid rgba(255,255,255,.06);box-shadow:0 2px 12px rgba(0,0,0,.25)}
.topbar-brand{display:flex;align-items:center;gap:8px;flex-shrink:0}
.topbar-brand img{width:28px;height:28px;border-radius:6px;object-fit:cover}
.topbar-brand h1{font-size:14px;font-weight:700;color:#fff;letter-spacing:.3px;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:nowrap}
.user-chip{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;background:rgba(255,255,255,.1);border-radius:20px;border:1px solid rgba(255,255,255,.15);flex-shrink:0}
.user-av{width:26px;height:26px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}
.role-badge{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:600;flex-shrink:0}
.role-admin{background:#FFF4E0;color:#C47A00}
.role-consultant{background:#F0EBFF;color:#6741D9}
.role-manager{background:#E6FAF0;color:#087443}
.role-employee{background:#E8EEFF;color:#3B5BDB}
.btn-logout{font-size:11px;padding:5px 10px;border-radius:7px;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.18);font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn-logout:hover{background:rgba(255,255,255,.2)}
.preview-bar{display:flex;gap:2px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:3px;flex-shrink:0}
.preview-btn{font-size:10px;padding:3px 8px;border-radius:5px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.6);font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap}
.preview-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.preview-btn.active.p-admin{background:#FFF4E0;color:#C47A00}
.preview-btn.active.p-consultant{background:#F0EBFF;color:#6741D9}
.preview-btn.active.p-manager{background:#E6FAF0;color:#087443}
.preview-btn.active.p-employee{background:#E8EEFF;color:#3B5BDB}
.menu-toggle{display:none;width:32px;height:32px;align-items:center;justify-content:center;background:rgba(255,255,255,.1);border:none;border-radius:7px;cursor:pointer;color:#fff;font-size:16px;flex-shrink:0}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar-w);background:var(--sidebar);position:fixed;top:var(--topbar-h);left:0;bottom:0;z-index:150;overflow-y:auto;overflow-x:hidden;transition:transform .25s;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.05)}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
.sidebar-greeting{padding:16px 16px 10px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-greeting .greet{font-size:13px;font-weight:600;color:#fff}
.sidebar-greeting .date{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}

/* ── Sidebar groups ── */
.sidebar-group{margin:4px 0}
.sidebar-group-header{display:flex;align-items:center;padding:8px 14px 6px;cursor:pointer;user-select:none;gap:6px;position:relative}
.sidebar-group-header:hover{background:rgba(255,255,255,.06)}
.drag-handle{display:none;cursor:grab;color:rgba(255,255,255,.25);font-size:11px;padding:2px 3px;flex-shrink:0;line-height:1}
.drag-handle:active{cursor:grabbing}
.admin-mode .drag-handle{display:block}
.sidebar-group.dragging-group{opacity:.4}
.sidebar-group.drag-group-over{border-top:2px solid rgba(255,200,50,.6)}
.sidebar-group-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.sidebar-group-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.75);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-chevron{font-size:9px;color:rgba(255,255,255,.4);transition:transform .2s;flex-shrink:0}
.sidebar-group.open .sidebar-chevron{transform:rotate(90deg)}
.sidebar-group-items{overflow:hidden;max-height:0;transition:max-height .25s ease}
.sidebar-group.open .sidebar-group-items{max-height:600px}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 36px;cursor:pointer;transition:background .15s;text-decoration:none;position:relative}
.sidebar-item:hover{background:rgba(255,255,255,.08)}
.sidebar-item.active{background:rgba(255,255,255,.14)}
.sidebar-item .item-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.sidebar-item .item-name{font-size:12px;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item .item-badge{font-size:9px;padding:1px 5px;border-radius:10px;margin-left:auto;flex-shrink:0}
.item-badge.soon{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4)}
.item-badge.admin-only{background:#FFF4E0;color:#C47A00}
.sidebar-divider{height:1px;background:rgba(255,255,255,.07);margin:4px 12px}

/* 群組編輯按鈕（ADMIN 限定） */
.sidebar-group-actions{display:none;gap:3px;flex-shrink:0}
.admin-mode .sidebar-group-actions{display:flex}
.grp-btn{width:20px;height:20px;border-radius:4px;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);transition:background .15s}
.grp-btn:hover{background:rgba(255,255,255,.25);color:#fff}
.grp-btn.del:hover{background:#e24b4a;color:#fff}
/* 新增群組按鈕 */
.sidebar-add-group{margin:8px 12px 4px;padding:7px 10px;border-radius:8px;border:1px dashed rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.5);font-size:11px;cursor:pointer;width:calc(100% - 24px);font-family:inherit;transition:all .15s;text-align:left;display:none}
.admin-mode .sidebar-add-group{display:block}
.sidebar-add-group:hover{border-color:rgba(255,255,255,.5);color:#fff;background:rgba(255,255,255,.06)}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;color:rgba(255,255,255,.3);text-align:center}

/* ── Main content ── */
.main-wrap{margin-left:var(--sidebar-w);padding-top:var(--topbar-h);min-height:100vh}
.main{padding:28px 24px}
.main-header{margin-bottom:24px}
.main-header h2{font-size:20px;font-weight:700;color:var(--text)}
.main-header p{font-size:12px;color:var(--text3);margin-top:4px}
.preview-notice{background:#FFF4E0;border:1px solid #FDDFA0;border-radius:10px;padding:8px 16px;font-size:12px;color:#C47A00;margin-bottom:20px;display:none;align-items:center;gap:8px}
.preview-notice.show{display:flex}

/* ── Module cards grid ── */
.group-section{margin-bottom:32px}
.group-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.group-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.module-card{background:var(--surface);border-radius:13px;border:1px solid var(--border);padding:20px 18px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:12px;position:relative}
.module-card:hover{border-color:var(--border2);box-shadow:0 5px 20px rgba(0,0,0,.07);transform:translateY(-2px)}
.module-card.disabled{cursor:not-allowed;opacity:.5}
.module-card.disabled:hover{border-color:var(--border);box-shadow:none;transform:none}
.card-badge{position:absolute;top:12px;right:12px;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.badge-active{background:#E6FAF0;color:#087443;border:1px solid #ADE8C4}
.badge-soon{background:#F4F5F8;color:#9AA0B4;border:1px solid var(--border)}
.badge-admin{background:#FFF4E0;color:#C47A00;border:1px solid #FDDFA0}
.icon-wrap{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;background:var(--surface2)}
.mod-name{font-size:14px;font-weight:600;color:var(--text)}
.mod-desc{font-size:11px;color:var(--text3);line-height:1.6}

/* ── 彈窗（群組管理 / 功能指派） ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);z-index:500;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:24px;width:min(440px,92vw);max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .18s ease}
@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.modal-header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.modal-title{font-size:15px;font-weight:700;color:var(--text);flex:1}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--surface2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0}
.modal-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:14px}
.modal-label:first-of-type{margin-top:0}
.modal-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;color:var(--text);background:var(--surface2);transition:border .15s}
.modal-input:focus{border-color:var(--accent)}
.modal-emoji-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.emoji-opt{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.emoji-opt:hover{border-color:var(--border2);background:var(--surface)}
.emoji-opt.selected{border-color:var(--accent);background:#eef0ff}
.mod-checklist{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:4px}
.mod-check-item{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .15s;background:var(--surface2)}
.mod-check-item:hover{border-color:var(--border2)}
.mod-check-item.checked{border-color:var(--accent);background:#eef0ff}
.mod-check-item input{accent-color:var(--accent);flex-shrink:0}
.mod-check-item .ci-icon{font-size:14px}
.mod-check-item .ci-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal-btn-row{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.btn-primary{padding:8px 18px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-ghost:hover{background:var(--surface2)}
.btn-danger{padding:8px 14px;border-radius:8px;border:none;background:#fff0f0;color:#e24b4a;font-size:12px;cursor:pointer;font-family:inherit;border:1px solid #ffd0d0;transition:all .15s}
.btn-danger:hover{background:#ffe0e0}

/* ── Hero 品牌區 ── */
.hero-wrap{display:flex;align-items:center;justify-content:center;gap:48px;min-height:calc(100vh - var(--topbar-h) - 80px);padding:40px 24px;flex-wrap:wrap}
.hero-logo-ring{width:140px;height:140px;border-radius:32px;background:linear-gradient(135deg,#f5a623,#e8830a);box-shadow:0 20px 60px rgba(245,166,35,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:floatUp 3s ease-in-out infinite}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hero-logo{width:100px;height:100px;border-radius:22px;display:flex;align-items:center;justify-content:center}
.hero-text{display:flex;flex-direction:column;gap:8px}
.hero-sub{font-size:13px;font-weight:500;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.hero-title{font-size:42px;font-weight:800;color:var(--text);letter-spacing:-1px;line-height:1.1;background:linear-gradient(135deg,var(--accent) 0%,#5a6aab 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-en{font-size:13px;font-weight:600;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.hero-divider{width:48px;height:3px;background:linear-gradient(90deg,var(--accent),transparent);border-radius:2px;margin:12px 0}
.hero-desc{font-size:14px;color:var(--text2);line-height:1.8}
@media(max-width:600px){
  .hero-wrap{gap:28px;min-height:calc(100vh - var(--topbar-h) - 120px);padding:32px 20px}
  .hero-logo-ring{width:100px;height:100px;border-radius:24px}
  .hero-logo{width:72px;height:72px}
  .hero-title{font-size:30px}
  .hero-en{font-size:11px}
  .hero-desc{font-size:13px}
}

/* ── Loading ── */
#loading{position:fixed;inset:0;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Mobile ── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:140}
@media(max-width:768px){
  :root{--sidebar-w:240px}
  .menu-toggle{display:flex}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .main-wrap{margin-left:0}
  .main{padding:20px 14px}
  .preview-bar{display:none!important}
  .user-name{max-width:60px}
  .mod-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div style="font-size:13px;color:#9AA0B4">載入中...</div></div>
<div id="app" style="display:none">

  <!-- Topbar -->
  <div class="topbar">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div class="topbar-brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" width="28" height="28" style="border-radius:6px">
  <rect width="28" height="28" rx="6" fill="#F5A623"/>
  <path d="M9 5 Q10 2 12 3 Q13 2 15 3 Q14 1 16 2 Q18 2 17 5 Q15.5 4 14 5 Q12.5 3.5 10.5 5Z" fill="#C0392B"/>
  <path d="M6 22 Q5 16 8 12 Q10 8 13 6 Q17 4 19.5 6 Q22 8 22 12 Q22 16 20 19 Q23 20 23.5 23 L5.5 23Z" fill="white" opacity="0.95"/>
  <circle cx="18" cy="12" r="3.5" fill="white"/>
  <circle cx="18" cy="12" r="2.5" fill="#C0392B"/>
  <circle cx="19" cy="11" r="0.8" fill="white"/>
  <path d="M20 14 Q22 13 21.5 15 Q20.5 16 20 15Z" fill="#E67E22"/>
  <path d="M7 21 Q6.5 16 8.5 12.5 Q10.5 9 14 8" fill="none" stroke="#F5A623" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
</svg>
      <h1>鑫系統 LIANGPING</h1>
    </div>
    <div class="topbar-right">
      <div class="preview-bar" id="previewBar" style="display:none">
        <button class="preview-btn p-admin" onclick="setPreview('admin')">管理員</button>
        <button class="preview-btn p-consultant" onclick="setPreview('consultant')">顧問</button>
        <button class="preview-btn p-manager" onclick="setPreview('manager')">店長</button>
        <button class="preview-btn p-employee" onclick="setPreview('employee')">同仁</button>
      </div>
      <div class="user-chip">
        <div class="user-av" id="userAv">—</div>
        <div class="user-name" id="userName">—</div>
        <div id="roleLabel"></div>
      </div>
      <button class="btn-logout" onclick="doLogout()">登出</button>
    </div>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-greeting">
      <div class="greet" id="sidebarGreet">歡迎回來</div>
      <div class="date" id="sidebarDate"></div>
    </div>
    <div id="sidebarContent"></div>
    <button class="sidebar-add-group" id="addGroupBtn" onclick="openGroupModal()">＋ 新增群組</button>
    <div class="sidebar-footer">鑫系統 LIANGPING · <span id="yearText"></span></div>
  </div>

  <!-- Main -->
  <div class="main-wrap">
    <div class="main">
      <div class="preview-notice" id="previewNotice">
        <span>👁</span>
        <span id="previewNoticeText">目前為預覽模式</span>
        <span style="margin-left:auto;cursor:pointer;opacity:.7" onclick="setPreview(realRole)">✕ 返回實際視角</span>
      </div>
      <div id="mainContent"></div>
      <!-- Hero 品牌區 -->
      <div class="hero-wrap" id="heroWrap">
        <div class="hero-logo-ring">
          <div class="hero-logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <rect width="120" height="120" rx="26" fill="#F5A623"/>
  <!-- 雞冠 -->
  <path d="M38 22 Q42 10 52 14 Q56 8 64 12 Q60 6 68 10 Q76 8 72 20 Q66 16 60 20 Q54 14 46 22Z" fill="#C0392B"/>
  <!-- 脖子和身體弧線 -->
  <path d="M28 88 Q24 68 32 52 Q38 38 52 30 Q66 24 76 28 Q88 34 90 50 Q92 66 84 78 Q94 82 96 96 L24 96Z" fill="white" opacity="0.95"/>
  <!-- 眼睛外圈 -->
  <circle cx="72" cy="50" r="13" fill="white"/>
  <!-- 眼睛內圈 -->
  <circle cx="72" cy="50" r="9" fill="#C0392B"/>
  <!-- 眼睛高光 -->
  <circle cx="76" cy="46" r="3" fill="white"/>
  <!-- 嘴巴 -->
  <path d="M80 56 Q88 52 86 60 Q82 64 80 60Z" fill="#E67E22"/>
  <!-- 身體左側弧線裝飾 -->
  <path d="M30 90 Q28 70 36 54 Q44 38 58 34" fill="none" stroke="#F5A623" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
</svg></div>
        </div>
        <div class="hero-text">
          <div class="hero-sub">歡迎使用</div>
          <div class="hero-title">輔助管理系統</div>
          <div class="hero-en">LIANGPING Management System</div>
          <div class="hero-divider"></div>
          <div class="hero-desc">整合人事、排班、打卡、菜價等<br>核心業務的一站式管理平台</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 群組設定 Modal -->
<div class="modal-overlay" id="groupModal" onclick="closeModalIfBg(event,'groupModal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="groupModalTitle">新增群組</div>
      <button class="modal-close" onclick="closeModal('groupModal')">✕</button>
    </div>
    <div class="modal-label">群組名稱</div>
    <input class="modal-input" id="groupNameInput" maxlength="16" placeholder="例：每日作業事項">
    <div class="modal-label">群組圖示</div>
    <div class="modal-emoji-row" id="emojiRow"></div>
    <div class="modal-label">包含功能</div>
    <div class="mod-checklist" id="modChecklist"></div>
    <div class="modal-btn-row">
      <button class="btn-danger" id="groupDeleteBtn" style="display:none;margin-right:auto" onclick="deleteCurrentGroup()">刪除群組</button>
      <button class="btn-ghost" onclick="closeModal('groupModal')">取消</button>
      <button class="btn-primary" onclick="saveGroup()">儲存</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyAg_dfvoxA1dQYqHzdqPtEot8wT-wKZal4",authDomain:"liangpinghri.firebaseapp.com",projectId:"liangpinghri",storageBucket:"liangpinghri.firebasestorage.app",messagingSenderId:"410255807470",appId:"1:410255807470:web:dc08ba070c7db4f083f4ff"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const roleNames={admin:'管理員',consultant:'顧問',manager:'店長',employee:'同仁'};
const roleBadgeClass={admin:'role-admin',consultant:'role-consultant',manager:'role-manager',employee:'role-employee'};
let realRole='employee';

// ── 所有功能定義 ──
const ALL_MODULES=[
  {key:'hr',      icon:'👥', name:'人員資訊',  desc:'同仁基本資料、薪資歷程、特休假管理、投保資料', page:'hr.html',active:true},
  {key:'clock',   icon:'⏱',  name:'打卡系統',  desc:'出缺勤紀錄、即時值班、異常管理、臨時打卡',     page:'clock.html',active:true,adminOnly:true},
  {key:'schedule',icon:'📅', name:'排班管理',  desc:'班表設定、輪班規則、換班申請',                 page:'schedule.html',active:true},
  {key:'price',   icon:'🥬', name:'菜價回報',  desc:'每日菜價回報、廠商比價、各店價格同步',         page:'price.html',active:true},
  {key:'device',  icon:'📱', name:'打卡審核',  desc:'裝置綁定申請審核、MAC 白名單管理',             page:'device_approval.html',active:true,adminOnly:true},
  {key:'meeting', icon:'📋', name:'會議紀錄',  desc:'各店會議音檔、文字紀錄、報告文件管理與備份',   page:'meeting.html',active:true},
  {key:'salary',  icon:'💰', name:'薪資計算',  desc:'月薪結算、固定獎金、勞健保自負額試算',         page:'salary.html',active:false,adminOnly:true},
  {key:'account', icon:'🔑', name:'帳號管理',  desc:'帳號角色設定、店面權限管理、帳號停用',         page:'account.html',active:true,adminOnly:true},
  {key:'cctv',    icon:'📹', name:'監視器回報',desc:'每日監視器影片回報、各店回報狀況查閱、未回報追蹤',page:'cctv_report.html',active:true},
];
const VISIBLE_KEYS={
  admin:    ['hr','clock','schedule','price','device','meeting','salary','account','cctv'],
  consultant:['hr','schedule','price','meeting','cctv'],
  manager:  ['hr','schedule','price','meeting','cctv'],
  employee: ['schedule']
};

// ── 預設群組（ADMIN 自訂群組的初始結構）──
const DEFAULT_GROUPS=[
  {id:'g_people',  name:'人事管理',   icon:'👥', keys:['hr','clock','account','salary','device']},
  {id:'g_daily',   name:'每日作業',   icon:'📋', keys:['schedule','price','cctv','meeting']},
];

let _currentUid='';
let _currentRole='';
let _editingGroupId=null;
const EMOJI_LIST=['📋','👥','🏪','⏱','📅','🥬','📱','💰','📹','🔑','🏠','📊','🔔','⚙️','📌','🗂','✅','🚀'];

// ── localStorage helpers ──
function getGroups(uid){ try{return JSON.parse(localStorage.getItem(`sidebarGroups_${uid}`)||'null');}catch{return null;} }
function saveGroups(uid,groups){ try{localStorage.setItem(`sidebarGroups_${uid}`,JSON.stringify(groups));}catch{} }

// ── 取得目前群組（若無則用預設）──
function getCurrentGroups(){
  const saved=getGroups(_currentUid);
  if(saved) return saved;
  return DEFAULT_GROUPS.map(g=>({...g}));
}

// ── renderSidebar & renderMain ──
function renderAll(role){
  _currentRole=role;
  const visKeys=VISIBLE_KEYS[role]||VISIBLE_KEYS['employee'];
  const groups=getCurrentGroups();
  const isAdmin=(realRole==='admin');
  const inPreview=(role!==realRole);

  // sidebar
  const sb=document.getElementById('sidebarContent');
  let sHtml='';
  groups.forEach(g=>{
    const gMods=ALL_MODULES.filter(m=>g.keys.includes(m.key)&&visKeys.includes(m.key));
    if(!gMods.length&&!isAdmin) return; // 非 admin 跳過空群組
    sHtml+=`<div class="sidebar-group" id="sg_${g.id}" data-gid="${g.id}" draggable="true">
      <div class="sidebar-group-header" onclick="toggleGroup('${g.id}')">
        <span class="drag-handle" title="拖拉排序" onclick="event.stopPropagation()">⠿</span>
        <span class="sidebar-group-icon">${g.icon}</span>
        <span class="sidebar-group-name">${g.name}</span>
        <div class="sidebar-group-actions">
          <button class="grp-btn" onclick="event.stopPropagation();editGroup('${g.id}')" title="編輯">✎</button>
        </div>
        <span class="sidebar-chevron">▶</span>
      </div>
      <div class="sidebar-group-items">`;
    gMods.forEach(m=>{
      const badge=m.active?(m.adminOnly?`<span class="item-badge admin-only">管理員</span>`:''):`<span class="item-badge soon">即將推出</span>`;
      const click=m.active?`onclick="goTo('${m.page}')"`:` style="cursor:not-allowed;opacity:.5"`;
      sHtml+=`<div class="sidebar-item" ${click}><span class="item-icon">${m.icon}</span><span class="item-name">${m.name}</span>${badge}</div>`;
    });
    if(!gMods.length) sHtml+=`<div style="padding:6px 14px 6px 36px;font-size:11px;color:rgba(255,255,255,.3)">（無可用功能）</div>`;
    sHtml+=`</div></div><div class="sidebar-divider"></div>`;
  });
  sb.innerHTML=sHtml;
  document.getElementById('sidebar').classList.toggle('admin-mode', isAdmin&&!inPreview);

  // 預設展開第一個群組
  const firstGrp=document.querySelector('.sidebar-group');
  if(firstGrp) firstGrp.classList.add('open');
  // 群組拖拉
  if(isAdmin&&!inPreview) initGroupDrag();

  // main cards
  renderMainCards(role, visKeys, groups);
}

function renderMainCards(role, visKeys, groups){
  // 右側只顯示品牌 Hero，不渲染功能卡片
}

// ── 群組展開/收合 ──
window.toggleGroup=function(id){
  const el=document.getElementById('sg_'+id);
  if(el) el.classList.toggle('open');
};

// ── sidebar mobile toggle ──
window.toggleSidebar=function(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
};
window.closeSidebar=function(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
};

// ── 群組 Modal ──
window.openGroupModal=function(){
  _editingGroupId=null;
  document.getElementById('groupModalTitle').textContent='新增群組';
  document.getElementById('groupNameInput').value='';
  document.getElementById('groupDeleteBtn').style.display='none';
  renderEmojiRow(EMOJI_LIST[0]);
  renderModChecklist([]);
  openModal('groupModal');
};
window.editGroup=function(id){
  const groups=getCurrentGroups();
  const g=groups.find(x=>x.id===id);
  if(!g) return;
  _editingGroupId=id;
  document.getElementById('groupModalTitle').textContent='編輯群組';
  document.getElementById('groupNameInput').value=g.name;
  document.getElementById('groupDeleteBtn').style.display='inline-flex';
  renderEmojiRow(g.icon);
  renderModChecklist(g.keys);
  openModal('groupModal');
};

function renderEmojiRow(selected){
  const visKeys=VISIBLE_KEYS[realRole]||VISIBLE_KEYS['employee'];
  document.getElementById('emojiRow').innerHTML=EMOJI_LIST.map(e=>
    `<div class="emoji-opt${e===selected?' selected':''}" onclick="selectEmoji('${e}')">${e}</div>`
  ).join('');
}
window.selectEmoji=function(e){
  document.querySelectorAll('.emoji-opt').forEach(el=>el.classList.toggle('selected',el.textContent===e));
};

function renderModChecklist(selectedKeys){
  const visKeys=VISIBLE_KEYS[realRole]||VISIBLE_KEYS['employee'];
  const mods=ALL_MODULES.filter(m=>visKeys.includes(m.key));
  document.getElementById('modChecklist').innerHTML=mods.map(m=>{
    const checked=selectedKeys.includes(m.key);
    return `<label class="mod-check-item${checked?' checked':''}" onclick="toggleModCheck(this,'${m.key}')">
      <input type="checkbox" ${checked?'checked':''} style="display:none">
      <span class="ci-icon">${m.icon}</span>
      <span class="ci-name">${m.name}</span>
    </label>`;
  }).join('');
}
window.toggleModCheck=function(el,key){
  el.classList.toggle('checked');
  el.querySelector('input').checked=el.classList.contains('checked');
};

window.saveGroup=function(){
  const name=document.getElementById('groupNameInput').value.trim();
  if(!name){alert('請輸入群組名稱');return;}
  const icon=document.querySelector('.emoji-opt.selected')?.textContent||'📋';
  const keys=[...document.querySelectorAll('.mod-check-item.checked')].map(el=>el.getAttribute('onclick').match(/'([^']+)'\)$/)?.[1]).filter(Boolean);
  const groups=getCurrentGroups();
  if(_editingGroupId){
    const idx=groups.findIndex(g=>g.id===_editingGroupId);
    if(idx>=0){ groups[idx].name=name; groups[idx].icon=icon; groups[idx].keys=keys; }
  } else {
    groups.push({id:'g_'+Date.now(), name, icon, keys});
  }
  saveGroups(_currentUid, groups);
  closeModal('groupModal');
  renderAll(_currentRole);
};

window.deleteCurrentGroup=function(){
  if(!_editingGroupId) return;
  if(!confirm('確定要刪除此群組？（功能本身不會消失）')) return;
  const groups=getCurrentGroups().filter(g=>g.id!==_editingGroupId);
  saveGroups(_currentUid, groups);
  closeModal('groupModal');
  renderAll(_currentRole);
};

// ── Modal helpers ──
window.openModal=function(id){
  const ov=document.getElementById(id);
  ov.style.display='flex';
  requestAnimationFrame(()=>ov.classList.add('show'));
};
window.closeModal=function(id){
  const ov=document.getElementById(id);
  ov.classList.remove('show');
  setTimeout(()=>ov.style.display='none',200);
};
window.closeModalIfBg=function(e,id){
  if(e.target===document.getElementById(id)) closeModal(id);
};

// ── Preview ──
window.setPreview=function(role){
  renderAll(role);
  document.querySelectorAll('.preview-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.querySelector(`.preview-btn.p-${role}`);
  if(btn) btn.classList.add('active');
  const notice=document.getElementById('previewNotice');
  if(role===realRole){ notice.classList.remove('show'); }
  else { notice.classList.add('show'); document.getElementById('previewNoticeText').textContent=`預覽模式：${roleNames[role]} 視角（實際身分：${roleNames[realRole]}）`; }
};

// ── Auth ──
onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='/hr-system/index.html';return;}
  try{ await setDoc(doc(db,'users',user.uid),{lastLoginAt:new Date().toISOString()},{merge:true}); }catch(_){}
  try{
    const snap=await getDoc(doc(db,'users',user.uid));
    const idNo=user.email.split('@')[0].toUpperCase();
    const now=new Date();
    const h=now.getHours();
    const gr=h<12?'早安':h<18?'午安':'晚安';
    if(!snap.exists()){
      document.getElementById('userAv').textContent=idNo.slice(0,1);
      document.getElementById('userName').textContent=idNo;
      document.getElementById('roleLabel').innerHTML='<span class="role-badge role-employee">同仁</span>';
      const greetEl=document.getElementById('greetText');
      if(greetEl) greetEl.textContent=`${gr} 👋`;
      document.getElementById('sidebarGreet').textContent=`${gr} 👋`;
      _currentUid=user.uid; renderAll('employee');
    } else {
      const data=snap.data();
      if(data.disabled){await signOut(auth);window.location.href='/hr-system/index.html?disabled=1';return;}
      const role=data.role||'employee';
      const name=data.name||'使用者';
      realRole=role; _currentUid=user.uid;
      document.getElementById('userAv').textContent=(name||'?').slice(0,1);
      document.getElementById('userName').textContent=name;
      document.getElementById('roleLabel').innerHTML=`<span class="role-badge ${roleBadgeClass[role]||'role-employee'}">${roleNames[role]||role}</span>`;
      const greetEl2=document.getElementById('greetText');
      if(greetEl2) greetEl2.textContent=`${gr}，${name} 👋`;
      document.getElementById('sidebarGreet').textContent=`${gr}，${name} 👋`;
      if(role==='admin'){
        document.getElementById('previewBar').style.display='flex';
        document.querySelector('.preview-btn.p-admin').classList.add('active');
      }
      if(role!=='admin'){
        try{
          const visSnap=await getDoc(doc(db,'price_settings','visibility'));
          const visData=visSnap.exists()?visSnap.data():{};
          const locs=data.locations||[];
          const myStore=locs.length?locs[0]:(data.workLocation||'');
          // price 可見性控制：若被關閉則從 VISIBLE_KEYS 中暫時移除
          if(myStore&&visData[myStore]===false){
            VISIBLE_KEYS[role]=(VISIBLE_KEYS[role]||[]).filter(k=>k!=='price');
          }
        }catch(_){}
      }
      renderAll(role);
    }
  }catch(e){console.error(e); renderAll('employee');}
  const now=new Date();
  const todayEl=document.getElementById('todayText');
  if(todayEl) todayEl.textContent=now.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  document.getElementById('sidebarDate').textContent=now.toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'short'});
  document.getElementById('yearText').textContent=now.getFullYear();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
});
window.goTo=function(page){window.location.href=page;};
window.doLogout=async function(){if(!confirm('確定要登出嗎？'))return;await signOut(auth);window.location.href='/hr-system/index.html';};

// ── 側邊欄群組拖拉排序 ──
function initGroupDrag(){
  const sb = document.getElementById('sidebarContent');
  let dragSrc = null;

  function getGroups(){ return [...sb.querySelectorAll('.sidebar-group[data-gid]')]; }

  sb.querySelectorAll('.sidebar-group[draggable]').forEach(el=>{
    el.addEventListener('dragstart', e=>{
      // 只允許從 drag-handle 啟動
      if(!e.target.classList.contains('drag-handle')&&!e.target.closest('.drag-handle')){ e.preventDefault(); return; }
      dragSrc = el;
      setTimeout(()=>el.classList.add('dragging-group'), 0);
      e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend', ()=>{
      el.classList.remove('dragging-group');
      sb.querySelectorAll('.sidebar-group').forEach(g=>g.classList.remove('drag-group-over'));
      if(!dragSrc) return;
      // 儲存新順序
      const newOrder = getGroups().map(g=>g.dataset.gid);
      const allGroups = getCurrentGroups();
      const sorted = newOrder.map(id=>allGroups.find(g=>g.id===id)).filter(Boolean);
      // 補上不在 sidebar 的群組（空群組）
      allGroups.forEach(g=>{ if(!sorted.find(x=>x.id===g.id)) sorted.push(g); });
      saveGroups(_currentUid, sorted);
      dragSrc = null;
    });
    el.addEventListener('dragover', e=>{
      e.preventDefault();
      if(!dragSrc||el===dragSrc) return;
      sb.querySelectorAll('.sidebar-group').forEach(g=>g.classList.remove('drag-group-over'));
      el.classList.add('drag-group-over');
    });
    el.addEventListener('drop', e=>{
      e.preventDefault();
      if(!dragSrc||el===dragSrc) return;
      el.classList.remove('drag-group-over');
      const cards = getGroups();
      const si = cards.indexOf(dragSrc), ti = cards.indexOf(el);
      if(si < ti) el.after(dragSrc);
      else el.before(dragSrc);
      // 同步更新 divider
      sb.querySelectorAll('.sidebar-divider').forEach(d=>d.remove());
      sb.querySelectorAll('.sidebar-group').forEach(g=>{
        const div = document.createElement('div');
        div.className='sidebar-divider';
        g.after(div);
      });
    });
  });

  // Touch 支援（手機拖拉群組）
  let touchSrc=null, touchClone=null, touchTimer=null;
  sb.querySelectorAll('.sidebar-group[draggable]').forEach(el=>{
    el.addEventListener('touchstart', e=>{
      const handle = e.target.closest('.drag-handle');
      if(!handle) return;
      touchTimer = setTimeout(()=>{
        touchSrc = el;
        el.classList.add('dragging-group');
        if(navigator.vibrate) navigator.vibrate(30);
        const r = el.getBoundingClientRect();
        touchClone = el.cloneNode(true);
        touchClone.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;opacity:.7;pointer-events:none;z-index:9999;background:var(--sidebar2);border-radius:8px;`;
        document.body.appendChild(touchClone);
      }, 350);
    },{passive:true});
    el.addEventListener('touchmove', e=>{
      if(!touchSrc){clearTimeout(touchTimer);return;}
      e.preventDefault();
      const t = e.touches[0];
      if(touchClone){ touchClone.style.top=(t.clientY-20)+'px'; }
      sb.querySelectorAll('.sidebar-group').forEach(g=>g.classList.remove('drag-group-over'));
      if(touchClone) touchClone.style.display='none';
      const el2 = document.elementFromPoint(t.clientX, t.clientY)?.closest('.sidebar-group[data-gid]');
      if(touchClone) touchClone.style.display='';
      if(el2&&el2!==touchSrc) el2.classList.add('drag-group-over');
    },{passive:false});
    el.addEventListener('touchend', e=>{
      clearTimeout(touchTimer);
      if(!touchSrc) return;
      const t = e.changedTouches[0];
      if(touchClone) touchClone.style.display='none';
      const target = document.elementFromPoint(t.clientX, t.clientY)?.closest('.sidebar-group[data-gid]');
      if(touchClone){touchClone.remove();touchClone=null;}
      sb.querySelectorAll('.sidebar-group').forEach(g=>g.classList.remove('drag-group-over'));
      if(target&&target!==touchSrc){
        const cards=getGroups(), si=cards.indexOf(touchSrc), ti=cards.indexOf(target);
        if(si<ti) target.after(touchSrc); else target.before(touchSrc);
        const newOrder=getGroups().map(g=>g.dataset.gid);
        const allGroups=getCurrentGroups();
        const sorted=newOrder.map(id=>allGroups.find(g=>g.id===id)).filter(Boolean);
        allGroups.forEach(g=>{ if(!sorted.find(x=>x.id===g.id)) sorted.push(g); });
        saveGroups(_currentUid, sorted);
      }
      touchSrc.classList.remove('dragging-group');
      touchSrc=null;
    },{passive:true});
  });
}
</script>
