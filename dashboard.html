<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
<link rel="apple-touch-icon" href="/hr-system/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="/hr-system/icons/icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="/hr-system/icons/favicon-32.png">
<link rel="manifest" href="/hr-system/manifest.json">
<meta name="apple-mobile-web-app-title" content="йСЂз≥їзµ±">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2D3142">
<title>йСЂз≥їзµ± LIANGPING</title>
<style>
:root{
  --bg:#F0F2F5;--surface:#FFFFFF;--surface2:#F4F5F8;--border:#DDE1E9;--border2:#C8CDD8;
  --text:#1A1D23;--text2:#5A6175;--text3:#9AA0B4;
  --topbar:#1A1E2E;
  --sidebar:#252A3D;--sidebar2:#2E3450;
  --accent:#2D3142;--accent2:#3D4360;
  --sidebar-w:220px;--topbar-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* вФАвФА Topbar вФАвФА */
.topbar{height:var(--topbar-h);background:var(--topbar);display:flex;align-items:center;padding:0 16px;position:fixed;top:0;left:0;right:0;z-index:200;gap:12px;border-bottom:1px solid rgba(255,255,255,.06);box-shadow:0 2px 12px rgba(0,0,0,.25)}
.topbar-brand{display:flex;align-items:center;gap:8px;flex-shrink:0}
.topbar-brand img{width:28px;height:28px;border-radius:6px;object-fit:cover}
.topbar-brand h1{font-size:14px;font-weight:700;color:#fff;letter-spacing:.3px;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:nowrap}
.user-chip{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;background:rgba(255,255,255,.1);border-radius:20px;border:1px solid rgba(255,255,255,.15);flex-shrink:0}
.user-av{width:26px;height:26px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}
.role-badge{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:600;flex-shrink:0}
.role-admin{background:#FFF4E0;color:#C47A00}
.role-consultant{background:#F0EBFF;color:#6741D9}
.role-manager{background:#E6FAF0;color:#087443}
.role-employee{background:#E8EEFF;color:#3B5BDB}
.btn-logout{font-size:11px;padding:5px 10px;border-radius:7px;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.18);font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn-logout:hover{background:rgba(255,255,255,.2)}
.btn-ann-mgr{width:32px;height:32px;border-radius:7px;cursor:pointer;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-ann-mgr:hover{background:rgba(255,255,255,.22)}
.preview-bar{display:flex;gap:2px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:3px;flex-shrink:0}
.preview-btn{font-size:10px;padding:3px 8px;border-radius:5px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.6);font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap}
.preview-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.preview-btn.active.p-admin{background:#FFF4E0;color:#C47A00}
.preview-btn.active.p-consultant{background:#F0EBFF;color:#6741D9}
.preview-btn.active.p-manager{background:#E6FAF0;color:#087443}
.preview-btn.active.p-employee{background:#E8EEFF;color:#3B5BDB}
.menu-toggle{display:none;width:32px;height:32px;align-items:center;justify-content:center;background:rgba(255,255,255,.1);border:none;border-radius:7px;cursor:pointer;color:#fff;font-size:16px;flex-shrink:0}

/* вФАвФА Sidebar вФАвФА */
.sidebar{width:var(--sidebar-w);background:var(--sidebar);position:fixed;top:var(--topbar-h);left:0;bottom:0;z-index:150;overflow-y:auto;overflow-x:hidden;transition:transform .25s;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.05)}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
.sidebar-greeting{padding:16px 16px 10px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-greeting .greet{font-size:13px;font-weight:600;color:#fff}
.sidebar-greeting .date{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}

/* вФАвФА Sidebar groups вФАвФА */
.sidebar-group{margin:4px 0}
.sidebar-group-header{display:flex;align-items:center;padding:8px 14px 6px;cursor:pointer;user-select:none;gap:6px;position:relative}
.sidebar-group-header:hover{background:rgba(255,255,255,.06)}
.drag-handle{display:none;cursor:grab;color:rgba(255,255,255,.25);font-size:11px;padding:2px 3px;flex-shrink:0;line-height:1}
.drag-handle:active{cursor:grabbing}
.admin-mode .drag-handle{display:block}
.sidebar-group.dragging-group{opacity:.4}
.sidebar-group.drag-group-over{border-top:2px solid rgba(255,200,50,.6)}
.sidebar-group-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0;display:none}
.sidebar-group-header::before{content:'';display:block;width:3px;height:14px;border-radius:2px;background:rgba(255,255,255,.25);flex-shrink:0;transition:background .2s}
.sidebar-group.open>.sidebar-group-header::before{background:rgba(255,255,255,.7)}
.sidebar-group-header:hover::before{background:rgba(255,255,255,.5)}
.sidebar-group-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.75);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-chevron{font-size:9px;color:rgba(255,255,255,.4);transition:transform .2s;flex-shrink:0}
.sidebar-group.open .sidebar-chevron{transform:rotate(90deg)}
.sidebar-group-items{display:grid;grid-template-rows:0fr;transition:grid-template-rows .5s cubic-bezier(.25,.46,.45,.94)}
.sidebar-group.open .sidebar-group-items{grid-template-rows:1fr}
.sidebar-group-items>div{overflow:hidden}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 14px;cursor:pointer;transition:background .15s;text-decoration:none;position:relative}
.sidebar-item:hover{background:rgba(255,255,255,.08)}
.sidebar-item.active{background:rgba(255,255,255,.14)}
.sidebar-item .item-drag-handle{display:none;cursor:grab;color:rgba(255,255,255,.2);font-size:10px;flex-shrink:0;padding:0 2px;line-height:1}
.sidebar-item .item-drag-handle:active{cursor:grabbing}
.admin-mode .sidebar-item[draggable] .item-drag-handle{display:block}
.sidebar-item .item-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0;display:none}
.sidebar-item::before{content:'';display:block;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.25);flex-shrink:0;margin:0 5px;transition:background .15s}
.sidebar-item:hover::before{background:rgba(255,255,255,.6)}
.sidebar-item.active::before{background:#fff}
.sidebar-item .item-name{font-size:12px;color:rgba(255,255,255,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item .item-badge{font-size:9px;padding:1px 5px;border-radius:10px;margin-left:auto;flex-shrink:0}
.sidebar-item.dragging-item{opacity:.35}
.sidebar-item.drag-item-over{border-top:2px solid rgba(255,200,50,.7)}
.item-badge.soon{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4)}
.item-badge.admin-only{background:#FFF4E0;color:#C47A00}
.sidebar-divider{height:1px;background:rgba(255,255,255,.07);margin:4px 12px}

/* зЊ§зµДзЈ®иЉѓжМЙйИХпЉИADMIN йЩРеЃЪпЉЙ */
.sidebar-group-actions{display:none;gap:3px;flex-shrink:0}
.admin-mode .sidebar-group-actions{display:flex}
.grp-btn{width:20px;height:20px;border-radius:4px;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);transition:background .15s}
.grp-btn:hover{background:rgba(255,255,255,.25);color:#fff}
.grp-btn.del:hover{background:#e24b4a;color:#fff}
/* жЦ∞еҐЮзЊ§зµДжМЙйИХ */
.sidebar-add-group{margin:8px 12px 4px;padding:7px 10px;border-radius:8px;border:1px dashed rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.5);font-size:11px;cursor:pointer;width:calc(100% - 24px);font-family:inherit;transition:all .15s;text-align:left;display:none}
.can-edit .sidebar-edit-toggle{display:block}
.admin-mode .sidebar-add-group{display:block}
.sidebar-add-group:hover{border-color:rgba(255,255,255,.5);color:#fff;background:rgba(255,255,255,.06)}
.sidebar-edit-toggle{display:none;margin:10px 12px 4px;padding:7px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);font-size:11px;cursor:pointer;width:calc(100% - 24px);font-family:inherit;transition:all .15s;text-align:left}
.sidebar-edit-toggle:hover{background:rgba(255,255,255,.12);color:#fff}
.sidebar-edit-toggle.active{border-color:rgba(100,200,255,.4);background:rgba(100,200,255,.1);color:rgba(180,230,255,.9)}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;color:rgba(255,255,255,.3);text-align:center}
.sidebar-reset-btn{margin:2px 12px 8px;padding:5px 10px;border-radius:8px;border:1px solid rgba(255,100,100,.25);background:transparent;color:rgba(255,100,100,.5);font-size:10px;cursor:pointer;width:calc(100% - 24px);font-family:inherit;transition:all .15s;text-align:left;display:none}
.admin-mode .sidebar-reset-btn{display:block}
.sidebar-reset-btn:hover{border-color:rgba(255,100,100,.6);color:rgba(255,100,100,.9)}
.sidebar-unassigned-title{font-size:10px;color:rgba(255,180,0,.7);font-weight:600;margin-bottom:6px;letter-spacing:.4px}
.sidebar-unassigned-item{font-size:11px;color:rgba(255,255,255,.4);padding:2px 0;line-height:1.6}

/* вФАвФА Main content вФАвФА */
.main-wrap{margin-left:var(--sidebar-w);padding-top:var(--topbar-h);height:100vh;overflow:hidden}
.main{height:100%;padding:0}
.content-frame{width:100%;height:100%;border:none;display:block;background:var(--bg);opacity:1;transition:opacity .18s ease}
.content-frame.loading{opacity:0}
/* iframe loading overlay */
.iframe-loader{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10}
.iframe-loader.show{opacity:1}
.iframe-loader-bar{width:180px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.iframe-loader-bar::after{content:'';display:block;height:100%;width:40%;background:var(--accent);border-radius:2px;animation:ibar .9s ease-in-out infinite alternate}
@keyframes ibar{from{transform:translateX(-60%)}to{transform:translateX(300%)}}
.iframe-loader-text{font-size:12px;color:var(--text3)}
.main{height:100%;padding:0;position:relative}
.main-header{margin-bottom:24px}
.main-header h2{font-size:20px;font-weight:700;color:var(--text)}
.main-header p{font-size:12px;color:var(--text3);margin-top:4px}
.preview-notice{background:#FFF4E0;border:1px solid #FDDFA0;border-radius:10px;padding:8px 16px;font-size:12px;color:#C47A00;margin-bottom:20px;display:none;align-items:center;gap:8px}
.preview-notice.show{display:flex}

/* вФАвФА Module cards grid вФАвФА */
.group-section{margin-bottom:32px}
.group-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.group-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.module-card{background:var(--surface);border-radius:13px;border:1px solid var(--border);padding:20px 18px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:12px;position:relative}
.module-card:hover{border-color:var(--border2);box-shadow:0 5px 20px rgba(0,0,0,.07);transform:translateY(-2px)}
.module-card.disabled{cursor:not-allowed;opacity:.5}
.module-card.disabled:hover{border-color:var(--border);box-shadow:none;transform:none}
.card-badge{position:absolute;top:12px;right:12px;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.badge-active{background:#E6FAF0;color:#087443;border:1px solid #ADE8C4}
.badge-soon{background:#F4F5F8;color:#9AA0B4;border:1px solid var(--border)}
.badge-admin{background:#FFF4E0;color:#C47A00;border:1px solid #FDDFA0}
.icon-wrap{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;background:var(--surface2)}
.mod-name{font-size:14px;font-weight:600;color:var(--text)}
.mod-desc{font-size:11px;color:var(--text3);line-height:1.6}

/* вФАвФА ељИз™ЧпЉИзЊ§зµДзЃ°зРЖ / еКЯиГљжМЗжіЊпЉЙ вФАвФА */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);z-index:500;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:24px;width:min(440px,92vw);max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .18s ease}
@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.modal-header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.modal-title{font-size:15px;font-weight:700;color:var(--text);flex:1}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--surface2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0}
.modal-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:14px}
.modal-label:first-of-type{margin-top:0}
.modal-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;color:var(--text);background:var(--surface2);transition:border .15s}
.modal-input:focus{border-color:var(--accent)}
.modal-emoji-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.emoji-opt{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.emoji-opt:hover{border-color:var(--border2);background:var(--surface)}
.emoji-opt.selected{border-color:var(--accent);background:#eef0ff}
.mod-checklist{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:4px}
.mod-check-item{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .15s;background:var(--surface2)}
.mod-check-item:hover{border-color:var(--border2)}
.mod-check-item.checked{border-color:var(--accent);background:#eef0ff}
.mod-check-item .ci-check{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:transparent;flex-shrink:0;transition:all .15s}
.mod-check-item.checked .ci-check{background:var(--accent);border-color:var(--accent);color:#fff}
.mod-check-item .ci-icon{font-size:14px}
.mod-check-item .ci-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal-btn-row{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.btn-primary{padding:8px 18px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-ghost:hover{background:var(--surface2)}
.btn-danger{padding:8px 14px;border-radius:8px;border:none;background:#fff0f0;color:#e24b4a;font-size:12px;cursor:pointer;font-family:inherit;border:1px solid #ffd0d0;transition:all .15s}
.btn-danger:hover{background:#ffe0e0}

/* вФАвФА Hero еУБзЙМеНА вФАвФА */
.hero-wrap{display:flex;align-items:center;justify-content:center;gap:48px;min-height:calc(100vh - var(--topbar-h) - 80px);padding:40px 24px;flex-wrap:wrap}
.hero-logo-ring{width:140px;height:140px;border-radius:32px;background:linear-gradient(135deg,#f5a623,#e8830a);box-shadow:0 20px 60px rgba(245,166,35,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:floatUp 3s ease-in-out infinite}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hero-logo{width:100px;height:100px;border-radius:22px;object-fit:cover}
.hero-text{display:flex;flex-direction:column;gap:8px}
.hero-sub{font-size:13px;font-weight:500;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.hero-title{font-size:42px;font-weight:800;color:var(--text);letter-spacing:-1px;line-height:1.1;background:linear-gradient(135deg,var(--accent) 0%,#5a6aab 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-en{font-size:13px;font-weight:600;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.hero-divider{width:48px;height:3px;background:linear-gradient(90deg,var(--accent),transparent);border-radius:2px;margin:12px 0}
.hero-desc{font-size:14px;color:var(--text2);line-height:1.8}
.hero-motto{font-size:13px;color:var(--text3);font-style:italic;margin-top:12px;letter-spacing:.3px}
@media(max-width:600px){
  .hero-wrap{gap:28px;min-height:calc(100vh - var(--topbar-h) - 120px);padding:32px 20px}
  .hero-logo-ring{width:100px;height:100px;border-radius:24px}
  .hero-logo{width:72px;height:72px}
  .hero-title{font-size:30px}
  .hero-en{font-size:11px}
  .hero-desc{font-size:13px}
}

/* вФАвФА еЕђеСКж©ЂеєЕ вФАвФА */
.announce-bar{display:none;align-items:center;gap:10px;background:linear-gradient(90deg,#1a1e2e,#2d3142);border-bottom:1px solid rgba(255,255,255,.08);padding:0 20px;height:38px;overflow:hidden;flex-shrink:0;position:fixed;top:var(--topbar-h);left:0;right:0;z-index:190}
.announce-bar.show{display:flex}
.announce-icon{font-size:14px;flex-shrink:0;opacity:.9}
.announce-track{flex:1;overflow:hidden;position:relative;height:100%}
.announce-text{display:inline-block;white-space:nowrap;font-size:12px;color:rgba(255,255,255,.88);font-weight:500;letter-spacing:.2px;position:absolute;top:50%;left:100%;transform:translateY(-50%);will-change:transform}
@keyframes marqueeScroll{0%{transform:translateX(0) translateY(-50%)}100%{transform:translateX(calc(-100% - 100vw)) translateY(-50%)}}
.announce-close{flex-shrink:0;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);font-size:14px;padding:4px 6px;border-radius:4px;line-height:1;transition:color .15s}
.announce-close:hover{color:rgba(255,255,255,.8)}
.announce-edit-btn{flex-shrink:0;font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.announce-edit-btn:hover{background:rgba(255,255,255,.16);color:#fff}
/* еЕђеСКзЃ°зРЖ Modal */
.ann-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);z-index:600;display:none;align-items:center;justify-content:center}
.ann-overlay.show{display:flex}
.ann-modal{background:var(--surface);border-radius:16px;padding:24px;width:min(460px,92vw);box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .18s ease}
.ann-modal h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.ann-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.ann-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;color:var(--text);background:var(--surface2);resize:vertical;min-height:80px;transition:border .15s}
.ann-input:focus{border-color:var(--accent)}
.ann-toggle-row{display:flex;align-items:center;gap:10px;margin:14px 0}
.ann-toggle-lbl{font-size:13px;color:var(--text2);flex:1}
.ann-toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.ann-toggle input{opacity:0;width:0;height:0;position:absolute}
.ann-slider{position:absolute;inset:0;background:#ccc;border-radius:22px;cursor:pointer;transition:.2s}
.ann-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.ann-toggle input:checked+.ann-slider{background:var(--accent)}
.ann-toggle input:checked+.ann-slider::before{transform:translateX(18px)}
.ann-speed-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.ann-speed-row select{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;background:var(--surface2);color:var(--text);outline:none}
.ann-btn-row{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
@media(max-width:600px){.announce-bar{padding:0 12px;height:34px}.announce-text{font-size:11px}.ann-modal{border-radius:16px 16px 0 0;position:fixed;bottom:0;left:0;right:0;width:100%;border-radius:16px 16px 0 0}.ann-overlay{align-items:flex-end}}

/* вФАвФА Loading вФАвФА */
#loading{position:fixed;inset:0;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* вФАвФА Mobile вФАвФА */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:140}
@media(max-width:768px){
  :root{--sidebar-w:240px}
  .menu-toggle{display:flex}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .main-wrap{margin-left:0}
  .main{padding:0}
  .preview-bar{display:none!important}
  .mod-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .topbar{padding:0 10px;gap:6px}
  .topbar-brand h1{font-size:13px}
  .brand-en{display:none}
  .topbar-right{gap:5px;flex-shrink:1;min-width:0;overflow:hidden}
  .user-chip{padding:3px 7px 3px 3px;gap:4px;min-width:0;flex-shrink:1}
  .user-chip .user-name{max-width:48px;font-size:11px}
  .role-badge{font-size:9px;padding:1px 5px;flex-shrink:0}
  .btn-logout{font-size:10px;padding:4px 8px;white-space:nowrap;flex-shrink:0}
}
</style>
</head>

  const icon=document.querySelector('.emoji-opt.selected')?.textContent||'рЯУЛ';
  const keys=[...document.querySelectorAll('.mod-check-item.checked')].map(el=>el.dataset.key).filter(Boolean);
  const groups=getCurrentGroups();
  if(_editingGroupId){
    const idx=groups.findIndex(g=>g.id===_editingGroupId);
    if(idx>=0){ groups[idx].name=name; groups[idx].icon=icon; groups[idx].keys=keys; }

  closeModal('groupModal');
  renderAll(_currentRole);
};

let _dashSettled=false;
const _dashWatchdog=setTimeout(()=>{
  if(_dashSettled)return;

  if(el)el.innerHTML='<div style="text-align:center;padding:24px;color:#9AA0B4;font-size:14px;line-height:1.8">йА£зЈЪйАЊжЩВпЉМиЂЛж™ҐжЯ•зґ≤иЈѓ<br><button onclick="location.reload()" style="margin-top:12px;padding:10px 24px;font-size:14px;border-radius:8px;border:1px solid #C8CDD8;background:#2D3142;color:#fff;cursor:pointer;font-family:inherit;min-height:44px">вЖї йЗНжЦ∞иЉЙеЕ•</button></div>';
},8000);

onAuthStateChanged(auth,async user=>{
  _dashSettled=true; clearTimeout(_dashWatchdog);
  if(!user){window.location.href='/hr-system/index.html';return;}
  try{ await setDoc(doc(db,'users',user.uid),{lastLoginAt:new Date().toISOString()},{merge:true}); }catch(_){}
  try{
    const snap=await getDoc(doc(db,'users',user.uid));
    const idNo=user.email.split('@')[0].toUpperCase();
    const now=new Date();
    const h=now.getHours();
    const gr=h<12?'жЧ©еЃЙ':h<18?'еНИеЃЙ':'жЩЪеЃЙ';
    if(!snap.exists()){
      document.getElementById('userAv').textContent=idNo.slice(0,1);
      document.getElementById('userName').textContent=idNo;
      document.getElementById('roleLabel').innerHTML='<span class="role-badge role-employee">еРМдїБ</span>';
      const greetEl=document.getElementById('greetText');
      if(greetEl) greetEl.textContent=`${gr} рЯСЛ`;
      document.getElementById('sidebarGreet').textContent=`${gr} рЯСЛ`;
      _currentUid=user.uid;
      await loadGroupsFromFirestore();
      renderAll('employee');
      loadAnnounce('employee');
    } else {
      const data=snap.data();
      if(data.disabled){await signOut(auth);window.location.href='/hr-system/index.html?disabled=1';return;}
      const role=data.role||'employee';
      const name=data.name||'дљњзФ®иАЕ';
      realRole=role; _currentUid=user.uid;
      document.getElementById('userAv').textContent=(name||'?').slice(0,1);
      document.getElementById('userName').textContent=name;
      document.getElementById('roleLabel').innerHTML=`<span class="role-badge ${roleBadgeClass[role]||'role-employee'}">${roleNames[role]||role}</span>`;
      const greetEl2=document.getElementById('greetText');
      if(greetEl2) greetEl2.textContent=`${gr}пЉМ${name} рЯСЛ`;
      document.getElementById('sidebarGreet').textContent=`${gr}пЉМ${name} рЯСЛ`;
      if(role==='admin'){
        document.getElementById('previewBar').style.display='flex';
        document.querySelector('.preview-btn.p-admin').classList.add('active');
        const annBtn = document.getElementById('annMgrBtn');
        if(annBtn) annBtn.style.display='flex';
      }
      if(role!=='admin'){
        try{
          const visSnap=await getDoc(doc(db,'price_settings','visibility'));
          const visData=visSnap.exists()?visSnap.data():{};
          const locs=data.locations||[];
          const myStore=locs.length?locs[0]:(data.workLocation||'');
          // price еПѓи¶ЛжАІжОІеИґпЉЪиЛ•иҐЂйЧЬйЦЙеЙЗеЊЮ VISIBLE_KEYS дЄ≠жЪЂжЩВзІїйЩ§
          if(myStore&&visData[myStore]===false){
            VISIBLE_KEYS[role]=(VISIBLE_KEYS[role]||[]).filter(k=>k!=='price');
          }
        }catch(_){}
        // delivery_report еП™жЬЙе§ЃеїЪпЉИtype='central'пЉЙжЙНй°ѓз§Ї
        // иЛ•дљњзФ®иАЕжЙАе±ђеЇЧйЭҐеЕ®йГ®йГљжШѓйЦАеЄВпЉМеЙЗйЪ±иЧПеН°зЙЗ
        try{
          const permSnap=await getDoc(doc(db,'settings','permissions'));
          const locTypes=(permSnap.exists()?permSnap.data().locationTypes:null)||{};
          const userLocs=data.locations||[];
          const hasCentral=userLocs.some(l=>locTypes[l]==='central');
          if(!hasCentral){
            VISIBLE_KEYS[role]=(VISIBLE_KEYS[role]||[]).filter(k=>k!=='delivery_report');
          }
        }catch(_){}
      }
      await loadGroupsFromFirestore();
      renderAll(role);
      loadAnnounce(role);
    }
  }catch(e){
    console.error('renderAll error:', e);
    try{ renderAll('employee'); }catch(_){}
  } finally {
    const now=new Date();
    const todayEl=document.getElementById('todayText');
    if(todayEl) todayEl.textContent=now.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
    const sidebarDateEl=document.getElementById('sidebarDate');
    if(sidebarDateEl) sidebarDateEl.textContent=now.toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'short'});
    const yearEl=document.getElementById('yearText');
    if(yearEl) yearEl.textContent=now.getFullYear();
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    const _frame = document.getElementById('contentFrame');
    if(_frame) {
      _frame.src = 'welcome.html?embed=1';

// е∞З iframe topbar еКЯиГљжМЙйИХеРМж≠•еИ∞дЄїж°ЖжЮґ topbar
window._syncIframeActions = function(frame){
  const bar = document.getElementById('iframeActionBar');
  if(!bar) return;
  bar.innerHTML = '';
  try{
    const fdoc = frame.contentDocument;
    const fwin = frame.contentWindow;
    // жЙЊ iframe зЪД topbar-right жМЙйИХпЉИжОТйЩ§ back-btn еТМ role-chipпЉЙ
    const btns = fdoc.querySelectorAll('.topbar-right button:not(.back-btn):not(.role-chip)');
    btns.forEach(function(origBtn){
      // жОТйЩ§з©ЇзЩљжМЙйИХ
      const text = origBtn.textContent.trim();
      if(!text || text === 'вАФ') return;
      // еїЇзЂЛдї£зРЖжМЙйИХ
      const proxyBtn = document.createElement('button');
      proxyBtn.textContent = text;
      proxyBtn.className = 'btn btn-sm';
      proxyBtn.style.cssText = 'font-size:12px;padding:4px 12px;min-height:32px;white-space:nowrap;border-radius:7px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);cursor:pointer;font-family:inherit;transition:all .15s';
      // еРМж≠• disabled зЛАжЕЛ
      proxyBtn.disabled = origBtn.disabled;
      origBtn._proxyBtn = proxyBtn;
      // йїЮжУКдї£зРЖ вЖТ иІЄзЩЉ iframe еЕІеОЯеІЛжМЙйИХ
      proxyBtn.addEventListener('click', function(){
        try{ origBtn.click(); }catch(e){}
      });
      // зЫ£иБљ iframe жМЙйИХзЛАжЕЛиЃКеМЦпЉИзФ® MutationObserverпЉЙ
      new MutationObserver(function(){
        proxyBtn.disabled = origBtn.disabled;
        proxyBtn.textContent = origBtn.textContent.trim();
      }).observe(origBtn, {attributes:true, childList:true, subtree:true, characterData:true});
      bar.appendChild(proxyBtn);
    });
  }catch(e){}
};
window.goTo=function(page){
  if(!page) return;
  if(page === 'checkout.html'){ window.location.href = page; return; }
  const frame = document.getElementById('contentFrame');
  const sep = page.includes('?') ? '&' : '?';
  // жПЫй†БеЙНй°ѓз§Ї loading overlay
  const _loader = document.getElementById('iframeLoader');
  if(_loader){ _loader.classList.add('show'); }
  frame.classList.add('loading');
  frame.src = page + sep + 'embed=1&v=4';
  // iframe иЉЙеЕ•еЊМзЫіжО•и®≠ data-embedпЉМзєЮйБО URLSearchParams еЃЙеЕ®йЩРеИґ
  frame.onload = function(){
    try{
      const fdoc = frame.contentDocument;
      fdoc.documentElement.setAttribute('data-embed','1');
      // жКК iframe topbar зЪДеКЯиГљжМЙйИХжРђеИ∞дЄїж°ЖжЮґ
      _syncIframeActions(frame);
    }catch(_){}
    // йЪ±иЧП loading overlay
    if(_loader){ _loader.classList.remove('show'); }
    frame.classList.remove('loading');
  };
  document.querySelectorAll('.sidebar-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.page === page);
  });
  if(window.innerWidth <= 600) window.closeSidebar();
};

// вФАвФА еЕђеСКж©ЂеєЕ вФАвФА
let _annDismissedKey = 'ann_dismissed_v1';

function _setMarqueeDuration(textEl, speedKey){
  // зФ®е≠ЧеЕГжХЄдЉ∞зЃЧжЦЗе≠ЧеѓђеЇ¶пЉИжѓПе≠ЧеЕГзіД14pxпЉЙпЉМдЄНдЊЭи≥і scrollWidth
  const pxPerSec = {28:25, 18:45, 10:80, 6:130}[speedKey] || 45;
  const estTextW = textEl.textContent.length * 14;
  const screenW = window.innerWidth || 390;
  const dur = (screenW + estTextW) / pxPerSec;
  const durStr = Math.max(6, dur).toFixed(1) + 's';
  // йЗНи®≠еЛХзХЂпЉЪеЕИзІїйЩ§еЖНеК†еЫЮпЉМзҐЇдњЭжЦ∞ duration зФЯжХИ
  textEl.style.animation = 'none';
  textEl.style.animationDuration = durStr;
  // еЉЈеИґ reflow еЊМеХЯеЛХ
  void textEl.offsetWidth;
  textEl.style.animation = 'marqueeScroll ' + durStr + ' linear infinite';
}

function _adjustAnnLayout(visible){
  const h = visible ? 38 : 0;
  const mw = document.querySelector('.main-wrap');
  const sb = document.getElementById('sidebar');
  if(mw) mw.style.paddingTop = `calc(var(--topbar-h) + ${h}px)`;
  if(sb) sb.style.top = `calc(var(--topbar-h) + ${h}px)`;
}

async function loadAnnounce(role){
  try{
    const snap = await getDoc(doc(db,'settings','announcement'));
    if(!snap.exists()) return;
    const d = snap.data();
    if(!d.active || !d.text) return;
    // зФ®еЕІеЃєhashеБЪsession keyпЉМйБњеЕНжЦ∞еЕђеСКиҐЂиИКзЪДdismissжУЛдљП
    const hash = btoa(unescape(encodeURIComponent(d.text))).slice(0,16);
    const dismissed = sessionStorage.getItem(_annDismissedKey);
    if(dismissed === hash) return;
    const bar = document.getElementById('announceBar');
    const textEl = document.getElementById('announceText');
    textEl.textContent = d.text;
    bar.classList.add('show');
    _adjustAnnLayout(true);
    // дЊЭжЦЗе≠Чеѓ¶йЪЫеѓђеЇ¶еЛХжЕЛи®ИзЃЧжЩВйЦУпЉМзҐЇдњЭжЙЛж©ЯдєЯиГљеЃМжХіиЈСеЃМ
    _setMarqueeDuration(textEl, d.speed||18);
    // admin жЙНй°ѓз§ЇзЈ®иЉѓжМЙйИХ
    const editBtn = document.getElementById('announceEditBtn');
    if(editBtn) editBtn.style.display = (role==='admin') ? 'inline-block' : 'none';
    bar.dataset.hash = hash;
  }catch(e){ console.warn('loadAnnounce error:', e); }
}

window.dismissAnnounce = function(){
  const bar = document.getElementById('announceBar');
  const hash = bar.dataset.hash || '';
  if(hash) sessionStorage.setItem(_annDismissedKey, hash);
  bar.classList.remove('show');
  _adjustAnnLayout(false);
};

window.openAnnModal = async function(){
  try{
    const snap = await getDoc(doc(db,'settings','announcement'));
    const d = snap.exists() ? snap.data() : {};
    document.getElementById('annText').value = d.text || '';
    document.getElementById('annActive').checked = !!d.active;
    document.getElementById('annSpeed').value = String(d.speed || 18);
  }catch(_){}
  const ov = document.getElementById('annOverlay');
  ov.style.display = 'flex';
  requestAnimationFrame(()=>ov.classList.add('show'));
};
window.closeAnnModal = function(){
  const ov = document.getElementById('annOverlay');
  ov.classList.remove('show');
  setTimeout(()=>ov.style.display='none', 200);
};
window.saveAnnounce = async function(){
  const text = document.getElementById('annText').value.trim();
  const active = document.getElementById('annActive').checked;
  const speed = parseInt(document.getElementById('annSpeed').value) || 18;
  try{
    await setDoc(doc(db,'settings','announcement'),{ text, active, speed, updatedAt: new Date().toISOString() });
    closeAnnModal();
    // жЄЕжОЙ dismissпЉМиЃУжЦ∞еЕђеСКзЂЛеН≥й°ѓз§Ї
    sessionStorage.removeItem(_annDismissedKey);
    const bar = document.getElementById('announceBar');
    bar.classList.remove('show');
    _adjustAnnLayout(false);
    if(active && text){
      const hash = btoa(unescape(encodeURIComponent(text))).slice(0,16);
      bar.dataset.hash = hash;
      const tEl = document.getElementById('announceText');
      tEl.textContent = text;
      bar.classList.add('show');
      _adjustAnnLayout(true);
      _setMarqueeDuration(tEl, speed);
    }
  }catch(e){ alert('еД≤е≠Ше§±жХЧпЉЪ' + e.message); }
};

// вФАвФА зі∞й†ЕжЛЦжЛЙжОТеЇПпЉИADMINпЉЙвФАвФА
function initItemDrag(){
  document.querySelectorAll('.sidebar-group[data-gid]').forEach(grpEl=>{
    const gid = grpEl.dataset.gid;
    const itemsWrap = grpEl.querySelector('.sidebar-group-items');
    if(!itemsWrap) return;
    let dragSrc = null;

    function getItems(){ return [...itemsWrap.querySelectorAll('.sidebar-item[data-key]')]; }

    function saveItemOrder(){
      const newKeys = getItems().map(el=>el.dataset.key);
      // deep copy йБњеЕНзЫіжО•жФє _sharedGroups еПГиАГ
      const groups = JSON.parse(JSON.stringify(getCurrentGroups()));
      const g = groups.find(x=>x.id===gid);
      if(!g) return;
      // дњЭзХЩеЬ®ж≠§зЊ§зµДдљЖдЄНеЬ® sidebar еПѓи¶ЛзЪД key
      const extra = (g.keys||[]).filter(k=>!ALL_MODULES.find(m=>m.key===k&&(VISIBLE_KEYS[_currentRole]||[]).includes(m.key)));
      g.keys = [...newKeys, ...extra];
      // зЂЛеН≥жЫіжЦ∞и®ШжЖґйЂФпЉМеЖНе≠Ш Firestore
      _sharedGroups = groups;
      saveGroupsToFirestore(groups);
    }

    let lastItemMouseTarget = null;

    // mousedown on handle вЖТ еЛХжЕЛеК† draggableпЉМmouseup жЄЕйЩ§
    itemsWrap.addEventListener('mousedown', e=>{
      lastItemMouseTarget = e.target;
      const handle = e.target.closest('.item-drag-handle');
      // еП™жЬЙйїЮеИ∞ handle жЙНиЃУжХіеАЛ item еПѓжЛЦ
      itemsWrap.querySelectorAll('.sidebar-item').forEach(el=>el.removeAttribute('draggable'));
      if(handle){
        const item = handle.closest('.sidebar-item');
        if(item) item.setAttribute('draggable','true');
      }
    });
    window.addEventListener('mouseup', ()=>{
      itemsWrap.querySelectorAll('.sidebar-item[draggable]').forEach(el=>el.removeAttribute('draggable'));
    });

    itemsWrap.querySelectorAll('.sidebar-item').forEach(el=>{
      el.addEventListener('dragstart', e=>{
        const fromHandle = lastItemMouseTarget && lastItemMouseTarget.closest('.item-drag-handle');
        if(!fromHandle){ e.preventDefault(); return; }
        dragSrc = el;
        setTimeout(()=>el.classList.add('dragging-item'), 0);
        e.dataTransfer.effectAllowed='move';
        e.stopPropagation();
      });
      el.addEventListener('dragend', ()=>{
        el.removeAttribute('draggable');
        el.classList.remove('dragging-item');
        itemsWrap.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('drag-item-over'));
        if(dragSrc){ saveItemOrder(); dragSrc=null; }
      });
      el.addEventListener('dragover', e=>{
        e.preventDefault(); e.stopPropagation();
        if(!dragSrc||el===dragSrc) return;
        itemsWrap.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('drag-item-over'));
        el.classList.add('drag-item-over');
      });
      el.addEventListener('drop', e=>{
        e.preventDefault(); e.stopPropagation();
        if(!dragSrc||el===dragSrc) return;
        el.classList.remove('drag-item-over');
        const items=getItems(), si=items.indexOf(dragSrc), ti=items.indexOf(el);
        if(si<ti) el.after(dragSrc); else el.before(dragSrc);
      });
    });

    // Touch жЛЦжЛЙпЉИжЙЛж©ЯпЉЙ
    let tSrc=null, tClone=null, tTimer=null;
    itemsWrap.querySelectorAll('.sidebar-item[draggable]').forEach(el=>{
      el.addEventListener('touchstart', e=>{
        if(!e.target.closest('.item-drag-handle')) return;
        tTimer = setTimeout(()=>{
          tSrc=el; el.classList.add('dragging-item');
          if(navigator.vibrate) navigator.vibrate(25);
          const r=el.getBoundingClientRect();
          tClone=el.cloneNode(true);
          tClone.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;opacity:.7;pointer-events:none;z-index:9999;background:var(--sidebar2);border-radius:6px;`;
          document.body.appendChild(tClone);
        },300);
      },{passive:true});
      el.addEventListener('touchmove', e=>{
        if(!tSrc){clearTimeout(tTimer);return;}
        e.preventDefault(); e.stopPropagation();
        const t=e.touches[0];
        if(tClone) tClone.style.top=(t.clientY-16)+'px';
        itemsWrap.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('drag-item-over'));
        if(tClone) tClone.style.display='none';
        const target=document.elementFromPoint(t.clientX,t.clientY)?.closest('.sidebar-item[data-key]');
        if(tClone) tClone.style.display='';
        if(target&&target!==tSrc) target.classList.add('drag-item-over');
      },{passive:false});
      el.addEventListener('touchend', e=>{
        clearTimeout(tTimer);
        if(!tSrc) return;
        const t=e.changedTouches[0];
        if(tClone) tClone.style.display='none';
        const target=document.elementFromPoint(t.clientX,t.clientY)?.closest('.sidebar-item[data-key]');
        if(tClone){tClone.remove();tClone=null;}
        itemsWrap.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('drag-item-over'));
        if(target&&target!==tSrc){
          const items=getItems(),si=items.indexOf(tSrc),ti=items.indexOf(target);
          if(si<ti) target.after(tSrc); else target.before(tSrc);
          saveItemOrder();
        }
        tSrc.classList.remove('dragging-item'); tSrc=null;
      },{passive:true});
    });
  });
}
function initGroupDrag(){
  const sb = document.getElementById('sidebarContent');
  let dragSrc = null;

  function getGroups(){ return [...sb.querySelectorAll('.sidebar-group[data-gid]')]; }

  let lastMouseTarget = null;
  sb.addEventListener('mousedown', e=>{
    lastMouseTarget = e.target;
    const handle = e.target.closest('.drag-handle');
    sb.querySelectorAll('.sidebar-group').forEach(el=>el.removeAttribute('draggable'));
    if(handle){
      const grp = handle.closest('.sidebar-group');
      if(grp) grp.setAttribute('draggable','true');
    }
  });
  window.addEventListener('mouseup', ()=>{
    sb.querySelectorAll('.sidebar-group[draggable]').forEach(el=>el.removeAttribute('draggable'));
  });

  sb.querySelectorAll('.sidebar-group').forEach(el=>{
    el.addEventListener('dragstart', e=>{
      const fromHandle = lastMouseTarget && lastMouseTarget.closest('.drag-handle');
      if(!fromHandle){ e.preventDefault(); return; }
      dragSrc = el;
      setTimeout(()=>el.classList.add('dragging-group'), 0);
      e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend', ()=>{
      el.classList.remove('dragging-group');
      sb.querySelectorAll('.sidebar-group').forEach(g=>g.classList.remove('drag-group-over'));
      if(!dragSrc) return;
      // еД≤е≠ШжЦ∞й†ЖеЇП
      const newOrder = getGroups().map(g=>g.dataset.gid);
      const allGroups = JSON.parse(JSON.stringify(getCurrentGroups()));
      const sorted = newOrder.map(id=>allGroups.find(g=>g.id===id)).filter(Boolean);
      allGroups.forEach(g=>{ if(!sorted.some(x=>x.id===g.id)) sorted.push(g); });
      _sharedGroups = sorted;
      saveGroupsToFirestore(sorted);
      dragSrc = null;
    });
    el.addEventListener('dragover', e=>{
      e.preventDefault();
      if(!dragSrc||el===dragSrc) return;
      sb.querySelectorAll('.sidebar-group').forEach(g=>g.classList.remove('drag-group-over'));
      el.classList.add('drag-group-over');
    });
    el.addEventListener('drop', e=>{
      e.preventDefault();
      if(!dragSrc||el===dragSrc) return;
      el.classList.remove('drag-group-over');
      const cards = getGroups();
      const si = cards.indexOf(dragSrc), ti = cards.indexOf(el);
      if(si < ti) el.after(dragSrc);
      else el.before(dragSrc);
      // еРМж≠•жЫіжЦ∞ divider
      sb.querySelectorAll('.sidebar-divider').forEach(d=>d.remove());
      sb.querySelectorAll('.sidebar-group').forEach(g=>{
        const div = document.createElement('div');

        g.after(div);
      });
    });
  });

  // Touch жФѓжПіпЉИжЙЛж©ЯжЛЦжЛЙзЊ§зµДпЉЙ
  let touchSrc=null, touchClone=null, touchTimer=null;
  sb.querySelectorAll('.sidebar-group[draggable]').forEach(el=>{
    el.addEventListener('touchstart', e=>{
      const handle = e.target.closest('.drag-handle');
      if(!handle) return;
      touchTimer = setTimeout(()=>{
        touchSrc = el;
        el.classList.add('dragging-group');
        if(navigator.vibrate) navigator.vibrate(30);
        const r = el.getBoundingClientRect();
        touchClone = el.cloneNode(true);
        touchClone.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;opacity:.7;pointer-events:none;z-index:9999;background:var(--sidebar2);border-radius:8px;`;
        document.body.appendChild(touchClone);
      }, 350);
    },{passive:true});
    el.addEventListener('touchmove', e=>{
      if(!touchSrc){clearTimeout(touchTimer);return;}
      e.preventDefault();
      const t = e.touches[0];
      if(touchClone){ touchClone.style.top=(t.clientY-20)+'px'; }
      sb.querySelectorAll('.sidebar-group').forEach(g=>g.classList.remove('drag-group-over'));
      if(touchClone) touchClone.style.display='none';
      const el2 = document.elementFromPoint(t.clientX, t.clientY)?.closest('.sidebar-group[data-gid]');
      if(touchClone) touchClone.style.display='';
      if(el2&&el2!==touchSrc) el2.classList.add('drag-group-over');
    },{passive:false});
    el.addEventListener('touchend', e=>{
      clearTimeout(touchTimer);
      if(!touchSrc) return;
      const t = e.changedTouches[0];
      if(touchClone) touchClone.style.display='none';
      const target = document.elementFromPoint(t.clientX, t.clientY)?.closest('.sidebar-group[data-gid]');
      if(touchClone){touchClone.remove();touchClone=null;}
      sb.querySelectorAll('.sidebar-group').forEach(g=>g.classList.remove('drag-group-over'));
      if(target&&target!==touchSrc){
        const cards=getGroups(), si=cards.indexOf(touchSrc), ti=cards.indexOf(target);
        if(si<ti) target.after(touchSrc); else target.before(touchSrc);
        const newOrder=getGroups().map(g=>g.dataset.gid);
        const allGroups=JSON.parse(JSON.stringify(getCurrentGroups()));
        const sorted=newOrder.map(id=>allGroups.find(g=>g.id===id)).filter(Boolean);
        allGroups.forEach(g=>{ if(!sorted.find(x=>x.id===g.id)) sorted.push(g); });
        _sharedGroups = sorted;
        saveGroupsToFirestore(sorted);
      }
      touchSrc.classList.remove('dragging-group');
      touchSrc=null;
    },{passive:true});
  });
}
