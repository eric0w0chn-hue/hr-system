<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
<title>店內帳號管理 — 鑫系統</title>
<style>
:root{
  --bg:#ECEEF2;--surface:#fff;--surface2:#F4F5F8;--border:#DDE1E9;--border2:#C8CDD8;
  --text:#1A1D23;--text2:#5A6175;--text3:#9AA0B4;--accent:#2D3142;--accent-light:#F0F2F5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text)}

/* Topbar */
.topbar{height:60px;background:var(--accent);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:200;gap:10px}
.topbar-left{display:flex;align-items:center;gap:14px;min-width:0;flex:1;overflow:hidden}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.back-btn{font-size:12px;padding:5px 13px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0}
.back-btn:hover{background:rgba(255,255,255,.2)}
.dv{width:1px;height:20px;background:rgba(255,255,255,.2);flex-shrink:0}
.topbar h1{font-size:16px;font-weight:700;color:#fff;letter-spacing:.5px;display:flex;align-items:center;gap:8px;white-space:nowrap;margin:0}
.role-chip{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);white-space:nowrap}
@media(max-width:600px){.topbar{padding:0 12px;gap:6px}.topbar h1{font-size:14px}.back-btn{font-size:11px;padding:4px 9px}}

/* Loading */
#loading{display:flex;align-items:center;justify-content:center;height:100vh;gap:8px;font-size:13px;color:var(--text3)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

/* Main */
.main{max-width:1000px;margin:0 auto;padding:24px 20px}

/* Store selector */
.store-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.store-btn{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500}
.store-btn:hover{border-color:var(--accent);color:var(--accent)}
.store-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.card-header h2{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
.card-store-name{font-size:12px;color:var(--text3);font-weight:500}

/* Table */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--surface2);color:var(--text2);font-weight:600;padding:9px 12px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}

/* Password toggle */
.pw-cell{display:flex;align-items:center;gap:6px}
.pw-text{font-family:monospace;letter-spacing:.05em}
.pw-hidden{letter-spacing:.1em;color:var(--text3)}
.pw-toggle{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 5px;border-radius:4px;transition:all .15s;line-height:1}
.pw-toggle:hover{background:var(--surface2);color:var(--accent)}

/* Actions */
.btn{font-size:12px;padding:5px 12px;border-radius:7px;cursor:pointer;border:1px solid transparent;font-family:inherit;transition:all .15s;font-weight:500;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#3a3f5c}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border2)}
.btn-ghost:hover{background:var(--surface2);border-color:var(--border);color:var(--text)}
.btn-danger{background:#FEF2F2;color:#DC2626;border-color:#FECACA}
.btn-danger:hover{background:#FEE2E2}
.btn-sm{font-size:11px;padding:3px 9px}
.btns-row{display:flex;gap:6px}

/* Date chip */
.date-chip{font-size:11px;color:var(--text3);background:var(--surface2);border-radius:5px;padding:2px 7px;white-space:nowrap}

/* Modal */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:16px}
.modal-backdrop.show{display:flex}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:440px;box-shadow:0 12px 40px rgba(0,0,0,.18);overflow:hidden}
.modal-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:14px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:none;font-size:18px;color:var(--text3);cursor:pointer;line-height:1;padding:2px 6px;border-radius:5px}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:18px 20px}
.modal-foot{padding:12px 20px 16px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border)}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.form-row input,.form-row select{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s}
.form-row input:focus,.form-row select:focus{border-color:var(--accent)}
.form-row .hint{font-size:11px;color:var(--text3);margin-top:4px}

/* pw-input-wrap */
.pw-input-wrap{position:relative;display:flex;align-items:center}
.pw-input-wrap input{padding-right:36px}
.pw-input-wrap .pw-eye{position:absolute;right:8px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px;line-height:1}

/* empty state */
.empty{text-align:center;padding:36px 20px;color:var(--text3);font-size:13px}
.empty .empty-icon{font-size:32px;display:block;margin-bottom:8px}

/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1D23;color:#fff;font-size:13px;padding:9px 18px;border-radius:10px;z-index:999;opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 管理 modal 使用者列表 */
.mgmt-user-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.mgmt-user-row:last-child{border-bottom:none}
.mgmt-user-name{font-size:13px;font-weight:600;color:var(--text);min-width:80px}
.mgmt-user-role{font-size:11px;color:var(--text3);background:var(--surface2);border-radius:5px;padding:2px 7px;flex-shrink:0}
.mgmt-stores{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.mgmt-store-tag{font-size:11px;padding:3px 9px;border-radius:20px;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:all .15s;user-select:none}
.mgmt-store-tag:hover{border-color:#DC2626;color:#DC2626}
.mgmt-store-tag.hidden{background:#FEF2F2;color:#DC2626;border-color:#FECACA;text-decoration:line-through}
.mgmt-empty{font-size:12px;color:var(--text3);padding:24px 0;text-align:center}

/* section header (store name row) */
.section-name{font-size:13px;font-weight:700;color:var(--text);padding:4px 0 10px;display:flex;align-items:center;gap:6px}
.section-count{font-size:11px;font-weight:500;background:var(--accent-light);color:var(--text2);border-radius:10px;padding:2px 8px}

.btn-icon-ghost{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.8);font-size:18px;padding:4px 8px;border-radius:7px;transition:all .15s;line-height:1;display:flex;align-items:center;justify-content:center;min-height:34px}
.btn-icon-ghost:hover{background:rgba(255,255,255,.15);color:#fff}

/* drag / sort mode */
.drag-handle{cursor:grab;color:var(--text3);padding:0 8px 0 2px;font-size:18px;user-select:none;flex-shrink:0;touch-action:none;display:none}
.drag-handle:active{cursor:grabbing}
tr.sortable .drag-handle{display:inline}
tr.sortable{cursor:grab;background:var(--surface2)!important}
tr.drag-over td{background:#EEF0FF!important}
tr.dragging{opacity:.4}
.sort-toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* btn text switch */
.btn-short{display:none}
@media(max-width:600px){
  .btn-full{display:none}
  .btn-short{display:inline}

  /* Topbar */
  .topbar{padding:0 10px;gap:5px}
  .topbar h1{font-size:13px}
  .back-btn{font-size:11px;padding:0 8px;min-height:36px}
  .role-chip{font-size:10px;padding:2px 7px}
  .btn{font-size:13px;padding:0 10px;min-height:36px}

  /* Main */
  .main{padding:12px}
  .card{padding:0;border-radius:12px;overflow:hidden}
  .card-header{padding:14px 16px 12px;border-bottom:1px solid var(--border)}
  .card-header h2{font-size:13px}

  /* Table → 卡片式 */
  .tbl-wrap{overflow-x:visible}
  table thead{display:none}
  table tbody tr{display:block;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surface)}
  table tbody tr:last-child{border-bottom:none}
  table tbody tr:hover{background:var(--surface)}

  /* 第一欄（項目名稱）當標題 */
  table td:first-child{display:block;font-weight:700;font-size:15px;color:var(--text);padding:0 0 10px;border-bottom:1px solid var(--border);margin-bottom:8px}
  table td:first-child::before{display:none}

  /* 其他欄位左右排列 */
  table td{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:none;font-size:13px;min-height:30px}
  table td::before{content:attr(data-label);font-size:12px;color:var(--text3);font-weight:500;flex-shrink:0;margin-right:8px}

  /* 操作按鈕靠右 */
  .btns-row{justify-content:flex-end}
  .btn.btn-sm{min-height:34px;padding:0 14px;font-size:12px}

  /* Modal 底部滑出 */
  .modal-backdrop{padding:0;align-items:flex-end}
  .modal{border-radius:16px 16px 0 0;max-height:90vh}

  /* 帳號卡片緊湊版 */
  .card{margin-bottom:8px}
  .card-header{padding:10px 12px 8px}
  table tbody tr{padding:6px 12px 8px}
  table td{padding:1px 0;font-size:12px}
  table td::before{font-size:10px;min-width:52px;margin-right:4px}
  table td:first-child{font-size:13px;padding-bottom:3px;margin-bottom:2px}
  .btns-row .btn-sm{min-height:28px;padding:0 10px;font-size:11px}
  .date-chip{font-size:10px;padding:1px 5px}
}
@media(min-width:601px){
  .modal-backdrop{align-items:center;padding:16px}
  .modal{border-radius:14px}
}

/* 手機版帳號收合展開 */
@media(max-width:600px){
  /* 隱藏桌機表格 thead */
  .tbl-wrap table thead{display:none}
  /* 每個 tr 變成卡片列 */
  .tbl-wrap table tbody tr{
    display:block;
    border-bottom:1px solid var(--border);
    padding:0;
    cursor:pointer;
  }
  .tbl-wrap table tbody tr:last-child{border-bottom:none}
  /* 名稱列（第一個 td）─ 永遠顯示，做成標題行 */
  .tbl-wrap table tbody tr td:first-child{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 14px;font-size:14px;font-weight:600;color:var(--text);
    border-bottom:none;
  }
  .tbl-wrap table tbody tr td:first-child::before{display:none}
  /* 展開箭頭 */
  .tbl-wrap table tbody tr td:first-child::after{
    content:'▸';font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0;margin-left:8px;
  }
  .tbl-wrap table tbody tr.acc-open td:first-child::after{
    transform:rotate(90deg);
  }
  /* 其餘 td 預設隱藏 */
  .tbl-wrap table tbody tr td:not(:first-child){
    display:none;padding:4px 14px;font-size:12px;color:var(--text);border-bottom:none;
  }
  .tbl-wrap table tbody tr td:not(:first-child)::before{
    content:attr(data-label);font-size:11px;color:var(--text3);font-weight:500;
    display:inline-block;min-width:56px;margin-right:6px;
  }
  /* 展開後顯示 */
  .tbl-wrap table tbody tr.acc-open td:not(:first-child){
    display:flex;align-items:center;
  }
  /* 最後一個 td（操作）展開後底部留空白 */
  .tbl-wrap table tbody tr.acc-open td:last-child{
    padding-bottom:12px;
  }
  /* 手機版拖拉把手縮小但保留 */
  .drag-handle{font-size:14px;opacity:.5}
  /* card padding 壓縮 */
  .card{margin-bottom:8px;padding:0}
  .card-header{padding:12px 14px 10px}
}
</style>

      document.head.appendChild(s);
      document.documentElement.setAttribute("data-embed","1");
    }
  })();
  </script>
</head>

      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>所屬店面</label>
        <select id="fStore"></select>
      </div>
      <div class="form-row">
        <label>項目名稱 <span style="color:#DC2626">*</span></label>
        <input type="text" id="fName" placeholder="例：監視器、POS 系統、Wi-Fi 路由器…">
      </div>
      <div class="form-row">
        <label>帳號</label>
        <input type="text" id="fAccount" placeholder="輸入帳號">
      </div>
      <div class="form-row">
        <label>密碼</label>
        <div class="pw-input-wrap">
          <input type="password" id="fPassword" placeholder="輸入密碼">
          <button class="pw-eye" onclick="toggleModalPw()" id="btnModalEye">👁</button>
        </div>
      </div>
      <div class="form-row">
        <label>備註（選填）</label>
        <input type="text" id="fNote" placeholder="例：備用密碼、第二組帳號等">
        <div class="hint">修改日期將自動記錄今天</div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEntry()">儲存</button>
    </div>
  </div>
</div>

<!-- 管理 Modal -->
<div class="modal-backdrop" id="mgmtModal">
  <div class="modal" style="max-width:520px">
    <div class="modal-head">
      <h3>⚙ 店面可見性管理</h3>
      <button class="modal-close" onclick="closeMgmt()">✕</button>
    </div>
    <div class="modal-body" style="padding-bottom:4px;max-height:60vh;overflow-y:auto">
      <p style="font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6">點擊店面標籤可切換該使用者在「店內帳號管理」的可見性。<br><span style="color:#DC2626;font-weight:600">劃線紅色</span> = 隱藏，不會看到該店資料。</p>
      <div id="mgmtUserList"><div class="mgmt-empty">載入中…</div></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeMgmt()">關閉</button>
      <button class="btn btn-primary" onclick="saveMgmt()">儲存變更</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { authGuard, db, writeOpLog } from './auth-guard.js?v=4';
import {
  collection, doc, getDocs, getDoc, addDoc, updateDoc, deleteDoc, setDoc, query, where, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
// 店面名稱正規化（異體字容錯：舖/鋪）
function normLoc(s){return (s||'').replace(/鋪/g,'舖').replace(/　/g,' ').trim();}


let _role = '';
let _uid = '';
let _name = '';
let _locations = [];
let _currentStore = null;
let _entries = [];
let _editId = null;
let _db = null;
let _allUsers = [];       // { uid, name, role, locations }
let _hiddenMap = {};      // { uid: [store, ...] } — 從 settings/store_accounts_hidden 讀取
let _hiddenMapDraft = {}; // 管理 modal 編輯中的暫存

// ── pw visibility per row (rowId -> bool) ──
const _pwVisible = {};

authGuard('store_accounts', async ({ user, uid, role, locations, userData, db: dbRef }) => {
  _role = role;
  _uid  = uid;
  _name = userData?.name || '—';
  _locations = locations;
  _db = dbRef;

  // admin 看全部店面
  if (role === 'admin') {
    try {
      const settSnap = await getDoc(doc(dbRef, 'hr', 'settings'));
      const allLocs = settSnap.exists() ? (settSnap.data().workLocations || []) : [];
      if (allLocs.length > 0) _locations = allLocs;
    } catch(e) {
      console.warn('[store_accounts] 無法讀取 hr/settings:', e);
    }
  }

  // 讀取隱藏設定
  try {
    const hidSnap = await getDoc(doc(dbRef, 'settings', 'store_accounts_hidden'));
    _hiddenMap = hidSnap.exists() ? (hidSnap.data() || {}) : {};
  } catch(e) {
    _hiddenMap = {};
  }

  const rc = document.getElementById('roleChip');
  if (rc) rc.textContent = ({admin:'管理員',consultant:'顧問',manager:'店長/副店長',employee:'同仁'})[role]||role;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  if (role === 'employee') {
    document.getElementById('btnAdd').style.display = 'none';
  }

  // admin 才能看管理按鈕，並載入 allUsers
  if (role === 'admin') {
    document.getElementById('btnMgmt').style.display = 'inline-flex';
    try {
      const usersSnap = await getDocs(collection(dbRef, 'users'));
      _allUsers = [];
      usersSnap.forEach(d => {
        const u = d.data();
        if (!u.disabled && (u.role === 'consultant' || u.role === 'manager')) {
          _allUsers.push({ uid: d.id, name: u.name||'', role: u.role||'employee', locations: u.locations||[] });
        }
      });
    } catch(e) {
      console.warn('[store_accounts] 無法載入使用者列表:', e);
    }
  }

  buildStoreBar();
  loadAll();
});

// ── Store Dropdown ──
function buildStoreBar() {
  const myHidden = new Set(_hiddenMap[_uid] || []);
  const visibleLocs = _locations.filter(loc => !myHidden.has(loc));
  const bar = document.getElementById('storeBar');
  const sel = document.getElementById('storeSelect');
  bar.style.display = 'flex';
  if (visibleLocs.length > 1) {
    sel.style.display = 'block';
    sel.innerHTML = `<option value="">🏪 全部店面</option>`
      + visibleLocs.map(loc => `<option value="${esc(loc)}">${esc(loc)}</option>`).join('');
  } else {
    sel.style.display = 'none';
  }
}

window._onStoreChange = function(val) {
  _currentStore = val || null;
  renderEntries();
};

// ── Load from Firestore ──
async function loadAll() {
  try {
    const snap = await getDocs(collection(_db, 'store_accounts'));
    _entries = [];
    snap.forEach(d => _entries.push({ id: d.id, ...d.data() }));
    renderEntries();
  } catch(e) {
    console.error(e);
    showToast('載入失敗：' + e.message);
  }
}

// ── Render ──
function renderEntries() {
  const content = document.getElementById('content');

  // filter by accessible stores
  const accessibleIds = new Set(_locations.map(normLoc));
  // 套用個人隱藏設定
  const myHidden = new Set(_hiddenMap[_uid] || []);
  let list = _entries.filter(e => accessibleIds.has(normLoc(e.store)) && !myHidden.has(e.store));

  // filter by selected store
  if (_currentStore !== null) {
    list = list.filter(e => normLoc(e.store) === normLoc(_currentStore));
  }

  if (list.length === 0) {
    content.innerHTML = `<div class="card"><div class="empty"><span class="empty-icon">🔐</span>尚無帳號資料<br><span style="font-size:12px">點擊右上角「＋ 新增帳號」開始記錄</span></div></div>`;
    return;
  }

  // group by store
  const grouped = {};
  list.forEach(e => {
    if (!grouped[e.store]) grouped[e.store] = [];
    grouped[e.store].push(e);
  });

  let html = '';
  Object.entries(grouped).forEach(([storeId, items]) => {
    const storeName = storeId;
    // sort by sort field, then updatedAt
    items.sort((a,b) => {
      const sa = a.sort ?? 9999, sb = b.sort ?? 9999;
      if (sa !== sb) return sa - sb;
      return (b.updatedAt||'').localeCompare(a.updatedAt||'');
    });
    html += `
    <div class="card">
      <div class="card-header">
        <h2>🏪 <span>${storeName}</span></h2>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="section-count">${items.length} 筆</span>
          ${_role !== 'employee' ? `<button class="btn btn-ghost btn-sm sort-toggle-btn" style="font-size:11px;min-height:28px;padding:0 10px" onclick="event.stopPropagation();_toggleSortMode(this,'${esc(storeId)}')">⇅ 排序</button>` : ''}
        </div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>項目</th>
            <th>帳號</th>
            <th>密碼</th>
            <th>備註</th>
            <th>修改日期</th>
            ${_role !== 'employee' ? '<th style="width:100px">操作</th>' : ''}
          </tr></thead>
          <tbody>
            ${items.map(e => renderRow(e)).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  });
  content.innerHTML = html;
  if (_role !== 'employee') attachDrag();
}

function renderRow(e) {
  const visible = _pwVisible[e.id] || false;
  const pwDisplay = e.password
    ? visible
      ? `<span class="pw-text" id="pw-${e.id}">${esc(e.password)}</span>`
      : `<span class="pw-hidden" id="pw-${e.id}">••••••</span>`
    : `<span style="color:var(--text3)">—</span>`;

  const eyeBtn = e.password
    ? `<button class="pw-toggle" onclick="event.stopPropagation();_togglePw('${e.id}')">${visible ? '🙈' : '👁'}</button>`
    : '';

  const actionCol = _role !== 'employee'
    ? `<td><div class="btns-row">
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();_edit('${e.id}')">編輯</button>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();_del('${e.id}')">刪除</button>
      </div></td>`
    : '';

  return `<tr data-id="${e.id}" data-store="${esc(e.store)}" onclick="_toggleAcc(this)">
    <td>${esc(e.name)}</td>
    <td data-label="帳號"><span style="font-family:monospace">${e.account ? esc(e.account) : '<span style=color:var(--text3)>—</span>'}</span></td>
    <td data-label="密碼" data-pw="${esc(e.password||'')}"><div class="pw-cell">${pwDisplay}${eyeBtn}</div></td>
    <td data-label="備註">${e.note ? esc(e.note) : '<span style=color:var(--text3)>—</span>'}</td>
    <td data-label="修改日期"><span class="date-chip">${e.updatedAt || '—'}</span></td>
    ${_role !== 'employee' ? `<td data-label="操作"><div class="btns-row">
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();_edit('${e.id}')">編輯</button>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();_del('${e.id}')">刪除</button>
      </div></td>` : ''}
  </tr>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// expose to inline onclick

window._toggleAcc = function(tr) {
  tr.classList.toggle('acc-open');
};

window._togglePw = function(id) {
  event.stopPropagation(); // 不觸發 tr 的 toggleAcc
  _pwVisible[id] = !(_pwVisible[id] || false);
  // 只更新密碼顯示，不重新 render 整個列表
  const tr = document.querySelector('tr[data-id="'+id+'"]');
  if(!tr) { renderEntries(); return; }
  const pwTd = tr.querySelector('td[data-label="密碼"]');
  if(!pwTd) return;
  const show = _pwVisible[id];
  const pw = pwTd.dataset.pw || '';
  pwTd.innerHTML = show
    ? `${pw} <button onclick="event.stopPropagation();_togglePw('${id}')" style="background:none;border:none;cursor:pointer;font-size:14px;padding:0 4px">🙈</button>`
    : `<span style="letter-spacing:2px;color:var(--text3)">••••••</span> <button onclick="event.stopPropagation();_togglePw('${id}')" style="background:none;border:none;cursor:pointer;font-size:14px;padding:0 4px">👁</button>`;
};

window._edit = function(id) {
  const e = _entries.find(x => x.id === id);
  if (!e) return;
  _editId = id;
  document.getElementById('modalTitle').textContent = '編輯帳號資料';
  populateStoreSelect(e.store);
  document.getElementById('fName').value = e.name || '';
  document.getElementById('fAccount').value = e.account || '';
  document.getElementById('fPassword').value = e.password || '';
  document.getElementById('fNote').value = e.note || '';
  document.getElementById('fPassword').type = 'password';
  document.getElementById('btnModalEye').textContent = '👁';
  document.getElementById('modal').classList.add('show');
};

window._del = function(id) {
  const e = _entries.find(x => x.id === id);
  if (!e) return;
  if (!confirm(`確定要刪除「${e.name}」的帳號資料？`)) return;
  const _delName = _entries.find(x => x.id === id)?.name || id;
  deleteDoc(doc(_db, 'store_accounts', id))
    .then(() => {
      writeOpLog({ editor:_name, role:_role, module:'store_accounts', action:'刪除店內帳號', detail:_delName });
      _entries = _entries.filter(x => x.id !== id);
      renderEntries();
      showToast('已刪除');
    })
    .catch(err => showToast('刪除失敗：' + err.message));
};

// ── Modal ──
window.openModal = function() {
  _editId = null;
  document.getElementById('modalTitle').textContent = '新增帳號資料';
  populateStoreSelect(null);
  document.getElementById('fName').value = '';
  document.getElementById('fAccount').value = '';
  document.getElementById('fPassword').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('fPassword').type = 'password';
  document.getElementById('btnModalEye').textContent = '👁';
  document.getElementById('modal').classList.add('show');
};

window.closeModal = function() {
  document.getElementById('modal').classList.remove('show');
};

window.toggleModalPw = function() {
  const inp = document.getElementById('fPassword');
  const btn = document.getElementById('btnModalEye');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
};

function populateStoreSelect(selectedStore) {
  const sel = document.getElementById('fStore');
  sel.innerHTML = _locations.map(loc => {
    return `<option value="${esc(loc)}" ${loc === selectedStore ? 'selected' : ''}>${esc(loc)}</option>`;
  }).join('');
}

window.saveEntry = async function() {
  const store = document.getElementById('fStore').value.trim();
  const name  = document.getElementById('fName').value.trim();
  const account = document.getElementById('fAccount').value.trim();
  const password = document.getElementById('fPassword').value;
  const note  = document.getElementById('fNote').value.trim();

  if (!name) { alert('請輸入項目名稱'); return; }
  if (!store) { alert('請選擇店面'); return; }

  const today = new Date().toLocaleDateString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'/');
  const data = { store, name, account, password, note, updatedAt: today };

  try {
    if (_editId) {
      await updateDoc(doc(_db, 'store_accounts', _editId), data);
      writeOpLog({ editor:_name, role:_role, module:'store_accounts', action:'編輯店內帳號', detail:`${store} ${name}` });
      const idx = _entries.findIndex(x => x.id === _editId);
      if (idx >= 0) _entries[idx] = { id: _editId, ...data };
      showToast('已更新');
    } else {
      const ref = await addDoc(collection(_db, 'store_accounts'), data);
      writeOpLog({ editor:_name, role:_role, module:'store_accounts', action:'新增店內帳號', detail:`${store} ${name}` });
      _entries.push({ id: ref.id, ...data });
      showToast('已新增');
    }
    closeModal();
    renderEntries();
  } catch(e) {
    showToast('儲存失敗：' + e.message);
  }
};

// close on backdrop click
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ── 管理 Modal ──
window.openMgmt = function() {
  _hiddenMapDraft = JSON.parse(JSON.stringify(_hiddenMap));
  renderMgmtList();
  document.getElementById('mgmtModal').classList.add('show');
};

window.closeMgmt = function() {
  document.getElementById('mgmtModal').classList.remove('show');
};

document.getElementById('mgmtModal').addEventListener('click', e => {
  if (e.target === document.getElementById('mgmtModal')) closeMgmt();
});

function renderMgmtList() {
  const wrap = document.getElementById('mgmtUserList');
  if (!_allUsers.length) {
    wrap.innerHTML = '<div class="mgmt-empty">無使用者資料</div>';
    return;
  }
  const roleLabel = {consultant:'顧問', manager:'店長/副店長', employee:'同仁'};
  wrap.innerHTML = _allUsers.map(u => {
    const hidden = new Set(_hiddenMapDraft[u.uid] || []);
    // 顯示該使用者有權限的店面（自己的 locations）
    const userLocs = u.locations.length ? u.locations : _locations;
    const tags = userLocs.map(loc => {
      const isHidden = hidden.has(loc);
      return `<span class="mgmt-store-tag${isHidden?' hidden':''}" data-uid="${u.uid}" data-loc="${esc(loc)}" onclick="_toggleHidden(this)">${esc(loc)}</span>`;
    }).join('');
    return `<div class="mgmt-user-row">
      <span class="mgmt-user-name">${esc(u.name)}</span>
      <span class="mgmt-user-role">${roleLabel[u.role]||u.role}</span>
      <div class="mgmt-stores">${tags || '<span style="font-size:12px;color:var(--text3)">無店面</span>'}</div>
    </div>`;
  }).join('');
}

window._toggleHidden = function(el) {
  const uid = el.dataset.uid;
  const loc = el.dataset.loc;
  if (!_hiddenMapDraft[uid]) _hiddenMapDraft[uid] = [];
  const arr = _hiddenMapDraft[uid];
  const idx = arr.indexOf(loc);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.push(loc);
  el.classList.toggle('hidden');
};

window.saveMgmt = async function() {
  try {
    // 清掉空陣列的 key
    const toSave = {};
    Object.entries(_hiddenMapDraft).forEach(([uid, arr]) => {
      if (arr.length > 0) toSave[uid] = arr;
    });
    await setDoc(doc(_db, 'settings', 'store_accounts_hidden'), toSave);
    _hiddenMap = JSON.parse(JSON.stringify(_hiddenMapDraft));
    closeMgmt();
    renderEntries();
    showToast('✅ 已儲存');
  } catch(e) {
    showToast('儲存失敗：' + e.message);
  }
};

// ── Drag & Drop 排序 ──
let _dragSrc = null;

// 開啟/關閉某店的排序模式
window._toggleSortMode = function(btn, storeId) {
  const card = btn.closest('.card');
  const rows = [...card.querySelectorAll('tr[data-id]')];
  const isOn = btn.classList.toggle('active');
  rows.forEach(row => {
    if (isOn) {
      row.classList.add('sortable');
      row.setAttribute('draggable', 'true');
      row.onclick = null; // 排序模式關閉展開
      // 確保 drag handle 存在
      const td = row.querySelector('td:first-child');
      if (!td.querySelector('.drag-handle')) {
        const h = document.createElement('span');
        h.className = 'drag-handle';
        h.textContent = '⠿';
        td.prepend(h);
      }
    } else {
      row.classList.remove('sortable');
      row.setAttribute('draggable', 'false');
      row.onclick = () => _toggleAcc(row);
    }
  });
  btn.textContent = isOn ? '✓ 完成' : '⇅ 排序';
  if (!isOn) saveSortOrder(card.querySelector('tbody'));
  attachDragToCard(card);
};

function attachDrag() {
  document.querySelectorAll('#content .card').forEach(card => attachDragToCard(card));
}

function attachDragToCard(card) {
  card.querySelectorAll('tr[data-id]').forEach(row => {
    // 避免重複綁定
    if (row._dragBound) return;
    row._dragBound = true;

    // desktop
    row.addEventListener('dragstart', e => {
      if (!row.classList.contains('sortable')) { e.preventDefault(); return; }
      _dragSrc = row;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      card.querySelectorAll('tr.drag-over').forEach(r => r.classList.remove('drag-over'));
    });
    row.addEventListener('dragover', e => {
      if (!row.classList.contains('sortable')) return;
      e.preventDefault();
      if (_dragSrc && _dragSrc !== row) {
        card.querySelectorAll('tr.drag-over').forEach(r => r.classList.remove('drag-over'));
        row.classList.add('drag-over');
        const tbody = row.closest('tbody');
        const rows = [...tbody.querySelectorAll('tr')];
        const si = rows.indexOf(_dragSrc), ti = rows.indexOf(row);
        if (si < ti) tbody.insertBefore(_dragSrc, row.nextSibling);
        else tbody.insertBefore(_dragSrc, row);
      }
    });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => { e.preventDefault(); row.classList.remove('drag-over'); });

    // mobile touch
    let _ty = 0, _dragging = false;
    row.addEventListener('touchstart', e => {
      if (!row.classList.contains('sortable')) return;
      _ty = e.touches[0].clientY;
      _dragging = true;
      _dragSrc = row;
      row.classList.add('dragging');
    }, {passive:true});
    row.addEventListener('touchmove', e => {
      if (!_dragging) return;
      e.preventDefault();
      const y = e.touches[0].clientY;
      const tbody = row.closest('tbody');
      const rows = [...tbody.querySelectorAll('tr')];
      for (const r of rows) {
        const rect = r.getBoundingClientRect();
        if (y >= rect.top && y <= rect.bottom && r !== _dragSrc) {
          const si = rows.indexOf(_dragSrc), ti = rows.indexOf(r);
          if (si < ti) tbody.insertBefore(_dragSrc, r.nextSibling);
          else tbody.insertBefore(_dragSrc, r);
          break;
        }
      }
    }, {passive:false});
    row.addEventListener('touchend', () => {
      if (!_dragging) return;
      row.classList.remove('dragging');
      _dragging = false;
      _dragSrc = null;
    });
  });
}

async function saveSortOrder(tbody) {
  const rows = [...tbody.querySelectorAll('tr[data-id]')];
  const updates = rows.map((r, i) => ({ id: r.dataset.id, sort: i }));
  // update local _entries
  updates.forEach(({id, sort}) => {
    const e = _entries.find(x => x.id === id);
    if (e) e.sort = sort;
  });
  // batch write to Firestore
  try {
    await Promise.all(updates.map(({id, sort}) =>
      updateDoc(doc(_db, 'store_accounts', id), { sort })
    ));
  } catch(e) {
    console.warn('排序儲存失敗', e);
  }
}

// ── Toast ──
function showToast(msg, ms=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}
</script>
</body>
</html>
