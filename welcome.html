<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歡迎 — 鑫系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  background:#F0F2F5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.hero{display:flex;align-items:center;gap:32px;padding:40px 24px;flex-wrap:wrap;justify-content:center}
.hero-logo-ring{width:110px;height:110px;border-radius:28px;overflow:hidden;box-shadow:0 8px 32px rgba(45,49,66,.15);flex-shrink:0}
.hero-logo{width:100%;height:100%;object-fit:cover}
.hero-text{max-width:320px}
.hero-sub{font-size:12px;color:#9AA0B4;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase}
.hero-title{font-size:28px;font-weight:800;color:#1A1D23;line-height:1.2}
.hero-en{font-size:11px;color:#9AA0B4;letter-spacing:2px;margin-top:4px}
.hero-divider{width:36px;height:3px;background:#2D3142;border-radius:2px;margin:14px 0}
.hero-desc{font-size:13px;color:#5A6175;line-height:1.7}
.hero-motto{font-size:12px;color:#9AA0B4;margin-top:12px;font-style:italic}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-logo-ring">
    <img class="hero-logo" src="icons/icon-180.png" onerror="this.style.background='#2D3142';this.style.display='block'" alt="鑫系統">
  </div>
  <div class="hero-text">
    <div class="hero-sub">歡迎使用</div>
    <div class="hero-title">輔助管理系統</div>
    <div class="hero-en">LIANGPING MANAGEMENT SYSTEM</div>
    <div class="hero-divider"></div>
    <div class="hero-desc">整合人事、排班、各項回報事宜等<br>核心業務的一站式管理平台</div>
    <div class="hero-motto">「你敢建議、我敢嘗試。」</div>
  </div>
</div>
</body>
</html>
