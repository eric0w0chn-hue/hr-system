<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歡迎 — 鑫系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
  background:#F0F2F5;min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;
  top:5%;left:50%;transform:translateX(-50%);
  width:480px;height:480px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,170,0,.13) 0%,transparent 70%);
  pointer-events:none;
}
.hero-logo-wrap{
  position:relative;margin-bottom:44px;
}
.hero-logo-glow{
  position:absolute;inset:-20px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,165,0,.28) 0%,transparent 68%);
  filter:blur(18px);
}
.hero-logo-ring{
  width:140px;height:140px;border-radius:36px;
  overflow:hidden;position:relative;z-index:1;
  box-shadow:0 24px 64px rgba(45,49,66,.16),0 4px 16px rgba(45,49,66,.08);
}
.hero-logo{width:100%;height:100%;object-fit:cover;display:block}
.hero-text{text-align:center;max-width:480px}
.hero-sub{
  font-size:13px;color:#9AA0B4;
  margin-bottom:10px;letter-spacing:.5px;
}
.hero-title{
  font-size:42px;font-weight:800;
  line-height:1.15;letter-spacing:-1px;
  margin-bottom:10px;
  background:linear-gradient(135deg,#1A1D23 0%,#3D4158 40%,#6B7280 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero-en{
  font-size:11px;font-weight:600;
  color:#C8CDD8;letter-spacing:3.5px;
  text-transform:uppercase;margin-bottom:20px;
}
.hero-divider{
  width:40px;height:3px;
  background:linear-gradient(90deg,#2D3142,#9AA0B4);
  border-radius:2px;margin:0 auto 20px;
}
.hero-desc{
  font-size:14px;color:#5A6175;
  line-height:1.9;margin-bottom:24px;
}
.hero-motto{
  font-size:13px;color:#9AA0B4;
  font-style:italic;letter-spacing:.3px;
}
.hero-version{
  position:fixed;bottom:20px;
  font-size:10px;color:#C8CDD8;letter-spacing:.5px;
}
@media(max-width:480px){
  .hero-logo-ring{width:110px;height:110px;border-radius:28px}
  .hero-title{font-size:32px}
  .hero-logo-wrap{margin-bottom:36px}
}
</style>
</head>
