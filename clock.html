<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打卡系統 — 鑫系統</title>
<style>
:root{
  --bg:#ECEEF2;--surface:#fff;--surface2:#F4F5F8;--border:#DDE1E9;--border2:#C8CDD8;
  --text:#1A1D23;--text2:#5A6175;--text3:#9AA0B4;--accent:#2D3142;--accent-light:#F0F2F5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}







.main{max-width:960px;margin:0 auto;padding:32px 20px}

.page-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.module-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:24px 20px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:14px;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.module-card:hover{border-color:var(--border2);box-shadow:0 6px 24px rgba(0,0,0,.08);transform:translateY(-2px)}
.module-card.disabled{cursor:not-allowed;opacity:.5}
.module-card.disabled:hover{border-color:var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04);transform:none}
.icon-wrap{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--surface2)}
.mod-name{font-size:15px;font-weight:600;color:var(--text)}
.mod-desc{font-size:12px;color:var(--text3);line-height:1.6}
.badge{position:absolute;top:14px;right:14px;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-active{background:#E6FAF0;color:#087443;border:1px solid #ADE8C4}
.badge-soon{background:#F4F5F8;color:#9AA0B4;border:1px solid var(--border)}
#loading{position:fixed;inset:0;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  
  
  
  
  
  
}
/* ===== 標準 topbar（統一規格）===== */
.topbar{height:60px;background:var(--accent);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:200;gap:10px}
.topbar-left{display:flex;align-items:center;gap:14px;min-width:0;flex:1;overflow:hidden}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.back-btn{font-size:12px;padding:5px 13px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0}
.back-btn:hover{background:rgba(255,255,255,.2)}
.dv{width:1px;height:20px;background:rgba(255,255,255,.2);flex-shrink:0}
.topbar h1{font-size:16px;font-weight:700;color:#fff;letter-spacing:.5px;display:flex;align-items:center;gap:8px;white-space:nowrap;margin:0}
.role-chip{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);white-space:nowrap}
@media(max-width:600px){.topbar{padding:0 12px;gap:6px}.topbar h1{font-size:14px}.back-btn{font-size:11px;padding:4px 9px}}
/* ===== 標準 topbar 結束 ===== */
</style>
</head>

  <div class="main">
    <div class="page-title">打卡系統</div>
    <div class="page-sub">出缺勤管理、即時值班狀況、異常排除與臨時打卡</div>
    <div class="grid" id="moduleGrid"></div>
  </div>
</div>
<script type="module">
import { authGuard, db } from './auth-guard.js';
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const roleNames={admin:'管理員',consultant:'顧問',manager:'店長/副店長',employee:'同仁'};

const ALL_MODULES=[
  {key:'attendance', icon:'📋', name:'出缺勤紀錄',    desc:'查詢同仁打卡記錄、出勤狀況、匯出報表',        page:'attendance.html',    active:true,  roles:['admin','consultant','manager']},
  {key:'realtime',   icon:'📡', name:'即時值班狀況',  desc:'各店即時在場人數，每5分鐘自動更新',            page:'realtime.html',      active:true,  roles:['admin','consultant','manager']},
  {key:'anomaly',    icon:'⚠️', name:'上下班異常排除', desc:'未打卡異常列表，批次排除與管理員回報',          page:'anomaly.html',       active:true,  roles:['admin','consultant','manager']},
  {key:'anomaly_q',  icon:'🔍', name:'上下班異常查詢', desc:'歷史異常記錄查詢，依店面、人員、日期篩選',      page:'anomaly_query.html', active:true,  roles:['admin','consultant','manager']},
  {key:'temp_clock', icon:'🕐', name:'臨時打卡',       desc:'未排班浮動人員打卡記錄查詢與管理',             page:'temp_clock.html',    active:true,  roles:['admin','consultant','manager']},
  {key:'my_clock',   icon:'👤', name:'我的出勤',       desc:'查看個人打卡記錄與出勤狀況',                   page:'my_attendance.html', active:true,  roles:['employee']},
];

function renderModules(role){
  const modules = role==='employee'
    ? ALL_MODULES.filter(m=>m.roles.includes('employee'))
    : ALL_MODULES.filter(m=>m.roles.includes('admin')||m.roles.includes('manager')||m.roles.includes('consultant'));

  document.getElementById('moduleGrid').innerHTML = modules.map(m=>{
    const badgeHtml = m.active
      ? `<span class="badge badge-active">可使用</span>`
      : `<span class="badge badge-soon">即將推出</span>`;
    const clickAttr = m.active ? `onclick="window.location.href='${m.page}'"` : '';
    return `<div class="module-card${m.active?'':' disabled'}" ${clickAttr}>
      ${badgeHtml}
      <div class="icon-wrap">${m.icon}</div>
      <div><div class="mod-name">${m.name}</div><div class="mod-desc" style="margin-top:4px">${m.desc}</div></div>
    </div>`;
  }).join('');
}

authGuard('clock', ({ role }) => {
  document.getElementById('roleChip').textContent=roleNames[role]||role;
  renderModules(role);
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
});
</script>
