<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>員工資料去重修復工具</title>
<style>
body{font-family:sans-serif;max-width:700px;margin:40px auto;padding:20px;background:#f5f5f5}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
h2{margin:0 0 16px;color:#2D3142}
.warn{background:#FFF3E0;border:1px solid #FFB74D;border-radius:8px;padding:12px 16px;font-size:13px;color:#E65100;margin-bottom:16px}
.info{background:#E3F2FD;border:1px solid #90CAF9;border-radius:8px;padding:12px 16px;font-size:13px;color:#1565C0;margin-bottom:16px}
.ok{background:#E8F5E9;border:1px solid #A5D6A7;border-radius:8px;padding:12px 16px;font-size:13px;color:#2E7D32;margin-bottom:16px}
button{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600}
.btn-danger{background:#e53935;color:#fff}
.btn-primary{background:#2D3142;color:#fff}
.btn-danger:disabled,.btn-primary:disabled{opacity:.5;cursor:not-allowed}
#log{font-size:12px;color:#555;max-height:300px;overflow-y:auto;background:#f9f9f9;border-radius:6px;padding:10px;margin-top:12px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="card">
  <h2>🔧 員工資料去重修復工具</h2>
  <div class="warn">⚠️ 此工具僅限 Admin 使用，請確認已用 Admin 帳號登入系統後再執行。執行前會先預覽，確認後才真正寫入。</div>
  <div id="status" class="info">載入中...</div>
  <div id="preview"></div>
  <div style="display:flex;gap:10px;margin-top:12px">
    <button class="btn-primary" id="btnScan" onclick="scan()" disabled>🔍 掃描重複資料</button>
    <button class="btn-danger" id="btnFix" onclick="fix()" disabled>✓ 執行去重修復</button>
  </div>
  <div id="log"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAg_dfvoxA1dQYqHzdqPtEot8wT-wKZal4",
  authDomain: "liangpinghri.firebaseapp.com",
  projectId: "liangpinghri",
  storageBucket: "liangpinghri.firebasestorage.app",
  messagingSenderId: "175992659099",
  appId: "1:175992659099:web:placeholder"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let cleanEmployees = [], cleanResigned = [];

function log(msg){ document.getElementById('log').textContent += msg + '\n'; }
function setStatus(msg, type='info'){
  const el = document.getElementById('status');
  el.className = type;
  el.textContent = msg;
}

onAuthStateChanged(auth, async user => {
  if(!user){ setStatus('❌ 未登入，請先到系統登入後再開此頁', 'warn'); return; }
  // 確認 role
  const uSnap = await getDoc(doc(db,'users',user.uid));
  const role = uSnap.exists() ? uSnap.data().role : '';
  if(role !== 'admin'){ setStatus('❌ 需要 Admin 權限', 'warn'); return; }
  setStatus('✅ 已確認 Admin 身分：' + (uSnap.data().name||user.email), 'ok');
  document.getElementById('btnScan').disabled = false;
});

window.scan = async function(){
  log('開始掃描...');
  document.getElementById('btnScan').disabled = true;

  const [empSnap, resSnap] = await Promise.all([
    getDoc(doc(db,'hr','employees')),
    getDoc(doc(db,'hr','resigned')),
  ]);

  const empList = empSnap.exists() ? empSnap.data().list || [] : [];
  const resList = resSnap.exists() ? resSnap.data().list || [] : [];

  log('Firestore employees 總筆數：' + empList.length);
  log('Firestore resigned 總筆數：' + resList.length);

  // 去重：以 id 為 key，保留第一筆
  const empMap = new Map();
  for(const r of empList){
    if(!empMap.has(r.id)) empMap.set(r.id, r);
  }
  const resMap = new Map();
  for(const r of resList){
    if(!resMap.has(r.id)) resMap.set(r.id, r);
  }

  cleanEmployees = [...empMap.values()];
  cleanResigned  = [...resMap.values()];

  const empDup = empList.length - cleanEmployees.length;
  const resDup = resList.length - cleanResigned.length;

  log('去重後 employees：' + cleanEmployees.length + ' 筆（移除 ' + empDup + ' 筆重複）');
  log('去重後 resigned：'  + cleanResigned.length  + ' 筆（移除 ' + resDup  + ' 筆重複）');

  const preview = document.getElementById('preview');
  if(empDup === 0 && resDup === 0){
    preview.innerHTML = '<div class="ok">✅ 沒有發現重複資料，不需要修復。</div>';
    setStatus('掃描完成，資料正常', 'ok');
  } else {
    preview.innerHTML = `<div class="warn">⚠️ 發現重複：employees ${empDup} 筆、resigned ${resDup} 筆。確認後按「執行去重修復」。</div>`;
    setStatus('發現重複資料，請確認後執行修復', 'warn');
    document.getElementById('btnFix').disabled = false;
  }
};

window.fix = async function(){
  if(!confirm('確定要執行去重修復？此操作會覆寫 Firestore 員工清單，請確認已備份。')) return;
  document.getElementById('btnFix').disabled = true;
  log('寫入去重後資料...');
  try {
    await setDoc(doc(db,'hr','employees'), {list: cleanEmployees});
    await setDoc(doc(db,'hr','resigned'),  {list: cleanResigned});
    log('✅ 完成！employees：' + cleanEmployees.length + ' 筆，resigned：' + cleanResigned.length + ' 筆');
    setStatus('✅ 修復完成，請重新整理 hr.html 確認資料', 'ok');
    document.getElementById('preview').innerHTML = '<div class="ok">✅ 去重完成，請關閉此頁並重新開啟人員資訊頁面。</div>';
  } catch(e) {
    log('❌ 失敗：' + e.message);
    setStatus('修復失敗：' + e.message, 'warn');
    document.getElementById('btnFix').disabled = false;
  }
};
</script>
</body>
</html>
