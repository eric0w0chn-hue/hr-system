<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://www.googleapis.com" crossorigin>
<title>и–ӘиіҮиЁҲз®— вҖ” й‘«зі»зөұ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#ECEEF2;--surface:#fff;--surface2:#F4F5F8;--border:#DDE1E9;
  --text:#1A1D23;--text2:#5A6175;--text3:#9AA0B4;
  --accent:#2D3142;--accent-hover:#1E2230;--accent-light:#F0F2F5;
  --green:#1A9B4C;--green-bg:#E5F5EB;--green-border:#B4E1C2;
  --orange:#C47A00;--orange-bg:#FFF4E0;--orange-border:#FDDFA0;
  --red:#D33A3A;--red-bg:#FCEBEB;--red-border:#F7C8C8;
  --blue:#2D6BF0;--blue-bg:#EAF0FF;--blue-border:#C3D4F7;
  --yellow-bg:#FFFBE6;--yellow-border:#FFE58F;
  --purple:#7C3AED;--purple-bg:#F5F0FF;--purple-border:#D8B4FE;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

.topbar{height:60px;background:var(--accent);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200;gap:8px}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1;overflow:hidden}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.back-btn{font-size:12px;padding:0 13px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0;min-height:44px;display:flex;align-items:center}
.back-btn:hover{background:rgba(255,255,255,.22)}
.dv{width:1px;height:20px;background:rgba(255,255,255,.2);flex-shrink:0}
.topbar h1{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;margin:0;white-space:nowrap}
.role-chip{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;background:rgba(255,255,255,.15);color:#fff;white-space:nowrap}
@media(max-width:600px){.topbar{padding:0 10px}.topbar h1{font-size:14px}.back-btn{font-size:11px;padding:0 9px;min-height:38px}}

.main{max-width:1100px;margin:0 auto;padding:18px 16px 80px}

.filter-bar{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.emp-picker-bar{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.emp-picker-bar select{flex:1;min-width:160px;font-size:14px;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;min-height:42px;cursor:pointer;font-weight:600}
.emp-picker-bar select:focus{border-color:var(--accent)}
.emp-picker-bar select:disabled{opacity:.5}
.emp-count{font-size:12px;color:var(--text3);white-space:nowrap}
.filter-bar select{font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;min-height:36px;cursor:pointer}
.filter-bar select:focus{border-color:var(--accent)}
.fl{font-size:12px;color:var(--text2);white-space:nowrap;font-weight:500}
.fdv{width:1px;height:20px;background:var(--border);flex-shrink:0}

.locked-banner{border-radius:10px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;background:var(--orange-bg);border:1px solid var(--orange-border);color:var(--orange)}

.btn{font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;font-weight:500;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-family:inherit;transition:all .15s;border:none;min-height:36px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}.btn-outline:hover{background:var(--surface2)}
.btn-sm{font-size:12px;padding:4px 10px;min-height:28px;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-weight:500;font-family:inherit;border:none;transition:all .15s}
.btn-sm.p{background:var(--accent);color:#fff}
.btn-sm.o{border:1px solid var(--border);background:#fff;color:var(--text2)}.btn-sm.o:hover{background:var(--surface2)}

.ot-panel{background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:12px;padding:14px 16px;margin-bottom:14px}
/* зі»зөұиЁӯе®ҡйқўжқҝ */
.sys-panel{background:#fff;border:2px solid var(--accent);border-radius:12px;padding:16px;margin-bottom:14px}
.sys-panel-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.sys-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.sys-field{flex:1;min-width:140px}
.sys-field label{font-size:11px;color:var(--text2);font-weight:600;display:block;margin-bottom:4px}
.sys-inp{width:100%;font-size:16px;font-weight:700;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;-webkit-appearance:none;appearance:none;min-height:42px}
.sys-inp:focus{border-color:var(--accent);outline:none}
.sys-rate-head{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.sys-rate-wrap{max-height:340px;overflow-y:auto;border:1px solid var(--border);border-radius:8px}
.sys-rate-tbl{width:100%;border-collapse:collapse;font-size:13px}
.sys-rate-tbl th{position:sticky;top:0;background:var(--surface2);font-size:11px;color:var(--text2);font-weight:600;padding:8px 6px;text-align:left}
.sys-rate-tbl td{padding:4px 6px;border-bottom:1px solid var(--border)}
.rate-inp{width:100%;font-size:13px;padding:5px 7px;border:1px solid var(--border);border-radius:6px;font-family:inherit;-webkit-appearance:none;appearance:none;min-height:32px}
.rate-inp:focus{border-color:var(--accent);outline:none}
.rate-del{color:var(--red);cursor:pointer;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-block}
.rate-del:hover{background:var(--red-bg)}
.sys-note{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.5}
.ot-panel-title{font-size:12px;font-weight:700;color:#92640A;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.ot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.ot-item{background:#fff;border:1px solid var(--yellow-border);border-radius:8px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ot-item-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ot-sel{font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;font-family:inherit;-webkit-appearance:none;appearance:none;min-height:28px;cursor:pointer}

.emp-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px;margin-bottom:16px}
.emp-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .15s}
.emp-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.07)}
.emp-card.active{border-color:var(--accent);background:var(--accent-light)}
.emp-name{font-size:14px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.emp-meta{font-size:11px;color:var(--text2);display:flex;gap:8px;flex-wrap:wrap}
.emp-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--accent-light);color:var(--accent)}
.partial-flag{font-size:9px;font-weight:600;padding:1px 6px;border-radius:10px;background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border)}

.salary-sheet{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;scroll-margin-top:70px}
.sheet-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;background:var(--surface2)}
.sheet-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}

.sum-row{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
@media(max-width:700px){.sum-row{grid-template-columns:repeat(2,1fr)}}
.sum-cell{padding:12px 14px;border-right:1px solid var(--border);text-align:center}
.sum-cell:last-child{border-right:none}
.sum-lbl{font-size:10px;color:var(--text3);margin-bottom:3px}
.sum-val{font-size:17px;font-weight:700}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-blue{color:var(--blue)}.c-orange{color:var(--orange)}

.fml-sec{padding:0;border-bottom:1px solid var(--border)}
.ins-section{padding:0;border-top:1px solid var(--border)}
.ded-sec{padding:0;border-top:1px solid var(--border)}
.add-sec{padding:0;border-top:1px solid var(--border)}
.sec-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
/* в”Җв”Җ еҸҜеұ•й–ӢеҚҖеЎҠзөұдёҖжЁЈејҸ в”Җв”Җ */
.collapsible-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;user-select:none;border-radius:8px;transition:background .12s;gap:10px}
.collapsible-header:hover{background:var(--surface2)}
.ch-left{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--text);min-width:0;flex-shrink:0}
.ch-right{display:flex;align-items:center;gap:8px;flex-shrink:0;min-width:0}
.ch-summary{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
@media(max-width:600px){
  .ch-summary{max-width:120px;font-size:11px}
  .collapsible-header{padding:10px 13px;gap:6px}
  .ch-ins-full{display:none}
  .ch-ins-short{display:inline}
}
@media(min-width:601px){
  .ch-ins-short{display:none}
}
.ch-summary{font-size:12px;color:var(--text2);white-space:nowrap}
.ch-summary.empty{color:var(--text3)}
.ch-summary.has-value{color:var(--text);font-weight:600}
.ch-summary.deduct{color:var(--red);font-weight:600}
.ch-summary.add{color:var(--green);font-weight:600}
.ch-chevron{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;background:var(--surface2);font-size:10px;color:var(--text3);flex-shrink:0;transition:transform .2s,background .12s}
.collapsible-header:hover .ch-chevron{background:var(--border);color:var(--text2)}
.ch-chevron.open{transform:rotate(180deg)}
.collapsible-body{padding:0 4px 4px}
/* еӢһеҒҘдҝқж ёе°ҚиЎЁ */
.audit-wrap{overflow-x:auto}
.audit-tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
.audit-tbl th{background:var(--accent);color:#fff;padding:10px 12px;text-align:right;font-size:12px;font-weight:600;white-space:nowrap;position:sticky;top:0}
.audit-tbl th:first-child{text-align:left}
.audit-tbl td{padding:9px 12px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
.audit-tbl .ac-name{text-align:left;font-weight:600;color:var(--text)}
.audit-tbl .ac-num{font-variant-numeric:tabular-nums;font-family:'SF Mono',Menlo,monospace}
.audit-tbl tbody tr:hover{background:var(--surface2)}
.audit-tbl tbody tr:nth-child(even){background:#FAFBFC}
.audit-tbl .ac-sum td{border-top:2px solid var(--accent);border-bottom:none;font-weight:700;background:var(--accent-light);color:var(--text)}
.ac-tag{font-size:10px;background:var(--green-bg);color:var(--green);padding:1px 6px;border-radius:10px;margin-left:6px;font-weight:600}
.ac-tag.o{background:var(--orange-bg);color:var(--orange)}
.ac-tag.r{background:var(--red-bg);color:var(--red)}
.ac-tag.na{background:var(--surface2);color:var(--text3)}
/* жҜ”е°Қзөҗжһң */
.cmp-banner{padding:11px 16px;font-size:13px;font-weight:600;line-height:1.6}
.cmp-banner.ok{background:var(--green-bg);color:var(--green);border-bottom:1px solid var(--green-border)}
.cmp-banner.warn{background:var(--orange-bg);color:var(--orange);border-bottom:1px solid var(--orange-border)}
.audit-tbl td.cmp-ok{color:var(--green)}
.audit-tbl td.cmp-diff{background:var(--red-bg)!important;color:var(--red);font-weight:700}
.cmp-comp{font-size:10px;color:var(--red);font-weight:600;margin-top:1px}
.audit-tbl td.cmp-na{color:var(--text3)}
.audit-tbl tr.cmp-row-na{opacity:.7}
.audit-tbl tr.cmp-row-extra{background:var(--red-bg)!important}
/* еҸҜз·ЁијҜиҮӘд»ҳж¬„ */
.ac-editable{position:relative}
.ac-edit{width:74px;text-align:right;font-size:13px;font-variant-numeric:tabular-nums;padding:5px 7px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text);font-family:inherit;-moz-appearance:textfield}
.ac-edit:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 2px rgba(45,49,66,.1)}
.ac-edit::-webkit-outer-spin-button,.ac-edit::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.cmp-mark{color:var(--green);margin-left:4px;font-weight:700}
td.cmp-diff .ac-edit{border-color:var(--red);color:var(--red);font-weight:700}
.fml-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
@media(max-width:700px){.fml-grid{grid-template-columns:repeat(2,1fr)}}
.fml-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
.fi-lbl{font-size:10px;color:var(--text3);margin-bottom:2px}
.fi-val{font-size:13px;font-weight:600}
.fi-sub{font-size:10px;color:var(--text3);margin-top:2px}
.eq-bar{font-size:12px;color:var(--text2);padding:8px 10px;background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:7px;display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-top:6px}
.eq-bar .v{font-weight:700;color:var(--text);font-size:13px}.eq-bar .op{color:var(--text3)}

/* дёҚи¶іжңҲй©—з®—зӣ’ */
.partial-box{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--orange-bg)}
.partial-box .sec-title{color:var(--orange)}
.partial-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.partial-item{background:#fff;border:1px solid var(--orange-border);border-radius:8px;padding:9px 11px}
.partial-item label{font-size:10px;color:var(--text3);display:block;margin-bottom:4px}
.partial-item input{font-size:14px;font-weight:600;padding:4px 7px;border:1px solid var(--border);border-radius:6px;width:100%;font-family:inherit;text-align:right;-webkit-appearance:none;appearance:none;min-height:32px}
.partial-item input:focus{border-color:var(--orange);outline:none}
.partial-item .readonly-val{font-size:15px;font-weight:700;color:var(--text)}
.verify-line{margin-top:10px;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:8px}
.verify-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.verify-no{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}

.daily-sec{padding:12px 16px}
.half-toggle{display:flex;gap:6px;margin-bottom:10px}
.half-btn{flex:1;font-size:13px;padding:8px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text2);cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.half-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.daily-hd-row{display:grid;grid-template-columns:46px minmax(0,1fr) 90px 110px 110px 62px;gap:4px;padding:3px 8px;font-size:10px;color:var(--text3);font-weight:600}
.d-row{display:grid;grid-template-columns:46px minmax(0,1fr) 90px 110px 110px 62px;gap:4px;align-items:center;padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:3px}
.d-row:hover{background:#EDEEF3}
.d-row.weekend{background:#FFF8F8;border-color:#FDDADA}
.d-row.no-shift{opacity:.55}
.d-row.d-min{grid-template-columns:46px 1fr;cursor:pointer;opacity:.7;padding:5px 8px}
.d-row.d-min{grid-template-columns:46px 120px 1fr auto;align-items:center;opacity:1;padding:9px 10px;gap:8px}
.d-row.d-min:hover{background:#EDEEF3}
.d-row.d-min.has-data{background:#fff;border-color:var(--accent-light)}
/* жҘөз°ЎжңӘжҺ’зҸӯпјҡй«ҳеәҰжңҖдҪҺгҖҒйҖҸжҳҺеәҰеҫҲдҪҺ */
.d-row.d-min.d-noshift-empty{
  padding:4px 10px;opacity:.35;border-color:transparent;background:transparent;
  grid-template-columns:42px 1fr auto;gap:6px;min-height:0;
}
.d-row.d-min.d-noshift-empty:hover{opacity:.7;background:var(--surface2)}
.d-noshift-line{height:1px;background:var(--border);align-self:center;border-radius:1px}
.d-row.d-min.anomaly{border-color:var(--orange-border)!important;background:var(--orange-bg)!important}
.anomaly-dot{font-size:11px;color:var(--orange);margin-left:4px;cursor:help}
.d-min-shift{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-min-summary{font-size:12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-width:0}
.d-sum-muted{color:var(--text3);font-size:12px}
.d-sum-extra{color:var(--text2);font-size:11px}
.d-sum-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.d-sum-tag.t-gray{background:var(--surface2);color:var(--text2)}
.d-sum-tag.t-blue{background:var(--blue-bg);color:var(--blue)}
.d-sum-tag.t-sick,.d-sum-tag.t-physio{background:var(--orange-bg);color:var(--orange)}
.d-sum-tag.t-absent,.d-sum-tag.t-careLeave{background:var(--red-bg);color:var(--red)}
.d-sum-tag.t-annual,.d-sum-tag.t-wed,.d-sum-tag.t-funeral,.d-sum-tag.t-redEnvelope{background:var(--green-bg);color:var(--green)}
.d-min-hint{font-size:13px;color:var(--blue);font-weight:600;justify-self:end;padding:0 4px}
@media(max-width:700px){.d-row.d-min{grid-template-columns:40px 1fr}}
.d-min-label{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px}
.d-min-hint{font-size:10px;color:var(--blue)}
.d-collapse{font-size:10px;color:var(--text3);cursor:pointer;text-decoration:underline;margin-left:4px}
.d-collapse:hover{color:var(--accent)}
.d-row.out-employ{opacity:.35;pointer-events:none}
.d-row.locked{pointer-events:none;opacity:.7}
@media(max-width:700px){
  .daily-hd-row{display:none}
  .d-row{grid-template-columns:40px minmax(0,1fr) 80px 102px 102px 58px;gap:3px;padding:6px 7px}
  .hm-wrap input.hm-h,.hm-wrap input.hm-m{width:30px;font-size:12px;padding:4px 2px;min-height:30px}
  .hm-wrap{gap:1px}
  .hm-wrap .hm-sep{font-size:10px}
}
/* в”Җв”Җ жүӢж©ҹзүҲпјҡжҜҸж—ҘеҮәеӢӨж”№зӮәеҚЎзүҮејҸпјҢжүҖжңүж¬„дҪҚжё…жҘҡжЁҷзӨә в”Җв”Җ */
@media(max-width:600px){
  .d-row{
    display:flex !important;flex-direction:column;gap:8px;
    padding:11px 13px;margin-bottom:8px;border-radius:10px;

  }

  /* headerпјҡж—Ҙжңҹ + зҸӯж¬Ў еҗҢдёҖиЎҢ */
  .d-row .d-date{display:flex;align-items:baseline;gap:6px;text-align:left;order:0;flex:0 0 auto}
  .d-row .d-num{font-size:17px}.d-row .d-wday{font-size:13px;color:var(--text3)}
  .d-row .d-shift{font-size:13px;color:var(--text2);order:1;flex:1;justify-content:flex-end;text-align:right;display:flex;align-items:center}
  /* жҜҸеҖӢж¬„дҪҚпјҡжЁҷзұӨеңЁдёҠгҖҒијёе…ҘеңЁдёӢ */
  .d-row .d-field{display:flex !important;flex-direction:column;gap:4px}

    content:attr(data-label);font-size:11px;color:var(--text2);font-weight:600;
  }
  .d-row .col-ot2,.d-row .col-late{display:flex !important}
  /* жүӢж©ҹпјҡеӣәе®ҡ+йЎҚеӨ–еҠ зҸӯдёҰжҺ’еҗ„еҚҠпјҢйҒІеҲ°зҚЁз«ӢдёҖиЎҢ */
  .d-row .d-field[data-label="еӣәе®ҡеҠ зҸӯ"],
  .d-row .d-field[data-label="йЎҚеӨ–еҠ зҸӯ"]{flex:1 1 44%;min-width:140px}
  .d-row .d-field[data-label="йҒІеҲ°"]{flex:0 0 100%;width:100%}
  .d-row .d-field[data-label="еӣәе®ҡеҠ зҸӯ"]{order:3}
  .d-row .d-field[data-label="йЎҚеӨ–еҠ зҸӯ"]{order:4}
  .d-row .d-field[data-label="йҒІеҲ°"]{order:5}
  .d-row .d-field[data-label="еҒҮеҲҘ"]{order:2;width:100%}
  .d-row{flex-wrap:wrap}
  .d-row .hm-wrap input.hm-h,.d-row .hm-wrap input.hm-m{width:48px;font-size:15px;min-height:42px}
  .d-row .hm-wrap{justify-content:flex-start;gap:3px}
  .d-row .hm-wrap .hm-sep{font-size:12px}
  .d-row .ipt-wrap input{font-size:15px;min-height:42px;padding:8px 22px 8px 10px;text-align:left}
  .d-row .ipt-unit{font-size:11px;right:8px}
  .d-row .type-sel{font-size:15px;min-height:44px;padding:8px 10px}
  .d-row .d-tempbtn{order:2;align-self:flex-start;font-size:13px !important;padding:8px 18px !important;min-height:40px !important}
  .d-row .d-spacer{display:none}
  .d-row .sub-row{order:6;width:100%;padding-left:0;margin-top:2px}
  .d-row .sub-leave,.d-row .sub-temp{font-size:13px;padding:8px 10px}

  .d-row .sub-temp select{font-size:14px;min-height:36px}
  /* жңҖе°ҸеҢ–еҲ—пјҡжүӢж©ҹж”№зӮәж—Ҙжңҹ+зҸӯж¬Ў+ж‘ҳиҰҒ */
  .d-row.d-min{display:grid !important;grid-template-columns:auto 1fr auto;align-items:center;gap:8px;padding:12px 13px}
  .d-row.d-min .d-date{order:0}

  .d-row.d-min .d-min-hint{order:1;font-size:16px}
}

function insFromGrade(grade){
  if(!grade)return{labor:0,health:0,matched:0};
  const g=Number(grade);let best=LABOR_TABLE[0];
  // еҸ–гҖҢеӨ§ж–јзӯүж–јжҠ•дҝқйҮ‘йЎҚгҖҚзҡ„жңҖжҺҘиҝ‘зҙҡи·қпјҲжҠ•дҝқйҮ‘йЎҚжҮүиҗҪеңЁжҹҗдёҖзҙҡпјү
  for(const r of LABOR_TABLE){if(r.grade<=g)best=r;}
  // иӢҘжңүе®Ңе…Ёзӣёзӯүзҡ„зҙҡи·қе„Әе…Ҳ
  const exact=LABOR_TABLE.find(r=>r.grade===g);
  if(exact)best=exact;
  return{labor:best.labor,health:best.health,matched:best.grade};
}

// еҸ–е“Ўе·Ҙж¬„дҪҚпјҲеӨҡйҮҚ fallbackпјү
function getHireDate(e){return e.hireDate||e.startDate||e.onboardDate||e.еҲ°иҒ·ж—Ҙ||e.entryDate||null;}
function getLeaveDate(e){return e.leaveDate||e.resignDate||e.йӣўиҒ·ж—Ҙ||e.quitDate||null;}
function getInsGrade(e,y,m){
  // 6жңҲи–ӘиіҮз№ізҡ„жҳҜ5жңҲиІ»з”Ё вҶ’ жҠ“гҖҢдёҠеҖӢжңҲжңҖеҫҢдёҖеӨ©гҖҚд№ӢеүҚжңҖж–°зҡ„жҠ•дҝқзҙҡи·қ
  const hist=e.insurance?.gradeHistory;
  if(y&&m&&Array.isArray(hist)&&hist.length){
    // дёҠеҖӢжңҲ
    let py=y, pm=m-1; if(pm<1){pm=12;py=y-1;}
    const cutoff=`${py}-${String(pm).padStart(2,'0')}-${String(getDaysInMonth(py,pm)).padStart(2,'0')}`;
    const sorted=hist.slice().sort((a,b)=>String(b.date).localeCompare(String(a.date)));
    const valid=sorted.find(r=>String(r.date)<=cutoff);
    if(valid)return Number(valid.grade);
    // жІ’жңүдёҠжңҲ(еҗ«)д»ҘеүҚзҡ„зҙҖйҢ„ вҶ’ еҸ–жңҖж—©дёҖзӯҶ
    return Number(sorted[sorted.length-1].grade);
  }
  return Number(e.insurance?.grade||e.insuranceGrade||e.жҠ•дҝқзҙҡи·қ||e.grade||0);
}
function getTarget(e,y,m){
  const h=(e.salaryHistory||[]).slice().sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  if(h.length>0){
    // дҫқз•¶жңҲжҠ“пјҡеҸ– date <= з•¶жңҲжңҖеҫҢдёҖеӨ© зҡ„жңҖж–°дёҖзӯҶ
    if(y&&m){
      const cutoff=`${y}-${String(m).padStart(2,'0')}-${String(getDaysInMonth(y,m)).padStart(2,'0')}`;
      const valid=h.find(r=>String(r.date)<=cutoff);
      if(valid)return Number(valid.amount);
      // иӢҘе…ЁйғЁйғҪжҷҡж–јз•¶жңҲпјҲиіҮж–ҷйғҪжҜ”з•¶жңҲж–°пјүпјҢеҸ–жңҖж—©дёҖзӯҶз•¶иө·и–Ә
      return Number(h[h.length-1].amount);
    }
    return Number(h[0].amount);
  }
  return Number(e.salary||e.targetSalary||0);
}

function isMonthLocked(y,m){
  const now=new Date();const cy=now.getFullYear(),cm=now.getMonth()+1;
  if(y<cy)return true;if(y===cy&&m<cm)return true;return false;
}

// иЁҲз®—з•¶жңҲеңЁиҒ·еӨ©ж•ёпјҲ30еӨ©еҲ¶пјүпјҡrec еҸҜжүӢеӢ•иҰҶи“ӢеҲ°иҒ·/йӣўиҒ·ж—ҘпјҢеҗҰеүҮз”Ё HR иіҮж–ҷ
function calcEmployedDays(emp,y,m,rec){
  const dim=getDaysInMonth(y,m);
  const monthStart=new Date(y,m-1,1), monthEnd=new Date(y,m-1,dim);
  let s=monthStart, e=monthEnd, partial=false;
  // е„Әе…Ҳз”ЁжүӢеӢ•иЁӯе®ҡпјҲrec.hireOverride / rec.leaveOverrideпјүпјҢеҗҰеүҮ HR ж¬„дҪҚ
  const hd=(rec&&rec.hireOverride)||getHireDate(emp);
  const ld=(rec&&rec.leaveOverride)||getLeaveDate(emp);
  if(hd){const d=new Date(hd); if(d>monthEnd) return {days:0,partial:true,empty:true,inEmploy:()=>false,hireDate:hd,leaveDate:ld};
    if(d>monthStart){s=d;partial=true;}}
  if(ld){const d=new Date(ld); if(d<monthStart) return {days:0,partial:true,empty:true,inEmploy:()=>false,hireDate:hd,leaveDate:ld};
    if(d<monthEnd){e=d;partial=true;}}
  const dayCount=Math.round((e-s)/86400000)+1;
  const employedDays = partial ? dayCount : 30;
  const sN=s.getDate(), eN=e.getDate();
  return {
    days:employedDays, partial, hireDate:hd, leaveDate:ld,
    lastWorkDayNum:eN, firstWorkDayNum:sN,
    inEmploy:(dayNum)=>partial?(dayNum>=sN&&dayNum<=eN):true
  };
}
// йҖҖдҝқж—Ҙпјҡй җиЁӯйӣўиҒ·ж—Ҙж¬Ўж—ҘпјҲеҸҜз”ұ rec.unenrollOverride иҰҶи“Ӣпјү
function getUnenrollDate(emp,rec,leaveDate){

}

async function saveRec(empId,y,m,data){
  const k=`${empId}_${y}-${String(m).padStart(2,'0')}`;
  try{await setDoc(doc(db,'salary_records',k),{...data,updatedAt:new Date().toISOString(),updatedBy:CU.name});return true;}catch(e){return false;}
}
async function loadShifts(empId,y,m){
  const emp=employees.find(e=>String(e.id)===String(empId));
  if(!emp||!emp.workLocation)return{};
  const ym=`${y}-${String(m).padStart(2,'0')}`;
  // еҳ—и©ҰеӨҡзЁ®еә—еҗҚи®Ҡй«”
  const variants=[emp.workLocation, normStore(emp.workLocation), String(emp.workLocation).replace(/иҲ–/g,'йӢӘ')];
  for(const loc of [...new Set(variants)]){
    try{const s=await getDoc(doc(db,'schedules',`${ym}_${loc}`));
      if(s.exists())return s.data().shifts||{};}catch(e){}
  }
  return {};
}

// в”Җв”Җв”Җ иЁҲз®—ж ёеҝғ в”Җв”Җв”Җ
function calcSalary(emp,rec,shifts){
  // е…јиҒ·пјҲжҷӮи–ӘеҲ¶пјүеҲӨе®ҡ
  const isPartTime=(emp.title||'').includes('е…јиҒ·')||(emp.title||'').includes('е·Ҙи®Җ');
  const target=getTarget(emp,viewYear,viewMonth);
  const days=getDaysInMonth(viewYear,viewMonth);
  const dd=rec?.dailyData||{};
  const defOt=getDefOt(emp.workLocation);
  const emp2=calcEmployedDays(emp,viewYear,viewMonth,rec);
  const isPartial=emp2.partial&&emp2.days<30;

  // е…јиҒ·пјҡжҷӮи–ӘеҲ¶зҚЁз«ӢиЁҲз®—
  if(isPartTime)return calcPartTimeSalary(emp,rec,shifts,emp2,defOt);

  // зөұиЁҲ
  let fixedOtHours=0;     // еӣәе®ҡеҠ зҸӯжҷӮж•ёпјҲиЁҲе…Ҙзӣ®жЁҷзӯүејҸпјү
  let extraOtHours=0;     // йЎҚеӨ– 1.67 жҷӮж•ё
  let tempOtSegs={};      // жңӘжҺ’зҸӯиҮЁжҷӮеҠ зҸӯ {rate:hours}
  let personalMins=0;     // дәӢеҒҮ+йҒІеҲ°пјҲеҲҶйҗҳпјү
  let absentDays=0;       // жӣ иҒ·еӨ©ж•ё
  let sickHours=0;        // з—…еҒҮ/з”ҹзҗҶеҒҮпјҲе°ҸжҷӮпјҢеҚҠи–Әпјү
  let workDays=0;
  let scheduledDays=0; // жңүжҺ’зҸӯзҡ„еӨ©ж•ёпјҲеӨ®е»ҡйӨҗиІ»иЈңеҠ©з”Ёпјү
  let personalDates=[], sickDates=[], absentDates=[]; // жүЈй …ж—ҘжңҹжҸҗзӨә
  let paidLeaves={}; // е…Ёи–ӘеҒҮеҲҘ {еҒҮеҲҘlabel: [ж—Ҙжңҹ]}

  for(let d=1;d<=days;d++){
    if(!emp2.inEmploy(d))continue;
    const ds=dateStr(viewYear,viewMonth,d);
    const shift=getShift(shifts,emp,ds);
    const r=dd[ds]||{};
    const type=getEffectiveType(emp,r,ds);
    const lt=LEAVE_TYPES[type]||LEAVE_TYPES.normal;

    // жңӘжҺ’зҸӯж—ҘиҮЁжҷӮеҠ зҸӯпјҲж”ҜжҸҙеӨҡж®өиІ»зҺҮпјү
    if(!shift){
      const segs=Array.isArray(r.tempSegs)?r.tempSegs:(r.tempOt>0?[{h:Number(r.tempOt),rate:Number(r.tempOtRate||1.34)}]:[]);
      for(const sg of segs){
        if(sg.h>0){const rate=Number(sg.rate||1.34);tempOtSegs[rate]=(tempOtSegs[rate]||0)+Number(sg.h);}
      }
      // HR зү№дј‘её¶е…ҘдҪҶз•¶еӨ©жңӘжҺ’зҸӯ вҶ’ д»ҚеҲ—е…Ҙе…Ёи–ӘеҒҮеҲҘе‘ҲзҸҫпјҲжңҲи–ӘеҲ¶дёҚжүЈи–ӘпјҢдёҚеҪұйҹҝеҜҰй ҳпјү
      if(lt.pay==='full'&&type!=='normal'){
        const label=LEAVE_TYPES[type].label;
        if(!paidLeaves[label])paidLeaves[label]=[];
        paidLeaves[label].push(`${d}ж—Ҙ`);
      }
      continue;
    }
    if(type==='dayoff')continue;
    scheduledDays++; // жңүжҺ’зҸӯпјҲйқһе…¬дј‘пјүеҚіиЁҲйӨҗиІ»иЈңеҠ©еҹәжә–

    if(type==='normal'){
      const worked=r.workedHours!=null?Number(r.workedHours):8+defOt; // й җиЁӯи¶іжҷӮ
      workDays++;
      if(worked>=8){
        fixedOtHours+=(r.autoOt!=null?Number(r.autoOt):defOt);
        extraOtHours+=Number(r.ot167||0);
      } else {
        personalMins+=(8-worked)*60;
        personalDates.push(`${d}ж—Ҙ(ж—©йҖҖ${8-worked}h)`);
      }
      // йҒІеҲ°
      if(r.lateMins&&Number(r.lateMins)>0){
        const lm=Number(r.lateMins);const dm=Math.floor(lm/10)*10;
        if(dm>0){personalMins+=dm;personalDates.push(`${d}ж—Ҙ(йҒІеҲ°${lm}еҲҶ)`);}
      }
    } else {
      const worked=Number(r.workedHours||0);
      if(worked>=8){
        workDays++;
        fixedOtHours+=Math.max(0,worked-8);
      } else {
        const leaveH=8-worked;
        if(worked>0)workDays+=worked/8;
        const wh=worked>0?`(дёҠзҸӯ${Math.round(worked*100)/100}h)`:'';  // е°Ҹж•ёз¬¬2дҪҚ
        if(lt.pay==='none'){
          if(type==='absent'){absentDays+=leaveH/8;absentDates.push(`${d}ж—Ҙ${wh}`);}
          else {personalMins+=leaveH*60;personalDates.push(`${d}ж—Ҙ${LEAVE_TYPES[type].label}${wh}`);}
        } else if(lt.pay==='half'){
          sickHours+=leaveH;sickDates.push(`${d}ж—Ҙ${LEAVE_TYPES[type].label}${wh}`);
        } else if(lt.pay==='full'){
          // е…Ёи–ӘеҒҮеҲҘпјҲзү№дј‘/е©ҡ/е–Ә/зҙ…еӯ—пјүпјҡдёҚжүЈи–ӘпјҢдҪҶиҰҒе‘ҲзҸҫ
          const label=LEAVE_TYPES[type].label;
          if(!paidLeaves[label])paidLeaves[label]=[];
          paidLeaves[label].push(`${d}ж—Ҙ${wh}`);
        }
      }
    }
  }

  // еҠ ж¬ҠжҷӮж•ёпјҲеҸӘз”Ёеӣәе®ҡеҠ зҸӯпјҢжұәе®ҡеҪҲжҖ§иЈңиІјпјү
  const W=fixedOtHours*1.34;

  // еҪҲжҖ§иЈңиІј
  let elastic, base;
  let partialOverTarget=false; // еә•и–Ә+еҠ зҸӯиІ» вүҘ жҢүжҜ”дҫӢзӣ®жЁҷи–ӘиіҮзҡ„зү№ж®Ҡжғ…жіҒ
  if(isPartial){
    base=Math.round(BASE_FULL/30*emp2.days);
    // дёҚи¶іжңҲеҠ зҸӯиІ»пјҲз”Ёи¶іжңҲжҷӮи–ӘеҹәзӨҺе…Ҳз®—пјү
    const hourlyFull=BASE_FULL/30/8; // и¶іжңҲжҷӮи–ӘпјҢдёҚдҫқиіҙ elastic
    const fixedOtPayFull=Math.round(hourlyFull*fixedOtHours*1.34*10)/10;
    const proratedTgt=Math.round(target/30*emp2.days);
    // иҮӘеӢ•иЁҲз®—еҪҲжҖ§иЈңиІј = жҢүжҜ”дҫӢзӣ®жЁҷ вҲ’ еә•и–Ә вҲ’ еӣәе®ҡеҠ зҸӯиІ»
    const autoElastic=proratedTgt-base-fixedOtPayFull;
    if(autoElastic<=0){
      // зү№ж®Ҡжғ…жіҒпјҡеә•и–Ә+еҠ зҸӯиІ»е·І вүҘ зӣ®жЁҷпјҢеҪҲжҖ§иЈңиІјиЁӯзӮә 0
      elastic=0;
      partialOverTarget=true;
    } else {
      elastic=autoElastic;
    }
    // иӢҘз®ЎзҗҶе“ЎжңүжүӢеӢ•иҰҶи“ӢпјҢд»ҘжүӢеӢ•зӮәжә–пјҲзӣёе®№иҲҠиіҮж–ҷпјү
    if(rec?.elasticManual!=null)elastic=Number(rec.elasticManual);
  } else {
    base=BASE_FULL;
    elastic=Math.round(target/(1+W/240))-BASE_FULL;
  }

  // жҷӮи–ӘеҹәзӨҺпјҲдёҖеҫӢз”Ёи¶іжңҲеә•и–Ә+еҪҲжҖ§пјү
  const hourly=(BASE_FULL+elastic)/30/8;
  const dailyBase=(base+elastic)/30; // жүЈй …з”ЁеҜҰеҫ—ж—Ҙи–Ә

  // еҠ зҸӯиІ»
  const fixedOtPay=Math.round(hourly*fixedOtHours*1.34*10)/10;
  const extraOtPay=Math.round(hourly*extraOtHours*1.67*10)/10;
  let tempOtPay=0;const tempOtList=[];
  for(const[rate,hrs]of Object.entries(tempOtSegs)){
    const p=Math.round(hourly*hrs*Number(rate)*10)/10;tempOtPay+=p;
    tempOtList.push({rate:Number(rate),hrs,pay:p});
  }
  const otPayTotal=fixedOtPay+extraOtPay+tempOtPay;

  // жүЈй …
  const personalDeduct=Math.round(dailyBase/8*(personalMins/60));
  const absentDeduct=Math.round(dailyBase*absentDays);
  const sickDeduct=Math.round(dailyBase/8*sickHours*0.5);

  // еӢһеҒҘдҝқ
  const insGrade=(rec&&rec.gradeOverride)||getInsGrade(emp,viewYear,viewMonth);
  const ins=insFromGrade(insGrade);
  const laborMonthly=rec?.laborDeduct!=null?rec.laborDeduct:ins.labor;   // ж•ҙжңҲеӢһдҝқиҮӘиІ 
  const healthBase=rec?.healthDeduct!=null?rec.healthDeduct:ins.health;  // жң¬дәәж•ҙжңҲеҒҘдҝқ
  // иҮӘжҸҗ%пјҡsalary жүӢеӢ•иҰҶи“Ӣе„Әе…ҲпјҢеҗҰеүҮжҠ“ hr insurance.pensionRate
  const hrPension=Number(emp.insurance?.pensionRate||0);
  const pensionRate=rec?.pensionRate!=null?rec.pensionRate:hrPension;
  const pensionAmt=pensionRate>0?Math.round(insGrade*pensionRate):0;
  // зң·еұ¬ж•ёпјҡsalary жүӢеӢ•иҰҶи“Ӣе„Әе…ҲпјҢеҗҰеүҮжҠ“ hr insurance.dependents ж•ёйҮҸ
  const hrDeps=Array.isArray(emp.insurance?.dependents)?emp.insurance.dependents.length:0;
  const dependents=rec?.dependents!=null?rec.dependents:hrDeps;
  const healthTotal=healthBase+Math.round(healthBase*dependents*HEALTH_DEP_RATIO); // еҗ«зң·ж•ҙжңҲеҒҘдҝқ
  // з№іиІ»зӢҖж…ӢпјҡжүӢеӢ•иЁӯе®ҡе„Әе…ҲпјӣеҗҰеүҮиӢҘеҲ°иҒ·ж—Ҙ = з•¶еүҚи–ӘиіҮе№ҙжңҲ вҶ’ иҮӘеӢ•ж–°дәәйҰ–жңҲе…ҚжүЈ
  let autoInsMode='normal';
  const _hd=emp2.hireDate?new Date(emp2.hireDate):null;
  if(_hd&&_hd.getFullYear()===viewYear&&(_hd.getMonth()+1)===viewMonth)autoInsMode='new';
  const insMode=rec?.insMode||autoInsMode;

  // в”Җв”Җ еӢһдҝқпјҡжҢүгҖҢеңЁдҝқеӨ©ж•ёгҖҚиЁҲз®—пјҲдёҚи¶іжңҲпјүв”Җв”Җ
  // еңЁдҝқеӨ©ж•ё = йҖҖдҝқж—Ҙ вҲ’ еҲ°иҒ·ж—Ҙ(жҲ–жңҲеҲқ)гҖӮйҖҖдҝқж—Ҙй җиЁӯйӣўиҒ·ж¬Ўж—ҘпјҢж•…йӣўиҒ·ж—Ҙз•¶еӨ©д»ҚеңЁдҝқгҖӮ
  const dim2=getDaysInMonth(viewYear,viewMonth);
  let laborInMonth=laborMonthly; // й җиЁӯж•ҙжңҲ
  let laborInsuredDays=dim2;
  let healthCharged=true;        // еҒҘдҝқжҳҜеҗҰжүЈпјҲйқһи¶іжңҲжҷӮдҫқйҖҖдҝқж—Ҙпјү
  let unenrollDate=null;
  if(isPartial){
    // еңЁдҝқиө·ж—Ҙ
    const monthStart=new Date(viewYear,viewMonth-1,1);
    const startD=emp2.hireDate&&new Date(emp2.hireDate)>monthStart?new Date(emp2.hireDate):monthStart;
    // йҖҖдҝқж—ҘпјҲйӣўиҒ·иҖ…жүҚжңүпјү
    unenrollDate=getUnenrollDate(emp,rec,emp2.leaveDate);
    const monthEnd=new Date(viewYear,viewMonth-1,dim2);
    let endInsured=monthEnd;
    if(unenrollDate){
      // еңЁдҝқеҲ°гҖҢйҖҖдҝқж—ҘеүҚдёҖеӨ©гҖҚпјӣйҖҖдҝқж—ҘиҗҪеңЁз•¶жңҲе…§жүҚзё®зҹӯ
      const ub=new Date(unenrollDate);ub.setDate(ub.getDate()-1);
      if(ub<monthEnd)endInsured=ub;
    }
    laborInsuredDays=Math.max(0,Math.round((endInsured-startD)/86400000)+1);
    laborInMonth=Math.round(laborMonthly/dim2*laborInsuredDays);
    // в”Җв”Җ еҒҘдҝқпјҡеҸӘиҰҒйҖҖдҝқж—ҘдёҚжҳҜз•¶жңҲжңҖеҫҢдёҖеӨ© вҶ’ дёҚжүЈпјӣйҖҖдҝқ=з•¶жңҲжңҖеҫҢдёҖеӨ©жүҚжүЈж•ҙжңҲ в”Җв”Җ
    if(unenrollDate){
      const uYM=unenrollDate.getFullYear()===viewYear&&(unenrollDate.getMonth()+1)===viewMonth;
      // йҖҖдҝқж—ҘеңЁз•¶жңҲпјҡиӢҘйҖҖдҝқж—Ҙ != з•¶жңҲжңҖеҫҢдёҖеӨ© вҶ’ дёҚжүЈеҒҘдҝқ
      if(uYM){healthCharged=(unenrollDate.getDate()===dim2);}
      else {healthCharged=true;} // йҖҖдҝқж—Ҙе·Іи·ЁеҲ°ж¬ЎжңҲ вҶ’ з•¶жңҲж•ҙжңҲеңЁдҝқпјҢжүЈ
    } else {
      healthCharged=true; // зҙ”еҲ°иҒ·дёҚи¶іжңҲпјҲз„ЎйӣўиҒ·пјүпјҢеҒҘдҝқз…§жүЈж•ҙжңҲ
    }
  }

  // в”Җв”Җ дёүзЁ®жЁЎејҸ в”Җв”Җ
  let finalLabor, finalHealth;
  if(insMode==='new'){
    finalLabor=0; finalHealth=0; // ж–°дәәйҰ–жңҲе…ҚжүЈ
  } else if(insMode==='quit_prepay'){
    // йӣўиҒ·й җжүЈпјҡжң¬жңҲдёҖд»Ҫ + й җжүЈж¬ЎжңҲдёҖд»Ҫ = Г—2пјҲз”Ёж•ҙжңҲиІ»з”Ёпјү
    finalLabor=laborMonthly*2;
    finalHealth=healthTotal*2;
  } else {
    finalLabor=isPartial?laborInMonth:laborMonthly;
    finalHealth=isPartial?(healthCharged?healthTotal:0):healthTotal;
  }
  const laborBase=laborMonthly; // йЎҜзӨәз”Ёж•ҙжңҲеҹәжә–

  // еҠ й …
  const annualComp=rec?.annualComp??0;
  const autoAnnualComp=annualComp>0?Math.round(target/30*annualComp):0;
  const redComp=rec?.redComp??0;
  const autoRedComp=redComp>0?Math.round(dailyBase*redComp):0;
  // еӨ®е»ҡйӨҗиІ»иЈңеҠ©пјҡжҜҸжҺ’дёҖеӨ©зҸӯ +100пјҢй җиЁӯ=жҺ’зҸӯеӨ©ж•ёпјҢеҸҜжүӢеӢ•иҰҶи“Ӣ
  const isCen=isCentral(emp.workLocation);
  const mealDays=rec?.mealDays!=null?rec.mealDays:(isCen?scheduledDays:0);
  const mealAllowance=isCen?Math.round(mealDays*MEAL_PER_DAY):0;
  const customAdds=rec?.customAdds||[]; // [{name, amount}]
  const customAddTotal=customAdds.reduce((s,a)=>s+Number(a.amount||0),0);
  // з®ЎзҗҶдәәе“ЎеҮәеӢӨжүЈй»һпјҡжҜҸй»һ -100пјҢжңҖеӨҡжүЈ 8 й»һпјҲ-800пјүпјӣйҒ” 9 й»һд»ҘдёҠе°Ғй Ӯ -800 дёҰжҸҗзӨәз•¶жңҲз„Ўз®ЎзҗҶзҚҺйҮ‘
  const mgrPoints=Number(rec?.mgrPoints||0);
  const mgrDeduct=Math.min(mgrPoints,8)*100;
  const mgrNoBonus=mgrPoints>=9;

  const gross=base+elastic+otPayTotal;
  const totalDeduct=personalDeduct+absentDeduct+sickDeduct+finalLabor+finalHealth+pensionAmt+mgrDeduct;
  const totalAdd=autoAnnualComp+autoRedComp+mealAllowance+customAddTotal;
  const netPay=gross-totalDeduct+totalAdd;

  // дёҚи¶іжңҲй©—з®—зӣ®жЁҷ
  const proratedTarget=isPartial?Math.round(target/30*emp2.days):target;
  const verifySum=base+elastic+fixedOtPay; // жҮүвүҲproratedTarget

  return{
    target,proratedTarget,isPartial,partialOverTarget,employedDays:emp2.days,base,elastic,hourly,dailyBase,defOt,
    fixedOtHours,extraOtHours,tempOtSegs,tempOtList,W,
    fixedOtPay,extraOtPay,tempOtPay,otPayTotal,
    workDays,personalMins,absentDays,sickHours,
    personalDates,sickDates,absentDates,paidLeaves,
    personalDeduct,absentDeduct,sickDeduct,
    mgrPoints,mgrDeduct,mgrNoBonus,
    laborBase,healthBase,healthTotal,finalLabor,finalHealth,
    laborInsuredDays,healthCharged,laborInMonth,
    hireDate:emp2.hireDate,leaveDate:emp2.leaveDate,
    unenrollDate:unenrollDate?dateStr(unenrollDate.getFullYear(),unenrollDate.getMonth()+1,unenrollDate.getDate()):null,
    pensionRate,pensionAmt,dependents,insMode,
    pensionFromHR:(rec?.pensionRate==null&&hrPension>0),depsFromHR:(rec?.dependents==null&&hrDeps>0),
    annualComp,autoAnnualComp,redComp,autoRedComp,customAdds,customAddTotal,
    isCentral:isCen,scheduledDays,mealDays,mealAllowance,
    gross,totalDeduct,totalAdd,netPay,verifySum,
    insGrade,insMatched:ins.matched,gradeOverride:rec?.gradeOverride,elasticManual:rec?.elasticManual
  };
}

// в”Җв”Җв”Җ е…јиҒ·пјҲжҷӮи–ӘеҲ¶пјүиЁҲз®— в”Җв”Җв”Җ
// иҰҸеүҮпјҡеҜҰй ҳ = ОЈ(еҜҰйҡӣдёҠзҸӯжҷӮж•ёГ—(жҷӮи–Ә+10еҮәеӢӨзҚҺеӢө)) + еҠ зҸӯиІ»(зҙ”жҷӮи–ӘГ—еҖҚзҺҮ) + еҠ й … вҲ’ еӢһеҒҘдҝқ вҲ’ з®ЎзҗҶжүЈй»һ
// и«ӢеҒҮдёҚжүЈпјҲеҸӘз®—еҜҰйҡӣеҮәеӢӨпјүпјӣз„Ўеә•и–Ә/еҪҲжҖ§иЈңиІј/зӣ®жЁҷи–ӘиіҮ/дёҚи¶іжңҲжҰӮеҝө
function calcPartTimeSalary(emp,rec,shifts,emp2,defOt){
  const days=getDaysInMonth(viewYear,viewMonth);
  const dd=rec?.dailyData||{};
  const hourlyRate=Number(rec?.hourlyOverride??emp.hourlyRate??0); // зҙ”жҷӮи–Ә
  const ATTEND_BONUS=10; // жҜҸе°ҸжҷӮеҮәеӢӨзҚҺеӢө
  const SHIFT_HOURS=8;   // дёҖеҖӢзҸӯж¬Ўй җиЁӯжҷӮж•ёпјҲз„ЎеЎ«еҜ«еҜҰйҡӣдёҠзҸӯжҷӮз”Ёпјү

  let workedHoursTotal=0;  // еҜҰйҡӣдёҠзҸӯзёҪжҷӮж•ёпјҲеҗ«еҮәеӢӨзҚҺеӢөеҹәжә–пјү
  let fixedOtHours=0, extraOtHours=0, tempOtSegs={};
  let scheduledDays=0, workDays=0;
  let workDates=[]; // еҮәеӢӨж—ҘжҳҺзҙ°
  let scheduledHoursTotal=0; // жҺ’зҸӯзёҪжҷӮж•ёпјҲеҗ«и«ӢеҒҮж—ҘпјҢз”Ёж–јеҲӨж–·жҳҜеҗҰйҒ”136hпјү
  let hasAbnormal=false;     // жҳҜеҗҰжңүйқһжӯЈеёёеҮәеӢӨпјҲи«ӢеҒҮ/зјәеӢӨзӯүпјү

  for(let d=1;d<=days;d++){
    if(!emp2.inEmploy(d))continue;
    const ds=dateStr(viewYear,viewMonth,d);
    const shift=getShift(shifts,emp,ds);
    const r=dd[ds]||{};
    const type=getEffectiveType(emp,r,ds);

    // жңӘжҺ’зҸӯж—ҘиҮЁжҷӮеҠ зҸӯ
    if(!shift){
      const segs=Array.isArray(r.tempSegs)?r.tempSegs:[];
      for(const sg of segs){if(sg.h>0){const rate=Number(sg.rate||1.34);tempOtSegs[rate]=(tempOtSegs[rate]||0)+Number(sg.h);}}
      continue;
    }
    if(type==='dayoff')continue;
    scheduledDays++;
    scheduledHoursTotal+=SHIFT_HOURS; // жҜҸеҖӢжҺ’зҸӯж—Ҙз®— 8hпјҲжҺ’зҸӯеҹәжә–пјү

    // еҲӨж–·йқһжӯЈеёёеҮәеӢӨпјҡжңүи«ӢеҒҮпјҲtype !== normalпјүе°ұжЁҷиЁҳ
    if(type!=='normal')hasAbnormal=true;

    // еҜҰйҡӣеҮәеӢӨжҷӮж•ёпјҲеҸӘз®—зңҹжӯЈдёҠзҸӯзҡ„пјү
    let worked;
    if(r.workedHours!=null)worked=Number(r.workedHours);
    else if(type==='normal')worked=SHIFT_HOURS;
    else worked=0; // и«ӢеҒҮз•¶еӨ©иӢҘжІ’зү№еҲҘеЎ«пјҢз•¶еӨ©жІ’дёҠзҸӯ
    if(worked>0){
      workedHoursTotal+=worked;workDays++;
      workDates.push(`${d}ж—Ҙ(${Math.round(worked*100)/100}h)`);
      fixedOtHours+=(r.autoOt!=null?Number(r.autoOt):0); // е…јиҒ·й җиЁӯ 0пјҢдёҚеҘ—з”Ёеә—йқўеӣәе®ҡеҠ зҸӯиЁӯе®ҡ
      extraOtHours+=Number(r.ot167||0);
    }
  }

  // еҮәеӢӨзҚҺеӢөжўқд»¶пјҡжҺ’зҸӯзёҪжҷӮж•ё вүҘ 136h дё”з•¶жңҲз„Ўд»»дҪ•йқһжӯЈеёёеҮәеӢӨ
  const ATTEND_THRESHOLD=136;
  const attendQualified=scheduledHoursTotal>=ATTEND_THRESHOLD&&!hasAbnormal;

  // и–ӘиіҮзө„жҲҗ
  const basePay=Math.round(workedHoursTotal*hourlyRate);                            // зҙ”жҷӮи–ӘйғЁеҲҶ
  // еҠ зҸӯиІ»пјҲзҙ”жҷӮи–ӘеҹәзӨҺпјҢжҜ”з…§жӯЈиҒ·еҖҚзҺҮпјү
  const fixedOtPay=Math.round(hourlyRate*fixedOtHours*1.34);
  const extraOtPay=Math.round(hourlyRate*extraOtHours*1.67);
  let tempOtPay=0;const tempOtList=[];
  for(const[rate,hrs]of Object.entries(tempOtSegs)){
    const p=Math.round(hourlyRate*hrs*Number(rate));tempOtPay+=p;
    tempOtList.push({rate:Number(rate),hrs,pay:p});
  }
  const otPayTotal=fixedOtPay+extraOtPay+tempOtPay;
  const tempOtHoursTotal=Object.values(tempOtSegs).reduce((s,h)=>s+h,0);
  const otHoursTotal=fixedOtHours+extraOtHours+tempOtHoursTotal; // е…ЁйғЁеҠ зҸӯжҷӮж•ё
  // еҮәеӢӨзҚҺеӢөпјҡе…ЁеӢӨйҒ”жЁҷжүҚзөҰпјҢжҷӮж•ёеҢ…еҗ«еҠ зҸӯжҷӮж•ё
  const attendBonusHours=attendQualified?(workedHoursTotal+otHoursTotal):0;
  const attendBonus=Math.round(attendBonusHours*ATTEND_BONUS);

  // еӢһеҒҘдҝқпјҲе…јиҒ·дёҖжЁЈеҸҜжҠ•дҝқпјҢжІҝз”ЁиЁӯе®ҡпјӣй җиЁӯдёҚжүЈпјҢз”ұ rec жүӢеӢ•иЁӯе®ҡпјү
  const ins=insFromGrade((rec?.gradeOverride)||getInsGrade(emp,viewYear,viewMonth));
  const insMode=rec?.insMode||'normal';
  const finalLabor=insMode==='new'?0:(rec?.laborDeduct!=null?rec.laborDeduct:0);
  const finalHealth=insMode==='new'?0:(rec?.healthDeduct!=null?rec.healthDeduct:0);
  const pensionRate=rec?.pensionRate!=null?rec.pensionRate:Number(emp.insurance?.pensionRate||0);
  const insGrade=(rec?.gradeOverride)||getInsGrade(emp,viewYear,viewMonth);
  const pensionAmt=pensionRate>0?Math.round(insGrade*pensionRate):0;

  // з®ЎзҗҶжүЈй»һ
  const mgrPoints=Number(rec?.mgrPoints||0);
  const mgrDeduct=Math.min(mgrPoints,8)*100;
  const mgrNoBonus=mgrPoints>=9;

  // еҠ й …пјҲе…¶д»–еҠ й …гҖҒйӨҗиІ»иЈңеҠ©пјү
  const isCen=isCentral(emp.workLocation);
  const mealDays=rec?.mealDays!=null?rec.mealDays:(isCen?scheduledDays:0);
  const mealAllowance=isCen?Math.round(mealDays*MEAL_PER_DAY):0;
  const customAdds=rec?.customAdds||[];
  const customAddTotal=customAdds.reduce((s,a)=>s+Number(a.amount||0),0);

  const gross=basePay+attendBonus+otPayTotal;
  const totalDeduct=finalLabor+finalHealth+pensionAmt+mgrDeduct;
  const totalAdd=mealAllowance+customAddTotal;
  const netPay=gross-totalDeduct+totalAdd;

  return{
    isPartTime:true, hourlyRate, attendBonusRate:ATTEND_BONUS,
    attendQualified, scheduledHoursTotal, hasAbnormal, attendThreshold:ATTEND_THRESHOLD,
    attendBonusHours, otHoursTotal,
    workedHoursTotal, workDays, workDates, scheduledDays,
    basePay, attendBonus,
    fixedOtHours, extraOtHours, fixedOtPay, extraOtPay, tempOtPay, otPayTotal, tempOtList, tempOtSegs,
    finalLabor, finalHealth, pensionRate, pensionAmt, insGrade, insMode, insMatched:ins.matched,
    dependents:0, healthCharged:true, laborInsuredDays:0,
    mgrPoints, mgrDeduct, mgrNoBonus,
    mealDays, mealAllowance, customAdds, customAddTotal, isCentral:isCen,
    gross, totalDeduct, totalAdd, netPay,
    employedDays:emp2.days, isPartial:false,
    // еҚ дҪҚпјҲзөҰе…ұз”Ё UI/и–ӘиіҮе–®з”ЁпјҢе…јиҒ·дёҚйҒ©з”Ёзҡ„ж¬„дҪҚзөҰз©әпјү
    paidLeaves:{}, personalDeduct:0, sickDeduct:0, absentDeduct:0,
    personalDates:[], sickDates:[], absentDates:[], personalMins:0, sickHours:0, absentDays:0,
    base:0, elastic:0, target:0, proratedTarget:0, hourly:hourlyRate, defOt,
    annualComp:0,autoAnnualComp:0,redComp:0,autoRedComp:0,
    gradeOverride:rec?.gradeOverride
  };
}
function getDaysInMonth(y,m){return new Date(y,m,0).getDate();}
function dateStr(y,m,d){return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function getShift(shifts,emp,ds){return(shifts[ds]||[]).find(s=>(String(s.empId)===String(emp.id)||normStore(s.empName)===normStore(emp.name))&&s.kind!=='annual');}
// еҸ–жҹҗе“Ўе·Ҙ hr иҮЁжҷӮзү№дј‘ж—Ҙжңҹ SetпјҲз•¶е№ҙеәҰпјү
function getExtraLeaveSet(emp,y){
  const s=new Set();
  const arr=emp&&emp.extraLeave&&emp.extraLeave[y];
  if(Array.isArray(arr))arr.forEach(d=>s.add(d));
  return s;
}
// жұәе®ҡжҹҗеӨ©жңүж•ҲеҒҮеҲҘпјҡsalary_records жүӢеӢ• type е„Әе…ҲпјӣеҗҰеүҮ hr зү№дј‘её¶зӮә annualпјӣеҗҰеүҮ normal
// r.type еӯҳеңЁ(еҗ«'normal')=жүӢеӢ•иЁӯе®ҡйҒҺ вҶ’ е„Әе…ҲпјӣдёҚеӯҳеңЁ=жңӘиЁӯе®ҡ вҶ’ еҸҜиў« extraLeave иҰҶи“Ӣ
function getEffectiveType(emp,r,ds){
  if(r&&r.type!=null&&r.type!=='')return r.type; // жүӢеӢ•иЁӯе®ҡе„Әе…Ҳ
  const y=Number(ds.slice(0,4));
  const exSet=getExtraLeaveSet(emp,y);
  if(exSet.has(ds))return 'annual'; // HR зү№дј‘иҮӘеӢ•её¶е…Ҙ
  return 'normal';
}
function storeEmps(store){return employees.filter(e=>normStore(e.workLocation)===normStore(store));}
function fmtMin(mins){mins=Math.round(mins);if(mins===0)return'0';const h=Math.floor(mins/60),m=mins%60;return`${h>0?h+'жҷӮ':''}${m>0?m+'еҲҶ':''}`||'0';}
// гҖҢжҷӮ:еҲҶгҖҚжҲ–зҙ”ж•ёеӯ—еӯ—дёІ вҶ’ е°ҸжҷӮ(ж•ёеӯ—)
function hmToHours(str){
  if(str==null||str==='')return null;
  str=String(str).trim();
  if(str.includes(':')){
    const[h,m]=str.split(':');
    return (Number(h)||0)+(Number(m)||0)/60;
  }
  return Number(str)||0;
}
// е°ҸжҷӮ(ж•ёеӯ—) вҶ’ гҖҢжҷӮ:еҲҶгҖҚйЎҜзӨә
function hoursToHM(hrs){
  if(hrs==null||hrs===''||isNaN(hrs))return '';
  const total=Math.round(Number(hrs)*60);
  const h=Math.floor(total/60),m=total%60;
  if(m===0)return String(h);
  return `${h}:${String(m).padStart(2,'0')}`;
}
// е°ҸжҷӮ(ж•ёеӯ—) вҶ’ жҷӮйғЁеҲҶ / еҲҶйғЁеҲҶ
function hPart(hrs){if(hrs==null||hrs===''||isNaN(hrs))return '';const t=Math.round(Number(hrs)*60);return Math.floor(t/60);}
function mPart(hrs){if(hrs==null||hrs===''||isNaN(hrs))return '';const t=Math.round(Number(hrs)*60);return t%60;}
// жҷӮ + еҲҶ вҶ’ е°ҸжҷӮ(ж•ёеӯ—)
function hmPartsToHours(h,m){const hh=Number(h)||0,mm=Number(m)||0;if(hh===0&&mm===0)return 0;return hh+mm/60;}
function toDateInput(d){if(!d)return'';const dt=new Date(d);if(isNaN(dt))return'';return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}

// иғҢжҷҜй җијүз•¶еә—еҗ„е“Ўе·Ҙжң¬жңҲеҜҰй ҳпјҢжӣҙж–°дёӢжӢүйҒёй …ж–Үеӯ—
let _preloadToken=0;
async function preloadSnapshots(emps){
  if(!emps||!emps.length)return;
  const token=++_preloadToken;
  for(const e of emps){
    const snapKey=`${e.id}_${viewYear}-${String(viewMonth).padStart(2,'0')}`;
    if(snapCache[snapKey]!=null)continue;
    try{
      const[shifts,rec]=await Promise.all([loadShifts(e.id,viewYear,viewMonth),loadRec(e.id,viewYear,viewMonth)]);
      if(token!==_preloadToken)return; // е·ІеҲҮжҸӣеә—йқў/жңҲд»ҪпјҢж”ҫжЈ„
      const c=calcSalary(e,rec||{dailyData:{}},shifts);
      snapCache[snapKey]=Math.round(c.netPay);
      // жӣҙж–°дёӢжӢүе°ҚжҮү option ж–Үеӯ—
      const sel=document.getElementById('empSel');
      if(sel){const opt=[...sel.options].find(o=>o.value===String(e.id));
        if(opt&&!opt.textContent.includes('еҜҰй ҳ')){
          const tgt=getTarget(e,viewYear,viewMonth);
          const e2=calcEmployedDays(e,viewYear,viewMonth,null);
          const flag=e2.days===0?'пјҲжңӘеңЁиҒ·пјү':(e2.partial&&e2.days<30&&e2.days>0?'пјҲдёҚи¶іжңҲпјү':'');
          opt.textContent=`${e.name}${flag}${tgt?' зӣ®жЁҷ$'+Number(tgt).toLocaleString():''}\nеҜҰй ҳ$${Number(Math.round(c.netPay)).toLocaleString()}`;
        }}
    }catch(err){}
  }
}

async function loadAndRender(empId,doScroll){
  const emp=employees.find(e=>String(e.id)===String(empId));if(!emp)return;
  const[shifts,rec]=await Promise.all([loadShifts(empId,viewYear,viewMonth),loadRec(empId,viewYear,viewMonth)]);
  currentRec=rec||{dailyData:{}};
  if(!currentRec.dailyData)currentRec.dailyData={};
  curShifts=shifts;
  renderSheet(emp,currentRec,shifts,calcSalary(emp,currentRec,shifts));
  if(doScroll){setTimeout(()=>{const el=document.getElementById('sheetArea');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},80);}
}

// в”Җв”Җв”Җ и–ӘиіҮе–® в”Җв”Җв”Җ
function renderSheet(emp,rec,shifts,c){
  const days=getDaysInMonth(viewYear,viewMonth);
  const WD=['ж—Ҙ','дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ'];
  const locked=isMonthLocked(viewYear,viewMonth)&&CU.role!=='admin';
  const dis=locked?'disabled':'';
  const dd=rec?.dailyData||{};
  const defOt=c.defOt;
  const emp2=calcEmployedDays(emp,viewYear,viewMonth,rec);
  const typeOpts=Object.entries(LEAVE_TYPES).map(([v,t])=>`<option value="${v}">${t.label}</option>`).join('');

  // еҚҠжңҲзҜ„еңҚ
  const startD=halfView==='first'?1:16;

  let rows='';
  for(let d=startD;d<=endD;d++){

    const isWknd=dow===0||dow===6;
    const shift=getShift(shifts,emp,ds);
    const r=dd[ds]||{};
    const type=getEffectiveType(emp,r,ds);
    const lt=LEAVE_TYPES[type]||LEAVE_TYPES.normal;
    const inEmp=emp2.inEmploy(d);

      : `<span style="color:var(--text3)">жңӘжҺ’зҸӯ</span>`;

    const hasFixedOt=type==='normal'&&shift&&inEmp;
    const autoOt=r.autoOt!=null?Number(r.autoOt):defOt;
    const ot167=r.ot167||'';
    const lateMins=r.lateMins||'';
    const selCls=`type-sel${lt.cls?' t-'+lt.cls:''}`;

    // и«ӢеҒҮеҮәеӢӨжҷӮж•ёеӯҗж¬„пјҲи«ӢеҒҮдё”йқһе…Ёи–Ә/жҲ–йңҖиҰҒйғЁеҲҶеҮәеӢӨжҷӮпјү
    let subRow='';
    if(shift&&inEmp&&type!=='normal'&&type!=='dayoff'){
      subRow=`<div class="sub-row"><div class="sub-leave">

          <input type="number" min="0" max="59" inputmode="numeric" value="${r.workedHours!=null?mPart(r.workedHours):''}" class="hm-m" placeholder="0" data-date="${ds}" onchange="patchDayParts('${ds}','workedHours','m',this.value)" ${dis}><span class="hm-sep">еҲҶ</span>
        </div>
        <span>пјҲе…¶йӨҳ${LEAVE_TYPES[type].label}пјү</span>
      </div></div>`;
    } else if(c.isPartTime&&shift&&inEmp&&type==='normal'){
      // е…јиҒ·жӯЈеёёж—ҘпјҡеЎ«еҜҰйҡӣдёҠзҸӯжҷӮж•ёпјҲжҷӮи–ӘиЁҲз®—дҫқжӯӨпјү
      subRow=`<div class="sub-row"><div class="sub-leave" style="background:var(--green-bg);border-color:var(--green-border)">
        <span style="color:var(--green);font-weight:600">еҜҰйҡӣдёҠзҸӯжҷӮж•ё</span>
        <div class="hm-wrap">
          <input type="number" min="0" max="23" inputmode="numeric" value="${r.workedHours!=null?hPart(r.workedHours):''}" class="hm-h" placeholder="8" data-date="${ds}" onchange="patchDayParts('${ds}','workedHours','h',this.value)" ${dis}><span class="hm-sep">жҷӮ</span>
          <input type="number" min="0" max="59" inputmode="numeric" value="${r.workedHours!=null?mPart(r.workedHours):''}" class="hm-m" placeholder="0" data-date="${ds}" onchange="patchDayParts('${ds}','workedHours','m',this.value)" ${dis}><span class="hm-sep">еҲҶ</span>
        </div>
        <span style="color:var(--text3);font-size:11px">жңӘеЎ«й җиЁӯ 8h</span>

    }
    // жңӘжҺ’зҸӯж—ҘиҮЁжҷӮеҠ зҸӯеӯҗж¬„пјҲеӨҡж®өиІ»зҺҮпјү
    let tempRow='';
    if(noShift&&inEmp&&r.hasTempOt){
      const segs=Array.isArray(r.tempSegs)?r.tempSegs:(r.tempOt>0?[{h:Number(r.tempOt),rate:Number(r.tempOtRate||1.34)}]:[{h:'',rate:1.34}]);
      const segHtml=segs.map((sg,si)=>`<div class="sub-temp">

    // в”Җв”Җ е…ЁйғЁй җиЁӯж”¶иө·пјҢй»һй–ӢжүҚеЎ«еҜ« в”Җв”Җ
    const fromHR = (r.type==null||r.type==='') && type==='annual'; // з”ұHRзү№дј‘её¶е…Ҙ
    const hasData = (type!=='normal')                                    // жңүеҒҮеҲҘ
      || r.ot167>0 || r.lateMins>0 || r.hasTempOt                       // жңүеҠ зҸӯ/йҒІеҲ°/иҮЁжҷӮеҠ зҸӯ
      || (type!=='normal' && r.workedHours!=null)                       // и«ӢеҒҮж—ҘжүҚзңӢ workedHours
      || (r.autoOt!=null && Math.abs(Number(r.autoOt)-Number(defOt))>0.01); // еӣәе®ҡеҠ зҸӯзўәеҜҰиҲҮй җиЁӯдёҚеҗҢ
    // з•°еёёеҲӨж–·пјҡи«ӢеҒҮдҪҶеӣәе®ҡеҠ зҸӯд»Қ > 0пјҲжңӘжё…зӮә 0пјү

      &&LEAVE_TYPES[type]?.pay==='none'&&(r.autoOt!=null?Number(r.autoOt):defOt)>0;
    const isExpanded = r.expanded;
    if(!isExpanded){
      // ж”¶иө·еҲ—ж‘ҳиҰҒпјҡеҒҮеҲҘе„Әе…ҲпјҲеҗ« HR её¶е…Ҙзү№дј‘пјү

      if(type!=='normal'){
        summary = `<span class="d-sum-tag t-${LEAVE_TYPES[type].cls||'gray'}">${LEAVE_TYPES[type].label}${r.workedHours!=null?`пјҲдёҠзҸӯ${(Math.round(Number(r.workedHours)*100)/100)}hпјү`:''}</span>${fromHR?'<span class="d-sum-extra">пјҲHRзү№дј‘пјү</span>':''}`;
      } else if(noShift){
        summary = r.hasTempOt ? `<span class="d-sum-tag t-blue">иҮЁжҷӮеҠ зҸӯ</span>` : '';
      } else {
        const parts=[];
        if(r.ot167>0)parts.push(`йЎҚеӨ–+${hoursToHM(r.ot167)}h`);
        if(r.lateMins>0)parts.push(`йҒІеҲ°${r.lateMins}еҲҶ`);
        summary = parts.length
          ? `<span class="d-sum-tag t-gray">жӯЈеёё</span><span class="d-sum-extra">${parts.join('гҖҒ')}</span>`

      // жңӘжҺ’зҸӯдё”з„Ўд»»дҪ•иіҮж–ҷ вҶ’ жҘөз°ЎеҲ—пјҲжӣҙз·Ҡзё®пјү

      rows+=`<div class="d-row d-min${isWknd?' weekend':''}${!inEmp?' out-employ':''}${locked?' locked':''}${hasData?' has-data':''}${isAnomaly?' anomaly':''}" onclick="${locked||!inEmp?'':`expandDay('${ds}')`}">

      continue;
    }

    rows+=`<div class="d-row${isWknd?' weekend':''}${noShift&&!isWknd?' no-shift':''}${!inEmp?' out-employ':''}${locked?' locked':''}">

    } else {

// зөұдёҖе„Іеӯҳпјҡж”№иЁҳжҶ¶й«” currentRec + з«ӢеҚійҮҚз№Ә + иғҢжҷҜеӯҳ Firestore
function persist(){ if(selectedEmpId&&currentRec) saveRec(selectedEmpId,viewYear,viewMonth,currentRec); }
function rerender(){
  const emp=employees.find(e=>String(e.id)===String(selectedEmpId));if(!emp||!currentRec)return;
  const sy=window.scrollY;
  const c=calcSalary(emp,currentRec,curShifts);
  renderSheet(emp,currentRec,curShifts,c);
  // еҗҢжӯҘжӣҙж–°дёӢжӢүзҡ„еҜҰй ҳ
  const snapKey=`${selectedEmpId}_${viewYear}-${String(viewMonth).padStart(2,'0')}`;
  snapCache[snapKey]=Math.round(c.netPay);
  window.scrollTo(0,sy);
}
function dayRec(ds){
  if(!currentRec.dailyData)currentRec.dailyData={};
  if(!currentRec.dailyData[ds])currentRec.dailyData[ds]={};
  return currentRec.dailyData[ds];
}

window.applyInsSuggest=function(){
  if(!currentRec)return;
  const emp=employees.find(e=>String(e.id)===String(selectedEmpId));
  const insGrade=(currentRec.gradeOverride)||getInsGrade(emp,viewYear,viewMonth);
  const ins=insFromGrade(insGrade);
  currentRec.laborDeduct=null; currentRec.healthDeduct=null;
  persist();showToast(`вң“ е·ІеҘ—з”Ё ${INS_YEAR} е»әиӯ°еҖјпјҲеӢһдҝқ $${ins.labor} / еҒҘдҝқ $${ins.health}пјү`);rerender();
};
// е…Ёеә—еҘ—з”Ёпјҡжё…йҷӨжүҖжңүдәәз•¶жңҲзҡ„еӢһеҒҘдҝқжүӢеӢ•иҰҶи“ӢеҖј
window.applyAllInsSuggest=async function(){
  const store=selectedStore;
  const emps=storeEmps(store);
  if(!emps.length){showToast('жӯӨеә—йқўз„ЎеңЁиҒ·еҗҢд»Ғ');return;}
  if(!confirm(`зўәе®ҡиҰҒе°ҮгҖҢ${store}гҖҚ${emps.length} дҪҚеҗҢд»Ғзҡ„ ${viewYear}/${viewMonth} еӢһеҒҘдҝқе…ЁйғЁйҮҚиЁӯзӮә ${INS_YEAR} е№ҙеәҰе»әиӯ°еҖјпјҹжүӢеӢ•иҰҶи“Ӣзҡ„йҮ‘йЎҚе°Үиў«жё…йҷӨгҖӮ`))return;
  showToast(`еҘ—з”ЁдёӯпјҢе…ұ ${emps.length} дәәвҖҰ`,5000);
  let cnt=0;
  for(const emp of emps){
    const rec=await loadRec(emp.id,viewYear,viewMonth)||{dailyData:{}};
    rec.laborDeduct=null;rec.healthDeduct=null;
    await saveRec(emp.id,viewYear,viewMonth,rec);
    cnt++;
  }
  // жӣҙж–°еҝ«еҸ–
  for(const emp of emps){
    const snapKey=`${emp.id}_${viewYear}-${String(viewMonth).padStart(2,'0')}`;
    delete snapCache[snapKey];
  }
  showToast(`вң“ е·Іе®ҢжҲҗ ${cnt} дҪҚеҗҢд»Ғзҡ„иІ»зҺҮйҮҚиЁӯ`);
  if(selectedEmpId){const r=await loadRec(selectedEmpId,viewYear,viewMonth);currentRec=r||{dailyData:{}};rerender();}
};

// в”Җв”Җ еӢһеҒҘдҝқж ёе°ҚзёҪиЎЁ в”Җв”Җ
function calcInsAuditRow(emp,rec){
  const insGrade=(rec?.gradeOverride)||getInsGrade(emp,viewYear,viewMonth);
  const ins=insFromGrade(insGrade);
  const insMode=rec?.insMode||'normal';
  const laborSelf=insMode==='new'?0:(rec?.laborDeduct!=null?rec.laborDeduct:ins.labor);
  const healthSelf=insMode==='new'?0:(rec?.healthDeduct!=null?rec.healthDeduct:ins.health);
  const laborEmployer=Math.round(insGrade*0.0894);
  const pension=Math.round(insGrade*0.06);
  const healthEmployer=Math.round(insGrade*0.0517*0.6*1.56);
  return {empId:emp.id,name:emp.name||'вҖ”',grade:insGrade,laborSelf,laborEmployer,pension,healthSelf,healthEmployer,insMode};
}

// иЎЁж јжң¬й«”жёІжҹ“пјҲеҗ«жҜ”е°ҚжЁҷзҙ…пјү
function renderInsAuditBody(){
  const rows=window._insAuditRows||[];
  const cmp=window._insAuditCompare; // {matched:Map(idx->{laborSelf,healthSelf}), unmatchedCompany:[], summary}
  const sum=rows.reduce((s,r)=>({laborSelf:s.laborSelf+r.laborSelf,laborEmployer:s.laborEmployer+r.laborEmployer,pension:s.pension+r.pension,healthSelf:s.healthSelf+r.healthSelf,healthEmployer:s.healthEmployer+r.healthEmployer}),{laborSelf:0,laborEmployer:0,pension:0,healthSelf:0,healthEmployer:0});

  // жҜ”е°ҚзёҪзөҗеҲ—
  let cmpBanner='';
  if(cmp){
    if(cmp.diffCount===0&&cmp.unmatchedCompany.length===0&&cmp.unmatchedSystem.length===0){
      cmpBanner=`<div class="cmp-banner ok">вң“ е…ЁйғЁзӣёз¬Ұпјҡ${cmp.matchedCount} дҪҚеҗҢд»Ғзҡ„еӢһдҝқиҮӘд»ҳгҖҒеҒҘдҝқиҮӘд»ҳиҲҮе…¬еҸёиіҮж–ҷе®Ңе…ЁдёҖиҮҙ</div>`;
    } else {
      const parts=[];
      if(cmp.diffCount>0)parts.push(`${cmp.diffCount} зӯҶйҮ‘йЎҚдёҚдёҖиҮҙ`);
      if(cmp.unmatchedSystem.length)parts.push(`${cmp.unmatchedSystem.length} дҪҚзі»зөұжңүдҪҶе…¬еҸёжңӘжҸҗдҫӣ`);
      if(cmp.unmatchedCompany.length)parts.push(`${cmp.unmatchedCompany.length} дҪҚе…¬еҸёжңүдҪҶзі»зөұжҹҘз„Ў`);
      cmpBanner=`<div class="cmp-banner warn">вҡ пёҸ зҷјзҸҫе·®з•°пјҡ${parts.join('гҖҒ')}гҖӮзҙ…иүІжЁҷзӨәиҷ•и«ӢзўәиӘҚгҖӮ</div>`;
    }
  }

  // е…¬еҸёиіҮж–ҷй…Қе°ҚпјҡжҜҸеҲ—жүҫе°ҚжҮү
  function cellCmp(idx,field,sysVal){
    const inp=`<input class="ac-edit" type="number" value="${sysVal}" data-idx="${idx}" data-field="${field}" onchange="editInsSelf(${idx},'${field}',this.value)">`;
    if(!cmp)return `<td class="ac-num ac-editable">${inp}</td>`;
    const m=cmp.matched.get(idx);
    if(!m||m[field]==null)return `<td class="ac-num ac-editable cmp-na" title="е…¬еҸёжңӘжҸҗдҫӣ">${inp}</td>`;
    const compVal=m[field];
    if(compVal===sysVal)return `<td class="ac-num ac-editable cmp-ok">${inp}<span class="cmp-mark">вң“</span></td>`;
    return `<td class="ac-num ac-editable cmp-diff" title="е…¬еҸёеҖј ${compVal.toLocaleString()} / зі»зөұеҖј ${sysVal.toLocaleString()}">${inp}<div class="cmp-comp">е…¬еҸё ${compVal.toLocaleString()}</div></td>`;
  }

  let html=`${cmpBanner}
    <div class="audit-wrap">
      <table class="audit-tbl">
        <thead><tr>
          <th>е§“еҗҚ</th><th>жҠ•дҝқи–ӘиіҮ</th><th>еӢһдҝқ(иҮӘд»ҳ)</th><th>еӢһдҝқ(е–®дҪҚ)</th><th>еӢһйҖҖ</th><th>еҒҘдҝқ(иҮӘд»ҳ)</th><th>еҒҘдҝқ(е–®дҪҚ)</th>
        </tr></thead>
        <tbody>
          ${rows.map((r,idx)=>{
            const unmatchedSys=cmp&&cmp.unmatchedSystem.includes(idx);
            return `<tr${unmatchedSys?' class="cmp-row-na"':''}>
            <td class="ac-name">${r.name}${r.insMode==='new'?'<span class="ac-tag">йҰ–жңҲе…ҚжүЈ</span>':r.insMode==='quit_prepay'?'<span class="ac-tag o">йӣўиҒ·й җжүЈ</span>':''}${unmatchedSys?'<span class="ac-tag na">е…¬еҸёжңӘжҸҗдҫӣ</span>':''}</td>
            <td>${r.grade.toLocaleString()}</td>
            ${cellCmp(idx,'laborSelf',r.laborSelf)}
            <td class="ac-num">${r.laborEmployer.toLocaleString()}</td>
            <td class="ac-num">${r.pension.toLocaleString()}</td>
            ${cellCmp(idx,'healthSelf',r.healthSelf)}
            <td class="ac-num">${r.healthEmployer.toLocaleString()}</td>
          </tr>`;}).join('')}
          ${cmp&&cmp.unmatchedCompany.length?cmp.unmatchedCompany.map(u=>`<tr class="cmp-row-extra">
            <td class="ac-name">${u.name}<span class="ac-tag r">зі»зөұжҹҘз„Ў</span></td>
            <td>${u.grade?u.grade.toLocaleString():'вҖ”'}</td>
            <td class="ac-num cmp-diff">е…¬еҸё ${u.laborSelf!=null?u.laborSelf.toLocaleString():'вҖ”'}</td>
            <td class="ac-num">вҖ”</td><td class="ac-num">вҖ”</td>
            <td class="ac-num cmp-diff">е…¬еҸё ${u.healthSelf!=null?u.healthSelf.toLocaleString():'вҖ”'}</td>
            <td class="ac-num">вҖ”</td>
          </tr>`).join(''):''}
        </tbody>
        <tfoot><tr class="ac-sum">
          <td>еҗҲиЁҲпјҲ${rows.length}дәәпјү</td><td>вҖ”</td>
          <td class="ac-num">${sum.laborSelf.toLocaleString()}</td>
          <td class="ac-num">${sum.laborEmployer.toLocaleString()}</td>
          <td class="ac-num">${sum.pension.toLocaleString()}</td>
          <td class="ac-num">${sum.healthSelf.toLocaleString()}</td>
          <td class="ac-num">${sum.healthEmployer.toLocaleString()}</td>
        </tr></tfoot>
      </table>

// еҢҜе…Ҙе…¬еҸё CSV дёҰжҜ”е°Қ
window.importInsCompare=function(input){
  const file=input.files&&input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const text=String(e.target.result||'').replace(/^\uFEFF/,'');
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){showToast('вҡ пёҸ CSV жІ’жңүиіҮж–ҷеҲ—');return;}
      // и§ЈжһҗиЎЁй ӯпјҢжүҫж¬„дҪҚдҪҚзҪ®
      const header=lines[0].split(',').map(h=>h.trim());
      const findCol=(...keys)=>header.findIndex(h=>keys.some(k=>h.includes(k)));
      const cName=findCol('е§“еҗҚ');
      const cGrade=findCol('жҠ•дҝқи–ӘиіҮ','жҠ•дҝқзҙҡи·қ','жҠ•дҝқ');
      const cLabor=findCol('еӢһдҝқ(иҮӘд»ҳ)','еӢһдҝқиҮӘд»ҳ','еӢһдҝқпјҲиҮӘд»ҳпјү');
      const cHealth=findCol('еҒҘдҝқ(иҮӘд»ҳ)','еҒҘдҝқиҮӘд»ҳ','еҒҘдҝқпјҲиҮӘд»ҳпјү');
      if(cName<0||cGrade<0){showToast('вҡ пёҸ CSV йңҖеҢ…еҗ«гҖҢе§“еҗҚгҖҚиҲҮгҖҢжҠ•дҝқи–ӘиіҮгҖҚж¬„дҪҚ');return;}
      if(cLabor<0&&cHealth<0){showToast('вҡ пёҸ CSV йңҖиҮіе°‘еҢ…еҗ«гҖҢеӢһдҝқ(иҮӘд»ҳ)гҖҚжҲ–гҖҢеҒҘдҝқ(иҮӘд»ҳ)гҖҚж¬„дҪҚ');return;}

      // е…¬еҸёиіҮж–ҷ
      const company=lines.slice(1).map(l=>{
        const cols=l.split(',').map(c=>c.trim());
        const numOf=i=>{const v=(cols[i]||'').replace(/[$,\s]/g,'');return v===''?null:Number(v);};
        return {
          name:(cols[cName]||'').trim(),
          grade:numOf(cGrade),
          laborSelf:cLabor>=0?numOf(cLabor):null,
          healthSelf:cHealth>=0?numOf(cHealth):null
        };
      }).filter(c=>c.name&&c.name!=='еҗҲиЁҲ');

      // й–Ӣе§ӢжҜ”е°Қпјҡе§“еҗҚ+жҠ•дҝқи–ӘиіҮ йӣҷйҮҚй…Қе°Қ
      const rows=window._insAuditRows||[];
      const matched=new Map();
      const usedCompany=new Set();
      const unmatchedSystem=[];
      let diffCount=0, matchedCount=0;

      rows.forEach((r,idx)=>{
        // жүҫе…¬еҸёиіҮж–ҷдёӯ е§“еҗҚзӣёеҗҢ дё” жҠ•дҝқи–ӘиіҮзӣёеҗҢ
        const ci=company.findIndex((c,i)=>!usedCompany.has(i)&&c.name===r.name&&Number(c.grade)===Number(r.grade));
        if(ci<0){unmatchedSystem.push(idx);return;}
        usedCompany.add(ci);
        matchedCount++;
        const c=company[ci];
        matched.set(idx,{laborSelf:c.laborSelf,healthSelf:c.healthSelf});
        if(c.laborSelf!=null&&c.laborSelf!==r.laborSelf)diffCount++;
        if(c.healthSelf!=null&&c.healthSelf!==r.healthSelf)diffCount++;
      });
      // е…¬еҸёжңүдҪҶзі»зөұжІ’й…ҚеҲ°зҡ„
      const unmatchedCompany=company.filter((c,i)=>!usedCompany.has(i));

      window._insAuditCompare={matched,unmatchedSystem,unmatchedCompany,diffCount,matchedCount};
      document.getElementById('insAuditBody').innerHTML=renderInsAuditBody();
      // жңүеҸҜеҘ—з”Ёзҡ„е·®з•°жҷӮйЎҜзӨәгҖҢдёҖйҚөеҘ—з”Ёе…¬еҸёеҖјгҖҚ
      const applyBtn=document.getElementById('applyCmpBtn');
      if(applyBtn)applyBtn.style.display=diffCount>0?'':'none';
      if(diffCount===0&&unmatchedCompany.length===0&&unmatchedSystem.length===0)showToast(`вң“ е…ЁйғЁзӣёз¬ҰпјҲ${matchedCount}дәәпјү`);
      else showToast(`вҡ пёҸ зҷјзҸҫ ${diffCount} зӯҶе·®з•°пјҢе·ІжЁҷзҙ…`);
    }catch(err){console.error(err);showToast('вҡ пёҸ CSV и§ЈжһҗеӨұж•—пјҢи«ӢзўәиӘҚж јејҸ');}
    input.value=''; // жё…з©әи®“еҗҢжӘ”еҸҜеҶҚйҒё
  };
  reader.readAsText(file,'utf-8');
};

// е–®ж јз·ЁијҜиҮӘд»ҳйҮ‘йЎҚ вҶ’ еҜ«еӣһи©Іе“Ўе·Ҙи–ӘиіҮзҙҖйҢ„
window.editInsSelf=async function(idx,field,val){
  const rows=window._insAuditRows||[];
  const r=rows[idx];if(!r)return;
  const num=Math.round(Number(val))||0;
  const recField=field==='laborSelf'?'laborDeduct':'healthDeduct';
  try{
    const rec=await loadRec(r.empId,viewYear,viewMonth)||{dailyData:{}};
    rec[recField]=num;
    await saveRec(r.empId,viewYear,viewMonth,rec);
    r[field]=num; // жӣҙж–°иЎЁж јиіҮж–ҷ
    // иӢҘи©Іе“Ўе·ҘжӯЈеңЁдё»з•«йқўй–Ӣи‘—пјҢеҗҢжӯҘйҮҚз®—
    if(String(selectedEmpId)===String(r.empId)){const fresh=await loadRec(r.empId,viewYear,viewMonth);currentRec=fresh||{dailyData:{}};rerender();}

    document.getElementById('insAuditBody').innerHTML=renderInsAuditBody();
    const applyBtn=document.getElementById('applyCmpBtn');
    if(applyBtn&&window._insAuditCompare)applyBtn.style.display=window._insAuditCompare.diffCount>0?'':'none';
    showToast(`вң“ е·Іжӣҙж–° ${r.name} зҡ„${field==='laborSelf'?'еӢһдҝқ':'еҒҘдҝқ'}иҮӘд»ҳзӮә $${num.toLocaleString()}`);
  }catch(e){console.error(e);showToast('вҡ пёҸ еҜ«е…ҘеӨұж•—');}
};

// йҮҚж–°иЁҲз®—жҜ”е°Қе·®з•°ж•ёпјҲз·ЁијҜеҫҢз”Ёпјү
function recomputeCompare(){
  const cmp=window._insAuditCompare;if(!cmp)return;
  const rows=window._insAuditRows||[];
  let diffCount=0;
  rows.forEach((r,idx)=>{
    const m=cmp.matched.get(idx);if(!m)return;
    if(m.laborSelf!=null&&m.laborSelf!==r.laborSelf)diffCount++;
    if(m.healthSelf!=null&&m.healthSelf!==r.healthSelf)diffCount++;
  });
  cmp.diffCount=diffCount;
}

// дёҖйҚөеҘ—з”Ёе…¬еҸёеҖјпјҲеҸӘеҘ—з”Ёй…Қе°ҚжҲҗеҠҹдё”жңүе·®з•°зҡ„пјӣзі»зөұжҹҘз„ЎиҖ…еғ…жҸҗзӨәдёҚж–°еўһпјү
window.applyCompanyValues=async function(){
  const cmp=window._insAuditCompare;if(!cmp){showToast('и«Ӣе…ҲеҢҜе…Ҙе…¬еҸёиіҮж–ҷ');return;}
  const rows=window._insAuditRows||[];
  // ж”¶йӣҶиҰҒжӣҙж–°зҡ„
  const updates=[];
  rows.forEach((r,idx)=>{
    const m=cmp.matched.get(idx);if(!m)return;
    const patch={};
    if(m.laborSelf!=null&&m.laborSelf!==r.laborSelf)patch.laborDeduct=m.laborSelf;
    if(m.healthSelf!=null&&m.healthSelf!==r.healthSelf)patch.healthDeduct=m.healthSelf;
    if(Object.keys(patch).length)updates.push({idx,empId:r.empId,name:r.name,patch,m});
  });
  if(!updates.length){showToast('жІ’жңүйңҖиҰҒеҘ—з”Ёзҡ„е·®з•°');return;}
  const naMsg=cmp.unmatchedCompany.length?`\n\nиЁ»пјҡе…¬еҸёиіҮж–ҷдёӯжңү ${cmp.unmatchedCompany.length} дҪҚпјҲ${cmp.unmatchedCompany.map(u=>u.name).join('гҖҒ')}пјүзі»зөұжҹҘз„ЎпјҢе°Үи·ійҒҺдёҚиҷ•зҗҶгҖӮ`:'';
  if(!confirm(`е°Үд»Ҙе…¬еҸёеҖјжӣҙж–° ${updates.length} дҪҚеҗҢд»Ғзҡ„еӢһеҒҘдҝқиҮӘд»ҳйҮ‘йЎҚпјҢдёҰеҜ«еӣһеҗ„иҮӘзҡ„и–ӘиіҮзҙҖйҢ„гҖӮзўәе®ҡеҘ—з”Ёпјҹ${naMsg}`))return;
  showToast(`еҘ—з”ЁдёӯпјҢе…ұ ${updates.length} зӯҶвҖҰ`,8000);
  let done=0;
  for(const u of updates){
    try{
      const rec=await loadRec(u.empId,viewYear,viewMonth)||{dailyData:{}};
      Object.assign(rec,u.patch);
      await saveRec(u.empId,viewYear,viewMonth,rec);
      const row=rows[u.idx];
      if(u.patch.laborDeduct!=null)row.laborSelf=u.patch.laborDeduct;
      if(u.patch.healthDeduct!=null)row.healthSelf=u.patch.healthDeduct;
      done++;
    }catch(e){console.error('еҘ—з”ЁеӨұж•—',u.name,e);}
  }
  // еҗҢжӯҘдё»з•«йқў
  if(selectedEmpId){const fresh=await loadRec(selectedEmpId,viewYear,viewMonth);currentRec=fresh||{dailyData:{}};rerender();}
  recomputeCompare();
  document.getElementById('insAuditBody').innerHTML=renderInsAuditBody();
  const applyBtn=document.getElementById('applyCmpBtn');
  if(applyBtn)applyBtn.style.display=cmp.diffCount>0?'':'none';
  showToast(`вң“ е·ІеҘ—з”Ё ${done} зӯҶ${cmp.unmatchedCompany.length?`пјҲ${cmp.unmatchedCompany.length} дҪҚзі»зөұжҹҘз„Ўе·Іи·ійҒҺпјү`:''}`);
};

window.exportInsAuditCSV=function(){

  const header=['е§“еҗҚ','жҠ•дҝқи–ӘиіҮ','еӢһдҝқ(иҮӘд»ҳ)','еӢһдҝқ(е–®дҪҚ)','еӢһйҖҖ','еҒҘдҝқ(иҮӘд»ҳ)','еҒҘдҝқ(е–®дҪҚ)'];
  const lines=[header.join(',')];
  rows.forEach(r=>lines.push([r.name,r.grade,r.laborSelf,r.laborEmployer,r.pension,r.healthSelf,r.healthEmployer].join(',')));
  const sum=rows.reduce((s,r)=>({a:s.a+r.laborSelf,b:s.b+r.laborEmployer,c:s.c+r.pension,d:s.d+r.healthSelf,e:s.e+r.healthEmployer}),{a:0,b:0,c:0,d:0,e:0});
  lines.push(['еҗҲиЁҲ','',sum.a,sum.b,sum.c,sum.d,sum.e].join(','));
  const csv='\uFEFF'+lines.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);

  a.href=url;a.download=`еӢһеҒҘдҝқж ёе°Қ_${selectedStore}_${viewYear}е№ҙ${viewMonth}жңҲ.csv`;

async function syncAnnualToHR(ds,add){

    const empId=selectedEmpId;
    const yr=new Date(ds).getFullYear();
    // е…Ҳжӣҙж–°иЁҳжҶ¶й«”пјҲи®“ getEffectiveType еҚіжҷӮеҸҚжҳ гҖҒдёӢжӢүеҜҰй ҳйҮҚз®—жӯЈзўәпјү
    const memEmp=employees.find(e=>String(e.id)===String(empId));
    if(memEmp){
      if(!memEmp.extraLeave)memEmp.extraLeave={};
      if(!memEmp.extraLeave[yr])memEmp.extraLeave[yr]=[];
      const ma=memEmp.extraLeave[yr];const mi=ma.indexOf(ds);
      if(add){if(mi<0){ma.push(ds);ma.sort();}}else{if(mi>=0)ma.splice(mi,1);}
    }
    // еҜ«еӣһ Firestore
    const snap=await getDoc(doc(db,'hr','employees'));
    if(!snap.exists())return;
    const list=snap.data().list||[];
    const emp=list.find(e=>String(e.id)===String(empId));
    if(!emp)return;
    if(!emp.extraLeave)emp.extraLeave={};
    if(!emp.extraLeave[yr])emp.extraLeave[yr]=[];
    const arr=emp.extraLeave[yr];
    const idx=arr.indexOf(ds);
    if(add){if(idx<0){arr.push(ds);arr.sort();}}
    else{if(idx>=0)arr.splice(idx,1);}
    await setDoc(doc(db,'hr','employees'),{list},{merge:true});
    showToast(add?`вң“ зү№дј‘ ${ds} е·ІеҗҢжӯҘиҮідәәе“ЎиіҮиЁҠ`:`вң“ е·Із§»йҷӨ ${ds} зү№дј‘еҗҢжӯҘ`);
  }catch(e){console.error('syncAnnualToHR',e);}
}
window.patchDay=function(ds,field,value){if(!currentRec)return;dayRec(ds)[field]=value;persist();rerender();};
window.patchDayHM=function(ds,field,str){if(!currentRec)return;const v=hmToHours(str);dayRec(ds)[field]=(v===null||v===0&&str==='')?(field==='workedHours'?null:0):v;persist();rerender();};
window.patchDayParts=function(ds,field,part,val){
  if(!currentRec)return;
  const r=dayRec(ds);
  const cur=r[field];
  let h=hPart(cur)||0, m=mPart(cur)||0;
  if(part==='h')h=Number(val)||0; else m=Number(val)||0;
  const hours=hmPartsToHours(h,m);
  r[field]=(field==='workedHours'&&hours===0&&part==='h'&&!val&&!m)?null:hours;
  persist();rerender();
};
window.patchRec=function(field,value){if(!currentRec)return;currentRec[field]=value;persist();rerender();};
window.toggleTempOt=function(ds){
  if(!currentRec)return;const r=dayRec(ds);
  r.hasTempOt=!r.hasTempOt;
  if(r.hasTempOt&&!Array.isArray(r.tempSegs))r.tempSegs=[{h:'',rate:1.34}];
  persist();rerender();
};
function ensureSegs(ds){
  const r=dayRec(ds);
  if(!Array.isArray(r.tempSegs)){r.tempSegs=r.tempOt>0?[{h:Number(r.tempOt),rate:Number(r.tempOtRate||1.34)}]:[{h:'',rate:1.34}];}
  return r.tempSegs;
}
window.addTempSeg=function(ds){if(!currentRec)return;ensureSegs(ds).push({h:'',rate:1.34});persist();rerender();};
window.updTempSeg=function(ds,si,field,val){if(!currentRec)return;const s=ensureSegs(ds);if(!s[si])return;s[si][field]=val;persist();rerender();};
window.updTempSegHM=function(ds,si,str){if(!currentRec)return;const s=ensureSegs(ds);if(!s[si])return;s[si].h=hmToHours(str)||0;persist();rerender();};
window.updTempSegParts=function(ds,si,part,val){
  if(!currentRec)return;const s=ensureSegs(ds);if(!s[si])return;
  let h=hPart(s[si].h)||0,m=mPart(s[si].h)||0;
  if(part==='h')h=Number(val)||0;else m=Number(val)||0;
  s[si].h=hmPartsToHours(h,m);persist();rerender();
};
window.delTempSeg=function(ds,si){if(!currentRec)return;const s=ensureSegs(ds);s.splice(si,1);if(!s.length)s.push({h:'',rate:1.34});persist();rerender();};

  try{

// в”Җв”Җ иҮӘиЈҪйҒёеҗҢд»ҒдёӢжӢү в”Җв”Җ
let _cddOpen = false;
let _cddDropEl = null;

function _cddClose(){
  if(_cddDropEl){ _cddDropEl.remove(); _cddDropEl=null; }
  _cddOpen=false;
  document.removeEventListener('touchstart',_cddCloseOnOutside,true);
  document.removeEventListener('click',_cddCloseOnOutside,true);
}
function _cddCloseOnOutside(e){
  if(!_cddDropEl) return;
  // еҲӨж–·и§ёжҺ§/й»һж“ҠжҳҜеҗҰеңЁдёӢжӢүжҲ–и§ёзҷјжҢүйҲ•д»ҘеӨ–
  const t = e.target||e.touches&&e.touches[0]&&document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
  if(t && !_cddDropEl.contains(t) && !t.closest('.cdd-trigger')){
    _cddClose();
  }
}
window._cddToggle = function(btn){
  if(btn.disabled) return;
  if(_cddOpen){ _cddClose(); return; }
  const cdd = btn.closest('.cdd');
  const trigger = btn;
  const rect = trigger.getBoundingClientRect();
  
  // е»әз«ӢдёӢжӢү
  const drop = document.createElement('div');
  drop.className='cdd-dropdown';
  drop.style.touchAction='pan-y'; // е…ҒиЁұдёӢжӢүе…§еһӮзӣҙж»ҫеӢ•
  // еӢ•ж…ӢиЁҲз®—еҸҜз”Ёй«ҳеәҰпјҡиҰ–зӘ—еә•йғЁ - trigger еә•йғЁ - 16px е®үе…Ёи·қйӣў
  const availH = window.innerHeight - rect.bottom - 16;
  drop.style.maxHeight = Math.max(availH, 200) + 'px';
  
  const inner = document.createElement('div');
  inner.className='cdd-dropdown-inner';
  
  // еҸ–еҫ—зӣ®еүҚзҡ„ empSel optionsпјҲйҡұи—Ҹзҡ„ select йӮ„еңЁ DOM иЈЎпјү
  const sel = document.getElementById('empSel');
  if(!sel){ _cddClose(); return; }
  
  const opts = Array.from(sel.options);
  opts.forEach(opt => {
    if(!opt.value){
      const ph = document.createElement('div');
      ph.className='cdd-opt-placeholder';
      ph.textContent = opt.text;
      inner.appendChild(ph);
      return;
    }
    const text = opt.text;
    // и§Јжһҗпјҡе§“еҗҚгҖҒзӣ®жЁҷ$xxxгҖҒеҜҰй ҳ$xxx
    const nameMatch = text.match(/^([^\n\u3000зӣ®жЁҷеҜҰй ҳ]+)/);
    const targetMatch = text.match(/зӣ®жЁҷ\$([\d,]+)/);
    const actualMatch = text.match(/еҜҰй ҳ\$([\d,]+)/);
    const name = nameMatch ? nameMatch[1].trim() : text;
    
    const item = document.createElement('div');
    item.className = 'cdd-opt' + (opt.value === sel.value ? ' selected' : '');
    item.innerHTML = `<div class="opt-name">${name}</div>${targetMatch?`<div class="opt-target">зӣ®жЁҷ $${targetMatch[1]}</div>`:''}${actualMatch?`<div class="opt-actual">еҜҰй ҳ $${actualMatch[1]}</div>`:''}`;
    item.addEventListener('click', e=>{
      e.stopPropagation();
      _cddClose();
      // и§ёзҷјйҒёж“Ү
      sel.value = opt.value;
      selEmpFromSel(opt.value);
      // жӣҙж–° trigger ж–Үеӯ—
      const trigText = btn.querySelector('.cdd-trigger-text');
      if(trigText) trigText.textContent = name;
    });
    inner.appendChild(item);
  });
  
  drop.appendChild(inner);
  cdd.appendChild(drop);
  _cddDropEl = drop;
  _cddOpen = true;
  setTimeout(()=>{
    document.addEventListener('touchstart',_cddCloseOnOutside,true);
    document.addEventListener('click',_cddCloseOnOutside,true);
  },0);
};

// з•¶ empSel options жӣҙж–°еҫҢпјҢеҗҢжӯҘжӣҙж–° trigger йЎҜзӨәж–Үеӯ—
const _origUpdateEmpSel = window._updateEmpSelDisplay;
function _syncCddTrigger(){
  const sel = document.getElementById('empSel');
  const trigText = document.querySelector('.cdd-trigger-text');
  if(!sel || !trigText) return;
  const cur = sel.options[sel.selectedIndex];
  if(cur && cur.value){
    const nameMatch = cur.text.match(/^([^\nзӣ®жЁҷеҜҰ]+)/);
    trigText.textContent = nameMatch ? nameMatch[1].trim() : cur.text;
  } else {
    trigText.textContent = cur ? cur.text : 'вҖ” и«ӢйҒёж“ҮеҗҢд»Ғ вҖ”';
  }
}
// иҰҶеҜ« selEmpFromSel еҠ е…ҘеҗҢжӯҘ
const _orig_selEmpFromSel = window.selEmpFromSel;
window.selEmpFromSel = async function(empId){
  await _orig_selEmpFromSel(empId);
  setTimeout(_syncCddTrigger, 100);
};

</script>
