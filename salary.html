<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>薪資計算 — 鑫系統</title>
<style>
:root{
  --bg:#ECEEF2;--surface:#fff;--surface2:#F4F5F8;--border:#DDE1E9;
  --text:#1A1D23;--text2:#5A6175;--text3:#9AA0B4;
  --accent:#2D3142;--accent-hover:#1E2230;--accent-light:#F0F2F5;
  --green:#1A9B4C;--green-bg:#E5F5EB;--green-border:#B4E1C2;
  --orange:#C47A00;--orange-bg:#FFF4E0;--orange-border:#FDDFA0;
  --red:#D33A3A;--red-bg:#FCEBEB;--red-border:#F7C8C8;
  --blue:#2D6BF0;--blue-bg:#EAF0FF;--blue-border:#C3D4F7;
  --yellow-bg:#FFFBE6;--yellow-border:#FFE58F;
  --purple:#7C3AED;--purple-bg:#F5F0FF;--purple-border:#D8B4FE;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

.topbar{height:60px;background:var(--accent);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200;gap:8px}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1;overflow:hidden}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.back-btn{font-size:12px;padding:0 13px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0;min-height:44px;display:flex;align-items:center}
.back-btn:hover{background:rgba(255,255,255,.22)}
.dv{width:1px;height:20px;background:rgba(255,255,255,.2);flex-shrink:0}
.topbar h1{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;margin:0;white-space:nowrap}
.role-chip{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;background:rgba(255,255,255,.15);color:#fff;white-space:nowrap}
@media(max-width:600px){.topbar{padding:0 10px}.topbar h1{font-size:14px}.back-btn{font-size:11px;padding:0 9px;min-height:38px}}

.main{max-width:1100px;margin:0 auto;padding:18px 16px 80px}

.filter-bar{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-bar select{font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;min-height:36px;cursor:pointer}
.filter-bar select:focus{border-color:var(--accent)}
.fl{font-size:12px;color:var(--text2);white-space:nowrap;font-weight:500}
.fdv{width:1px;height:20px;background:var(--border);flex-shrink:0}

.locked-banner{border-radius:10px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;background:var(--orange-bg);border:1px solid var(--orange-border);color:var(--orange)}

.btn{font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;font-weight:500;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-family:inherit;transition:all .15s;border:none;min-height:36px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}.btn-outline:hover{background:var(--surface2)}
.btn-sm{font-size:12px;padding:4px 10px;min-height:28px;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-weight:500;font-family:inherit;border:none;transition:all .15s}
.btn-sm.p{background:var(--accent);color:#fff}
.btn-sm.o{border:1px solid var(--border);background:#fff;color:var(--text2)}.btn-sm.o:hover{background:var(--surface2)}

.ot-panel{background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.ot-panel-title{font-size:12px;font-weight:700;color:#92640A;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.ot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.ot-item{background:#fff;border:1px solid var(--yellow-border);border-radius:8px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ot-item-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ot-sel{font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;font-family:inherit;-webkit-appearance:none;appearance:none;min-height:28px;cursor:pointer}

.emp-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px;margin-bottom:16px}
.emp-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .15s}
.emp-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.07)}
.emp-card.active{border-color:var(--accent);background:var(--accent-light)}
.emp-name{font-size:14px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.emp-meta{font-size:11px;color:var(--text2);display:flex;gap:8px;flex-wrap:wrap}
.emp-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--accent-light);color:var(--accent)}
.partial-flag{font-size:9px;font-weight:600;padding:1px 6px;border-radius:10px;background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border)}

.salary-sheet{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;scroll-margin-top:70px}
.sheet-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;background:var(--surface2)}
.sheet-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}

.sum-row{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
@media(max-width:700px){.sum-row{grid-template-columns:repeat(2,1fr)}}
.sum-cell{padding:12px 14px;border-right:1px solid var(--border);text-align:center}
.sum-cell:last-child{border-right:none}
.sum-lbl{font-size:10px;color:var(--text3);margin-bottom:3px}
.sum-val{font-size:17px;font-weight:700}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-blue{color:var(--blue)}.c-orange{color:var(--orange)}

.fml-sec{padding:12px 16px;border-bottom:1px solid var(--border)}
.sec-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.fml-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
@media(max-width:700px){.fml-grid{grid-template-columns:repeat(2,1fr)}}
.fml-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
.fi-lbl{font-size:10px;color:var(--text3);margin-bottom:2px}
.fi-val{font-size:13px;font-weight:600}
.fi-sub{font-size:10px;color:var(--text3);margin-top:2px}
.eq-bar{font-size:12px;color:var(--text2);padding:8px 10px;background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:7px;display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-top:6px}
.eq-bar .v{font-weight:700;color:var(--text);font-size:13px}.eq-bar .op{color:var(--text3)}

/* 不足月驗算盒 */
.partial-box{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--orange-bg)}
.partial-box .sec-title{color:var(--orange)}
.partial-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.partial-item{background:#fff;border:1px solid var(--orange-border);border-radius:8px;padding:9px 11px}
.partial-item label{font-size:10px;color:var(--text3);display:block;margin-bottom:4px}
.partial-item input{font-size:14px;font-weight:600;padding:4px 7px;border:1px solid var(--border);border-radius:6px;width:100%;font-family:inherit;text-align:right;-webkit-appearance:none;appearance:none;min-height:32px}
.partial-item input:focus{border-color:var(--orange);outline:none}
.partial-item .readonly-val{font-size:15px;font-weight:700;color:var(--text)}
.verify-line{margin-top:10px;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:8px}
.verify-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.verify-no{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}

.daily-sec{padding:12px 16px}
.half-toggle{display:flex;gap:6px;margin-bottom:10px}
.half-btn{flex:1;font-size:13px;padding:8px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text2);cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.half-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.daily-hd-row{display:grid;grid-template-columns:46px minmax(0,1fr) 86px 70px 70px 60px;gap:4px;padding:3px 8px;font-size:10px;color:var(--text3);font-weight:600}
.d-row{display:grid;grid-template-columns:46px minmax(0,1fr) 86px 70px 70px 60px;gap:4px;align-items:center;padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:3px}
.d-row:hover{background:#EDEEF3}
.d-row.weekend{background:#FFF8F8;border-color:#FDDADA}
.d-row.no-shift{opacity:.55}
.d-row.d-min{grid-template-columns:46px 1fr;cursor:pointer;opacity:.7;padding:5px 8px}
.d-row.d-min:hover{opacity:1;background:#EDEEF3}
@media(max-width:700px){.d-row.d-min{grid-template-columns:40px 1fr}}
.d-min-label{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px}
.d-min-hint{font-size:10px;color:var(--blue)}
.d-collapse{font-size:10px;color:var(--text3);cursor:pointer;text-decoration:underline;margin-left:4px}
.d-collapse:hover{color:var(--accent)}
.d-row.out-employ{opacity:.35;pointer-events:none}
.d-row.locked{pointer-events:none;opacity:.7}
@media(max-width:700px){
  .daily-hd-row{display:none}
  .d-row{grid-template-columns:40px minmax(0,1fr) 78px 58px;gap:3px;padding:6px 7px}
  .d-row .col-ot2,.d-row .col-late{display:none}
}
.d-date{text-align:center}.d-num{font-size:12px;font-weight:700}.d-wday{font-size:10px;color:var(--text3)}
.d-shift{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.type-sel{font-size:11px;padding:3px 4px;border:1px solid var(--border);border-radius:6px;background:#fff;font-family:inherit;width:100%;-webkit-appearance:none;appearance:none;min-height:28px;cursor:pointer;color:var(--text)}
.type-sel.t-absent,.type-sel.t-careLeave{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.type-sel.t-sick,.type-sel.t-physio{background:var(--orange-bg);border-color:var(--orange-border);color:var(--orange)}
.type-sel.t-annual,.type-sel.t-wed,.type-sel.t-funeral,.type-sel.t-redEnvelope{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.ipt-wrap{position:relative;display:flex;align-items:center}
.ipt-wrap input{width:100%;font-size:11px;padding:3px 16px 3px 5px;border:1px solid var(--border);border-radius:6px;background:#fff;font-family:inherit;text-align:right;min-height:28px;-webkit-appearance:none;appearance:none}
.ipt-wrap input:focus{border-color:var(--accent);outline:none}
.ipt-wrap input.fill-orange{background:var(--orange-bg);border-color:var(--orange-border);color:var(--orange)}
.ipt-wrap input.fill-red{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.ipt-wrap input:disabled{opacity:.4;cursor:not-allowed;background:#F0F0F0}
.ipt-unit{position:absolute;right:4px;font-size:9px;color:var(--text3);pointer-events:none}

/* 子欄：請假出勤時數 / 未排班臨時加班 */
.sub-row{grid-column:1/-1;display:flex;gap:6px;padding:4px 0 0 46px;flex-wrap:wrap}
@media(max-width:700px){.sub-row{padding:4px 0 0 40px}}
.sub-leave{display:flex;align-items:center;gap:5px;background:var(--purple-bg);border:1px solid var(--purple-border);border-radius:6px;padding:5px 8px;font-size:11px;color:var(--purple);font-weight:500}
.sub-leave input{width:54px;font-size:11px;padding:3px 5px;border:1px solid var(--purple-border);border-radius:5px;background:#fff;font-family:inherit;text-align:right;min-height:26px;-webkit-appearance:none;appearance:none}
.sub-temp{display:flex;align-items:center;gap:5px;background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:6px;padding:5px 8px;font-size:11px;color:var(--blue);font-weight:500}
.sub-temp input{width:54px;font-size:11px;padding:3px 5px;border:1px solid var(--blue-border);border-radius:5px;background:#fff;font-family:inherit;text-align:right;min-height:26px;-webkit-appearance:none;appearance:none}
.sub-temp select{font-size:11px;padding:3px 5px;border:1px solid var(--blue-border);border-radius:5px;background:#fff;font-family:inherit;min-height:26px;-webkit-appearance:none;appearance:none}

.ins-section{padding:12px 16px;border-top:1px solid var(--border)}
.ins-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:7px}
.ins-item{padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px}
.ins-item-lbl{font-size:11px;color:var(--text3);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.ins-item-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.ins-item-val{font-size:13px;font-weight:600}
.ins-sel{font-size:11px;padding:3px 6px;border:1px solid var(--border);border-radius:6px;background:#fff;font-family:inherit;-webkit-appearance:none;appearance:none;min-height:26px;cursor:pointer}
.ins-sel:focus{border-color:var(--accent);outline:none}
.ded-input{font-size:13px;padding:4px 7px;border:1px solid var(--border);border-radius:6px;background:#fff;font-family:inherit;width:80px;text-align:right;min-height:30px;-webkit-appearance:none;appearance:none}
.ded-input:focus{border-color:var(--accent);outline:none}
.prepay-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.prepay-new{background:var(--green-bg);color:var(--green)}
.prepay-quit{background:var(--orange-bg);color:var(--orange)}
/* 勞健保新版 */
.ins-headbar{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.ins-head-cell{flex:1;min-width:140px;background:var(--accent-light);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ins-head-lbl{font-size:11px;color:var(--text3)}
.ins-head-val{font-size:15px;font-weight:700;color:var(--accent)}
.ins-head-note{font-size:10px;color:var(--text3)}
.ins-table{border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ins-trow{display:grid;grid-template-columns:1.1fr 1.6fr 1fr;gap:8px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border)}
.ins-trow:last-child{border-bottom:none}
.ins-thead{background:var(--surface2);font-size:10px;color:var(--text3);font-weight:600;padding:6px 12px}
.ins-tname{font-size:13px;font-weight:600;color:var(--text)}
.ins-tnote{font-size:10px;color:var(--text3);font-weight:400;margin-top:1px}
.ins-tval{font-size:14px;font-weight:700;color:var(--red);text-align:right}
.ins-tval.strike{text-decoration:line-through;color:var(--text3)}
.ins-auto{font-size:10px;color:var(--green);white-space:nowrap}
.ins-banner{font-size:11px;margin-top:8px;padding:8px 12px;border-radius:8px;line-height:1.5}
.ins-banner-g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.ins-banner-o{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border)}
.employ-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.employ-head{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12px;font-weight:600;color:var(--text2)}
.employ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:10px}
.employ-item label{font-size:10px;color:var(--text3);display:block;margin-bottom:4px}
.employ-item input{font-size:13px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;width:100%;font-family:inherit;-webkit-appearance:none;appearance:none;min-height:34px;background:#fff}
.employ-item input:focus{border-color:var(--accent);outline:none}
.employ-note{font-size:10px;color:var(--text3);margin-top:8px;line-height:1.5}
@media(max-width:600px){.ins-trow{grid-template-columns:1fr;gap:5px}.ins-tval{text-align:left}.ins-thead{display:none}}

.ded-sec{padding:12px 16px;border-top:1px solid var(--border)}
.paid-leave-box{margin-top:10px;padding:10px 12px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:8px}
.paid-leave-title{font-size:12px;font-weight:600;color:var(--green);margin-bottom:6px}
.paid-leave-list{display:flex;flex-direction:column;gap:4px}
.paid-leave-item{display:flex;align-items:center;gap:8px;font-size:12px}
.paid-leave-label{font-weight:600;color:var(--green);min-width:60px}
.paid-leave-dates{color:var(--text2)}
.ded-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
@media(max-width:700px){.ded-grid{grid-template-columns:1fr}}
.ded-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;gap:6px}
.ded-lbl{font-size:12px;color:var(--text2);flex:1}
.ded-sub{font-size:10px;color:var(--text3);margin-top:1px}
.ded-dates{font-size:10px;color:var(--red);margin-top:3px;line-height:1.4}
.ded-val{font-size:13px;font-weight:600;color:var(--red);white-space:nowrap}

.add-sec{padding:12px 16px;border-top:1px solid var(--border)}
.add-list{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.add-item{display:flex;align-items:center;gap:7px;padding:9px 12px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:8px}
.add-item .add-name{flex:1;font-size:12px;color:var(--green);font-weight:500}
.add-item .add-name-input{flex:1;font-size:12px;padding:4px 7px;border:1px solid var(--green-border);border-radius:6px;background:#fff;font-family:inherit;min-height:30px}
.add-item input.add-amt{font-size:13px;padding:4px 7px;border:1px solid var(--green-border);border-radius:6px;background:#fff;font-family:inherit;width:90px;text-align:right;min-height:30px;-webkit-appearance:none;appearance:none}
.add-item .add-days{font-size:13px;padding:4px 7px;border:1px solid var(--green-border);border-radius:6px;background:#fff;font-family:inherit;width:64px;text-align:right;min-height:30px;-webkit-appearance:none;appearance:none}
.add-val{font-size:13px;font-weight:600;color:var(--green);white-space:nowrap;min-width:70px;text-align:right}
.add-del{font-size:11px;color:var(--red);cursor:pointer;padding:2px 6px;border-radius:6px;border:1px solid var(--red-border);background:#fff}

.netpay-bar{margin:12px 16px;padding:14px 16px;background:linear-gradient(135deg,#2D3142 0%,#404563 100%);border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.np-lbl{font-size:13px;color:rgba(255,255,255,.75);font-weight:500}
.np-val{font-size:24px;font-weight:800;color:#fff}
@media(max-width:500px){.np-val{font-size:20px}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1D23;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;transition:all .25s;z-index:9999;pointer-events:none;white-space:nowrap}
/* 薪資單 overlay */
.slip-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.slip-overlay{align-items:center}}
.slip-modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
@media(min-width:600px){.slip-modal{border-radius:14px;max-height:85vh}}
.slip-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0}
.slip-close{background:#fff;color:var(--text);border:1px solid var(--border)}.slip-close:hover{background:var(--surface2)}
.slip-body{padding:20px 18px;overflow-y:auto;color:#1a1a1a}
.slip-body table{width:100%;border-collapse:collapse;margin-bottom:12px}
.slip-body td{padding:7px 10px;border-bottom:1px solid #eee;font-size:13px}
.slip-body td:last-child{text-align:right;font-weight:500}
.slip-body .sh{background:#f5f5f5;font-weight:700;font-size:11px;color:#555;padding:5px 10px}
.slip-body .tot td{font-weight:700;font-size:15px;background:#f0f4ff;border-top:2px solid #2D3142}
.slip-body .red{color:#D33A3A}.slip-body .green{color:#1A9B4C}
@media print{
  body.printing-slip>*{display:none!important}
  body.printing-slip .slip-overlay{display:block!important;position:static;background:#fff}
  body.printing-slip .slip-modal{max-height:none;box-shadow:none}
  body.printing-slip .slip-bar{display:none!important}
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.badge-g{background:var(--green-bg);color:var(--green)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}

<script type="module">
import { authGuard, db, writeOpLog } from './auth-guard.js?v=2';
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let CU={name:'',role:'',uid:''};
let employees=[], allStores=[], viewableStores=[], storeOtConfig={};
let selectedStore=null, selectedEmpId=null;
let viewYear=new Date().getFullYear(), viewMonth=new Date().getMonth()+1;
let isSaving=false, showOtPanel=false, halfView='first', employBoxOpen=false;
let currentRec=null; // 記憶體快取，避免 setDoc 後立刻 getDoc 的延遲
let curShifts={};

const ROLE_NAMES={admin:'管理員',consultant:'顧問',manager:'店長/副店長',employee:'同仁'};
const BASE_FULL=29500;

// 店名正規化（鋪→舖）
function normStore(s){return String(s||'').replace(/鋪/g,'舖').trim();}

// 假別：pay=full/half/none, ot=是否計加班
const LEAVE_TYPES={
  normal:     {label:'正常',       pay:'full', ot:true },
  sick:       {label:'病假',       pay:'half', ot:false, cls:'sick'},
  physio:     {label:'生理假',     pay:'half', ot:false, cls:'physio'},
  personal:   {label:'事假',       pay:'none', ot:false, cls:'absent'},
  absent:     {label:'曠職',       pay:'none', ot:false, cls:'absent'},
  careLeave:  {label:'家庭照顧假', pay:'none', ot:false, cls:'careLeave'},
  annual:     {label:'特休假',     pay:'full', ot:false, cls:'annual'},
  wed:        {label:'婚假',       pay:'full', ot:false, cls:'wed'},
  funeral:    {label:'喪假',       pay:'full', ot:false, cls:'funeral'},
  redEnvelope:{label:'紅字假',     pay:'full', ot:false, cls:'redEnvelope'},
  dayoff:     {label:'公休',       pay:'none', ot:false },
};

// 115年(2026) 勞健保級距表：labor=員工勞保自負, health=員工健保自負(本人), pension6=公司勞退6%(參考)
const INS_YEAR=2026;
const LABOR_TABLE=[
  {grade:1500,labor:277,health:458},{grade:3000,labor:277,health:458},{grade:4500,labor:277,health:458},
  {grade:6000,labor:277,health:458},{grade:7500,labor:277,health:458},{grade:8700,labor:277,health:458},
  {grade:9900,labor:277,health:458},{grade:11100,labor:277,health:458},{grade:12540,labor:313,health:458},
  {grade:13500,labor:338,health:458},{grade:15840,labor:396,health:458},{grade:16500,labor:413,health:458},
  {grade:17280,labor:432,health:458},{grade:17880,labor:447,health:458},{grade:19047,labor:476,health:458},
  {grade:20008,labor:500,health:458},{grade:21009,labor:525,health:458},{grade:22000,labor:550,health:458},
  {grade:23100,labor:577,health:458},{grade:24000,labor:600,health:458},{grade:25250,labor:632,health:458},
  {grade:26400,labor:660,health:458},{grade:27600,labor:690,health:458},{grade:28590,labor:715,health:458},
  {grade:29500,labor:738,health:458},{grade:30300,labor:758,health:470},{grade:31800,labor:795,health:493},
  {grade:33300,labor:833,health:516},{grade:34800,labor:870,health:540},{grade:36300,labor:908,health:563},
  {grade:38200,labor:955,health:592},{grade:40100,labor:1002,health:622},{grade:42000,labor:1050,health:651},
  {grade:43900,labor:1098,health:681},{grade:45800,labor:1145,health:710},{grade:48200,labor:1145,health:748},
  {grade:50600,labor:1145,health:785},{grade:53000,labor:1145,health:822},{grade:55400,labor:1145,health:859},
  {grade:57800,labor:1145,health:896},{grade:60800,labor:1145,health:943},{grade:63800,labor:1145,health:990},
  {grade:66800,labor:1145,health:1036},{grade:69800,labor:1145,health:1083},{grade:72800,labor:1145,health:1129},
  {grade:76500,labor:1145,health:1187},{grade:80200,labor:1145,health:1244},{grade:83900,labor:1145,health:1301},
  {grade:87600,labor:1145,health:1359},{grade:92100,labor:1145,health:1428},{grade:96600,labor:1145,health:1498},
  {grade:101100,labor:1145,health:1568},{grade:105600,labor:1145,health:1638},{grade:110100,labor:1145,health:1708},
  {grade:115500,labor:1145,health:1791},{grade:120900,labor:1145,health:1875},{grade:126300,labor:1145,health:1959},
  {grade:131700,labor:1145,health:2043},{grade:137100,labor:1145,health:2126},{grade:142500,labor:1145,health:2210},
  {grade:147900,labor:1145,health:2294},{grade:150000,labor:1145,health:2327},
];
const HEALTH_DEP_RATIO=1; // 每位眷屬 = 1 份本人健保費
function insFromGrade(grade){
  if(!grade)return{labor:0,health:0,matched:0};
  const g=Number(grade);let best=LABOR_TABLE[0];
  // 取「大於等於投保金額」的最接近級距（投保金額應落在某一級）
  for(const r of LABOR_TABLE){if(r.grade<=g)best=r;}
  // 若有完全相等的級距優先
  const exact=LABOR_TABLE.find(r=>r.grade===g);
  if(exact)best=exact;
  return{labor:best.labor,health:best.health,matched:best.grade};
}

// 取員工欄位（多重 fallback）
function getHireDate(e){return e.hireDate||e.startDate||e.onboardDate||e.到職日||e.entryDate||null;}
function getLeaveDate(e){return e.leaveDate||e.resignDate||e.離職日||e.quitDate||null;}
function getInsGrade(e){return Number(e.insurance?.grade||e.insuranceGrade||e.投保級距||e.grade||0);}
function getTarget(e){
  const h=(e.salaryHistory||[]).slice().sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  if(h.length>0)return Number(h[0].amount);
  return Number(e.salary||e.targetSalary||0);
}

function isMonthLocked(y,m){
  const now=new Date();const cy=now.getFullYear(),cm=now.getMonth()+1;
  if(y<cy)return true;if(y===cy&&m<cm)return true;return false;
}

// 計算當月在職天數（30天制）：rec 可手動覆蓋到職/離職日，否則用 HR 資料
function calcEmployedDays(emp,y,m,rec){
  const dim=getDaysInMonth(y,m);
  const monthStart=new Date(y,m-1,1), monthEnd=new Date(y,m-1,dim);
  let s=monthStart, e=monthEnd, partial=false;
  // 優先用手動設定（rec.hireOverride / rec.leaveOverride），否則 HR 欄位
  const hd=(rec&&rec.hireOverride)||getHireDate(emp);
  const ld=(rec&&rec.leaveOverride)||getLeaveDate(emp);
  if(hd){const d=new Date(hd); if(d>monthEnd) return {days:0,partial:true,empty:true,inEmploy:()=>false,hireDate:hd,leaveDate:ld};
    if(d>monthStart){s=d;partial=true;}}
  if(ld){const d=new Date(ld); if(d<monthStart) return {days:0,partial:true,empty:true,inEmploy:()=>false,hireDate:hd,leaveDate:ld};
    if(d<monthEnd){e=d;partial=true;}}
  const dayCount=Math.round((e-s)/86400000)+1;
  const employedDays = partial ? dayCount : 30;
  const sN=s.getDate(), eN=e.getDate();
  return {
    days:employedDays, partial, hireDate:hd, leaveDate:ld,
    lastWorkDayNum:eN, firstWorkDayNum:sN,
    inEmploy:(dayNum)=>partial?(dayNum>=sN&&dayNum<=eN):true
  };
}
// 退保日：預設離職日次日（可由 rec.unenrollOverride 覆蓋）
function getUnenrollDate(emp,rec,leaveDate){
  if(rec&&rec.unenrollOverride)return new Date(rec.unenrollOverride);
  if(!leaveDate)return null;
  const d=new Date(leaveDate);d.setDate(d.getDate()+1);return d; // 預設離職次日退保
}

authGuard('salary',({user,uid,role,locations,userData})=>{
  CU={name:userData.name||user.email,role,uid};
  document.getElementById('roleChip').textContent=ROLE_NAMES[role]||role;
  init(locations,userData);
});

async function init(locations,userData){
  await Promise.all([loadEmployees(),loadStores(locations,userData),loadOtConfig()]);
  renderMain();
}
async function loadEmployees(){
  try{const s=await getDoc(doc(db,'hr','employees'));
    if(s.exists())employees=(s.data().list||[]).filter(e=>e.status==='在職'||!e.status);
  }catch(e){console.error(e);}
}
async function loadStores(locations,userData){
  try{const s=await getDoc(doc(db,'hr','settings'));
    allStores=s.exists()?(s.data().workLocations||[]).filter(Boolean).sort():[];
    if(CU.role==='admin'||CU.role==='consultant'){viewableStores=[...allStores];}
    else{const my=Array.isArray(userData.locations)?userData.locations:[];
      viewableStores=allStores.filter(x=>my.some(l=>normStore(l)===normStore(x)));
      if(!viewableStores.length)viewableStores=[...my];}
    if(!selectedStore&&viewableStores.length)selectedStore=viewableStores[0];
  }catch(e){console.error(e);}
}
async function loadOtConfig(){
  try{const s=await getDoc(doc(db,'salary_settings','store_ot'));
    storeOtConfig=s.exists()?(s.data().config||{}):{};}catch(e){storeOtConfig={};}
}
async function saveOtConfig(){
  try{await setDoc(doc(db,'salary_settings','store_ot'),{config:storeOtConfig,updatedAt:new Date().toISOString(),updatedBy:CU.name});
    showToast('✓ 加班設定已儲存');
    writeOpLog({editor:CU.name,role:CU.role,module:'salary',action:'編輯加班設定',detail:'各店固定加班時數'});
  }catch(e){showToast('⚠️ 儲存失敗');}
}
function getDefOt(store){return storeOtConfig[normStore(store)]??storeOtConfig[store]??2;}

async function loadRec(empId,y,m){
  const k=`${empId}_${y}-${String(m).padStart(2,'0')}`;
  try{const s=await getDoc(doc(db,'salary_records',k));return s.exists()?s.data():null;}catch(e){return null;}
}
async function saveRec(empId,y,m,data){
  const k=`${empId}_${y}-${String(m).padStart(2,'0')}`;
  try{await setDoc(doc(db,'salary_records',k),{...data,updatedAt:new Date().toISOString(),updatedBy:CU.name});return true;}catch(e){return false;}
}
async function loadShifts(empId,y,m){
  const emp=employees.find(e=>String(e.id)===String(empId));
  if(!emp||!emp.workLocation)return{};
  const ym=`${y}-${String(m).padStart(2,'0')}`;
  // 嘗試多種店名變體
  const variants=[emp.workLocation, normStore(emp.workLocation), String(emp.workLocation).replace(/舖/g,'鋪')];
  for(const loc of [...new Set(variants)]){
    try{const s=await getDoc(doc(db,'schedules',`${ym}_${loc}`));
      if(s.exists())return s.data().shifts||{};}catch(e){}
  }
  return {};
}

// ─── 計算核心 ───
function calcSalary(emp,rec,shifts){
  const target=getTarget(emp);
  const days=getDaysInMonth(viewYear,viewMonth);
  const dd=rec?.dailyData||{};
  const defOt=getDefOt(emp.workLocation);
  const emp2=calcEmployedDays(emp,viewYear,viewMonth,rec);
  const isPartial=emp2.partial&&emp2.days<30;

  // 統計
  let fixedOtHours=0;     // 固定加班時數（計入目標等式）
  let extraOtHours=0;     // 額外 1.67 時數
  let tempOtSegs={};      // 未排班臨時加班 {rate:hours}
  let personalMins=0;     // 事假+遲到（分鐘）
  let absentDays=0;       // 曠職天數
  let sickHours=0;        // 病假/生理假（小時，半薪）
  let workDays=0;
  let personalDates=[], sickDates=[], absentDates=[]; // 扣項日期提示
  let paidLeaves={}; // 全薪假別 {假別label: [日期]}

  for(let d=1;d<=days;d++){
    if(!emp2.inEmploy(d))continue;
    const ds=dateStr(viewYear,viewMonth,d);
    const shift=getShift(shifts,emp,ds);
    const r=dd[ds]||{};
    const type=r.type||'normal';
    const lt=LEAVE_TYPES[type]||LEAVE_TYPES.normal;

    // 未排班日臨時加班（支援多段費率）
    if(!shift){
      const segs=Array.isArray(r.tempSegs)?r.tempSegs:(r.tempOt>0?[{h:Number(r.tempOt),rate:Number(r.tempOtRate||1.34)}]:[]);
      for(const sg of segs){
        if(sg.h>0){const rate=Number(sg.rate||1.34);tempOtSegs[rate]=(tempOtSegs[rate]||0)+Number(sg.h);}
      }
      continue;
    }
    if(type==='dayoff')continue;

    if(type==='normal'){
      const worked=r.workedHours!=null?Number(r.workedHours):8+defOt; // 預設足時
      workDays++;
      if(worked>=8){
        fixedOtHours+=(r.autoOt!=null?Number(r.autoOt):defOt);
        extraOtHours+=Number(r.ot167||0);
      } else {
        personalMins+=(8-worked)*60;
        personalDates.push(`${d}日(早退${8-worked}h)`);
      }
      // 遲到
      if(r.lateMins&&Number(r.lateMins)>0){
        const lm=Number(r.lateMins);const dm=Math.floor(lm/10)*10;
        if(dm>0){personalMins+=dm;personalDates.push(`${d}日(遲到${lm}分)`);}
      }
    } else {
      const worked=Number(r.workedHours||0);
      if(worked>=8){
        workDays++;
        fixedOtHours+=Math.max(0,worked-8);
      } else {
        const leaveH=8-worked;
        if(worked>0)workDays+=worked/8;
        const wh=worked>0?`(上班${worked}h)`:'';
        if(lt.pay==='none'){
          if(type==='absent'){absentDays+=leaveH/8;absentDates.push(`${d}日${wh}`);}
          else {personalMins+=leaveH*60;personalDates.push(`${d}日${LEAVE_TYPES[type].label}${wh}`);}
        } else if(lt.pay==='half'){
          sickHours+=leaveH;sickDates.push(`${d}日${LEAVE_TYPES[type].label}${wh}`);
        } else if(lt.pay==='full'){
          // 全薪假別（特休/婚/喪/紅字）：不扣薪，但要呈現
          const label=LEAVE_TYPES[type].label;
          if(!paidLeaves[label])paidLeaves[label]=[];
          paidLeaves[label].push(`${d}日${wh}`);
        }
      }
    }
  }

  // 加權時數（只用固定加班，決定彈性補貼）
  const W=fixedOtHours*1.34;

  // 彈性補貼
  let elastic, base;
  if(isPartial){
    base=Math.round(BASE_FULL/30*emp2.days);
    elastic=rec?.elasticManual!=null?Number(rec.elasticManual):0; // 手動
  } else {
    base=BASE_FULL;
    elastic=Math.round(target/(1+W/240))-BASE_FULL;
  }

  // 時薪基礎（一律用足月底薪+彈性）
  const hourly=(BASE_FULL+elastic)/30/8;
  const dailyBase=(base+elastic)/30; // 扣項用實得日薪

  // 加班費
  const fixedOtPay=Math.round(hourly*fixedOtHours*1.34*10)/10;
  const extraOtPay=Math.round(hourly*extraOtHours*1.67*10)/10;
  let tempOtPay=0;const tempOtList=[];
  for(const[rate,hrs]of Object.entries(tempOtSegs)){
    const p=Math.round(hourly*hrs*Number(rate)*10)/10;tempOtPay+=p;
    tempOtList.push({rate:Number(rate),hrs,pay:p});
  }
  const otPayTotal=fixedOtPay+extraOtPay+tempOtPay;

  // 扣項
  const personalDeduct=Math.round(dailyBase/8*(personalMins/60));
  const absentDeduct=Math.round(dailyBase*absentDays);
  const sickDeduct=Math.round(dailyBase/8*sickHours*0.5);

  // 勞健保
  const insGrade=(rec&&rec.gradeOverride)||getInsGrade(emp);
  const ins=insFromGrade(insGrade);
  const laborMonthly=rec?.laborDeduct!=null?rec.laborDeduct:ins.labor;   // 整月勞保自負
  const healthBase=rec?.healthDeduct!=null?rec.healthDeduct:ins.health;  // 本人整月健保
  const pensionRate=rec?.pensionRate??0;
  const pensionAmt=pensionRate>0?Math.round(insGrade*pensionRate):0;
  const dependents=rec?.dependents??0;
  const healthTotal=healthBase+Math.round(healthBase*dependents*HEALTH_DEP_RATIO); // 含眷整月健保
  const insMode=rec?.insMode||'normal';

  // ── 勞保：按「在保天數」計算（不足月）──
  // 在保天數 = 退保日 − 到職日(或月初)。退保日預設離職次日，故離職日當天仍在保。
  const dim2=getDaysInMonth(viewYear,viewMonth);
  let laborInMonth=laborMonthly; // 預設整月
  let laborInsuredDays=dim2;
  let healthCharged=true;        // 健保是否扣（非足月時依退保日）
  let unenrollDate=null;
  if(isPartial){
    // 在保起日
    const monthStart=new Date(viewYear,viewMonth-1,1);
    const startD=emp2.hireDate&&new Date(emp2.hireDate)>monthStart?new Date(emp2.hireDate):monthStart;
    // 退保日（離職者才有）
    unenrollDate=getUnenrollDate(emp,rec,emp2.leaveDate);
    const monthEnd=new Date(viewYear,viewMonth-1,dim2);
    let endInsured=monthEnd;
    if(unenrollDate){
      // 在保到「退保日前一天」；退保日落在當月內才縮短
      const ub=new Date(unenrollDate);ub.setDate(ub.getDate()-1);
      if(ub<monthEnd)endInsured=ub;
    }
    laborInsuredDays=Math.max(0,Math.round((endInsured-startD)/86400000)+1);
    laborInMonth=Math.round(laborMonthly/dim2*laborInsuredDays);
    // ── 健保：只要退保日不是當月最後一天 → 不扣；退保=當月最後一天才扣整月 ──
    if(unenrollDate){
      const uYM=unenrollDate.getFullYear()===viewYear&&(unenrollDate.getMonth()+1)===viewMonth;
      // 退保日在當月：若退保日 != 當月最後一天 → 不扣健保
      if(uYM){healthCharged=(unenrollDate.getDate()===dim2);}
      else {healthCharged=true;} // 退保日已跨到次月 → 當月整月在保，扣
    } else {
      healthCharged=true; // 純到職不足月（無離職），健保照扣整月
    }
  }

  // ── 三種模式 ──
  let finalLabor, finalHealth;
  if(insMode==='new'){
    finalLabor=0; finalHealth=0; // 新人首月免扣
  } else if(insMode==='quit_prepay'){
    // 離職預扣：本月一份 + 預扣次月一份 = ×2（用整月費用）
    finalLabor=laborMonthly*2;
    finalHealth=healthTotal*2;
  } else {
    finalLabor=isPartial?laborInMonth:laborMonthly;
    finalHealth=isPartial?(healthCharged?healthTotal:0):healthTotal;
  }
  const laborBase=laborMonthly; // 顯示用整月基準

  // 加項
  const annualComp=rec?.annualComp??0;
  const autoAnnualComp=annualComp>0?Math.round(target/30*annualComp):0;
  const redComp=rec?.redComp??0;
  const autoRedComp=redComp>0?Math.round(dailyBase*redComp):0;
  const customAdds=rec?.customAdds||[]; // [{name, amount}]
  const customAddTotal=customAdds.reduce((s,a)=>s+Number(a.amount||0),0);

  const gross=base+elastic+otPayTotal;
  const totalDeduct=personalDeduct+absentDeduct+sickDeduct+finalLabor+finalHealth+pensionAmt;
  const totalAdd=autoAnnualComp+autoRedComp+customAddTotal;
  const netPay=gross-totalDeduct+totalAdd;

  // 不足月驗算目標
  const proratedTarget=isPartial?Math.round(target/30*emp2.days):target;
  const verifySum=base+elastic+fixedOtPay; // 應≈proratedTarget

  return{
    target,proratedTarget,isPartial,employedDays:emp2.days,base,elastic,hourly,dailyBase,defOt,
    fixedOtHours,extraOtHours,tempOtSegs,tempOtList,W,
    fixedOtPay,extraOtPay,tempOtPay,otPayTotal,
    workDays,personalMins,absentDays,sickHours,
    personalDates,sickDates,absentDates,paidLeaves,
    personalDeduct,absentDeduct,sickDeduct,
    laborBase,healthBase,healthTotal,finalLabor,finalHealth,
    laborInsuredDays,healthCharged,laborInMonth,
    hireDate:emp2.hireDate,leaveDate:emp2.leaveDate,
    unenrollDate:unenrollDate?dateStr(unenrollDate.getFullYear(),unenrollDate.getMonth()+1,unenrollDate.getDate()):null,
    pensionRate,pensionAmt,dependents,insMode,
    annualComp,autoAnnualComp,redComp,autoRedComp,customAdds,customAddTotal,
    gross,totalDeduct,totalAdd,netPay,verifySum,
    insGrade,insMatched:ins.matched,gradeOverride:rec?.gradeOverride,elasticManual:rec?.elasticManual
  };
}

function getDaysInMonth(y,m){return new Date(y,m,0).getDate();}
function dateStr(y,m,d){return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function getShift(shifts,emp,ds){return(shifts[ds]||[]).find(s=>String(s.empId)===String(emp.id)||normStore(s.empName)===normStore(emp.name));}
function storeEmps(store){return employees.filter(e=>normStore(e.workLocation)===normStore(store));}
function fmtMin(mins){mins=Math.round(mins);if(mins===0)return'0';const h=Math.floor(mins/60),m=mins%60;return`${h>0?h+'時':''}${m>0?m+'分':''}`||'0';}
function toDateInput(d){if(!d)return'';const dt=new Date(d);if(isNaN(dt))return'';return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}

// ─── 主畫面 ───
function renderMain(){
  const main=document.getElementById('mainArea');
  if(!viewableStores.length){main.innerHTML=`<div class="empty-state"><div style="font-size:32px">🏪</div><div>沒有可見的店面</div></div>`;return;}
  const locked=isMonthLocked(viewYear,viewMonth);
  const lockedBanner=locked&&CU.role!=='admin'
    ?`<div class="locked-banner">🔒 ${viewYear}年${viewMonth}月已鎖定，僅管理員可修改</div>`
    :locked&&CU.role==='admin'
    ?`<div class="locked-banner" style="background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)">🔓 管理員模式：鎖定月份可修改</div>`:'';

  let otPanelHtml='';
  if((CU.role==='admin'||CU.role==='consultant')&&showOtPanel){
    otPanelHtml=`<div class="ot-panel"><div class="ot-panel-title"><span>⚙️ 各店固定加班時數設定</span><button class="btn-sm p" onclick="doSaveOtConfig()">儲存</button></div>
    <div class="ot-grid">${viewableStores.map(s=>`<div class="ot-item"><div class="ot-item-name" title="${s}">${s}</div>
    <select class="ot-sel" onchange="setStoreOt('${s}',Number(this.value))">
    <option value="0"${getDefOt(s)===0?' selected':''}>無固定</option>
    <option value="1"${getDefOt(s)===1?' selected':''}>+1h</option>
    <option value="2"${getDefOt(s)===2?' selected':''}>+2h</option></select></div>`).join('')}</div></div>`;
  }

  const curEmps=selectedStore?storeEmps(selectedStore):[];
  const empCards=curEmps.length>0?curEmps.map(e=>{
    const tgt=getTarget(e);
    const e2=calcEmployedDays(e,viewYear,viewMonth,null);
    const partial=e2.partial&&e2.days<30&&e2.days>0;
    const notYet=e2.days===0;
    const act=String(e.id)===String(selectedEmpId);
    return`<div class="emp-card${act?' active':''}" onclick="selEmp(${e.id})">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div class="emp-name">${e.name||'—'}${partial?'<span class="partial-flag">不足月</span>':''}${notYet?'<span class="partial-flag">未在職</span>':''}</div>
        ${tgt?`<span class="emp-tag">目標 $${Number(tgt).toLocaleString()}</span>`:''}</div>
      <div class="emp-meta"><span>${e.title||'—'}</span>${getInsGrade(e)?`<span>投保 $${getInsGrade(e).toLocaleString()}</span>`:''}</div></div>`;
  }).join(''):`<div class="empty-state"><div style="font-size:28px">👥</div><div style="margin-top:8px">此店面尚無在職同仁</div></div>`;

  main.innerHTML=`
    <div class="filter-bar">
      <span class="fl">月份</span>
      <select id="yearSel" onchange="chgMonth()">${[2024,2025,2026,2027].map(y=>`<option value="${y}"${y===viewYear?' selected':''}>${y}年</option>`).join('')}</select>
      <select id="monthSel" onchange="chgMonth()">${Array.from({length:12},(_,i)=>i+1).map(m=>`<option value="${m}"${m===viewMonth?' selected':''}>${m}月</option>`).join('')}</select>
      <div class="fdv"></div>
      <span class="fl">店面</span>
      <select id="storeSel" onchange="chgStore(this.value)" style="max-width:220px">
      ${viewableStores.map(s=>`<option value="${s}"${normStore(s)===normStore(selectedStore)?' selected':''}>${s}（${storeEmps(s).length}人 +${getDefOt(s)}h/天）</option>`).join('')}</select>
      ${(CU.role==='admin'||CU.role==='consultant')?`<button class="btn-sm o" style="margin-left:auto" onclick="toggleOtPanel()">⚙️ 加班設定</button>`:''}
    </div>
    ${lockedBanner}${otPanelHtml}
    <div class="emp-list">${empCards}</div>
    <div id="sheetArea"></div>`;

  if(selectedEmpId&&curEmps.find(e=>String(e.id)===String(selectedEmpId)))loadAndRender(selectedEmpId,false);
}

window.chgMonth=function(){viewYear=+document.getElementById('yearSel').value;viewMonth=+document.getElementById('monthSel').value;selectedEmpId=null;renderMain();};
window.chgStore=function(s){selectedStore=s;selectedEmpId=null;renderMain();};
window.setStoreOt=function(s,v){storeOtConfig[normStore(s)]=v;renderMain();};
window.doSaveOtConfig=saveOtConfig;
window.toggleOtPanel=function(){showOtPanel=!showOtPanel;renderMain();};

window.selEmp=async function(empId){
  selectedEmpId=empId;halfView='first';
  document.querySelectorAll('.emp-card').forEach(el=>el.classList.remove('active'));
  if(event&&event.currentTarget)event.currentTarget.classList.add('active');
  document.getElementById('sheetArea').innerHTML='<div class="loading-text">載入中…</div>';
  await loadAndRender(empId,true);
};

async function loadAndRender(empId,doScroll){
  const emp=employees.find(e=>String(e.id)===String(empId));if(!emp)return;
  const[shifts,rec]=await Promise.all([loadShifts(empId,viewYear,viewMonth),loadRec(empId,viewYear,viewMonth)]);
  currentRec=rec||{dailyData:{}};
  if(!currentRec.dailyData)currentRec.dailyData={};
  curShifts=shifts;
  renderSheet(emp,currentRec,shifts,calcSalary(emp,currentRec,shifts));
  if(doScroll){setTimeout(()=>{const el=document.getElementById('sheetArea');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},80);}
}

// ─── 薪資單 ───
function renderSheet(emp,rec,shifts,c){
  const days=getDaysInMonth(viewYear,viewMonth);
  const WD=['日','一','二','三','四','五','六'];
  const locked=isMonthLocked(viewYear,viewMonth)&&CU.role!=='admin';
  const dis=locked?'disabled':'';
  const dd=rec?.dailyData||{};
  const defOt=c.defOt;
  const emp2=calcEmployedDays(emp,viewYear,viewMonth,rec);
  const typeOpts=Object.entries(LEAVE_TYPES).map(([v,t])=>`<option value="${v}">${t.label}</option>`).join('');

  // 半月範圍
  const startD=halfView==='first'?1:16;
  const endD=halfView==='first'?15:days;

  let rows='';
  for(let d=startD;d<=endD;d++){
    const ds=dateStr(viewYear,viewMonth,d);
    const dow=new Date(ds).getDay();
    const isWknd=dow===0||dow===6;
    const shift=getShift(shifts,emp,ds);
    const r=dd[ds]||{};
    const type=r.type||'normal';
    const lt=LEAVE_TYPES[type]||LEAVE_TYPES.normal;
    const inEmp=emp2.inEmploy(d);
    const noShift=!shift;

    let shiftTxt = shift?`${shift.startTime||''}-${shift.endTime||''}`
      : `<span style="color:var(--text3)">未排班</span>`;

    const hasFixedOt=type==='normal'&&shift&&inEmp;
    const autoOt=r.autoOt!=null?Number(r.autoOt):defOt;
    const ot167=r.ot167||'';
    const lateMins=r.lateMins||'';
    const selCls=`type-sel${lt.cls?' t-'+lt.cls:''}`;

    // 請假出勤時數子欄（請假且非全薪/或需要部分出勤時）
    let subRow='';
    if(shift&&inEmp&&type!=='normal'&&type!=='dayoff'){
      const wh=r.workedHours!=null?r.workedHours:'';
      subRow=`<div class="sub-row"><div class="sub-leave">
        <span>當天實際上班</span>
        <input type="number" min="0" max="24" step="0.5" value="${wh}" placeholder="0"
          data-date="${ds}" onchange="patchDay('${ds}','workedHours',this.value===''?null:+this.value)" ${dis}>
        <span>小時（其餘${LEAVE_TYPES[type].label}）</span>
      </div></div>`;
    }
    // 未排班日臨時加班子欄（多段費率）
    let tempRow='';
    if(noShift&&inEmp&&r.hasTempOt){
      const segs=Array.isArray(r.tempSegs)?r.tempSegs:(r.tempOt>0?[{h:Number(r.tempOt),rate:Number(r.tempOtRate||1.34)}]:[{h:'',rate:1.34}]);
      const segHtml=segs.map((sg,si)=>`<div class="sub-temp">
        <span>第${si+1}段</span>
        <input type="number" min="0" max="24" step="0.5" value="${sg.h||''}" placeholder="時" data-date="${ds}" onchange="updTempSeg('${ds}',${si},'h',+this.value)" ${dis}>
        <span>h ×</span>
        <select data-date="${ds}" onchange="updTempSeg('${ds}',${si},'rate',+this.value)" ${dis}>
          <option value="1"${sg.rate==1?' selected':''}>1.0</option>
          <option value="1.34"${sg.rate==1.34?' selected':''}>1.34</option>
          <option value="1.67"${sg.rate==1.67?' selected':''}>1.67</option>
          <option value="2"${sg.rate==2?' selected':''}>2.0</option>
        </select>
        ${segs.length>1&&!locked?`<span class="add-del" style="padding:1px 5px" onclick="delTempSeg('${ds}',${si})">×</span>`:''}
      </div>`).join('');
      tempRow=`<div class="sub-row" style="flex-direction:column;align-items:flex-start;gap:5px">
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">${segHtml}</div>
        ${!locked?`<button class="btn-sm o" style="font-size:10px;padding:2px 8px;min-height:24px;color:var(--blue);border-color:var(--blue-border)" onclick="addTempSeg('${ds}')">+ 加一段費率</button>`:''}
      </div>`;
    }

    // ── 未排班日：預設最小化，點開才顯示完整列 ──
    const isExpanded=r.expanded||r.hasTempOt; // 有臨時加班時自動展開
    if(noShift&&inEmp&&!isExpanded){
      rows+=`<div class="d-row d-min${isWknd?' weekend':''}${locked?' locked':''}" onclick="${locked?'':`expandDay('${ds}')`}">
        <div class="d-date"><div class="d-num" style="color:${dow===0?'#E05252':dow===6?'#5B8EDB':'var(--text3)'}">${d}</div><div class="d-wday">${WD[dow]}</div></div>
        <div class="d-min-label">未排班<span class="d-min-hint">${locked?'':'點擊展開'}</span></div>
      </div>`;
      continue;
    }

    rows+=`<div class="d-row${isWknd?' weekend':''}${noShift&&!isWknd?' no-shift':''}${!inEmp?' out-employ':''}${locked?' locked':''}">
      <div class="d-date"><div class="d-num" style="color:${dow===0?'#E05252':dow===6?'#5B8EDB':'var(--text)'}">${d}</div><div class="d-wday">${WD[dow]}</div></div>
      <div class="d-shift">${shiftTxt}${noShift&&inEmp&&!locked?` <span class="d-collapse" onclick="collapseDay('${ds}')">收合</span>`:''}</div>
      <select class="${selCls}" data-date="${ds}" onchange="updType(this)" ${noShift||!inEmp?'disabled':dis}>
        ${typeOpts.replace(`value="${type}"`,`value="${type}" selected`)}
      </select>
      <div class="ipt-wrap"><input type="number" min="0" max="24" step="0.5" value="${hasFixedOt?autoOt:''}" class="${hasFixedOt?'fill-orange':''}" placeholder="—" title="固定加班×1.34"
        data-date="${ds}" onchange="patchDay('${ds}','autoOt',+this.value)" ${!hasFixedOt||dis?'disabled':''}><span class="ipt-unit">h</span></div>
      <div class="ipt-wrap col-ot2"><input type="number" min="0" max="24" step="0.5" value="${ot167}" class="${ot167?'fill-red':''}" placeholder="—" title="額外加班×1.67"
        data-date="${ds}" onchange="patchDay('${ds}','ot167',+this.value)" ${!hasFixedOt||dis?'disabled':''}><span class="ipt-unit">h</span></div>
      <div class="ipt-wrap col-late"><input type="number" min="0" max="480" step="1" value="${lateMins}" class="${lateMins?'fill-red':''}" placeholder="—" title="遲到分鐘"
        data-date="${ds}" onchange="patchDay('${ds}','lateMins',+this.value)" ${!shift||type!=='normal'||!inEmp||dis?'disabled':''}><span class="ipt-unit">分</span></div>
      ${noShift&&inEmp?`<button class="btn-sm o" style="font-size:10px;padding:2px 5px;min-height:24px;${r.hasTempOt?'background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)':'color:var(--text3)'}" onclick="toggleTempOt('${ds}')" ${dis}>加班</button>`:'<div></div>'}
      ${subRow}${tempRow}</div>`;
  }

  // 不足月驗算盒
  let partialBox='';
  if(c.isPartial){
    const diff=c.proratedTarget-c.verifySum;
    const ok=Math.abs(diff)<=2;
    partialBox=`<div class="partial-box">
      <div class="sec-title">📝 不足月薪資（在職 ${c.employedDays} 天 / 30）— 請手動調整彈性補貼直到驗算相符</div>
      <div class="partial-grid">
        <div class="partial-item"><label>底薪（自動）</label><div class="readonly-val">$${c.base.toLocaleString()}</div></div>
        <div class="partial-item"><label>彈性補貼（手動輸入）</label>
          <input type="number" id="elasticManualInp" value="${c.elasticManual??0}" onchange="patchRec('elasticManual',+this.value)" ${dis}></div>
        <div class="partial-item"><label>固定加班費（自動）</label><div class="readonly-val">$${Math.round(c.fixedOtPay).toLocaleString()}</div></div>
        <div class="partial-item"><label>按比例目標薪資</label><div class="readonly-val" style="color:var(--blue)">$${c.proratedTarget.toLocaleString()}</div></div>
      </div>
      <div class="verify-line ${ok?'verify-ok':'verify-no'}">
        <span>${ok?'✓ 驗算相符':'⚠ 尚未相符'}：底薪 $${c.base.toLocaleString()} + 彈性 $${Math.round(c.elastic).toLocaleString()} + 加班 $${Math.round(c.fixedOtPay).toLocaleString()} = $${Math.round(c.verifySum).toLocaleString()}</span>
        <span>${ok?'':`差額 $${diff.toLocaleString()}`}</span>
      </div></div>`;
  }

  const insModeLabel={normal:'正常',new:'新人（首月免扣）',quit_prepay:'離職預扣次月'};
  const insModeTag=c.insMode==='new'?`<span class="prepay-tag prepay-new">首月免扣</span>`:c.insMode==='quit_prepay'?`<span class="prepay-tag prepay-quit">預扣次月</span>`:'';

  // 自訂加項
  const customAddRows=(c.customAdds||[]).map((a,i)=>`<div class="add-item">
    <input class="add-name-input" value="${a.name||''}" placeholder="加項名目" onchange="updCustomAdd(${i},'name',this.value)" ${dis}>
    <input class="add-amt" type="number" value="${a.amount||''}" placeholder="金額" onchange="updCustomAdd(${i},'amount',+this.value)" ${dis}>
    <span class="add-val">+$${Number(a.amount||0).toLocaleString()}</span>
    ${!locked?`<span class="add-del" onclick="delCustomAdd(${i})">刪</span>`:''}
  </div>`).join('');

  document.getElementById('sheetArea').innerHTML=`
    <div class="salary-sheet" id="salarySheet">
      <div class="sheet-hd">
        <div class="sheet-title">💰 ${emp.name} — ${viewYear}年${viewMonth}月 ${c.isPartial?'<span class="partial-flag">不足月</span>':''}${locked?'🔒':''}</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="badge badge-g">實領 $${Math.round(c.netPay).toLocaleString()}</span>
          ${!locked?`<button class="btn-sm p" onclick="saveSheet()">💾 儲存</button>`:''}
          <button class="btn-sm o" onclick="exportSlip()">📄 薪資單</button>
        </div>
      </div>

      <div class="sum-row">
        <div class="sum-cell"><div class="sum-lbl">底薪</div><div class="sum-val">$${c.base.toLocaleString()}</div></div>
        <div class="sum-cell"><div class="sum-lbl">彈性補貼${c.isPartial?'(手動)':''}</div><div class="sum-val c-blue">$${Math.round(c.elastic).toLocaleString()}</div></div>
        <div class="sum-cell"><div class="sum-lbl">加班費</div><div class="sum-val c-green">$${Math.round(c.otPayTotal).toLocaleString()}</div></div>
        <div class="sum-cell"><div class="sum-lbl">目標薪資</div><div class="sum-val">$${c.target.toLocaleString()}</div></div>
      </div>

      ${partialBox}

      <div class="fml-sec">
        <div class="sec-title">📐 計算公式 ${c.isPartial?'':`<span style="font-weight:400;color:var(--text3);font-size:10px">底薪+彈性補貼+固定加班費 = 目標薪資</span>`}</div>
        <div class="fml-grid">
          <div class="fml-item"><div class="fi-lbl">時薪基礎</div><div class="fi-val">$${c.hourly.toFixed(2)}</div><div class="fi-sub">(底薪+彈性)÷30÷8</div></div>
          <div class="fml-item"><div class="fi-lbl">固定加班 ×1.34</div><div class="fi-val c-orange">${c.fixedOtHours}h → $${Math.round(c.fixedOtPay).toLocaleString()}</div><div class="fi-sub">每出勤日 +${c.defOt}h</div></div>
          <div class="fml-item"><div class="fi-lbl">額外加班 ×1.67</div><div class="fi-val c-red">${c.extraOtHours}h → $${Math.round(c.extraOtPay).toLocaleString()}</div></div>
          <div class="fml-item"><div class="fi-lbl">臨時加班</div><div class="fi-val c-blue">${c.tempOtList.map(t=>`${t.hrs}h×${t.rate}`).join('+')||'—'} → $${Math.round(c.tempOtPay).toLocaleString()}</div></div>
        </div>
        <div class="eq-bar">
          <span>出勤</span><span class="v">${Math.round(c.workDays*10)/10}天</span><span class="op">｜</span>
          <span>事假/遲到</span><span class="v">${fmtMin(c.personalMins)}</span><span class="op">｜</span>
          <span>病假</span><span class="v">${fmtMin(c.sickHours*60)}</span><span class="op">｜</span>
          <span>曠職</span><span class="v">${Math.round(c.absentDays*10)/10}天</span>
        </div>
      </div>

      <div class="daily-sec">
        <div class="sec-title" style="margin-bottom:8px">📅 每日出勤
          <span style="font-size:10px;color:var(--text3);font-weight:400;margin-left:6px">正常日自動帶入固定加班，只需處理請假/異常</span></div>
        <div class="half-toggle">
          <button class="half-btn${halfView==='first'?' active':''}" onclick="setHalf('first')">上半月 (1–15)</button>
          <button class="half-btn${halfView==='second'?' active':''}" onclick="setHalf('second')">下半月 (16–${days})</button>
        </div>
        <div class="daily-hd-row"><div style="text-align:center">日期</div><div>班次</div><div>假別</div>
          <div style="text-align:right">固定加班</div><div style="text-align:right" class="col-ot2">額外加班</div><div style="text-align:right" class="col-late">遲到</div></div>
        <div id="dailyGrid">${rows}</div>
      </div>

      <div class="ins-section">
        <div class="sec-title">🛡️ 勞健保 <span style="font-weight:400;color:var(--text3);font-size:10px">依 ${INS_YEAR} 年度級距自動帶入，可手動覆蓋</span> ${insModeTag}</div>

        <div class="ins-headbar">
          <div class="ins-head-cell">
            <span class="ins-head-lbl">投保級距</span>
            ${c.insGrade?`<span class="ins-head-val">$${c.insGrade.toLocaleString()}</span>${c.insMatched&&c.insMatched!==c.insGrade?`<span class="ins-head-note">對應級距 $${c.insMatched.toLocaleString()}</span>`:''}`
              :`<span style="font-size:12px;color:var(--red);font-weight:600">⚠ 未抓到級距</span>
              <input class="ded-input" style="width:90px" type="number" placeholder="手動輸入" value="${c.gradeOverride||''}" onchange="patchRec('gradeOverride',+this.value||null)" ${dis}>`}
          </div>
          <div class="ins-head-cell"><span class="ins-head-lbl">繳費狀態</span>
            <select class="ins-sel" onchange="patchRec('insMode',this.value)" ${dis}>
              ${Object.entries(insModeLabel).map(([v,l])=>`<option value="${v}"${c.insMode===v?' selected':''}>${l}</option>`).join('')}</select></div>
          ${!locked?`<button class="btn-sm o" onclick="applyInsSuggest()" title="依${INS_YEAR}年度級距重設勞健保">↻ 套用${INS_YEAR}建議值</button>`:''}
        </div>

        <div class="employ-box">
          <div class="employ-head">
            <span>📆 在職日期設定 ${c.isPartial?'<span class="partial-flag">不足月</span>':'<span style="font-size:10px;color:var(--text3)">（足月，留空即可）</span>'}</span>
            <button class="btn-sm o" onclick="toggleEmployBox()">${employBoxOpen?'收合':'展開設定'}</button>
          </div>
          ${employBoxOpen?`<div class="employ-grid">
            <div class="employ-item"><label>到職日</label><input type="date" value="${(c.hireDate&&toDateInput(c.hireDate))||''}" onchange="patchRec('hireOverride',this.value||null)" ${dis}></div>
            <div class="employ-item"><label>離職日</label><input type="date" value="${(c.leaveDate&&toDateInput(c.leaveDate))||''}" onchange="patchRec('leaveOverride',this.value||null)" ${dis}></div>
            <div class="employ-item"><label>退保日 <span style="color:var(--text3)">（預設離職次日）</span></label><input type="date" value="${c.unenrollDate?toDateInput(c.unenrollDate):''}" onchange="patchRec('unenrollOverride',this.value||null)" ${dis}></div>
          </div>
          <div class="employ-note">手動設定後即覆蓋 HR 資料；退保日比離職日晚 1 天會多 1 天勞保。健保只有當月最後一天退保才扣整月。</div>`:''}
        </div>

        <div class="ins-table">
          <div class="ins-trow ins-thead"><div>項目</div><div style="text-align:center">設定</div><div style="text-align:right">本月實扣</div></div>

          <div class="ins-trow">
            <div class="ins-tname">勞保<div class="ins-tnote">${INS_YEAR}年度 員工自負${c.isPartial&&c.insMode==='normal'?`<br>在保 ${c.laborInsuredDays} 天 / ${days}`:''}</div></div>
            <div style="display:flex;align-items:center;gap:5px;justify-content:center"><span class="ins-auto">整月 $${insFromGrade(c.insGrade).labor.toLocaleString()}</span><input class="ded-input" style="width:72px" type="number" value="${c.laborBase}" onchange="patchRec('laborDeduct',+this.value)" ${dis}></div>
            <div class="ins-tval ${c.insMode==='new'?'strike':''}">−$${c.finalLabor.toLocaleString()}${c.insMode==='quit_prepay'?`<div class="ins-tnote" style="color:var(--orange)">本月+次月 ×2</div>`:c.isPartial&&c.insMode==='normal'?`<div class="ins-tnote" style="color:var(--text3)">在保${c.laborInsuredDays}天</div>`:''}</div>
          </div>

          <div class="ins-trow">
            <div class="ins-tname">健保<div class="ins-tnote">本人 + 眷屬加保</div></div>
            <div style="display:flex;align-items:center;gap:5px;justify-content:center;flex-wrap:wrap">
              <select class="ins-sel" onchange="patchRec('dependents',+this.value)" ${dis}>${[0,1,2,3,4,5,6].map(n=>`<option value="${n}"${c.dependents===n?' selected':''}>本人${n>0?'+眷'+n:''}</option>`).join('')}</select>
              <input class="ded-input" style="width:72px" type="number" value="${c.healthBase}" onchange="patchRec('healthDeduct',+this.value)" ${dis}>
            </div>
            <div class="ins-tval ${c.insMode==='new'||(!c.healthCharged&&c.insMode==='normal')?'strike':''}">−$${c.finalHealth.toLocaleString()}${c.insMode==='quit_prepay'?`<div class="ins-tnote" style="color:var(--orange)">本月+次月 ×2</div>`:c.dependents>0&&c.healthCharged?`<div class="ins-tnote" style="color:var(--text3)">本人$${c.healthBase.toLocaleString()}+眷$${(c.healthTotal-c.healthBase).toLocaleString()}</div>`:!c.healthCharged&&c.insMode==='normal'?`<div class="ins-tnote" style="color:var(--green)">非月底退保不扣</div>`:''}</div>
          </div>

          <div class="ins-trow">
            <div class="ins-tname">自提退休金<div class="ins-tnote">投保級距 × 自提%</div></div>
            <div style="text-align:center"><select class="ins-sel" onchange="patchRec('pensionRate',+this.value)" ${dis}><option value="0"${c.pensionRate===0?' selected':''}>不自提</option>${[1,2,3,4,5,6].map(p=>`<option value="${p/100}"${c.pensionRate===p/100?' selected':''}>${p}%</option>`).join('')}</select></div>
            <div class="ins-tval">−$${c.pensionAmt.toLocaleString()}</div>
          </div>
        </div>

        ${c.insMode==='new'?`<div class="ins-banner ins-banner-g">🆕 新人首月：勞健保由次月繳費單才產生，本月不扣（已歸零）。薪資單會註明。</div>`:''}
        ${c.insMode==='quit_prepay'?`<div class="ins-banner ins-banner-o">⚠️ 離職預扣：本月一份 + 預扣次月一份（共 ×2）。勞保 $${c.laborBase.toLocaleString()}×2 + 健保 $${c.healthTotal.toLocaleString()}×2，合計 −$${(c.finalLabor+c.finalHealth).toLocaleString()}。隔月無薪資可扣故提前扣除，薪資單會註明。</div>`:''}
      </div>

      <div class="ded-sec">
        <div class="sec-title">➖ 扣項明細</div>
        <div class="ded-grid">
          <div class="ded-item"><div class="ded-lbl">事假<div class="ded-sub">${fmtMin(c.personalMins)}（含遲到）</div>${c.personalDates.length?`<div class="ded-dates">${c.personalDates.join('、')}</div>`:''}</div><div class="ded-val">−$${c.personalDeduct.toLocaleString()}</div></div>
          <div class="ded-item"><div class="ded-lbl">病假<div class="ded-sub">${fmtMin(c.sickHours*60)} × 半薪</div>${c.sickDates.length?`<div class="ded-dates">${c.sickDates.join('、')}</div>`:''}</div><div class="ded-val">−$${c.sickDeduct.toLocaleString()}</div></div>
          <div class="ded-item"><div class="ded-lbl">曠職<div class="ded-sub">${Math.round(c.absentDays*10)/10}天</div>${c.absentDates.length?`<div class="ded-dates">${c.absentDates.join('、')}</div>`:''}</div><div class="ded-val">−$${c.absentDeduct.toLocaleString()}</div></div>
        </div>
        ${Object.keys(c.paidLeaves).length?`<div class="paid-leave-box">
          <div class="paid-leave-title">📌 其他假別（全薪，不扣薪）</div>
          <div class="paid-leave-list">
            ${Object.entries(c.paidLeaves).map(([label,dates])=>`<div class="paid-leave-item"><span class="paid-leave-label">${label}</span><span class="paid-leave-dates">${dates.join('、')}</span></div>`).join('')}
          </div>
        </div>`:''}
      </div>

      <div class="add-sec">
        <div class="sec-title">➕ 加項</div>
        <div class="add-list">
          <div class="add-item">
            <span class="add-name">特休補薪 <span style="font-size:10px;opacity:.7">目標÷30×天數</span></span>
            <input class="add-days" type="number" min="0" step="0.5" value="${c.annualComp}" placeholder="天" onchange="patchRec('annualComp',+this.value)" ${dis}>
            <span class="add-val">+$${c.autoAnnualComp.toLocaleString()}</span>
          </div>
          <div class="add-item">
            <span class="add-name">紅字補薪 <span style="font-size:10px;opacity:.7">日薪×天數</span></span>
            <input class="add-days" type="number" min="0" step="0.5" value="${c.redComp}" placeholder="天" onchange="patchRec('redComp',+this.value)" ${dis}>
            <span class="add-val">+$${c.autoRedComp.toLocaleString()}</span>
          </div>
          ${customAddRows}
        </div>
        ${!locked?`<button class="btn-sm o" onclick="addCustomAdd()">+ 新增其他加項</button>`:''}
      </div>

      <div class="netpay-bar">
        <div><div class="np-lbl">本月實領薪資</div>
          <div style="font-size:10px;color:rgba(255,255,255,.45);margin-top:2px">$${(c.base+Math.round(c.elastic)).toLocaleString()} 底+彈 ＋$${Math.round(c.otPayTotal).toLocaleString()} 加班 ＋$${c.totalAdd.toLocaleString()} 加項 −$${c.totalDeduct.toLocaleString()} 扣項</div></div>
        <div class="np-val" id="npDisp">$${Math.round(c.netPay).toLocaleString()}</div>
      </div>
      <div style="padding:0 16px 14px;display:flex;justify-content:flex-end;gap:8px">
        ${!locked?`<button class="btn btn-primary" onclick="saveSheet()">💾 儲存薪資記錄</button>`:''}
        <button class="btn btn-outline" onclick="exportSlip()">📄 匯出薪資單</button>
      </div>
    </div>`;
}

window.setHalf=function(h){halfView=h;rerender();};
window.toggleEmployBox=function(){employBoxOpen=!employBoxOpen;rerender();};

// 統一儲存：改記憶體 currentRec + 立即重繪 + 背景存 Firestore
function persist(){ if(selectedEmpId&&currentRec) saveRec(selectedEmpId,viewYear,viewMonth,currentRec); }
function rerender(){
  const emp=employees.find(e=>String(e.id)===String(selectedEmpId));if(!emp||!currentRec)return;
  const sy=window.scrollY;
  renderSheet(emp,currentRec,curShifts,calcSalary(emp,currentRec,curShifts));
  window.scrollTo(0,sy);
}
function dayRec(ds){
  if(!currentRec.dailyData)currentRec.dailyData={};
  if(!currentRec.dailyData[ds])currentRec.dailyData[ds]={};
  return currentRec.dailyData[ds];
}

window.applyInsSuggest=function(){
  if(!currentRec)return;
  const emp=employees.find(e=>String(e.id)===String(selectedEmpId));
  const insGrade=(currentRec.gradeOverride)||getInsGrade(emp);
  const ins=insFromGrade(insGrade);
  currentRec.laborDeduct=null; currentRec.healthDeduct=null;
  persist();showToast(`✓ 已套用 ${INS_YEAR} 建議值（勞保 $${ins.labor} / 健保 $${ins.health}）`);rerender();
};
window.expandDay=function(ds){if(!currentRec)return;dayRec(ds).expanded=true;persist();rerender();};
window.collapseDay=function(ds){if(!currentRec)return;dayRec(ds).expanded=false;persist();rerender();};
window.updType=function(el){
  if(!currentRec)return;
  const type=el.value,ds=el.dataset.date;
  const r=dayRec(ds);
  r.type=type;
  if(type==='normal'){delete r.workedHours;r.workedHours=null;} // 切回正常清掉請假時數
  persist();rerender();
};
window.patchDay=function(ds,field,value){if(!currentRec)return;dayRec(ds)[field]=value;persist();rerender();};
window.patchRec=function(field,value){if(!currentRec)return;currentRec[field]=value;persist();rerender();};
window.toggleTempOt=function(ds){
  if(!currentRec)return;const r=dayRec(ds);
  r.hasTempOt=!r.hasTempOt;
  if(r.hasTempOt&&!Array.isArray(r.tempSegs))r.tempSegs=[{h:'',rate:1.34}];
  persist();rerender();
};
function ensureSegs(ds){
  const r=dayRec(ds);
  if(!Array.isArray(r.tempSegs)){r.tempSegs=r.tempOt>0?[{h:Number(r.tempOt),rate:Number(r.tempOtRate||1.34)}]:[{h:'',rate:1.34}];}
  return r.tempSegs;
}
window.addTempSeg=function(ds){if(!currentRec)return;ensureSegs(ds).push({h:'',rate:1.34});persist();rerender();};
window.updTempSeg=function(ds,si,field,val){if(!currentRec)return;const s=ensureSegs(ds);if(!s[si])return;s[si][field]=val;persist();rerender();};
window.delTempSeg=function(ds,si){if(!currentRec)return;const s=ensureSegs(ds);s.splice(si,1);if(!s.length)s.push({h:'',rate:1.34});persist();rerender();};
window.addCustomAdd=function(){if(!currentRec)return;if(!currentRec.customAdds)currentRec.customAdds=[];currentRec.customAdds.push({name:'',amount:0});persist();rerender();};
window.updCustomAdd=function(i,field,val){if(!currentRec||!currentRec.customAdds||!currentRec.customAdds[i])return;currentRec.customAdds[i][field]=val;persist();rerender();};
window.delCustomAdd=function(i){if(!currentRec||!currentRec.customAdds)return;currentRec.customAdds.splice(i,1);persist();rerender();};

async function refreshSheet(){ rerender(); }

window.saveSheet=async function(){
  if(!selectedEmpId||isSaving||!currentRec)return;isSaving=true;showToast('儲存中…');
  const emp=employees.find(e=>String(e.id)===String(selectedEmpId));
  const record=currentRec;const c=calcSalary(emp,record,curShifts);
  record.snapshot={target:c.target,base:c.base,elastic:Math.round(c.elastic),otPayTotal:Math.round(c.otPayTotal),netPay:Math.round(c.netPay),isPartial:c.isPartial,employedDays:c.employedDays,savedAt:new Date().toISOString()};
  const ok=await saveRec(selectedEmpId,viewYear,viewMonth,record);
  if(ok){writeOpLog({editor:CU.name,role:CU.role,module:'salary',action:'儲存薪資',detail:`${emp.name} ${viewYear}年${viewMonth}月`});showToast('✓ 已儲存');}else showToast('⚠️ 儲存失敗');
  isSaving=false;
};

window.exportSlip=async function(){
  const emp=employees.find(e=>String(e.id)===String(selectedEmpId));if(!emp||!currentRec)return;
  const c=calcSalary(emp,currentRec,curShifts);
  const insLabel={normal:'',new:'首月免扣',quit_prepay:'含離職預扣'}[c.insMode]||'';
  const customRows=(c.customAdds||[]).filter(a=>a.amount>0).map(a=>`<tr><td>${a.name||'其他加項'}</td><td>$${Number(a.amount).toLocaleString()}</td></tr>`).join('');

  const slipHtml=`<table>
<tr><td class="sh" colspan="2">加項</td></tr>
<tr><td>底薪</td><td>$${c.base.toLocaleString()}</td></tr>
<tr><td>彈性補貼</td><td>$${Math.round(c.elastic).toLocaleString()}</td></tr>
<tr><td>加班費 ×1.34（${c.fixedOtHours}h）</td><td>$${Math.round(c.fixedOtPay).toLocaleString()}</td></tr>
${c.extraOtPay>0?`<tr><td>額外加班 ×1.67（${c.extraOtHours}h）</td><td>$${Math.round(c.extraOtPay).toLocaleString()}</td></tr>`:''}
${c.tempOtPay>0?`<tr><td>臨時加班</td><td>$${Math.round(c.tempOtPay).toLocaleString()}</td></tr>`:''}
${c.autoAnnualComp>0?`<tr><td>特休補薪（${c.annualComp}天）</td><td>$${c.autoAnnualComp.toLocaleString()}</td></tr>`:''}
${c.autoRedComp>0?`<tr><td>紅字補薪（${c.redComp}天）</td><td>$${c.autoRedComp.toLocaleString()}</td></tr>`:''}
${customRows}
<tr><td class="sh" colspan="2">扣項</td></tr>
${c.personalDeduct>0?`<tr><td>事假（${fmtMin(c.personalMins)}）</td><td class="red">−$${c.personalDeduct.toLocaleString()}</td></tr>`:''}
${c.sickDeduct>0?`<tr><td>病假（${fmtMin(c.sickHours*60)}）</td><td class="red">−$${c.sickDeduct.toLocaleString()}</td></tr>`:''}
${c.absentDeduct>0?`<tr><td>曠職（${Math.round(c.absentDays*10)/10}天）</td><td class="red">−$${c.absentDeduct.toLocaleString()}</td></tr>`:''}
<tr><td>勞保自負${c.insMode==='new'?'(首月免扣)':c.insMode==='quit_prepay'?'(本月+預扣次月×2)':c.isPartial?'(在保'+c.laborInsuredDays+'天)':''}</td><td class="red">−$${c.finalLabor.toLocaleString()}</td></tr>
<tr><td>健保自負${c.dependents>0?'(含眷'+c.dependents+'人)':''}${c.insMode==='new'?'(首月免扣)':c.insMode==='quit_prepay'?'(本月+預扣次月×2)':!c.healthCharged?'(非月底退保免扣)':''}</td><td class="red">−$${c.finalHealth.toLocaleString()}</td></tr>
${c.pensionAmt>0?`<tr><td>自提退休金（${Math.round(c.pensionRate*100)}%）</td><td class="red">−$${c.pensionAmt.toLocaleString()}</td></tr>`:''}
${c.insMode==='quit_prepay'?`<tr><td colspan="2" style="font-size:10px;color:#C47A00">※離職預扣：本月一份+次月一份（勞保健保各×2）</td></tr>`:''}
${Object.keys(c.paidLeaves).length?`<tr><td class="sh" colspan="2">其他假別（全薪，不扣薪）</td></tr>${Object.entries(c.paidLeaves).map(([label,dates])=>`<tr><td>${label}</td><td style="color:#1A9B4C;text-align:right">${dates.join('、')}</td></tr>`).join('')}`:''}
<tr class="tot"><td>本月實領薪資</td><td class="green">$${Math.round(c.netPay).toLocaleString()}</td></tr>
</table>`;

  const sub=`${emp.name}｜${viewYear}年${viewMonth}月｜${emp.workLocation||''}${c.isPartial?'｜不足月(在職'+c.employedDays+'天)':''}${insLabel?'｜'+insLabel:''}`;

  // 同頁 overlay（手機相容，不依賴 window.open）
  const ov=document.createElement('div');
  ov.className='slip-overlay';
  ov.innerHTML=`<div class="slip-modal">
    <div class="slip-bar">
      <button class="btn slip-close" onclick="closeSlip()">✕ 關閉</button>
      <span style="font-size:14px;font-weight:700">薪資單</span>
      <button class="btn btn-primary" onclick="printSlip()">📄 存成 PDF</button>
    </div>
    <div class="slip-body" id="slipBody">
      <h2 style="font-size:17px;margin-bottom:4px">薪　資　單</h2>
      <div style="font-size:11px;color:#666;margin-bottom:14px">${sub}</div>
      ${slipHtml}
      <div style="font-size:10px;color:#999;margin-top:10px">本薪資單由梁平鑫系統自動產生。</div>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{if(e.target===ov)closeSlip();});
};

window.closeSlip=function(){
  document.body.classList.remove('printing-slip');
  const ov=document.querySelector('.slip-overlay');if(ov)ov.remove();
};

window.printSlip=function(){
  // 直接列印當前薪資單（CSS 只顯示 overlay），手機桌機一致，不開新分頁
  document.body.classList.add('printing-slip');
  const cleanup=()=>{document.body.classList.remove('printing-slip');window.removeEventListener('afterprint',cleanup);};
  window.addEventListener('afterprint',cleanup);
  setTimeout(()=>{window.print();setTimeout(cleanup,1500);},100);
};

function showToast(msg,d=2000){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),d);}
window.showToast=showToast;
</script>
</body>
</html>
