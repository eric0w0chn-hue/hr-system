<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>薪資計算 — 鑫系統</title>
<style>
:root{
  --bg:#ECEEF2;--surface:#fff;--surface2:#F4F5F8;--border:#DDE1E9;--border2:#C8CDD8;
  --text:#1A1D23;--text2:#5A6175;--text3:#9AA0B4;--accent:#2D3142;--accent-hover:#1E2230;--accent-light:#F0F2F5;
  --green:#1A9B4C;--green-bg:#E5F5EB;--green-border:#B4E1C2;
  --orange:#C47A00;--orange-bg:#FFF4E0;--orange-border:#FDDFA0;
  --red:#D33A3A;--red-bg:#FCEBEB;--red-border:#F7C8C8;
  --blue:#2D6BF0;--blue-bg:#EAF0FF;--blue-border:#C3D4F7;
  --yellow-bg:#FFFBE6;--yellow-border:#FFE58F;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* ── Topbar ── */
.topbar{height:60px;background:var(--accent);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200;gap:8px}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1;overflow:hidden}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.back-btn{font-size:12px;padding:0 13px;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0;min-height:44px;display:flex;align-items:center}
.back-btn:hover{background:rgba(255,255,255,.22)}
.dv{width:1px;height:20px;background:rgba(255,255,255,.2);flex-shrink:0}
.topbar h1{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.role-chip{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;background:rgba(255,255,255,.15);color:#fff;white-space:nowrap}
@media(max-width:600px){.topbar{padding:0 10px}.topbar h1{font-size:14px}.back-btn{font-size:11px;padding:0 9px;min-height:38px}}

/* ── Layout ── */
.main{max-width:1100px;margin:0 auto;padding:18px 16px 60px}

/* ── Filter Bar ── */
.filter-bar{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-bar select,.filter-bar input{font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;min-height:36px}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--accent)}
.filter-label{font-size:12px;color:var(--text2);white-space:nowrap;font-weight:500}
.filter-divider{width:1px;height:20px;background:var(--border);flex-shrink:0}

/* ── Buttons ── */
.btn{font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;font-weight:500;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-family:inherit;transition:all .15s;border:none;min-height:36px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}.btn-outline:hover{background:var(--surface2)}
.btn-sm{font-size:12px;padding:4px 10px;min-height:28px;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-weight:500;font-family:inherit;border:none;transition:all .15s}
.btn-sm.btn-outline{border:1px solid var(--border);background:#fff;color:var(--text2)}.btn-sm.btn-outline:hover{background:var(--surface2)}
.btn-sm.btn-primary{background:var(--accent);color:#fff}

/* ── Store Tabs ── */
.store-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.store-tab{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.store-tab:hover{border-color:var(--accent);color:var(--accent)}
.store-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.store-tab .tab-count{font-size:10px;opacity:.75}
.store-ot-badge{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600;background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border)}
.store-ot-badge.ot2{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}

/* ── OT Settings Panel ── */
.ot-settings-panel{background:#fff;border:1px solid var(--yellow-border);border-radius:12px;padding:14px 16px;margin-bottom:14px;background:var(--yellow-bg)}
.ot-settings-title{font-size:12px;font-weight:700;color:#92640A;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ot-settings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.ot-store-item{background:#fff;border:1px solid var(--yellow-border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ot-store-name{font-size:12px;color:var(--text);font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ot-select{font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none;min-height:28px;cursor:pointer}
.ot-select:focus{border-color:var(--accent);outline:none}

/* ── Employee List ── */
.emp-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:20px}
.emp-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .15s;position:relative}
.emp-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.07)}
.emp-card.active{border-color:var(--accent);background:var(--accent-light);box-shadow:0 2px 8px rgba(45,49,66,.12)}
.emp-name{font-size:15px;font-weight:600;margin-bottom:4px}
.emp-meta{font-size:12px;color:var(--text2);display:flex;gap:8px;flex-wrap:wrap}
.emp-salary-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--accent-light);color:var(--accent)}

/* ── Salary Sheet ── */
.salary-sheet{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.sheet-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;background:var(--surface2)}
.sheet-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}

/* ── Summary Row ── */
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-bottom:1px solid var(--border)}
@media(max-width:700px){.summary-row{grid-template-columns:repeat(2,1fr)}}
.summary-cell{padding:14px 16px;border-right:1px solid var(--border);text-align:center}
.summary-cell:last-child{border-right:none}
.summary-label{font-size:11px;color:var(--text3);margin-bottom:4px;white-space:nowrap}
.summary-value{font-size:18px;font-weight:700;color:var(--text)}
.summary-value.green{color:var(--green)}
.summary-value.red{color:var(--red)}
.summary-value.blue{color:var(--blue)}

/* ── Formula Breakdown ── */
.formula-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.formula-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.formula-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:700px){.formula-grid{grid-template-columns:repeat(2,1fr)}}
.formula-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.formula-item-label{font-size:11px;color:var(--text3);margin-bottom:3px}
.formula-item-value{font-size:14px;font-weight:600;color:var(--text)}
.formula-item-sub{font-size:10px;color:var(--text3);margin-top:2px}
.formula-eq{display:flex;align-items:center;gap:4px;flex-wrap:wrap;font-size:12px;color:var(--text2);margin-top:8px;padding:8px 10px;background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:7px}
.formula-eq .val{font-weight:700;color:var(--text);font-size:13px}
.formula-eq .op{color:var(--text3)}

/* ── Daily Records ── */
.daily-section{padding:14px 16px}
.daily-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.daily-header{display:grid;grid-template-columns:52px 1fr 90px 90px 90px 90px;gap:6px;padding:5px 10px;font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.3px}
.daily-row{display:grid;grid-template-columns:52px 1fr 90px 90px 90px 90px;gap:6px;align-items:center;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;transition:background .1s}
.daily-row:hover{background:#EDEEF3}
.daily-row.weekend{background:#FFF8F8;border-color:#FDDADA}
.daily-row.no-shift{opacity:.5}
@media(max-width:700px){
  .daily-header{display:none}
  .daily-row{grid-template-columns:42px 1fr 80px 70px;gap:4px;padding:7px 8px}
  .daily-row .col-ot2,.daily-row .col-ot2-label{display:none}
}
.day-date-cell{text-align:center}
.day-num{font-size:13px;font-weight:600;color:var(--text)}
.day-name{font-size:10px;color:var(--text3)}
.day-shift{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.day-type-select{font-size:12px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);font-family:inherit;width:100%;-webkit-appearance:none;appearance:none;min-height:30px;text-align:center}
.day-type-select.absent{border-color:var(--red-border);background:var(--red-bg);color:var(--red)}
.day-type-select.sick{border-color:var(--orange-border);background:var(--orange-bg);color:var(--orange)}
.day-type-select.annual{border-color:var(--green-border);background:var(--green-bg);color:var(--green)}
.ot-input-wrap{position:relative;display:flex;align-items:center}
.ot-input-wrap input{width:100%;font-size:12px;padding:4px 24px 4px 6px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);font-family:inherit;text-align:right;-webkit-appearance:none;appearance:none;min-height:30px}
.ot-input-wrap input:focus{border-color:var(--accent);outline:none}
.ot-input-wrap input.auto-filled{background:var(--orange-bg);border-color:var(--orange-border);color:var(--orange)}
.ot-input-wrap input.ot2-input{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.ot-unit{position:absolute;right:6px;font-size:10px;color:var(--text3);pointer-events:none}

/* ── Deductions ── */
.deduct-section{padding:14px 16px;border-top:1px solid var(--border)}
.deduct-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:500px){.deduct-grid{grid-template-columns:1fr}}
.deduct-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;gap:8px}
.deduct-label{font-size:12px;color:var(--text2)}
.deduct-input{font-size:13px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);font-family:inherit;width:100px;text-align:right;-webkit-appearance:none;appearance:none;min-height:32px}
.deduct-input:focus{border-color:var(--accent);outline:none}

/* ── Net Pay ── */
.netpay-bar{margin:14px 16px;padding:14px 16px;background:linear-gradient(135deg,#2D3142 0%,#404563 100%);border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.netpay-label{font-size:13px;color:rgba(255,255,255,.75);font-weight:500}
.netpay-value{font-size:24px;font-weight:800;color:#fff;letter-spacing:.5px}
@media(max-width:500px){.netpay-value{font-size:20px}}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1D23;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;transition:all .25s;z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.overlay{align-items:center}}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px 18px 32px;max-height:85vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:14px;padding:22px 22px 24px;max-height:80vh}}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px}
.fr{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fr label{font-size:12px;color:var(--text2);font-weight:500}
.fr input,.fr select,.fr textarea{font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;color:var(--text);-webkit-appearance:none;appearance:none;min-height:38px}
.mf{display:flex;gap:8px;margin-top:16px}
.mf button{flex:1}

/* ── Empty / Loading ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:8px}
.loading-text{font-size:13px;color:var(--text3);text-align:center;padding:20px}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.badge-green{background:var(--green-bg);color:var(--green)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <button class="back-btn" onclick="history.back()">← 返回</button>
    <div class="dv"></div>
    <h1>💰 薪資計算</h1>
  </div>
  <div class="topbar-right">
    <span class="role-chip" id="roleChip">—</span>
  </div>
</div>

<div class="main" id="mainArea">
  <div class="loading-text">載入中…</div>
</div>

<div class="toast" id="toast"></div>
<div id="modalArea"></div>

<script type="module">
import { authGuard, db, writeOpLog } from './auth-guard.js?v=2';
import {
  doc, getDoc, setDoc, getDocs, collection
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── 頁面狀態 ──
let currentUserName='', currentRole='', currentUid='';
let userData_raw={};
let employees=[];       // 全部在職同仁
let allStores=[];       // 全部店面清單
let viewableStores=[];  // 當前角色可見店面
let storeOtConfig={};   // { '店名': 1 | 2 }  每間店固定加班時數
let selectedStore=null;
let selectedEmpId=null;
let viewYear=new Date().getFullYear();
let viewMonth=new Date().getMonth()+1;
let isSaving=false;
let showOtSettings=false;

const roleNames={admin:'管理員',consultant:'顧問',manager:'店長/副店長',employee:'同仁'};

// ── 2024 勞健保費率表 ──
const LABOR_TABLE=[
  {grade:26400,labor:388,health:372},{grade:27600,labor:405,health:390},
  {grade:28800,labor:423,health:407},{grade:30300,labor:445,health:427},
  {grade:31800,labor:467,health:448},{grade:33300,labor:489,health:470},
  {grade:34800,labor:511,health:491},{grade:36300,labor:533,health:512},
  {grade:38200,labor:561,health:538},{grade:40100,labor:589,health:565},
  {grade:42000,labor:617,health:591},{grade:43900,labor:644,health:617},
  {grade:45800,labor:673,health:645},{grade:48200,labor:708,health:678},
  {grade:50600,labor:743,health:712},{grade:53000,labor:778,health:745},
  {grade:55400,labor:814,health:780},{grade:57800,labor:849,health:813},
  {grade:60800,labor:892,health:855},{grade:63800,labor:937,health:897},
  {grade:66800,labor:981,health:940},{grade:69800,labor:1025,health:982},
  {grade:72800,labor:1069,health:1024},{grade:76500,labor:1123,health:1077},
];
function getInsuranceFromGrade(grade){
  if(!grade)return{labor:0,health:0};
  const g=Number(grade);
  let best=LABOR_TABLE[0];
  for(const row of LABOR_TABLE){if(row.grade<=g)best=row;}
  return{labor:best.labor,health:best.health};
}

// ── authGuard ──
authGuard('salary',({user,uid,role,locations,userData})=>{
  currentUid=uid; currentRole=role;
  currentUserName=userData.name||user.email;
  userData_raw=userData;
  document.getElementById('roleChip').textContent=roleNames[role]||role;
  init(locations, userData);
});

async function init(locations, userData){
  await Promise.all([
    loadEmployees(),
    loadStores(locations, userData),
    loadOtConfig(),
  ]);
  renderMain();
}

// ── 載入員工（hr/employees）──
async function loadEmployees(){
  try{
    const snap=await getDoc(doc(db,'hr','employees'));
    if(snap.exists()){
      employees=(snap.data().list||[]).filter(e=>e.status==='在職'||!e.status);
    }
  }catch(e){console.error(e);}
}

// ── 載入店面（依角色篩選）──
async function loadStores(locations, userData){
  try{
    // 從 hr/settings 取全部店面
    const hrSnap=await getDoc(doc(db,'hr','settings'));
    allStores=hrSnap.exists()?(hrSnap.data().workLocations||[]).filter(Boolean).sort():[];

    if(currentRole==='admin'||currentRole==='consultant'){
      viewableStores=[...allStores];
    } else {
      // manager / employee：只看自己被指派的店面
      const myLocs=Array.isArray(userData.locations)?userData.locations:[];
      viewableStores=allStores.filter(s=>myLocs.includes(s));
      if(!viewableStores.length) viewableStores=[...myLocs];
    }
    if(!selectedStore && viewableStores.length) selectedStore=viewableStores[0];
  }catch(e){console.error(e);}
}

// ── 載入加班設定（salary_settings/store_ot）──
async function loadOtConfig(){
  try{
    const snap=await getDoc(doc(db,'salary_settings','store_ot'));
    storeOtConfig=snap.exists()?(snap.data().config||{}):{};
  }catch(e){storeOtConfig={};}
}

// ── 儲存加班設定 ──
async function saveOtConfig(){
  try{
    await setDoc(doc(db,'salary_settings','store_ot'),{config:storeOtConfig,updatedAt:new Date().toISOString(),updatedBy:currentUserName});
    showToast('✓ 加班設定已儲存');
    writeOpLog({editor:currentUserName,role:currentRole,module:'salary',action:'編輯加班設定',detail:'各店固定加班時數'});
  }catch(e){showToast('⚠️ 儲存失敗');}
}

// ── 取得當店固定加班時數（預設 2）──
function getStoreDefaultOt(storeName){
  return storeOtConfig[storeName]??2;
}

// ── 薪資計算核心 ──
function calcSalary(emp, record, shifts){
  const salHist=(emp.salaryHistory||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const targetSalary=salHist.length>0?Number(salHist[0].amount):(emp.salary||0);
  const BASE=29500;
  const defaultOtPerDay=getStoreDefaultOt(emp.workLocation);
  const days=getDaysInMonth(viewYear,viewMonth);
  const dailyData=record?.dailyData||{};

  // 計算每日加班時數合計（1.34 固定 + 1.67 額外）
  let totalOt134=0, totalOt167=0;
  for(let d=1;d<=days;d++){
    const ds=dateStr(viewYear,viewMonth,d);
    const dayRec=dailyData[ds]||{};
    const shift=getShiftForDay(shifts,emp,ds);
    if(!shift)continue;
    const type=dayRec.type||'normal';
    if(type==='personal'||type==='absent'||type==='dayoff')continue;
    // 固定加班時數（自動套用）
    const autoOt=dayRec.autoOt!=null?Number(dayRec.autoOt):defaultOtPerDay;
    totalOt134+=autoOt;
    // 額外加班（1.67）
    totalOt167+=Number(dayRec.ot167||0);
  }

  // 彈性補貼 = ROUND(目標薪資 / (1 + 月加班時數/240)) - 底薪
  const totalOtForElastic=totalOt134+totalOt167;
  const elasticBonus=Math.round(targetSalary/(1+totalOtForElastic/240))-BASE;
  const hourlyBase=(BASE+elasticBonus)/30/8;

  // 加班費
  const otPay134=Math.round(hourlyBase*totalOt134*1.34*10)/10;
  const otPay167=Math.round(hourlyBase*totalOt167*1.67*10)/10;
  const otPayTotal=otPay134+otPay167;

  // 出勤統計
  let workDays=0,sickDays=0,personalDays=0,absentDays=0,annualDays=0;
  for(let d=1;d<=days;d++){
    const ds=dateStr(viewYear,viewMonth,d);
    const dayRec=dailyData[ds]||{};
    if(!getShiftForDay(shifts,emp,ds))continue;
    const type=dayRec.type||'normal';
    if(type==='normal'||type==='sick')workDays++;
    if(type==='sick')sickDays++;
    if(type==='personal')personalDays++;
    if(type==='absent')absentDays++;
    if(type==='annual')annualDays++;
  }

  const personalDeduct=Math.round((BASE+elasticBonus)/30*personalDays);
  const absentDeduct=Math.round((BASE+elasticBonus)/30*absentDays*3);
  const sickDeduct=Math.round((BASE+elasticBonus)/30*Math.max(0,sickDays-5)*0.5);
  const ins=getInsuranceFromGrade(emp.insurance?.grade||0);
  const laborDeduct=record?.laborDeduct??ins.labor;
  const healthDeduct=record?.healthDeduct??ins.health;

  const gross=BASE+elasticBonus+otPayTotal;
  const totalDeduct=personalDeduct+absentDeduct+sickDeduct+laborDeduct+healthDeduct;
  const netPay=gross-totalDeduct;

  return{
    targetSalary,BASE,elasticBonus,hourlyBase,
    totalOt134,totalOt167,otPay134,otPay167,otPayTotal,
    gross,workDays,sickDays,personalDays,absentDays,annualDays,
    personalDeduct,absentDeduct,sickDeduct,
    laborDeduct,healthDeduct,totalDeduct,netPay,
    insGrade:emp.insurance?.grade||0,
    defaultOtPerDay
  };
}

function getDaysInMonth(y,m){return new Date(y,m,0).getDate();}
function dateStr(y,m,d){return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function getShiftForDay(shifts,emp,ds){
  return(shifts[ds]||[]).find(s=>String(s.empId)===String(emp.id));
}

// ── 取得當店所有員工 ──
function getStoreEmps(store){
  return employees.filter(e=>e.workLocation===store);
}

      <span class="tab-count">${cnt}人</span>

      return`<div class="emp-card${isActive?' active':''}" onclick="selectEmp(${e.id})">

        </div>

          <span>${e.title||'—'}</span>

  main.innerHTML=`
    <div class="filter-bar">
      <span class="filter-label">月份</span>

      <select id="monthSel" onchange="changeMonth()">

window.selectEmp=async function(empId){

  event.currentTarget.classList.add('active');

// ── 載入並渲染薪資單 ──
async function loadAndRenderSheet(empId){
  const emp=employees.find(e=>String(e.id)===String(empId));
  if(!emp)return;
  const [shifts,existing]=await Promise.all([
    loadShifts(empId,viewYear,viewMonth),
    loadSalaryRecord(empId,viewYear,viewMonth)
  ]);
  const record=existing||{dailyData:{}};
  const calc=calcSalary(emp,record,shifts);
  renderSheet(emp,record,shifts,calc);
}

async function loadShifts(empId,year,month){
  const emp=employees.find(e=>String(e.id)===String(empId));
  if(!emp||!emp.workLocation)return{};
  const key=`${year}-${String(month).padStart(2,'0')}_${emp.workLocation}`;
  try{
    const snap=await getDoc(doc(db,'schedules',key));
    return snap.exists()?(snap.data().shifts||{}):{};
  }catch(e){return{};}
}
async function loadSalaryRecord(empId,year,month){
  const key=`${empId}_${year}-${String(month).padStart(2,'0')}`;
  try{
    const snap=await getDoc(doc(db,'salary_records',key));
    return snap.exists()?snap.data():null;
  }catch(e){return null;}
}
async function saveSalaryRecord(empId,year,month,data){
  const key=`${empId}_${year}-${String(month).padStart(2,'0')}`;
  try{
    await setDoc(doc(db,'salary_records',key),{...data,updatedAt:new Date().toISOString(),updatedBy:currentUserName});
    return true;
  }catch(e){return false;}
}

// ── 渲染薪資單 ──
function renderSheet(emp,record,shifts,calc){
  const days=getDaysInMonth(viewYear,viewMonth);
  const DAY=['日','一','二','三','四','五','六'];
  const TYPES=[
    {val:'normal',label:'正常'},{val:'sick',label:'病假'},
    {val:'personal',label:'事假'},{val:'annual',label:'特休'},
    {val:'absent',label:'曠職'},{val:'dayoff',label:'公休'},
  ];
  const dailyData=record?.dailyData||{};
  const defaultOt=calc.defaultOtPerDay;

  let rows='';
  for(let d=1;d<=days;d++){
    const ds=dateStr(viewYear,viewMonth,d);
    const dow=new Date(ds).getDay();
    const isWknd=dow===0||dow===6;

    const dayRec=dailyData[ds]||{};
    const type=dayRec.type||'normal';
    const noShift=!shift;
    const hasWork=shift&&type!=='personal'&&type!=='absent'&&type!=='dayoff';

    // 固定加班時數
    const autoOt=dayRec.autoOt!=null?Number(dayRec.autoOt):defaultOt;
    // 額外加班
    const ot167=dayRec.ot167||'';

    let shiftDesc='';
    if(shift)shiftDesc=`${shift.startTime||''}-${shift.endTime||''}`;
    else if(isWknd)shiftDesc=`<span style="color:#E05252">休</span>`;
    else shiftDesc=`<span style="color:var(--text3)">未排班</span>`;

    const selClass=type==='absent'?'absent':type==='sick'?'sick':type==='annual'?'annual':'normal';

    rows+=`<div class="daily-row${isWknd?' weekend':''}${noShift&&!isWknd?' no-shift':''}">
      <div class="day-date-cell">
        <div class="day-num" style="color:${dow===0?'#E05252':dow===6?'#5B8EDB':'var(--text)'}">${d}</div>
        <div class="day-name">${DAY[dow]}</div>
      </div>
      <div class="day-shift">${shiftDesc}</div>
      <select class="day-type-select ${selClass}" data-date="${ds}" onchange="updateDayType(this)" ${noShift?'disabled':''}>
        ${TYPES.map(o=>`<option value="${o.val}"${o.val===type?' selected':''}>${o.label}</option>`).join('')}
      </select>
      <div class="ot-input-wrap">
        <input type="number" min="0" max="24" step="0.5"
          value="${hasWork?autoOt:''}"
          class="${hasWork?'auto-filled':''}"
          placeholder="—"
          data-date="${ds}" data-field="autoOt"
          onchange="updateDayOtField(this,'autoOt')"
          ${noShift||type==='dayoff'?'disabled':''}>
        <span class="ot-unit">h</span>
      </div>
      <div class="ot-input-wrap col-ot2">
        <input type="number" min="0" max="24" step="0.5"
          value="${ot167}"
          class="ot2-input"
          placeholder="—"
          data-date="${ds}" data-field="ot167"
          onchange="updateDayOtField(this,'ot167')"
          ${noShift||!hasWork?'disabled':''}>
        <span class="ot-unit">h</span>
      </div>
      <div style="font-size:10px;color:var(--text3);text-align:right">
        ${hasWork?`<div style="color:var(--orange);font-weight:500">${autoOt}h×1.34</div>`:''}
        ${ot167?`<div style="color:var(--red);font-weight:500">${ot167}h×1.67</div>`:''}
      </div>
    </div>`;
  }

  document.getElementById('sheetArea').innerHTML=`
    <div class="salary-sheet">
      <div class="sheet-header">
        <div class="sheet-title">💰 ${emp.name} — ${viewYear}年${viewMonth}月</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="badge badge-green">實領 $${Math.round(calc.netPay).toLocaleString()}</span>
          <button class="btn btn-sm btn-primary" onclick="saveCurrentSheet()">💾 儲存</button>
          <button class="btn-sm btn-outline" onclick="exportSlip()">📄 薪資單</button>
        </div>
      </div>

      <!-- 摘要 -->
      <div class="summary-row">
        <div class="summary-cell">
          <div class="summary-label">底薪</div>
          <div class="summary-value">$${calc.BASE.toLocaleString()}</div>
        </div>
        <div class="summary-cell">
          <div class="summary-label">彈性補貼</div>
          <div class="summary-value blue">$${Math.round(calc.elasticBonus).toLocaleString()}</div>
        </div>
        <div class="summary-cell">
          <div class="summary-label">加班費合計</div>
          <div class="summary-value green">$${Math.round(calc.otPayTotal).toLocaleString()}</div>
        </div>
        <div class="summary-cell">
          <div class="summary-label">目標薪資</div>
          <div class="summary-value">$${calc.targetSalary.toLocaleString()}</div>
        </div>
      </div>

      <!-- 公式說明 -->
      <div class="formula-section">
        <div class="formula-title">📐 計算公式</div>
        <div class="formula-grid">
          <div class="formula-item">
            <div class="formula-item-label">時薪基礎</div>
            <div class="formula-item-value">$${calc.hourlyBase.toFixed(2)}</div>
            <div class="formula-item-sub">(底薪+彈性補貼)÷30÷8</div>
          </div>
          <div class="formula-item">
            <div class="formula-item-label">固定加班（1.34倍）</div>
            <div class="formula-item-value" style="color:var(--orange)">${calc.totalOt134}h → $${Math.round(calc.otPay134).toLocaleString()}</div>
            <div class="formula-item-sub">每出勤日 +${defaultOt}h</div>
          </div>
          <div class="formula-item">
            <div class="formula-item-label">額外加班（1.67倍）</div>
            <div class="formula-item-value" style="color:var(--red)">${calc.totalOt167}h → $${Math.round(calc.otPay167).toLocaleString()}</div>
            <div class="formula-item-sub">超過固定時數的部分</div>
          </div>
          <div class="formula-item">
            <div class="formula-item-label">店面固定設定</div>
            <div class="formula-item-value">+${defaultOt}h / 出勤日</div>
            <div class="formula-item-sub">${emp.workLocation}</div>
          </div>
        </div>
        <div class="formula-eq">
          <span>加班費</span><span class="op">=</span>
          <span class="val">$${calc.hourlyBase.toFixed(2)}</span>
          <span class="op">×</span>
          <span class="val">${calc.totalOt134}h</span>
          <span class="op">×1.34 +</span>
          <span class="val">${calc.hourlyBase.toFixed(2)}</span>
          <span class="op">×</span>
          <span class="val">${calc.totalOt167}h</span>
          <span class="op">×1.67 =</span>
          <span class="val" style="color:var(--green)">$${Math.round(calc.otPayTotal).toLocaleString()}</span>
        </div>
      </div>

      <!-- 每日出勤 -->
      <div class="daily-section">
        <div class="daily-title">
          <span>📅 每日出勤記錄</span>
          <span style="font-size:11px;color:var(--text3)">
            出勤 ${calc.workDays} ｜ 事假 ${calc.personalDays} ｜ 病假 ${calc.sickDays} ｜ 曠職 ${calc.absentDays} ｜ 特休 ${calc.annualDays}
          </span>
        </div>
        <div class="daily-header">
          <div style="text-align:center">日期</div>
          <div>班次</div>
          <div>出勤狀態</div>
          <div style="text-align:right">固定OT (×1.34)</div>
          <div style="text-align:right" class="col-ot2">額外OT (×1.67)</div>
          <div></div>
        </div>
        <div id="dailyGrid">${rows}</div>
      </div>

      <!-- 扣項 -->
      <div class="deduct-section">
        <div class="formula-title">➖ 扣項明細</div>
        <div class="deduct-grid">
          <div class="deduct-item">
            <div class="deduct-label">事假扣薪（${calc.personalDays}天）</div>
            <div style="font-size:13px;font-weight:600;color:var(--red)">−$${calc.personalDeduct.toLocaleString()}</div>
          </div>
          <div class="deduct-item">
            <div class="deduct-label">曠職扣薪（${calc.absentDays}天×3）</div>
            <div style="font-size:13px;font-weight:600;color:var(--red)">−$${calc.absentDeduct.toLocaleString()}</div>
          </div>
          <div class="deduct-item">
            <div class="deduct-label">病假扣薪（超5天部分）</div>
            <div style="font-size:13px;font-weight:600;color:var(--red)">−$${calc.sickDeduct.toLocaleString()}</div>
          </div>
          <div class="deduct-item">
            <div class="deduct-label">勞保自負額</div>
            <input class="deduct-input" type="number" id="laborInput" value="${calc.laborDeduct}" onchange="updateDeduct('labor',this.value)">
          </div>
          <div class="deduct-item">
            <div class="deduct-label">健保自負額</div>
            <input class="deduct-input" type="number" id="healthInput" value="${calc.healthDeduct}" onchange="updateDeduct('health',this.value)">
          </div>
          ${calc.insGrade?`<div class="deduct-item" style="background:var(--blue-bg);border-color:var(--blue-border)">
            <div class="deduct-label" style="color:var(--blue)">投保級距</div>
            <div style="font-size:12px;font-weight:600;color:var(--blue)">$${Number(calc.insGrade).toLocaleString()}</div>
          </div>`:''}
        </div>
      </div>

      <!-- 實領 -->
      <div class="netpay-bar">
        <div>
          <div class="netpay-label">本月實領薪資</div>
          <div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:2px">
            $${(calc.BASE+Math.round(calc.elasticBonus)).toLocaleString()} 底+彈 ＋ $${Math.round(calc.otPayTotal).toLocaleString()} 加班 − $${calc.totalDeduct.toLocaleString()} 扣項
          </div>
        </div>
        <div class="netpay-value" id="netPayDisplay">$${Math.round(calc.netPay).toLocaleString()}</div>
      </div>
      <div style="padding:0 16px 16px;display:flex;justify-content:flex-end;gap:8px">
        <button class="btn btn-primary" onclick="saveCurrentSheet()">💾 儲存薪資記錄</button>
      </div>
    </div>
  `;
}

// ── 更新出勤狀態 ──
window.updateDayType=async function(el){
  const type=el.value;
  el.className='day-type-select';
  el.classList.add(type==='absent'?'absent':type==='sick'?'sick':type==='annual'?'annual':'normal');
  const ds=el.dataset.date;
  await patchDayRecord(ds,'type',type);
  // 如果改成非出勤，清空加班自動填
  await refreshSheet();
};

// ── 更新加班時數欄位 ──
window.updateDayOtField=async function(el,field){
  await patchDayRecord(el.dataset.date,field,Number(el.value)||0);
  await refreshSheet();
};

// ── 更新勞健保扣項 ──
window.updateDeduct=async function(type,val){
  const rec=await loadSalaryRecord(selectedEmpId,viewYear,viewMonth)||{dailyData:{}};
  if(type==='labor')rec.laborDeduct=Number(val);
  else rec.healthDeduct=Number(val);
  await saveSalaryRecord(selectedEmpId,viewYear,viewMonth,rec);
  await refreshSheet();
};

// ── patch 單日記錄 ──
async function patchDayRecord(ds,field,value){
  if(!selectedEmpId)return;
  const rec=await loadSalaryRecord(selectedEmpId,viewYear,viewMonth)||{dailyData:{}};
  if(!rec.dailyData)rec.dailyData={};
  if(!rec.dailyData[ds])rec.dailyData[ds]={};
  rec.dailyData[ds][field]=value;
  await saveSalaryRecord(selectedEmpId,viewYear,viewMonth,rec);
}

// ── 重新計算並更新數字（不重繪整個 sheet）──
async function refreshSheet(){
  const emp=employees.find(e=>String(e.id)===String(selectedEmpId));
  if(!emp)return;
  const [shifts,rec]=await Promise.all([
    loadShifts(selectedEmpId,viewYear,viewMonth),
    loadSalaryRecord(selectedEmpId,viewYear,viewMonth)
  ]);
  const calc=calcSalary(emp,rec||{dailyData:{}},shifts);
  const el=document.getElementById('netPayDisplay');
  if(el)el.textContent=`$${Math.round(calc.netPay).toLocaleString()}`;
}

// ── 手動全量儲存 ──
window.saveCurrentSheet=async function(){
  if(!selectedEmpId||isSaving)return;
  isSaving=true;showToast('儲存中…');
  const emp=employees.find(e=>String(e.id)===String(selectedEmpId));
  const [shifts,rec]=await Promise.all([
    loadShifts(selectedEmpId,viewYear,viewMonth),
    loadSalaryRecord(selectedEmpId,viewYear,viewMonth)
  ]);
  const record=rec||{dailyData:{}};
  const calc=calcSalary(emp,record,shifts);
  record.snapshot={...calc,savedAt:new Date().toISOString()};
  const ok=await saveSalaryRecord(selectedEmpId,viewYear,viewMonth,record);
  if(ok){
    writeOpLog({editor:currentUserName,role:currentRole,module:'salary',action:'儲存薪資',detail:`${emp.name} ${viewYear}年${viewMonth}月`});
    showToast('✓ 薪資記錄已儲存');
  }else showToast('⚠️ 儲存失敗');
  isSaving=false;
};

// ── 匯出薪資單 ──
window.exportSlip=async function(){

  if(!emp)return;
  const [shifts,rec]=await Promise.all([
    loadShifts(selectedEmpId,viewYear,viewMonth),
    loadSalaryRecord(selectedEmpId,viewYear,viewMonth)
  ]);
  const c=calcSalary(emp,rec||{dailyData:{}},shifts);
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>薪資單 ${emp.name} ${viewYear}年${viewMonth}月</title>
<style>body{font-family:Arial,sans-serif;max-width:580px;margin:30px auto;font-size:14px;color:#1a1a1a}

// ── Toast ──
function showToast(msg,d=2000){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),d);
}
window.showToast=showToast;
