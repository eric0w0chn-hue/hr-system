<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

.sum-row{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}

.sum-cell{padding:12px 14px;border-right:1px solid var(--border);text-align:center}

.c-green{color:var(--green)}.c-red{color:var(--red)}.c-blue{color:var(--blue)}.c-orange{color:var(--orange)}

.fml-sec{padding:12px 16px;border-bottom:1px solid var(--border)}

.eq-bar .v{font-weight:700;color:var(--text);font-size:13px}.eq-bar .op{color:var(--text3)}

/* дёҚи¶іжңҲй©—з®—зӣ’ */
.partial-box{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--orange-bg)}

.d-date{text-align:center}.d-num{font-size:12px;font-weight:700}.d-wday{font-size:10px;color:var(--text3)}

.netpay-bar{margin:12px 16px;padding:14px 16px;background:linear-gradient(135deg,#2D3142 0%,#404563 100%);border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1D23;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;transition:all .25s;z-index:9999;pointer-events:none;white-space:nowrap}

.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}

.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}

  {grade:72800,labor:1069,health:1024},{grade:76500,labor:1123,health:1077},
];
const HEALTH_DEP_RATIO=1; // жҜҸдҪҚзң·еұ¬ = 1 д»Ҫиў«дҝқйҡӘдәәеҒҘдҝқиІ»пјҲеҸҜиӘҝпјү
function insFromGrade(grade){
  if(!grade)return{labor:0,health:0};
  const g=Number(grade);let best=LABOR_TABLE[0];
  for(const r of LABOR_TABLE)if(r.grade<=g)best=r;
  return{labor:best.labor,health:best.health};
}

// еҸ–е“Ўе·Ҙж¬„дҪҚпјҲеӨҡйҮҚ fallbackпјү
function getHireDate(e){return e.hireDate||e.startDate||e.onboardDate||e.еҲ°иҒ·ж—Ҙ||e.entryDate||null;}
function getLeaveDate(e){return e.leaveDate||e.resignDate||e.йӣўиҒ·ж—Ҙ||e.quitDate||null;}
function getInsGrade(e){return Number(e.insurance?.grade||e.insuranceGrade||e.жҠ•дҝқзҙҡи·қ||e.grade||0);}
function getTarget(e){
  const h=(e.salaryHistory||[]).slice().sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  if(h.length>0)return Number(h[0].amount);
  return Number(e.salary||e.targetSalary||0);
}

function isMonthLocked(y,m){
  const now=new Date();const cy=now.getFullYear(),cm=now.getMonth()+1;
  if(y<cy)return true;if(y===cy&&m<cm)return true;return false;
}

// иЁҲз®—з•¶жңҲеңЁиҒ·еӨ©ж•ёпјҲ30еӨ©еҲ¶пјүпјҡдҫқеҲ°иҒ·/йӣўиҒ·ж—ҘпјҢиҲҮз•¶жңҲдәӨйӣҶ
function calcEmployedDays(emp,y,m){
  const dim=getDaysInMonth(y,m);
  const monthStart=new Date(y,m-1,1), monthEnd=new Date(y,m-1,dim);
  let s=monthStart, e=monthEnd, partial=false;
  const hd=getHireDate(emp), ld=getLeaveDate(emp);
  if(hd){const d=new Date(hd); if(d>monthEnd) return {days:0,partial:true,inEmploy:()=>false};
    if(d>monthStart){s=d;partial=true;}}
  if(ld){const d=new Date(ld); if(d<monthStart) return {days:0,partial:true,inEmploy:()=>false};
    if(d<monthEnd){e=d;partial=true;}}
  // 30еӨ©еҲ¶пјҡеңЁиҒ·ж—Ҙж•ё = дәӨйӣҶеӨ©ж•ёпјҢдҪҶиӢҘж•ҙжңҲеңЁиҒ·еүҮиҰ–зӮә30
  const dayCount=Math.round((e-s)/86400000)+1;
  const employedDays = partial ? dayCount : 30;
  const sN=s.getDate(), eN=e.getDate();
  return {
    days:employedDays, partial,
    inEmploy:(dayNum)=>{
      if(partial){return dayNum>=sN&&dayNum<=eN;}
      return true;
    }
  };
}

// в”Җв”Җв”Җ иЁҲз®—ж ёеҝғ в”Җв”Җв”Җ
function calcSalary(emp,rec,shifts){
  const target=getTarget(emp);
  const days=getDaysInMonth(viewYear,viewMonth);
  const dd=rec?.dailyData||{};
  const defOt=getDefOt(emp.workLocation);
  const emp2=calcEmployedDays(emp,viewYear,viewMonth);
  const isPartial=emp2.partial&&emp2.days<30;

  // зөұиЁҲ
  let fixedOtHours=0;     // еӣәе®ҡеҠ зҸӯжҷӮж•ёпјҲиЁҲе…Ҙзӣ®жЁҷзӯүејҸпјү
  let extraOtHours=0;     // йЎҚеӨ– 1.67 жҷӮж•ё
  let tempOtSegs={};      // жңӘжҺ’зҸӯиҮЁжҷӮеҠ зҸӯ {rate:hours}
  let personalMins=0;     // дәӢеҒҮ+йҒІеҲ°пјҲеҲҶйҗҳпјү
  let absentDays=0;       // жӣ иҒ·еӨ©ж•ё
  let sickHours=0;        // з—…еҒҮ/з”ҹзҗҶеҒҮпјҲе°ҸжҷӮпјҢеҚҠи–Әпјү
  let workDays=0;

  for(let d=1;d<=days;d++){
    if(!emp2.inEmploy(d))continue;
    const ds=dateStr(viewYear,viewMonth,d);
    const shift=getShift(shifts,emp,ds);
    const r=dd[ds]||{};
    const type=r.type||'normal';
    const lt=LEAVE_TYPES[type]||LEAVE_TYPES.normal;

    // жңӘжҺ’зҸӯж—ҘиҮЁжҷӮеҠ зҸӯ
    if(!shift){
      if(r.tempOt&&Number(r.tempOt)>0){
        const rate=Number(r.tempOtRate||1.34);
        tempOtSegs[rate]=(tempOtSegs[rate]||0)+Number(r.tempOt);
      }
      continue;
    }
    if(type==='dayoff')continue;

    if(type==='normal'){
      // жҳҜеҗҰйғЁеҲҶеҮәеӢӨпјҲworked<8 иЎЁзӨәдёӯйҖ”и«ӢеҒҮпјҢдҪҶ type д»Қ normal иЎЁзӨәе…ЁеӨ©дёҠзҸӯпјү
      const worked=r.workedHours!=null?Number(r.workedHours):8+defOt; // й җиЁӯи¶іжҷӮ
      workDays++;
      if(worked>=8){
        // еӣәе®ҡеҠ зҸӯ = min(worked-8, defOt) еҸ–еә—иЁӯе®ҡпјӣи¶…еҮәйғЁеҲҶеҸҰиЁҲпјҹй җиЁӯз”Ёеә—иЁӯе®ҡ
        fixedOtHours+=(r.autoOt!=null?Number(r.autoOt):defOt);
        extraOtHours+=Number(r.ot167||0);
      } else {
        // дёҚи¶і8е°ҸжҷӮпјҲзҙ” normal дҪҶжҸҗж—©иө°пјҢз„ЎеҒҮеҲҘпјүвҶ’ иҰ–зӮәдәӢеҒҮиЈңи¶і
        personalMins+=(8-worked)*60;
      }
      // йҒІеҲ°
      if(r.lateMins&&Number(r.lateMins)>0){
        const lm=Number(r.lateMins);personalMins+=Math.floor(lm/10)*10;
      }
    } else {
      // и«ӢеҒҮж—Ҙпјҡworked = з•¶еӨ©еҜҰйҡӣдёҠзҸӯжҷӮж•ё
      const worked=Number(r.workedHours||0);
      if(worked>=8){
        // дёҠж»ҝ8е°ҸжҷӮйӮ„жңүеҠ зҸӯ вҶ’ 8е…Ёи–Ә + еҠ зҸӯпјҢеҒҮеҲҘеӨұж•Ҳ
        workDays++;
        fixedOtHours+=Math.max(0,worked-8);
      } else {
        // йғЁеҲҶеҮәеӢӨ + и«ӢеҒҮ
        const leaveH=8-worked;
        if(worked>0)workDays+=worked/8;
        if(lt.pay==='none'){
          if(type==='absent')absentDays+=leaveH/8;
          else personalMins+=leaveH*60;
        } else if(lt.pay==='half'){
          sickHours+=leaveH;
        }
        // fullпјҲе©ҡе–Әзү№дј‘зҙ…еӯ—пјүпјҡдёҚжүЈ
      }
    }
  }

  // еҠ ж¬ҠжҷӮж•ёпјҲеҸӘз”Ёеӣәе®ҡеҠ зҸӯпјҢжұәе®ҡеҪҲжҖ§иЈңиІјпјү
  const W=fixedOtHours*1.34;

  // еҪҲжҖ§иЈңиІј
  let elastic, base;
  if(isPartial){
    base=Math.round(BASE_FULL/30*emp2.days);
    elastic=rec?.elasticManual!=null?Number(rec.elasticManual):0; // жүӢеӢ•
  } else {
    base=BASE_FULL;
    elastic=Math.round(target/(1+W/240))-BASE_FULL;
  }

  // жҷӮи–ӘеҹәзӨҺпјҲдёҖеҫӢз”Ёи¶іжңҲеә•и–Ә+еҪҲжҖ§пјү
  const hourly=(BASE_FULL+elastic)/30/8;
  const dailyBase=(base+elastic)/30; // жүЈй …з”ЁеҜҰеҫ—ж—Ҙи–Ә

  // еҠ зҸӯиІ»
  const fixedOtPay=Math.round(hourly*fixedOtHours*1.34*10)/10;
  const extraOtPay=Math.round(hourly*extraOtHours*1.67*10)/10;
  let tempOtPay=0;const tempOtList=[];
  for(const[rate,hrs]of Object.entries(tempOtSegs)){
    const p=Math.round(hourly*hrs*Number(rate)*10)/10;tempOtPay+=p;
    tempOtList.push({rate:Number(rate),hrs,pay:p});
  }
  const otPayTotal=fixedOtPay+extraOtPay+tempOtPay;

  // жүЈй …
  const personalDeduct=Math.round(dailyBase/8*(personalMins/60));
  const absentDeduct=Math.round(dailyBase*absentDays);
  const sickDeduct=Math.round(dailyBase/8*sickHours*0.5);

  // еӢһеҒҘдҝқ
  const ins=insFromGrade(getInsGrade(emp));
  const laborBase=rec?.laborDeduct!=null?rec.laborDeduct:ins.labor;
  const healthBase=rec?.healthDeduct!=null?rec.healthDeduct:ins.health;
  const pensionRate=rec?.pensionRate??0;
  const pensionAmt=pensionRate>0?Math.round(getInsGrade(emp)*pensionRate):0;
  const dependents=rec?.dependents??0;
  const healthTotal=healthBase+Math.round(healthBase*dependents*HEALTH_DEP_RATIO);
  const insMode=rec?.insMode||'normal';
  const finalLabor=insMode==='new'?0:laborBase;
  const finalHealth=insMode==='new'?0:healthTotal;

  // еҠ й …
  const annualComp=rec?.annualComp??0;
  const autoAnnualComp=annualComp>0?Math.round(target/30*annualComp):0;
  const redComp=rec?.redComp??0;
  const autoRedComp=redComp>0?Math.round(dailyBase*redComp):0;
  const customAdds=rec?.customAdds||[]; // [{name, amount}]
  const customAddTotal=customAdds.reduce((s,a)=>s+Number(a.amount||0),0);

  const gross=base+elastic+otPayTotal;
  const totalDeduct=personalDeduct+absentDeduct+sickDeduct+finalLabor+finalHealth+pensionAmt;
  const totalAdd=autoAnnualComp+autoRedComp+customAddTotal;
  const netPay=gross-totalDeduct+totalAdd;

  // дёҚи¶іжңҲй©—з®—зӣ®жЁҷ
  const proratedTarget=isPartial?Math.round(target/30*emp2.days):target;
  const verifySum=base+elastic+fixedOtPay; // жҮүвүҲproratedTarget

  return{
    target,proratedTarget,isPartial,employedDays:emp2.days,base,elastic,hourly,dailyBase,defOt,
    fixedOtHours,extraOtHours,tempOtSegs,tempOtList,W,
    fixedOtPay,extraOtPay,tempOtPay,otPayTotal,
    workDays,personalMins,absentDays,sickHours,
    personalDeduct,absentDeduct,sickDeduct,
    laborBase,healthBase,healthTotal,finalLabor,finalHealth,
    pensionRate,pensionAmt,dependents,insMode,
    annualComp,autoAnnualComp,redComp,autoRedComp,customAdds,customAddTotal,
    gross,totalDeduct,totalAdd,netPay,verifySum,
    insGrade:getInsGrade(emp),elasticManual:rec?.elasticManual
  };
}

function getDaysInMonth(y,m){return new Date(y,m,0).getDate();}
function dateStr(y,m,d){return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function getShift(shifts,emp,ds){return(shifts[ds]||[]).find(s=>String(s.empId)===String(emp.id)||normStore(s.empName)===normStore(emp.name));}
function storeEmps(store){return employees.filter(e=>normStore(e.workLocation)===normStore(store));}
function fmtMin(mins){mins=Math.round(mins);if(mins===0)return'0';const h=Math.floor(mins/60),m=mins%60;return`${h>0?h+'жҷӮ':''}${m>0?m+'еҲҶ':''}`||'0';}

// в”Җв”Җв”Җ и–ӘиіҮе–® в”Җв”Җв”Җ
function renderSheet(emp,rec,shifts,c){
  const days=getDaysInMonth(viewYear,viewMonth);
  const WD=['ж—Ҙ','дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ'];
  const locked=isMonthLocked(viewYear,viewMonth)&&CU.role!=='admin';
  const dis=locked?'disabled':'';
  const dd=rec?.dailyData||{};
  const defOt=c.defOt;
  const emp2=calcEmployedDays(emp,viewYear,viewMonth);
  const typeOpts=Object.entries(LEAVE_TYPES).map(([v,t])=>`<option value="${v}">${t.label}</option>`).join('');

  // еҚҠжңҲзҜ„еңҚ
  const startD=halfView==='first'?1:16;
  const endD=halfView==='first'?15:days;

  let rows='';
  for(let d=startD;d<=endD;d++){

          <div class="fml-item"><div class="fi-lbl">йЎҚеӨ–еҠ зҸӯ Г—1.67</div><div class="fi-val c-red">${c.extraOtHours}h вҶ’ $${Math.round(c.extraOtPay).toLocaleString()}</div></div>
          <div class="fml-item"><div class="fi-lbl">иҮЁжҷӮеҠ зҸӯ</div><div class="fi-val c-blue">${c.tempOtList.map(t=>`${t.hrs}hГ—${t.rate}`).join('+')||'вҖ”'} вҶ’ $${Math.round(c.tempOtPay).toLocaleString()}</div></div>

        <div class="eq-bar">
          <span>еҮәеӢӨ</span><span class="v">${Math.round(c.workDays*10)/10}еӨ©</span><span class="op">пҪң</span>
          <span>дәӢеҒҮ/йҒІеҲ°</span><span class="v">${fmtMin(c.personalMins)}</span><span class="op">пҪң</span>
          <span>з—…еҒҮ</span><span class="v">${fmtMin(c.sickHours*60)}</span><span class="op">пҪң</span>
          <span>жӣ иҒ·</span><span class="v">${Math.round(c.absentDays*10)/10}еӨ©</span>
        </div>
      </div>

      <div class="daily-sec">
        <div class="sec-title" style="margin-bottom:8px">рҹ“… жҜҸж—ҘеҮәеӢӨ
          <span style="font-size:10px;color:var(--text3);font-weight:400;margin-left:6px">жӯЈеёёж—ҘиҮӘеӢ•её¶е…Ҙеӣәе®ҡеҠ зҸӯпјҢеҸӘйңҖиҷ•зҗҶи«ӢеҒҮ/з•°еёё</span></div>

        <div class="daily-hd-row"><div style="text-align:center">ж—Ҙжңҹ</div><div>зҸӯж¬Ў</div><div>еҒҮеҲҘ</div>
          <div style="text-align:right">еӣәе®ҡеҠ зҸӯ</div><div style="text-align:right" class="col-ot2">йЎҚеӨ–еҠ зҸӯ</div><div style="text-align:right" class="col-late">йҒІеҲ°</div></div>

      <div class="ins-section">

            <select class="ins-sel" onchange="patchRec('insMode',this.value)" ${dis} style="width:100%">
              ${Object.entries(insModeLabel).map(([v,l])=>`<option value="${v}"${c.insMode===v?' selected':''}>${l}</option>`).join('')}</select></div>
          <div class="ins-item"><div class="ins-item-lbl">еӢһдҝқиҮӘиІ йЎҚ</div>
            <div class="ins-item-row"><div class="ins-item-val c-red">вҲ’$${c.finalLabor.toLocaleString()}</div>
            <input class="ded-input" type="number" value="${c.laborBase}" onchange="patchRec('laborDeduct',+this.value)" ${dis}></div>
            ${c.insMode==='new'?`<div style="font-size:10px;color:var(--green);margin-top:3px">йҰ–жңҲе…ҚжүЈе·Іжӯёйӣ¶</div>`:''}</div>
          <div class="ins-item"><div class="ins-item-lbl">еҒҘдҝқиҮӘиІ йЎҚ
            <select class="ins-sel" onchange="patchRec('dependents',+this.value)" ${dis}>${[0,1,2,3,4,5].map(n=>`<option value="${n}"${c.dependents===n?' selected':''}>жң¬дәә${n>0?'+зң·'+n:''}</option>`).join('')}</select></div>
            <div class="ins-item-row"><div class="ins-item-val c-red">вҲ’$${c.finalHealth.toLocaleString()}</div>
            <input class="ded-input" type="number" value="${c.healthBase}" onchange="patchRec('healthDeduct',+this.value)" ${dis}></div>
            ${c.dependents>0?`<div style="font-size:10px;color:var(--text3);margin-top:2px">еҗ«зң·еұ¬${c.dependents}дәә +$${(c.finalHealth-c.healthBase).toLocaleString()}</div>`:''}</div>
          <div class="ins-item"><div class="ins-item-lbl">иҮӘжҸҗйҖҖдј‘йҮ‘
            <select class="ins-sel" onchange="patchRec('pensionRate',+this.value)" ${dis}><option value="0"${c.pensionRate===0?' selected':''}>дёҚжҸҗ</option>${[1,2,3,4,5,6].map(p=>`<option value="${p/100}"${c.pensionRate===p/100?' selected':''}>${p}%</option>`).join('')}</select></div>
            <div class="ins-item-row"><div class="ins-item-val c-red">вҲ’$${c.pensionAmt.toLocaleString()}</div>${c.insGrade?`<div style="font-size:10px;color:var(--text3)">зҙҡи·қ$${c.insGrade.toLocaleString()}</div>`:''}</div></div>
        </div>
        ${c.insMode==='quit_prepay'?`<div style="font-size:11px;color:var(--orange);margin-top:8px;padding:7px 10px;background:var(--orange-bg);border-radius:7px;border:1px solid var(--orange-border)">вҡ пёҸ йӣўиҒ·й җжүЈпјҡжң¬жңҲе·Іе…ҲжүЈж¬ЎжңҲеӢһдҝқ $${c.laborBase.toLocaleString()} + еҒҘдҝқ $${c.healthTotal.toLocaleString()}пјҲйҡ”жңҲз„Ўи–ӘиіҮеҸҜжүЈпјҢж•…жҸҗеүҚжүЈйҷӨпјү</div>`:''}
      </div>

      <div class="ded-sec">
        <div class="sec-title">вһ– жүЈй …жҳҺзҙ°</div>
        <div class="ded-grid">
          <div class="ded-item"><div class="ded-lbl">дәӢеҒҮ<div class="ded-sub">${fmtMin(c.personalMins)}пјҲеҗ«йҒІеҲ°пјү</div></div><div class="ded-val">вҲ’$${c.personalDeduct.toLocaleString()}</div></div>
          <div class="ded-item"><div class="ded-lbl">з—…еҒҮ<div class="ded-sub">${fmtMin(c.sickHours*60)} Г— еҚҠи–Ә</div></div><div class="ded-val">вҲ’$${c.sickDeduct.toLocaleString()}</div></div>
          <div class="ded-item"><div class="ded-lbl">жӣ иҒ·<div class="ded-sub">${Math.round(c.absentDays*10)/10}еӨ©</div></div><div class="ded-val">вҲ’$${c.absentDeduct.toLocaleString()}</div></div>

          <div class="add-item">

            <input class="add-days" type="number" min="0" step="0.5" value="${c.annualComp}" placeholder="еӨ©" onchange="patchRec('annualComp',+this.value)" ${dis}>
            <span class="add-val">+$${c.autoAnnualComp.toLocaleString()}</span>
          </div>
          <div class="add-item">
            <span class="add-name">зҙ…еӯ—иЈңи–Ә <span style="font-size:10px;opacity:.7">ж—Ҙи–ӘГ—еӨ©ж•ё</span></span>
            <input class="add-days" type="number" min="0" step="0.5" value="${c.redComp}" placeholder="еӨ©" onchange="patchRec('redComp',+this.value)" ${dis}>
            <span class="add-val">+$${c.autoRedComp.toLocaleString()}</span>
          </div>
          ${customAddRows}
        </div>
        ${!locked?`<button class="btn-sm o" onclick="addCustomAdd()">+ ж–°еўһе…¶д»–еҠ й …</button>`:''}
      </div>

      <div class="netpay-bar">
        <div><div class="np-lbl">жң¬жңҲеҜҰй ҳи–ӘиіҮ</div>
          <div style="font-size:10px;color:rgba(255,255,255,.45);margin-top:2px">$${(c.base+Math.round(c.elastic)).toLocaleString()} еә•+еҪҲ пјӢ$${Math.round(c.otPayTotal).toLocaleString()} еҠ зҸӯ пјӢ$${c.totalAdd.toLocaleString()} еҠ й … вҲ’$${c.totalDeduct.toLocaleString()} жүЈй …</div></div>
        <div class="np-val" id="npDisp">$${Math.round(c.netPay).toLocaleString()}</div>
      </div>
      <div style="padding:0 16px 14px;display:flex;justify-content:flex-end;gap:8px">

    </div>`;
}

window.setHalf=function(h){halfView=h;refreshSheet();};
window.updType=async function(el){
  const type=el.value;
  el.className=`type-sel${LEAVE_TYPES[type]?.cls?' t-'+LEAVE_TYPES[type].cls:''}`;
  await patchDay(el.dataset.date,'type',type);
  await refreshSheet();
};
window.patchDay=async function(ds,field,value){
  if(!selectedEmpId)return;
  const rec=await loadRec(selectedEmpId,viewYear,viewMonth)||{dailyData:{}};
  if(!rec.dailyData)rec.dailyData={};if(!rec.dailyData[ds])rec.dailyData[ds]={};
  rec.dailyData[ds][field]=value;
  await saveRec(selectedEmpId,viewYear,viewMonth,rec);await refreshNum();
};
window.patchRec=async function(field,value){
  if(!selectedEmpId)return;
  const rec=await loadRec(selectedEmpId,viewYear,viewMonth)||{dailyData:{}};
  rec[field]=value;await saveRec(selectedEmpId,viewYear,viewMonth,rec);
  if(field==='elasticManual'||field==='dependents'||field==='insMode')await refreshSheet();else await refreshNum();
};
window.toggleTempOt=async function(ds){
  if(!selectedEmpId)return;
  const rec=await loadRec(selectedEmpId,viewYear,viewMonth)||{dailyData:{}};
  if(!rec.dailyData)rec.dailyData={};if(!rec.dailyData[ds])rec.dailyData[ds]={};
  rec.dailyData[ds].hasTempOt=!rec.dailyData[ds].hasTempOt;
  await saveRec(selectedEmpId,viewYear,viewMonth,rec);await refreshSheet();
};
window.addCustomAdd=async function(){
  const rec=await loadRec(selectedEmpId,viewYear,viewMonth)||{dailyData:{}};
  if(!rec.customAdds)rec.customAdds=[];rec.customAdds.push({name:'',amount:0});
  await saveRec(selectedEmpId,viewYear,viewMonth,rec);await refreshSheet();
};
window.updCustomAdd=async function(i,field,val){
  const rec=await loadRec(selectedEmpId,viewYear,viewMonth)||{dailyData:{}};
  if(!rec.customAdds||!rec.customAdds[i])return;
  rec.customAdds[i][field]=val;await saveRec(selectedEmpId,viewYear,viewMonth,rec);
  if(field==='amount')await refreshSheet();else await refreshNum();
};
window.delCustomAdd=async function(i){
  const rec=await loadRec(selectedEmpId,viewYear,viewMonth)||{dailyData:{}};
  if(!rec.customAdds)return;rec.customAdds.splice(i,1);
  await saveRec(selectedEmpId,viewYear,viewMonth,rec);await refreshSheet();
};

async function refreshNum(){
  const emp=employees.find(e=>String(e.id)===String(selectedEmpId));if(!emp)return;
  const[shifts,rec]=await Promise.all([loadShifts(selectedEmpId,viewYear,viewMonth),loadRec(selectedEmpId,viewYear,viewMonth)]);
  const c=calcSalary(emp,rec||{dailyData:{}},shifts);
  const el=document.getElementById('npDisp');if(el)el.textContent=`$${Math.round(c.netPay).toLocaleString()}`;
}
async function refreshSheet(){
  const emp=employees.find(e=>String(e.id)===String(selectedEmpId));if(!emp)return;
  const[shifts,rec]=await Promise.all([loadShifts(selectedEmpId,viewYear,viewMonth),loadRec(selectedEmpId,viewYear,viewMonth)]);
  renderSheet(emp,rec||{dailyData:{}},shifts,calcSalary(emp,rec||{dailyData:{}},shifts));
}

window.saveSheet=async function(){
  if(!selectedEmpId||isSaving)return;isSaving=true;showToast('е„ІеӯҳдёӯвҖҰ');
  const emp=employees.find(e=>String(e.id)===String(selectedEmpId));
  const[shifts,rec]=await Promise.all([loadShifts(selectedEmpId,viewYear,viewMonth),loadRec(selectedEmpId,viewYear,viewMonth)]);
  const record=rec||{dailyData:{}};const c=calcSalary(emp,record,shifts);
  record.snapshot={target:c.target,base:c.base,elastic:Math.round(c.elastic),otPayTotal:Math.round(c.otPayTotal),netPay:Math.round(c.netPay),isPartial:c.isPartial,employedDays:c.employedDays,savedAt:new Date().toISOString()};
  const ok=await saveRec(selectedEmpId,viewYear,viewMonth,record);
  if(ok){writeOpLog({editor:CU.name,role:CU.role,module:'salary',action:'е„Іеӯҳи–ӘиіҮ',detail:`${emp.name} ${viewYear}е№ҙ${viewMonth}жңҲ`});showToast('вң“ е·Іе„Іеӯҳ');}else showToast('вҡ пёҸ е„ІеӯҳеӨұж•—');
  isSaving=false;
};

function showToast(msg,d=2000){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),d);}
window.showToast=showToast;
